<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Hub</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#eab308">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        /* O IMPORT DA FONTE DEVE SER SEMPRE A PRIMEIRA LINHA PARA FUNCIONAR */
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        /* Esconde as telas principais no carregamento */
        #login-screen, #dashboard {
            display: none;
        }

        /* Tela de Loading que aparece primeiro */
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #090909;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #eab308;
            font-family: 'Special Elite', serif;
            font-size: 24px;
        }

        body { 
            background: #000;
            color: white; 
            font-family: 'Special Elite', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        #login-screen { display: flex; flex-direction: column; align-items: center; gap: 40px; text-align: center; }
        h1 { font-size: 3.5rem; letter-spacing: 8px; margin: 0; color: #fff; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        
        #dashboard { width: 95%; max-width: 1200px; padding: 40px 20px; text-align: center; }
        
        .tab-btn { 
            background: none; border: none; color: #444; 
            font-family: 'Special Elite', sans-serif; font-size: 1.1rem; 
            cursor: pointer; padding: 10px 15px; transition: 0.3s;
            border-bottom: 2px solid transparent;
        }
        .tab-btn:hover { color: #999; }

        #btn-jog.active { color: #EAB308; border-bottom-color: #EAB308; }
        #btn-ameacas.active { color: #b31d1d; border-bottom-color: #b31d1d; }
        #btn-mestre.active { color: #fff; border-bottom-color: #fff; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .ficha-card, .ameaca-card { 
            background: #0a0a0a; padding: 20px; border-radius: 4px; border: 1px solid #222;
            display: flex; align-items: center; justify-content: space-between; text-align: left; position: relative; transition: 0.2s;
        }
        .ficha-card { border-left: 5px solid #EAB308; }
        .ameaca-card { border-left: 5px solid #b31d1d; }
        .ficha-card:hover, .ameaca-card:hover { background: #111; border-color: #444; }
        
        .portrait-mini { width: 55px; height: 55px; border-radius: 3px; background: #151515; overflow: hidden; margin-right: 15px; border: 1px solid #333; }
        .portrait-mini img { width: 100%; height: 100%; object-fit: cover; }

        .btn-google { background: white; color: black; border: none; padding: 12px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; font-family: 'Special Elite', sans-serif; transition: 0.3s; margin-top: 10px; }
        .btn-google:hover { background: #ccc; }

        .btn-del-node {
            position: absolute; top: 8px; right: 8px; background: none; border: none;
            color: #333; font-family: 'Special Elite', sans-serif; font-size: 11px;
            cursor: pointer; transition: 0.3s; padding: 2px 5px; letter-spacing: 1px;
        }
        .btn-del-node:hover { color: #ff4444; text-shadow: 0 0 5px #ff4444; }

        .btn-open { color: inherit; text-decoration: none; font-size: 13px; font-weight: bold; padding: 5px 10px; border: 1px solid transparent; transition: 0.3s; }
        .ficha-card .btn-open { color: #EAB308; }
        .ameaca-card .btn-open { color: #b31d1d; }
        .btn-open:hover { border-color: currentColor; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="loading-screen">
        <span>CARREGANDO SISTEMA...</span>
    </div>

    <div id="login-screen">
        <h1>C.R.I.S.</h1>
        <p style="color: #666;">AUTENTICAÇÃO NECESSÁRIA</p>
        <button class="btn-google" onclick="login()">ACESSAR TERMINAL</button>
    </div>

    <div id="dashboard">
        <h2 id="welcome" style="color: #fff; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase;">JOGADOR: CONECTANDO...</h2>
        
        <div id="menu-abas" style="margin-bottom: 30px; border-bottom: 1px solid #222; display: flex; justify-content: center; gap: 20px;">
            <button id="btn-jog" class="tab-btn active" onclick="mudarAbaHub('jogador')">MEUS AGENTES</button> 
            <button id="btn-ameacas" class="tab-btn" style="display:none;" onclick="mudarAbaHub('ameacas')">AMEAÇAS</button>
            <button id="btn-mestre" class="tab-btn" style="display:none;" onclick="mudarAbaHub('mestre')">MONITORAMENTO</button>
        </div>

        <div id="hub-jogador" class="conteudo-hub">
            <div class="grid" id="lista-fichas"></div>
            <button class="btn-google" onclick="criarNovaFicha()" style="background:#111; color:white; border:1px solid #333;">+ REGISTRAR AGENTE</button>
        </div>

        <div id="hub-ameacas" class="conteudo-hub" style="display: none;">
            <div id="lista-ameacas" class="grid" style="max-width: 900px; margin: 0 auto;"></div>
            <button class="btn-google" style="background: #200; color: #b31d1d; border: 1px solid #b31d1d;" onclick="criarNovaAmeaca()">+ IDENTIFICAR AMEAÇA</button>
        </div>

        <div id="hub-mestre" class="conteudo-hub" style="display:none;">
            <div id="monitor-mestre" class="grid"></div>
        </div>

        <br><br>
        <button onclick="firebase.auth().signOut()" style="background:transparent; color:#333; border:none; cursor:pointer; font-family: 'Special Elite'; font-size: 10px;">ENCERRAR SESSÃO</button>
    </div>

    <script>
        // ATIVA O MODO APLICATIVO (PASSO 3 - PARTE B)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        document.addEventListener("DOMContentLoaded", () => {
            const estavaLogado = localStorage.getItem('cris_logado') === 'true';
            if (estavaLogado) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('loading-screen').style.display = 'none';
            }
        });

        const firebaseConfig = {
            apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const EMAIL_MESTRE = "pedroacpr@gmail.com";

        auth.onAuthStateChanged(user => {
            const loading = document.getElementById('loading-screen');
            const loginSec = document.getElementById('login-screen');
            const hubSec = document.getElementById('dashboard');
            const btnAmeacas = document.getElementById('btn-ameacas');
            const btnMestre = document.getElementById('btn-mestre');
            const welcomeText = document.getElementById('welcome');

            if (user) {
                localStorage.setItem('cris_logado', 'true');
                loginSec.style.display = 'none';
                hubSec.style.display = 'block';
                
                // Exibe o nome do jogador (ou email) na tela
                welcomeText.innerText = `JOGADOR: ${user.email}`;

                if (user.email === EMAIL_MESTRE) {
                    btnAmeacas.style.display = 'inline-block';
                    btnMestre.style.display = 'inline-block';
                } else {
                    btnAmeacas.style.display = 'none';
                    btnMestre.style.display = 'none';
                }

                carregarFichasJogador(user.uid);
                listarAmeacas();
                carregarMonitorMestre();
            } else {
                localStorage.setItem('cris_logado', 'false');
                loginSec.style.display = 'block';
                hubSec.style.display = 'none';
                btnAmeacas.style.display = 'none';
                btnMestre.style.display = 'none';
                welcomeText.innerText = "SISTEMA ONLINE"; // Reseta o texto
            }

            setTimeout(() => {
                loading.style.display = 'none';
            }, 300);
        });

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function mudarAbaHub(aba) {
            document.querySelectorAll('.conteudo-hub').forEach(d => d.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('hub-' + aba).style.display = 'block';
            if (aba === 'jogador') document.getElementById('btn-jog').classList.add('active');
            if (aba === 'ameacas') document.getElementById('btn-ameacas').classList.add('active');
            if (aba === 'mestre') document.getElementById('btn-mestre').classList.add('active');
        }

        async function deletarDocumento(colecao, id, nome) {
            if (colecao === 'fichas') {
                const digitado = prompt(`ATENÇÃO: Você está prestes a apagar o agente ${nome.toUpperCase()}.\nDigite EXCLUIR para confirmar:`);
                if (digitado === "EXCLUIR") {
                    await db.collection(colecao).doc(id).delete();
                } else if (digitado !== null) {
                    alert("Palavra incorreta. A exclusão foi cancelada.");
                }
            } else {
                if (confirm(`CONFIRMAR EXCLUSÃO DE: ${nome.toUpperCase()}?`)) {
                    await db.collection(colecao).doc(id).delete();
                }
            }
        }

        function carregarFichasJogador(uid) {
            db.collection("fichas").where("dono", "==", uid).onSnapshot(snap => {
                const div = document.getElementById('lista-fichas');
                div.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const px = d.pX ?? 50; const py = d.pY ?? 50; const pz = d.pZ ?? 1;
                    div.innerHTML += `
                        <div class="ficha-card">
                            <button class="btn-del-node" onclick="deletarDocumento('fichas', '${doc.id}', '${d.nome || 'Agente'}')">[ APAGAR ]</button>
                            <div style="display:flex; align-items:center; flex:1">
                                <div class="portrait-mini" style="overflow: hidden; position: relative;">
                                    ${d.portrait ? `<img src="${d.portrait}" style="width: 100%; height: 100%; object-fit: cover; object-position: ${px}% ${py}%; transform: scale(${pz});">` : ''}
                                </div>
                                <div>
                                    <strong>${d.nome || 'AGENTE'}</strong><br>
                                    <small style="color:#666">NEX ${d.nex || '5%'}</small>
                                </div>
                            </div>
                            <a href="ficha.html?id=${doc.id}" class="btn-open">ACESSAR</a>
                        </div>`;
                });
            });
        }

        function listarAmeacas() {
            db.collection("ameacas").onSnapshot(snap => {
                const div = document.getElementById("lista-ameacas");
                div.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const px = d.pX || 50; const py = d.pY || 50; const pz = d.pZ || 1;
                    div.innerHTML += `
                        <div class="ameaca-card">
                            <button class="btn-del-node" onclick="deletarDocumento('ameacas', '${doc.id}', '${d.nome}')">[ APAGAR ]</button>
                            <div style="display:flex; align-items:center; flex:1">
                                <div class="portrait-mini" style="border-color:#b31d1d; overflow: hidden; position: relative;">
                                    ${d.portrait ? `<img src="${d.portrait}" style="width: 100%; height: 100%; object-fit: cover; object-position: ${px}% ${py}%; transform: scale(${pz});">` : ''}
                                </div>
                                <div>
                                    <strong style="color:#fff">${d.nome}</strong><br>
                                    <small style="color:#b31d1d">VD ${d.vd} | ${d.elemento}</small>
                                </div>
                            </div>
                            <a href="ameaca.html?id=${doc.id}" class="btn-open">ARQUIVO</a>
                        </div>`;
                });
            });
        }

        function carregarMonitorMestre() {
            db.collection("fichas").onSnapshot(snap => {
                const div = document.getElementById('monitor-mestre');
                div.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const px = d.pX ?? 50; const py = d.pY ?? 50; const pz = d.pZ ?? 1;
                    div.innerHTML += `
                        <div class="ficha-card" style="border-left-color:#444">
                            <button class="btn-del-node" onclick="deletarDocumento('fichas', '${doc.id}', '${d.nome || 'Agente'}')">[ APAGAR ]</button>
                            <div style="display:flex; align-items:center; flex:1">
                                <div class="portrait-mini" style="overflow: hidden; position: relative; border-color: #444;">
                                    ${d.portrait ? `<img src="${d.portrait}" style="width: 100%; height: 100%; object-fit: cover; object-position: ${px}% ${py}%; transform: scale(${pz});">` : ''}
                                </div>
                                <div>
                                    <strong>${d.nome || 'AGENTE'}</strong> <small style="color:#666">| NEX ${d.nex || '5%'}</small><br>
                                    <small style="color:#b31d1d">PV ${d.vidaAtual || 0}/${d.vidaMax || 0}</small> | 
                                    <small style="color:#034374">SAN ${d.sanAtual || 0}/${d.sanMax || 0}</small>
                                </div>
                            </div>
                            <a href="ficha.html?id=${doc.id}" class="btn-open" style="color:#666">VER</a>
                        </div>`;
                });
            });
        }

        async function criarNovaFicha() {
            const user = auth.currentUser;
            const ref = await db.collection("fichas").add({ dono: user.uid, nome: "NOVO AGENTE", nex: "5%", vidaAtual: 20, vidaMax: 20, sanAtual: 20, sanMax: 20, peAtual: 2, peMax: 2, pX: 50, pY: 50, pZ: 1 });
            window.location.href = `ficha.html?id=${ref.id}`;
        }

        async function criarNovaAmeaca() {
            const user = auth.currentUser;
            const ref = await db.collection("ameacas").add({ dono: user.uid, nome: "ALVO NÃO IDENTIFICADO", elemento: "SANGUE", vd: "20", pvAtual: 100, pvMax: 100, pX: 50, pY: 50, pZ: 1 });
            window.location.href = `ameaca.html?id=${ref.id}`;
        }
    </script>
</body>
</html>
