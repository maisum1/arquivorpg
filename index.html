<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Sistema de Rituais</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Roboto:wght@400;700&display=swap');

        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            padding: 20px;
            margin: 0;
        }

        /* Interface C.R.I.S */
        #rit {
            max-width: 800px;
            margin: 20px auto;
        }

        .rit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
        }

        .dt-container { display: flex; align-items: center; gap: 10px; }
        .dt-label { font-family: 'Special Elite', cursive; font-size: 1.1em; color: #aaa; }
        .dt-box { 
            background: #111; border: 1px solid #555; color: #fff; 
            padding: 5px 15px; border-radius: 4px; font-family: 'Special Elite', cursive; 
        }

        .cris-btn {
            background: transparent; border: 1px solid #fff; color: #fff;
            padding: 8px 16px; text-transform: uppercase; font-weight: bold;
            cursor: pointer; font-family: 'Special Elite', cursive; transition: 0.2s;
        }
        .cris-btn:hover { background: #fff; color: #000; }
        .cris-btn.danger { border-color: #ff4444; color: #ff4444; }
        .cris-btn.danger:hover { background: #ff4444; color: #fff; }
        .cris-btn.save { border-color: #00e676; color: #00e676; margin-right: 10px;}
        .cris-btn.save:hover { background: #00e676; color: #000; }

        /* Cards */
        .ritual-card {
            background: #121212; border-left: 5px solid #555; border-radius: 4px;
            margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        /* Element Colors */
        .ritual-card[data-elem="Conhecimento"] { border-left-color: #d4af37; }
        .ritual-card[data-elem="Energia"] { border-left-color: #9b59b6; }
        .ritual-card[data-elem="Morte"] { border-left-color: #555; }
        .ritual-card[data-elem="Sangue"] { border-left-color: #bf1e1e; }
        .ritual-card[data-elem="Medo"] { border-left-color: #fff; }

        .card-header {
            padding: 12px 15px; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03);
        }
        .card-title { font-family: 'Special Elite', cursive; text-transform: uppercase; }
        .card-body { display: none; padding: 15px; border-top: 1px solid #333; }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px; margin-bottom: 15px; background: #0a0a0a; padding: 12px;
        }

        .stat-label { font-size: 0.7em; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        
        .cris-input, .cris-select, .cris-textarea {
            background: transparent; border: none; border-bottom: 1px solid #444;
            color: #fff; width: 100%; padding: 5px 0; font-family: 'Roboto', sans-serif;
        }
        .cris-textarea { min-height: 80px; border: 1px solid #333; padding: 8px; margin-top: 5px; }

        .upgrade-section { margin-top: 15px; padding: 10px; border: 1px dashed #444; }
        .upgrade-title { font-size: 0.8em; color: #aaa; font-weight: bold; margin-bottom: 5px; }

        .acoes-container { margin-top: 20px; display: flex; justify-content: flex-end; }
        
        #link-compartilhar {
            font-size: 0.8em; color: #666; text-align: center; margin-top: 40px;
        }
    </style>
</head>
<body>

    <div id="rit">
        <div class="rit-header">
            <div class="dt-container">
                <span class="dt-label">DT RITUAIS</span>
                <div id="dtRituais" class="dt-box">0</div>
            </div>
            <button class="cris-btn" onclick="novoRitual()">+ ADICIONAR RITUAL</button>
        </div>

        <div id="listaRituais">
            <p style="text-align:center; color:#555;">Iniciando sistema...</p>
        </div>

        <div id="link-compartilhar"></div>
    </div>

    <script>
        // --- 1. CONFIGURAÇÃO ---
        const firebaseConfig = {
            apiKey: "AIzaSyBO3ytDF4stqlHA2h7qUP8fLcLsEwB3jNI",
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9",
            measurementId: "G-0LQNEFTCB5"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- 2. LÓGICA DE FICHA ---
        const urlParams = new URLSearchParams(window.location.search);
        let atual = urlParams.get('id');

        async function inicializarFicha() {
            if (!atual) {
                // Se não houver ID, cria uma nova ficha
                const ref = db.collection("fichas").doc();
                atual = ref.id;
                await ref.set({ criadoEm: firebase.firestore.FieldValue.serverTimestamp() });
                // Atualiza a URL sem recarregar totalmente, ou recarrega para limpar
                window.location.search = `?id=${atual}`;
            } else {
                document.getElementById('link-compartilhar').innerText = "Seu link único: " + window.location.href;
                carregarRituais();
            }
        }

        function carregarRituais() {
            db.collection("fichas").doc(atual).collection("rituais")
              .orderBy("circulo", "asc")
              .onSnapshot(snapshot => {
                const container = document.getElementById("listaRituais");
                container.innerHTML = "";
                document.getElementById("dtRituais").textContent = snapshot.size;

                if(snapshot.empty) {
                    container.innerHTML = "<p style='text-align:center; color:#444;'>Seu grimório está vazio.</p>";
                    return;
                }

                snapshot.forEach(doc => {
                    renderizarCard(doc.id, doc.data(), container);
                });
            });
        }

        function renderizarCard(id, data, container) {
            const card = document.createElement("div");
            card.className = "ritual-card";
            card.setAttribute("data-elem", data.elemento || "Morte");
            card.id = `card-${id}`;

            card.innerHTML = `
                <div class="card-header" onclick="toggleRitual('${id}')">
                    <span class="card-title">${data.circulo}º - ${data.nome || 'Novo Ritual'}</span>
                    <span style="font-size:0.8em; opacity:0.6">${data.elemento}</span>
                </div>
                <div class="card-body" id="body-${id}">
                    <div style="margin-bottom:15px;">
                        <span class="stat-label">Nome</span>
                        <input type="text" class="cris-input" id="nome-${id}" value="${data.nome || ''}">
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-label">Elemento</span>
                            <select class="cris-select" id="elem-${id}" onchange="atualizarCor('${id}', this.value)">
                                <option value="Conhecimento" ${data.elemento == 'Conhecimento' ? 'selected' : ''}>Conhecimento</option>
                                <option value="Energia" ${data.elemento == 'Energia' ? 'selected' : ''}>Energia</option>
                                <option value="Morte" ${data.elemento == 'Morte' ? 'selected' : ''}>Morte</option>
                                <option value="Sangue" ${data.elemento == 'Sangue' ? 'selected' : ''}>Sangue</option>
                                <option value="Medo" ${data.elemento == 'Medo' ? 'selected' : ''}>Medo</option>
                            </select>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Círculo</span>
                            <input type="number" class="cris-input" id="circ-${id}" value="${data.circulo || 1}">
                        </div>
                        <div class="stat-item"><span class="stat-label">Execução</span><input type="text" class="cris-input" id="exec-${id}" value="${data.execucao || ''}"></div>
                        <div class="stat-item"><span class="stat-label">Alcance</span><input type="text" class="cris-input" id="alc-${id}" value="${data.alcance || ''}"></div>
                    </div>
                    <span class="stat-label">Efeito</span>
                    <textarea class="cris-textarea" id="desc-${id}">${data.descricao || ''}</textarea>
                    
                    <div class="upgrade-section">
                        <div class="upgrade-title">DISCENTE (+${data.peDisc || 2} PE)</div>
                        <textarea class="cris-textarea" id="disc-${id}">${data.discente || ''}</textarea>
                    </div>

                    <div class="acoes-container">
                        <button class="cris-btn save" onclick="salvar('${id}')">Salvar</button>
                        <button class="cris-btn danger" onclick="remover('${id}')">Apagar</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        }

        // --- 3. AÇÕES ---
        async function novoRitual() {
            await db.collection("fichas").doc(atual).collection("rituais").add({
                nome: "Novo Ritual",
                elemento: "Morte",
                circulo: 1,
                execucao: "Padrão",
                alcance: "Curto",
                descricao: "",
                discente: "",
                peDisc: 2
            });
        }

        async function salvar(id) {
            const updates = {
                nome: document.getElementById(`nome-${id}`).value,
                elemento: document.getElementById(`elem-${id}`).value,
                circulo: parseInt(document.getElementById(`circ-${id}`).value),
                execucao: document.getElementById(`exec-${id}`).value,
                alcance: document.getElementById(`alc-${id}`).value,
                descricao: document.getElementById(`desc-${id}`).value,
                discente: document.getElementById(`disc-${id}`).value
            };
            await db.collection("fichas").doc(atual).collection("rituais").doc(id).update(updates);
            alert("Salvo com sucesso!");
        }

        async function remover(id) {
            if(confirm("Excluir ritual?")) {
                await db.collection("fichas").doc(atual).collection("rituais").doc(id).delete();
            }
        }

        function toggleRitual(id) {
            const b = document.getElementById(`body-${id}`);
            b.style.display = b.style.display === "block" ? "none" : "block";
        }

        function atualizarCor(id, val) {
            document.getElementById(`card-${id}`).setAttribute("data-elem", val);
        }

        // Iniciar
        inicializarFicha();
    </script>
</body>
</html>
