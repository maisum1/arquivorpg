<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.R.Q.U.I.V.O. - Hub</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a68a64">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;700&display=swap');

        /* Esconde as telas principais no carregamento */
        #login-screen, #dashboard { display: none; }

        /* Tela de Loading */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; display: flex; justify-content: center; align-items: center;
            z-index: 9999; color: #a68a64; font-family: 'Crimson Text', serif; font-size: 24px; font-weight: bold; letter-spacing: 2px;
        }

        body { 
            background: #121212; color: #d3d3d3; 
            font-family: 'Inter', sans-serif; margin: 0; display: flex; 
            align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden;
        }
        
        #login-screen { display: flex; flex-direction: column; align-items: center; gap: 30px; text-align: center; }
        h1 { font-size: 3.5rem; letter-spacing: 12px; margin: 0; color: #e0e0e0; font-family: 'Crimson Text', serif; border-bottom: 1px solid #404040; padding-bottom: 10px;}
        
        #dashboard { width: 95%; max-width: 1200px; padding: 40px 20px; text-align: center; }
        
        .tab-btn { 
            background: none; border: none; color: #666; 
            font-family: 'Crimson Text', serif; font-size: 1.2rem; font-weight: bold; letter-spacing: 1px;
            cursor: pointer; padding: 10px 15px; transition: 0.3s; border-bottom: 2px solid transparent;
        }
        .tab-btn:hover { color: #a68a64; }

        #btn-jog.active { color: #a68a64; border-bottom-color: #a68a64; }
        #btn-ameacas.active { color: #8b1c1c; border-bottom-color: #8b1c1c; }
        #btn-mestre.active { color: #e0e0e0; border-bottom-color: #e0e0e0; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .ficha-card, .ameaca-card { 
            background: #181818; padding: 20px; border-radius: 2px; border: 1px solid #333;
            display: flex; align-items: center; justify-content: space-between; text-align: left; position: relative; transition: 0.2s;
        }
        .ficha-card { border-left: 4px solid #a68a64; }
        .ameaca-card { border-left: 4px solid #8b1c1c; }
        .ficha-card:hover, .ameaca-card:hover { background: #1f1f1f; border-color: #555; }
        
        .portrait-mini { width: 55px; height: 55px; border-radius: 2px; background: #111; overflow: hidden; margin-right: 15px; border: 1px solid #404040; }
        .portrait-mini img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(20%) contrast(110%); }

        .btn-google { 
            background: #e0e0e0; color: #121212; border: 1px solid #fff; padding: 12px 25px; 
            border-radius: 2px; font-weight: bold; cursor: pointer; font-family: 'Inter', sans-serif; transition: 0.3s; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-google:hover { background: #a68a64; color: #121212; border-color: #a68a64;}

        .btn-del-node {
            position: absolute; top: 8px; right: 8px; background: none; border: none;
            color: #555; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: bold;
            cursor: pointer; transition: 0.3s; padding: 2px 5px; letter-spacing: 1px;
        }
        .btn-del-node:hover { color: #8b1c1c; }

        .btn-open { color: inherit; text-decoration: none; font-family: 'Crimson Text', serif; font-size: 14px; font-weight: bold; padding: 5px 10px; border: 1px solid transparent; transition: 0.3s; letter-spacing: 1px; }
        .ficha-card .btn-open { color: #a68a64; }
        .ameaca-card .btn-open { color: #8b1c1c; }
        .btn-open:hover { border-color: currentColor; background: rgba(255,255,255,0.03); }
    </style>
</head>
<body>
    <div id="loading-screen">ACESSANDO ARQUIVOS...</div>

    <div id="login-screen">
        <h1>A.R.Q.U.I.V.O.</h1>
        <p style="color: #666; font-family: 'Crimson Text', serif; font-style: italic; font-size: 1.1rem;">Credenciais Necessárias</p>
        <button class="btn-google" onclick="login()">IDENTIFICAR-SE</button>
    </div>

    <div id="dashboard">
        <h2 id="welcome" style="color: #a68a64; font-family: 'Crimson Text', serif; font-size: 1.4rem; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 30px;">AGENTE: CONECTANDO...</h2>
        
        <div id="menu-abas" style="margin-bottom: 30px; border-bottom: 1px solid #222; display: flex; justify-content: center; gap: 20px;">
            <button id="btn-jog" class="tab-btn active" onclick="mudarAbaHub('jogador')">DOSSIÊS PESSOAIS</button> 
            <button id="btn-ameacas" class="tab-btn" style="display:none;" onclick="mudarAbaHub('ameacas')">REGISTRO DE ENTIDADES</button>
            <button id="btn-mestre" class="tab-btn" style="display:none;" onclick="mudarAbaHub('mestre')">ARQUIVOS CONFIDENCIAIS</button>
        </div>

        <div id="hub-jogador" class="conteudo-hub">
            <div class="grid" id="lista-fichas"></div>
            <button class="btn-google" onclick="criarNovaFicha()" style="background:#181818; color:#a68a64; border:1px solid #a68a64; margin-top: 30px;">+ NOVO DOSSIÊ</button>
        </div>

        <div id="hub-ameacas" class="conteudo-hub" style="display: none;">
            <div id="lista-ameacas" class="grid" style="max-width: 900px; margin: 0 auto;"></div>
            <button class="btn-google" style="background: #1a0a0a; color: #8b1c1c; border: 1px solid #8b1c1c; margin-top: 30px;" onclick="criarNovaAmeaca()">+ NOVA ANOMALIA</button>
        </div>

        <div id="hub-mestre" class="conteudo-hub" style="display:none;">
            <div id="monitor-mestre" class="grid"></div>
        </div>

        <br><br>
        <button onclick="firebase.auth().signOut()" style="background:transparent; color:#555; border:none; cursor:pointer; font-family: 'Inter'; font-size: 11px; font-weight: bold; letter-spacing: 1px; margin-top: 40px; transition: 0.3s;">ENCERRAR SESSÃO</button>
    </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }

        document.addEventListener("DOMContentLoaded", () => {
            const estavaLogado = localStorage.getItem('cris_logado') === 'true';
            if (estavaLogado) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('loading-screen').style.display = 'none';
            }
        });

        const firebaseConfig = {
            apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const EMAIL_MESTRE = "pedroacpr@gmail.com";

        auth.onAuthStateChanged(user => {
            const loading = document.getElementById('loading-screen');
            const loginSec = document.getElementById('login-screen');
            const hubSec = document.getElementById('dashboard');
            const btnAmeacas = document.getElementById('btn-ameacas');
            const btnMestre = document.getElementById('btn-mestre');
            const welcomeText = document.getElementById('welcome');

            if (user) {
                localStorage.setItem('cris_logado', 'true');
                loginSec.style.display = 'none';
                hubSec.style.display = 'block';
                
                const nomeUsuario = user.displayName ? user.displayName : user.email;
                welcomeText.innerText = `AGENTE: ${nomeUsuario}`;

                if (user.email === EMAIL_MESTRE) {
                    btnAmeacas.style.display = 'inline-block';
                    btnMestre.style.display = 'inline-block';
                } else {
                    btnAmeacas.style.display = 'none';
                    btnMestre.style.display = 'none';
                }

                carregarFichasJogador(user.uid);
                listarAmeacas();
                carregarMonitorMestre();
            } else {
                localStorage.setItem('cris_logado', 'false');
                loginSec.style.display = 'block';
                hubSec.style.display = 'none';
                btnAmeacas.style.display = 'none';
                btnMestre.style.display = 'none';
                welcomeText.innerText = "SISTEMA DESCONECTADO";
            }
            setTimeout(() => { loading.style.display = 'none'; }, 300);
        });

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function mudarAbaHub(aba) {
            document.querySelectorAll('.conteudo-hub').forEach(d => d.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('hub-' + aba).style.display = 'block';
            if (aba === 'jogador') document.getElementById('btn-jog').classList.add('active');
            if (aba === 'ameacas') document.getElementById('btn-ameacas').classList.add('active');
            if (aba === 'mestre') document.getElementById('btn-mestre').classList.add('active');
        }

        async function deletarDocumento(colecao, id, nome) {
            if (colecao === 'fichas') {
                const digitado = prompt(`ATENÇÃO: Este dossiê será incinerado permanentemente: ${nome.toUpperCase()}.\nDigite EXCLUIR para confirmar:`);
                if (digitado === "EXCLUIR") { await db.collection(colecao).doc(id).delete(); } 
                else if (digitado !== null) { alert("Operação cancelada."); }
            } else {
                if (confirm(`CONFIRMAR DESTRUIÇÃO DE ARQUIVO: ${nome.toUpperCase()}?`)) { await db.collection(colecao).doc(id).delete(); }
            }
        }

        function carregarFichasJogador(uid) {
            db.collection("fichas").where("dono", "==", uid).onSnapshot(snap => {
                const div = document.getElementById('lista-fichas');
                div.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const px = d.pX ?? 50; const py = d.pY ?? 50; const pz = d.pZ ?? 1;
                    div.innerHTML += `
                        <div class="ficha-card">
                            <button class="btn-del-node" onclick="deletarDocumento('fichas', '${doc.id}', '${d.nome || 'Sujeito'}')">[ X ]</button>
                            <div style="display:flex; align-items:center; flex:1">
                                <div class="portrait-mini" style="overflow: hidden; position: relative;">
                                    ${d.portrait ? `<img src="${d.portrait}" style="object-position: ${px}% ${py}%; transform: scale(${pz});">` : ''}
                                </div>
                                <div>
                                    <strong style="font-family: 'Crimson Text', serif; font-size: 1.1rem; letter-spacing: 1px;">${d.nome || 'SUJEITO DESCONHECIDO'}</strong><br>
                                    <small style="color:#888; font-family: 'Inter', sans-serif;">EXP ${d.nex || '5%'}</small>
                                </div>
                            </div>
                            <a href="ficha.html?id=${doc.id}" class="btn-open">ABRIR</a>
                        </div>`;
                });
            });
        }

        function listarAmeacas() {
            db.collection("ameacas").onSnapshot(snap => {
                const div = document.getElementById("lista-ameacas");
                div.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const px = d.pX || 50; const py = d.pY || 50; const pz = d.pZ || 1;
                    div.innerHTML += `
                        <div class="ameaca-card">
                            <button class="btn-del-node" onclick="deletarDocumento('ameacas', '${doc.id}', '${d.nome}')">[ X ]</button>
                            <div style="display:flex; align-items:center; flex:1">
                                <div class="portrait-mini" style="border-color:#8b1c1c; overflow: hidden; position: relative;">
                                    ${d.portrait ? `<img src="${d.portrait}" style="object-position: ${px}% ${py}%; transform: scale(${pz});">` : ''}
                                </div>
                                <div>
                                    <strong style="color:#fff; font-family: 'Crimson Text', serif; font-size: 1.1rem;">${d.nome}</strong><br>
                                    <small style="color:#8b1c1c; font-family: 'Inter', sans-serif; font-weight: bold;">VD ${d.vd} | ${d.elemento}</small>
                                </div>
                            </div>
                            <a href="ameaca.html?id=${doc.id}" class="btn-open">INSPECIONAR</a>
                        </div>`;
                });
            });
        }

        function carregarMonitorMestre() {
            db.collection("fichas").onSnapshot(snap => {
                const div = document.getElementById('monitor-mestre');
                div.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const px = d.pX ?? 50; const py = d.pY ?? 50; const pz = d.pZ ?? 1;
                    div.innerHTML += `
                        <div class="ficha-card" style="border-left-color:#404040">
                            <button class="btn-del-node" onclick="deletarDocumento('fichas', '${doc.id}', '${d.nome || 'Sujeito'}')">[ X ]</button>
                            <div style="display:flex; align-items:center; flex:1">
                                <div class="portrait-mini" style="overflow: hidden; position: relative; border-color: #404040;">
                                    ${d.portrait ? `<img src="${d.portrait}" style="object-position: ${px}% ${py}%; transform: scale(${pz});">` : ''}
                                </div>
                                <div>
                                    <strong style="font-family: 'Crimson Text', serif;">${d.nome || 'SUJEITO'}</strong> <small style="color:#888">| EXP ${d.nex || '5%'}</small><br>
                                    <small style="color:#a68a64; font-size:9px; text-transform:uppercase;">AGENTE: ${d.nomeJogador || 'Desconhecido'}</small><br>
                                    <small style="color:#8b1c1c; font-weight: bold;">VIT ${d.vidaAtual || 0}/${d.vidaMax || 0}</small> <span style="color:#444">|</span> 
                                    <small style="color:#2f4f4f; font-weight: bold;">LUC ${d.sanAtual || 0}/${d.sanMax || 0}</small>
                                </div>
                            </div>
                            <a href="ficha.html?id=${doc.id}" class="btn-open" style="color:#888">VER</a>
                        </div>`;
                });
            });
        }

        async function criarNovaFicha() {
            const user = auth.currentUser;
            const nomeJogador = user.displayName ? user.displayName : user.email;
            const ref = await db.collection("fichas").add({ 
                dono: user.uid, nomeJogador: nomeJogador, nome: "NOVO SUJEITO", nex: "5%", 
                forca: 0, agilidade: 0, sagacidade: 0, vigor: 0, vontade: 0,
                vidaAtual: 12, vidaMax: 12, sanAtual: 12, sanMax: 12, peAtual: 1, peMax: 1, 
                pX: 50, pY: 50, pZ: 1 
            });
            window.location.href = `ficha.html?id=${ref.id}`;
        }

        async function criarNovaAmeaca() {
            const user = auth.currentUser;
            const ref = await db.collection("ameacas").add({ dono: user.uid, nome: "ENTIDADE DESCONHECIDA", elemento: "SANGUE", vd: "20", pvAtual: 100, pvMax: 100, pX: 50, pY: 50, pZ: 1 });
            window.location.href = `ameaca.html?id=${ref.id}`;
        }
    </script>
</body>
</html>
