<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        
        body { 
            background: #000; 
            color: white; 
            font-family: 'Special Elite', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        #login-screen { display: flex; flex-direction: column; align-items: center; gap: 40px; text-align: center; }
        h1 { font-size: 3.5rem; letter-spacing: 8px; margin: 0; color: #fff; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        
        #dashboard { display: none; width: 95%; max-width: 1200px; padding: 40px 20px; text-align: center; }
        
        .tab-btn { background: none; border: none; color: #555; font-family: 'Special Elite', sans-serif; font-size: 1.1rem; cursor: pointer; padding: 10px 15px; transition: 0.3s; }
        .tab-btn.active { color: #EAB308; border-bottom: 2px solid #EAB308; }
        .tab-btn:hover { color: white; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .ficha-card { 
            background: #111; 
            padding: 15px; 
            border-radius: 8px; 
            border-left: 4px solid #EAB308; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            text-align: left; 
            position: relative;
        }
        
        .portrait-mini { width: 50px; height: 50px; border-radius: 5px; background: #222; overflow: hidden; position: relative; margin-right: 15px; border: 1px solid #333; }

        .btn-google { background: white; color: black; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; font-family: 'Special Elite', sans-serif; transition: 0.3s; }
        .btn-google:hover { background: #ccc; transform: scale(1.05); }

        .ameaca-card { background: #111; border-left: 4px solid #b31d1d; padding: 15px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; text-align: left; margin-bottom: 10px; position: relative;}

        /* Botão de Excluir Pequeno */
        .btn-del-small {
            background: transparent;
            color: #444;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 5px;
            transition: 0.3s;
        }
        .btn-del-small:hover { color: #ff4444; }

        .card-info { display: flex; align-items: center; flex: 1; }
        .card-links { text-align: right; display: flex; flex-direction: column; gap: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>C.R.I.S.</h1>
        <p style="color: #666;">Sistema de Reconhecimento de Agentes</p>
        <button class="btn-google" onclick="login()">ACESSAR SISTEMA</button>
    </div>

    <div id="dashboard">
        <h2 id="welcome" style="color: #EAB308;">Agente Conectado</h2>
        
        <div id="menu-abas" style="margin-bottom: 30px; border-bottom: 1px solid #222; display: flex; justify-content: center; gap: 10px;">
            <button id="btn-jog" class="tab-btn active" onclick="mudarAbaHub('jogador')">Meus Agentes</button> 
            <button id="btn-ameacas" class="tab-btn" style="display:none;" onclick="mudarAbaHub('ameacas')">AMEAÇAS</button>
            <button id="btn-mestre" class="tab-btn" style="display:none;" onclick="mudarAbaHub('mestre')">Painel do Mestre</button>
        </div>

        <div id="hub-jogador" class="conteudo-hub">
            <div class="grid" id="lista-fichas"></div>
            <button class="btn-google" onclick="criarNovaFicha()" style="margin-top:30px; background:#222; color:white; border:1px solid #444;">+ Novo Agente</button>
        </div>

        <div id="hub-ameacas" class="conteudo-hub" style="display: none; width: 100%; max-width: 800px; margin: 0 auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #b31d1d; padding-bottom: 10px; margin-bottom: 20px;">
                <h2 style="color: #b31d1d; margin: 0;">ARQUIVO DE AMEAÇAS</h2>
                <button class="btn-google" style="background: #b31d1d; color: white; border: none; padding: 10px 15px; font-size: 14px;" onclick="criarNovaAmeaca()">+ NOVA AMEAÇA</button>
            </div>
            <div id="lista-ameacas"></div>
        </div>

        <div id="hub-mestre" class="conteudo-hub" style="display:none;">
            <div id="monitor-mestre" class="grid"></div>
        </div>

        <br><br>
        <button onclick="firebase.auth().signOut()" style="background:transparent; color:gray; border:none; cursor:pointer; font-family: sans-serif; font-size: 12px;">Desconectar Terminal</button>
    </div>

    <script>
        // --- COLOQUE SEUS DADOS DO FIREBASE AQUI ---
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const EMAIL_MESTRE = "pedroacpr@gmail.com"; 

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('welcome').innerText = `Agente: ${user.displayName || 'Conectado'}`;
                carregarFichasJogador(user.uid);
                if (user.email === EMAIL_MESTRE) {
                    document.getElementById('btn-mestre').style.display = 'inline-block';
                    document.getElementById('btn-ameacas').style.display = 'inline-block';
                    carregarMonitorMestre();
                    listarAmeacas();
                }
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'none';
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }

        function mudarAbaHub(aba) {
            document.querySelectorAll('.conteudo-hub').forEach(d => d.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (aba === 'jogador') { document.getElementById('hub-jogador').style.display = 'block'; document.getElementById('btn-jog').classList.add('active'); }
            else if (aba === 'ameacas') { document.getElementById('hub-ameacas').style.display = 'block'; document.getElementById('btn-ameacas').classList.add('active'); }
            else if (aba === 'mestre') { document.getElementById('hub-mestre').style.display = 'block'; document.getElementById('btn-mestre').classList.add('active'); }
        }

        // --- EXCLUSÃO COM CONFIRMAÇÃO ---
        async function deletarDocumento(colecao, id, nome) {
            if (confirm(`DESEJA REALMENTE EXCLUIR [ ${nome.toUpperCase()} ]?\nEsta ação é permanente.`)) {
                await db.collection(colecao).doc(id).delete();
            }
        }

        // --- CARREGAR AGENTES ---
        function carregarFichasJogador(uid) {
            db.collection("fichas").where("dono", "==", uid).onSnapshot(snap => {
                const div = document.getElementById('lista-fichas');
                div.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    div.innerHTML += `
                        <div class="ficha-card">
                            <div class="card-info">
                                <div class="portrait-mini">
                                    ${d.portrait ? `<img src="${d.portrait}" style="width:100%; height:100%; object-fit:cover;">` : ''}
                                </div>
                                <div>
                                    <strong>${d.nome || 'Agente'}</strong><br>
                                    <small>${d.nex || '5%'}</small>
                                </div>
                            </div>
                            <div class="card-links">
                                <a href="ficha.html?id=${doc.id}" style="color:#EAB308; text-decoration:none; font-size:12px; font-weight:bold;">ABRIR</a>
                                <button class="btn-del-small" onclick="deletarDocumento('fichas', '${doc.id}', '${d.nome}')">excluir</button>
                            </div>
                        </div>`;
                });
            });
        }

        // --- CARREGAR AMEAÇAS ---
        function listarAmeacas() {
            db.collection("ameacas").onSnapshot(snap => {
                const div = document.getElementById("lista-ameacas");
                div.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    div.innerHTML += `
                        <div class="ameaca-card">
                            <div class="card-info">
                                <div class="portrait-mini" style="border-color: #b31d1d">
                                    ${d.portrait ? `<img src="${d.portrait}" style="width: 100%; height: 100%; object-fit: cover;">` : ''}
                                </div>
                                <div>
                                    <strong style="color: #fff;">${d.nome}</strong><br>
                                    <small style="color: #aaa;">VD: ${d.vd} | ${d.elemento}</small>
                                </div>
                            </div>
                            <div class="card-links">
                                <a href="ameaca.html?id=${doc.id}" style="color: #b31d1d; text-decoration: none; font-weight: bold; font-size: 12px;">EDITAR</a>
                                <button class="btn-del-small" onclick="deletarDocumento('ameacas', '${doc.id}', '${d.nome}')">excluir</button>
                            </div>
                        </div>`;
                });
            });
        }

        // --- MONITOR DO MESTRE ---
        function carregarMonitorMestre() {
            db.collection("fichas").onSnapshot(snap => {
                const div = document.getElementById('monitor-mestre');
                div.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    div.innerHTML += `
                        <div class="ficha-card" style="border-left-color: #555;">
                            <div class="card-info">
                                <div>
                                    <strong>${d.nome}</strong><br>
                                    <small style="color:#b31d1d">PV: ${d.vidaAtual}/${d.vidaMax}</small> | 
                                    <small style="color:#034374">SAN: ${d.sanAtual}/${d.sanMax}</small>
                                </div>
                            </div>
                            <div class="card-links">
                                <a href="ficha.html?id=${doc.id}" style="color:gray; text-decoration:none; font-size:10px;">VER</a>
                                <button class="btn-del-small" onclick="deletarDocumento('fichas', '${doc.id}', '${d.nome}')">excluir</button>
                            </div>
                        </div>`;
                });
            });
        }

        async function criarNovaFicha() {
            const user = auth.currentUser;
            const ref = await db.collection("fichas").add({ dono: user.uid, nome: "Novo Agente", nex: "5%", vidaAtual: 20, vidaMax: 20, sanAtual: 20, sanMax: 20, peAtual: 2, peMax: 2 });
            window.location.href = `ficha.html?id=${ref.id}`;
        }

        async function criarNovaAmeaca() {
            const user = auth.currentUser;
            const ref = await db.collection("ameacas").add({ dono: user.uid, nome: "Nova Criatura", elemento: "Sangue", vd: "20", pvAtual: 100, pvMax: 100 });
            window.location.href = `ameaca.html?id=${ref.id}`;
        }
    </script>
</body>
</html>
