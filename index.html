<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        body { background: #000; color: white; font-family: 'Special Elite', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* Resolve o desalinhamento: organiza em coluna com espaço entre eles */
        #login-screen { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 40px; 
            text-align: center;
        }

        h1 { font-size: 3.5rem; letter-spacing: 8px; margin: 0; }

        .btn-google { 
            background: white; color: black; border: none; padding: 15px 30px; 
            border-radius: 5px; font-weight: bold; cursor: pointer; font-family: sans-serif;
            transition: 0.3s;
        }
        .btn-google:hover { transform: scale(1.1); background: #eee; }

        #dashboard { display: none; width: 90%; max-width: 800px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 8px; text-decoration: none; color: white; transition: 0.3s; }
        .card:hover { border-color: #6d28d9; background: #1a1a1a; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>C.R.I.S.</h1>
        <button class="btn-google" onclick="fazerLogin()">Entrar com Google</button>
    </div>

    <div id="dashboard">
        <h2 id="welcome">Agente Conectado</h2>
        <div class="grid" id="lista-fichas"></div>
        <button onclick="criarNovaFicha()" style="margin-top:30px; padding:10px; cursor:pointer;">+ Novo Agente</button>
        <br><br>
        <button onclick="firebase.auth().signOut()" style="background:transparent; color:gray; border:none; cursor:pointer;">Sair da Conta</button>
    </div>

    <script>
        // Use a chave da "Nova Browser key" que você configurou no Google Cloud
        const firebaseConfig = {
            apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI", 
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Monitor de Login
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('welcome').innerText = "Agente: " + user.displayName;
                carregarFichas(user.uid);
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'none';
            }
        });

        // Função de Login que estava dando erro de "not defined"
        function fazerLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(error => {
                alert("Erro ao logar: " + error.message);
                console.error(error);
            });
        }

        async function criarNovaFicha() {
            const user = auth.currentUser;
            const ref = await db.collection("fichas").add({
                dono: user.uid,
                nome: "Novo Agente",
                nex: "5%"
            });
            window.location.href = `ficha.html?id=${ref.id}`;
        }

        function carregarFichas(uid) {
            db.collection("fichas").where("dono", "==", uid).onSnapshot(snap => {
                const container = document.getElementById('lista-fichas');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    container.innerHTML += `<a href="ficha.html?id=${doc.id}" class="card">
                        <strong>${d.nome || 'Sem Nome'}</strong><br>
                        <small>NEX: ${d.nex || '5%'}</small>
                    </a>`;
                });
            });
        }
    </script>
</body>
</html>
