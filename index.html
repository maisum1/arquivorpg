<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.R.Q.U.I.V.O. - Hub</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#dcd7cb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        /* Importação padronizada da Ficha (incluindo Crimson Text) */
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;700;900&family=Special+Elite&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Libre+Barcode+39+Text&display=swap');

        /* Paleta exata da Ficha */
        :root {
            --op-red: #9e0b0f; --op-dark-red: #5a0000; --op-ink: #1a1a1a;
            --bg-desk: #121211; --bg-paper: #dcd7cb; --paper-shadow: 0 20px 50px rgba(0,0,0,0.9);
            --card-bg: rgba(0,0,0,0.03); --card-border: rgba(0,0,0,0.15); --card-hover: rgba(0,0,0,0.08);
            --cris-purple: var(--op-ink); --hp-red: var(--op-red); --san-purple: #2b3a4a; --pe-orange: #665235; 
            --cor-geral: #666; --sigilo-ring: #4a3a2a; --cor-morte: #2b2a2a;
            --accent-gold: #a68a64;
        }

        /* --- TEMA ESCURO (Sincronizado com a Ficha) --- */
        body.tema-escuro {
            --bg-paper: #161616; --op-ink: #d4d4d4; --op-red: #cc2929;
            --paper-shadow: 0 20px 50px rgba(0,0,0,1);
            --card-bg: rgba(255,255,255,0.02); --card-border: rgba(255,255,255,0.08); --card-hover: rgba(255,255,255,0.06);
            --san-purple: #6a829e; --pe-orange: #a88a61; --cor-geral: #888; --sigilo-ring: #c0c0c0; 
            --accent-gold: #a68a64;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%) !important;
        }

        /* Cores nos títulos para o Modo Escuro */
        body.tema-escuro h1 {
            color: #ffffff !important;
            border-bottom-color: var(--card-border) !important;
        }
        
        body.tema-escuro h2#welcome, 
        body.tema-escuro .mestre-panel h3 {
            color: var(--accent-gold) !important;
            border-bottom-color: var(--card-border) !important;
        }

        /* Esconde as telas principais no carregamento */
        #login-screen, #dashboard { display: none; }

        /* Tela de Loading */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-paper); display: flex; justify-content: center; align-items: center;
            z-index: 9999; color: var(--op-ink); font-family: 'Special Elite', monospace; font-size: 24px; font-weight: bold; letter-spacing: 2px;
        }

        /* --- O CORPO DA PÁGINA AGORA É O ARQUIVO MANCHADO --- */
        /* --- O CORPO DA PÁGINA COM TRANSIÇÃO SUAVE --- */
        body { 
            background-color: var(--bg-paper);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 115, 85, 0.08) 0%, transparent 25%),
                radial-gradient(circle at 85% 15%, rgba(100, 80, 60, 0.06) 0%, transparent 30%),
                radial-gradient(circle at 90% 85%, rgba(120, 100, 80, 0.07) 0%, transparent 25%),
                radial-gradient(circle at 15% 80%, rgba(150, 130, 100, 0.05) 0%, transparent 35%),
                radial-gradient(circle at 50% 45%, rgba(110, 90, 70, 0.04) 0%, transparent 40%),
                radial-gradient(circle at center, transparent 30%, rgba(85, 55, 30, 0.35) 120%),
                url('data:image/svg+xml,%3Csvg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="300" height="300" filter="url(%23noise)" opacity="0.07"/%3E%3C/svg%3E'),
                linear-gradient(to right, rgba(0,0,0,0.05) 0%, transparent 3%, transparent 97%, rgba(0,0,0,0.05) 100%);
            color: var(--op-ink); 
            font-family: 'Courier Prime', monospace; margin: 0; display: flex; 
            align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden;
            padding: 20px; box-sizing: border-box;
        }

        body.tema-escuro {
            --bg-paper: #161616; --op-ink: #d4d4d4; --op-red: #cc2929;
            --paper-shadow: 0 20px 50px rgba(0,0,0,1);
            --card-bg: rgba(255,255,255,0.02); --card-border: rgba(255,255,255,0.08); --card-hover: rgba(255,255,255,0.06);
            --san-purple: #6a829e; --pe-orange: #a88a61; --cor-geral: #888; --sigilo-ring: #c0c0c0; 
            --accent-gold: #a68a64;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%) !important;
        }
        
        #login-screen { display: flex; flex-direction: column; align-items: center; gap: 30px; text-align: center; padding: 60px 20px; width: 100%; max-width: 800px; }
        
        h1 { font-family: 'Crimson Text', serif; font-size: 3.5rem; font-weight: 900; letter-spacing: 4px; margin: 0; color: var(--op-ink); border-bottom: 4px double var(--op-ink); padding-bottom: 10px;}
        .barcode { font-family: 'Libre Barcode 39 Text', cursive; font-size: 40px; color: var(--op-ink); line-height: 0.8;}
        
        #dashboard { width: 100%; max-width: 1050px; padding: 20px; text-align: center; margin: 20px 0;}
        
        .tab-btn { 
            background: transparent; border: 1px dashed transparent; color: var(--cor-geral); 
            font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 900; letter-spacing: 1px;
            cursor: pointer; padding: 12px 15px; transition: 0.2s; text-transform: uppercase; border-radius: 2px;
        }
        .tab-btn:hover { color: var(--op-ink); }

        /* ABA ATIVA (Identica a da Ficha) */
        .tab-btn.active {
            background: var(--op-ink) !important; color: var(--bg-paper) !important; 
            font-family: 'Crimson Text', serif !important; font-weight: 900 !important; 
            text-transform: uppercase !important; letter-spacing: 2px !important; 
            padding: 6px 15px !important; box-shadow: 3px 3px 0px rgba(0,0,0,0.4) !important; 
            border: none !important; text-shadow: none !important;
        }
        body.tema-escuro .tab-btn.active { 
            background: #222 !important; color: var(--accent-gold) !important; 
            box-shadow: 3px 3px 0px #000 !important; border: 1px solid #333 !important; 
        }

        /* --- CORES ESPECÍFICAS PARA ABAS DO HUB --- */
        #btn-ameacas.active { background: var(--op-red) !important; color: #ffffff !important; }
        #btn-mestre.active { background: #693d1d !important; color: #ffffff !important; text-shadow: 1px 1px 2px rgba(0,0,0,0.8) !important; }
        
        body.tema-escuro #btn-ameacas.active { background: var(--op-red) !important; color: #ffffff !important; border-color: var(--op-dark-red) !important; text-shadow: none !important; }
        body.tema-escuro #btn-mestre.active { background: #5c4a3d !important; color: #ffffff !important; border-color: #3d2a1d !important; text-shadow: 1px 1px 2px rgba(0,0,0,0.8) !important; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .ficha-card, .ameaca-card { 
            background: var(--card-bg); padding: 20px; border-radius: 2px; border: 1px solid var(--card-border);
            display: flex; align-items: center; justify-content: space-between; text-align: left; position: relative; transition: 0.3s;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.02);
        }
        .ficha-card { border-left: 5px solid var(--op-ink); }
        .ameaca-card { border-left: 5px solid var(--op-red); }
        .ficha-card:hover, .ameaca-card:hover { background: var(--card-hover); border-color: var(--op-ink); transform: translateY(-2px); }
        body.tema-escuro .ameaca-card:hover { border-color: var(--op-red); }
        
        .portrait-mini { width: 55px; height: 55px; background: #e0e0e0; overflow: hidden; margin-right: 15px; border: 3px solid #fff; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); transform: rotate(-2deg); }
        .portrait-mini img { width: 100%; height: 100%; object-fit: cover; }

        /* BOTOES GERAIS */
        .btn-google { 
            background: rgba(0,0,0,0.04); color: var(--accent-gold); /* Alterado de --op-ink para --accent-gold */border: 1px dashed var(--accent-gold); /* Alterado para combinar com o texto */
            padding: 10px 20px; font-weight: bold; cursor: pointer; font-family: 'Courier Prime', monospace; transition: 0.3s; margin-top: 10px; 
            text-transform: uppercase; font-size: 14px; border-radius: 2px;
        }
        body.tema-escuro .btn-google { background: rgba(255,255,255,0.04); }
        .btn-google:hover { background: rgba(128,128,128,0.2); }

        /* Ícones de Ação */
        .btn-action-node {
            position: absolute; background: none; border: none;
            color: var(--op-red); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: bold;
            cursor: pointer; transition: 0.2s; opacity: 0.7; padding: 4px;
        }
        .btn-action-node:hover { opacity: 1; transform: scale(1.1); }
        .btn-action-node.btn-del { top: 8px; right: 8px; }
        .btn-action-node.btn-copy { top: 8px; right: 40px; color: var(--op-ink); }
        
        body:not(.tema-escuro) .btn-action-node.btn-copy { filter: grayscale(100%) brightness(0); }
        body.tema-escuro .btn-action-node.btn-copy { filter: grayscale(100%) brightness(200%); }
        
        .btn-open { color: var(--op-ink); text-decoration: none; font-family: 'Special Elite', monospace; font-size: 16px; font-weight: bold; padding: 5px 10px; border-bottom: 1px dotted var(--card-border); transition: 0.3s; }
        .btn-open:hover { border-bottom-color: var(--op-red); background: rgba(0,0,0,0.05); }
        body.tema-escuro .btn-open:hover { background: rgba(255,255,255,0.05); }

        /* Mestre Panel */
        .mestre-panel {
            background: var(--card-bg); border: 1px solid var(--card-border); border-left: 5px solid var(--cor-geral); padding: 20px; margin-bottom: 30px; text-align: left; border-radius: 2px;
        }
        .mestre-btn {
            background: rgba(0,0,0,0.04); border: 1px dashed var(--op-ink); color: var(--op-ink); padding: 10px; cursor: pointer; flex: 1; font-family: 'Courier Prime', monospace; font-weight: bold; font-size: 12px; transition: 0.3s; border-radius: 2px; text-transform: uppercase;
        }
        body.tema-escuro .mestre-btn { background: rgba(255,255,255,0.04); }
        .mestre-btn:hover { background: rgba(128,128,128,0.2); }
        .mestre-btn.red { border-color: var(--op-red); color: var(--op-red); }

        /* Botão Tema */
        .btn-theme { position: fixed; top: 15px; right: 20px; z-index: 999; background: none; border: none; color: #555; font-size: 24px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .btn-theme:hover { opacity: 1; transform: scale(1.1); color: var(--op-ink);}
    </style>
</head>
<body>
    <button class="btn-theme" onclick="alternarTema()" title="Alternar Modo Escuro/Claro">🌗</button>
    
    <div id="loading-screen">ACESSANDO ARQUIVOS...</div>

    <div id="login-screen">
        <div>
            <h1>A.R.Q.U.I.V.O.</h1>
            <div class="barcode">*IDENTIFICACAO*</div>
        </div>
        <p style="color: #555; font-family: 'Special Elite', monospace; font-size: 1.1rem;">Acesso restrito a jogadores autorizados.</p>
        <button class="btn-google" onclick="login()">[ CARIMBAR CREDENCIAIS ]</button>
    </div>

    <div id="dashboard">
        <h2 id="welcome" style="color: var(--op-ink); font-family: 'Crimson Text', serif; font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; border-bottom: 2px dotted var(--op-ink); padding-bottom: 15px; margin-bottom: 30px;">JOGADOR: CONECTANDO...</h2>
        
        <div id="menu-abas" style="margin-bottom: 30px; border-bottom: 1px dotted var(--card-border); padding-bottom: 15px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
            <button id="btn-jog" class="tab-btn active" onclick="mudarAbaHub('jogador')">MINHAS PERSONAS</button> 
            <button id="btn-ameacas" class="tab-btn" style="display:none;" onclick="mudarAbaHub('ameacas')">REGISTRO DE ENTIDADES</button>
            <button id="btn-mestre" class="tab-btn" style="display:none;" onclick="mudarAbaHub('mestre')">ARQUIVOS CONFIDENCIAIS</button>
        </div>

        <div id="hub-jogador" class="conteudo-hub">
            <div class="grid" id="lista-fichas"></div>
            <button class="btn-google" onclick="criarNovaFicha()" style="margin-top: 30px;">[+] ANEXAR NOVA PERSONA</button>
        </div>

        <div id="hub-ameacas" class="conteudo-hub" style="display: none;">
            <div id="lista-ameacas" class="grid" style="max-width: 900px; margin: 0 auto;"></div>
            <button class="btn-google" style="border-color: var(--op-red); color: var(--op-red); margin-top: 30px;" onclick="criarNovaAmeaca()">[+] DOCUMENTAR ANOMALIA</button>
        </div>

       <div id="hub-mestre" class="conteudo-hub" style="display:none;">
            <div class="mestre-panel">
                <h3 style="color: var(--op-ink); font-family: 'Crimson Text', serif; font-weight: 900; font-size: 1.2rem; margin-top: 0; text-transform: uppercase; letter-spacing: 1px;">⚙️ Controle Diretor</h3>
                <p style="font-size: 12px; color: var(--cor-geral); margin-bottom: 15px; font-family: 'Inter', sans-serif;">Alterações de status aplicadas globalmente em tempo real.</p>
                
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <button onclick="toggleGlobal('revelado')" class="mestre-btn">
                        [ 👁️ ERGUER O VÉU ]
                    </button>
                    <button onclick="toggleGlobal('extremos')" class="mestre-btn red">
                        [ 🩸 ATIVAR 100% NEX ]
                    </button>
                    <button onclick="toggleGlobal('hexatombe')" class="mestre-btn red" style="border-style: solid;">
                        [ 💀 PROTOCOLO HEXATOMBE ]
                    </button>
                </div>
            </div>
            
            <div id="monitor-mestre" class="grid"></div>
        </div>

        <br><br>
        <button onclick="firebase.auth().signOut()" style="background:transparent; color:var(--cor-geral); border:none; cursor:pointer; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: bold; letter-spacing: 1px; margin-top: 40px; transition: 0.3s;">ENCERRAR ACESSO</button>
    </div>

    <script>
        // --- GERENCIAMENTO DE TEMA ---
        function alternarTema() {
            document.body.classList.toggle('tema-escuro');
            const isEscuro = document.body.classList.contains('tema-escuro');
            localStorage.setItem('temaFichaAmeaca', isEscuro ? 'escuro' : 'claro');
            
            // Atualiza a cor da barra de status do celular
            document.querySelector('meta[name="theme-color"]').setAttribute("content", isEscuro ? "#161616" : "#dcd7cb");
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            // Usa a mesma chave do localStorage para manter consistência entre páginas
            if (localStorage.getItem('temaFichaAmeaca') === 'escuro') {
                document.body.classList.add('tema-escuro');
                document.querySelector('meta[name="theme-color"]').setAttribute("content", "#161616");
            }
        });

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }

        document.addEventListener("DOMContentLoaded", () => {
            const estavaLogado = localStorage.getItem('cris_logado') === 'true';
            if (estavaLogado) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('loading-screen').style.display = 'none';
            }
        });

        const firebaseConfig = {
            apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const EMAIL_MESTRE = "pedroacpr@gmail.com";

        function copiarLink(id) {
            const url = window.location.origin + window.location.pathname.replace(/index\.html.*/, '') + 'ficha.html?id=' + id;
            navigator.clipboard.writeText(url);
            alert('Link de Compartilhamento Copiado!\nEnvie para o jogador para que ele possa Assumir a Posse.');
        }

        function toggleGlobal(campo) {
            const docRef = db.collection("configuracoes").doc("globais");
            
            docRef.get().then((doc) => {
                let estadoAtual = false;
                if(doc.exists && doc.data()[campo]) { estadoAtual = doc.data()[campo]; }
                
                let o = {}; o[campo] = !estadoAtual;
                
                docRef.set(o, { merge: true }).then(() => {
                    alert(`Segredo Mestre [ ${campo.toUpperCase()} ] foi ${!estadoAtual ? "LIGADO" : "DESLIGADO"} para todos.`);
                });
            }).catch((e) => {
                console.error("Erro no toggleGlobal: ", e);
                alert("Erro ao alterar! Verifique as permissões de Escrita da coleção 'configuracoes'.");
            });
        }

        auth.onAuthStateChanged(user => {
            const loading = document.getElementById('loading-screen');
            const loginSec = document.getElementById('login-screen');
            const hubSec = document.getElementById('dashboard');
            const btnAmeacas = document.getElementById('btn-ameacas');
            const btnMestre = document.getElementById('btn-mestre');
            const welcomeText = document.getElementById('welcome');

            if (user) {
                localStorage.setItem('cris_logado', 'true');
                loginSec.style.display = 'none';
                hubSec.style.display = 'block';
                
                const nomeUsuario = user.displayName ? user.displayName : user.email;
                welcomeText.innerText = `JOGADOR: ${nomeUsuario}`;

                if (user.email === EMAIL_MESTRE) {
                    btnAmeacas.style.display = 'inline-block';
                    btnMestre.style.display = 'inline-block';
                } else {
                    btnAmeacas.style.display = 'none';
                    btnMestre.style.display = 'none';
                }

                carregarFichasJogador(user.uid);
                listarAmeacas();
                carregarMonitorMestre();
            } else {
                localStorage.setItem('cris_logado', 'false');
                loginSec.style.display = 'block';
                hubSec.style.display = 'none';
                btnAmeacas.style.display = 'none';
                btnMestre.style.display = 'none';
                welcomeText.innerText = "SISTEMA DESCONECTADO";
            }
            setTimeout(() => { loading.style.display = 'none'; }, 300);
        });

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function mudarAbaHub(aba) {
            document.querySelectorAll('.conteudo-hub').forEach(d => d.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('hub-' + aba).style.display = 'block';
            if (aba === 'jogador') document.getElementById('btn-jog').classList.add('active');
            if (aba === 'ameacas') document.getElementById('btn-ameacas').classList.add('active');
            if (aba === 'mestre') document.getElementById('btn-mestre').classList.add('active');
        }

        async function deletarDocumento(colecao, id, nome) {
            if (colecao === 'fichas') {
                const digitado = prompt(`ATENÇÃO: Esta persona será incinerado permanentemente: ${nome.toUpperCase()}.\nDigite EXCLUIR para confirmar:`);
                if (digitado === "EXCLUIR") { await db.collection(colecao).doc(id).delete(); } 
                else if (digitado !== null) { alert("Operação cancelada."); }
            } else {
                if (confirm(`CONFIRMAR DESTRUIÇÃO DE ARQUIVO: ${nome.toUpperCase()}?`)) { await db.collection(colecao).doc(id).delete(); }
            }
        }

        function carregarFichasJogador(uid) {
            db.collection("fichas").where("dono", "==", uid).onSnapshot(snap => {
                const div = document.getElementById('lista-fichas');
                div.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const px = d.pX ?? 50; const py = d.pY ?? 50; const pz = d.pZ ?? 1;
                    div.innerHTML += `
                        <div class="ficha-card">
                            <button class="btn-action-node btn-copy" onclick="copiarLink('${doc.id}')" title="Copiar Link">[ 🔗 ]</button>
                            <button class="btn-action-node btn-del" onclick="deletarDocumento('fichas', '${doc.id}', '${d.nome || 'Persona'}')">[ X ]</button>
                            <div style="display:flex; align-items:center; flex:1">
                                <div class="portrait-mini" style="overflow: hidden; position: relative;">
                                    ${d.portrait ? `<img src="${d.portrait}" style="object-position: ${px}% ${py}%; transform: scale(${pz});">` : ''}
                                </div>
                                <div>
                                    <strong style="color: var(--op-ink); font-family: 'Crimson Text', serif; font-size: 1.1rem; font-weight: 900; letter-spacing: 1px;">${d.nome || 'PERSONA DESCONHECIDA'}</strong><br>
                                    <small style="font-family: 'Special Elite', monospace; color: var(--cor-geral);">EXP ${d.nex || '5%'}</small>
                                </div>
                            </div>
                            <a href="ficha.html?id=${doc.id}" class="btn-open">ABRIR</a>
                        </div>`;
                });
            });
        }

        function listarAmeacas() {
            db.collection("ameacas").onSnapshot(snap => {
                const div = document.getElementById("lista-ameacas");
                div.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const px = d.pX || 50; const py = d.pY || 50; const pz = d.pZ || 1;
                    div.innerHTML += `
                        <div class="ameaca-card">
                            <button class="btn-action-node btn-del" onclick="deletarDocumento('ameacas', '${doc.id}', '${d.nome}')">[ X ]</button>
                            <div style="display:flex; align-items:center; flex:1">
                                <div class="portrait-mini" style="border-color:var(--op-red); overflow: hidden; position: relative;">
                                    ${d.portrait ? `<img src="${d.portrait}" style="object-position: ${px}% ${py}%; transform: scale(${pz});">` : ''}
                                </div>
                                <div>
                                    <strong style="color: var(--op-ink); font-family: 'Crimson Text', serif; font-size: 1.1rem; font-weight: 900; letter-spacing: 1px;">${d.nome}</strong><br>
                                    <small style="color:var(--op-red); font-family: 'Special Elite', monospace; font-weight: bold;">VD ${d.vd} | ${d.elemento}</small>
                                </div>
                            </div>
                            <a href="ameaca.html?id=${doc.id}" class="btn-open">INSPECIONAR</a>
                        </div>`;
                });
            });
        }

        function carregarMonitorMestre() {
            db.collection("fichas").onSnapshot(snap => {
                const div = document.getElementById('monitor-mestre');
                div.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const px = d.pX ?? 50; const py = d.pY ?? 50; const pz = d.pZ ?? 1;
                    div.innerHTML += `
                        <div class="ficha-card" style="border-left-color:var(--cor-geral);">
                            <button class="btn-action-node btn-copy" onclick="copiarLink('${doc.id}')" title="Copiar Link para Transferir">[ 🔗 ]</button>
                            <button class="btn-action-node btn-del" onclick="deletarDocumento('fichas', '${doc.id}', '${d.nome || 'Persona'}')">[ X ]</button>
                            <div style="display:flex; align-items:center; flex:1">
                                <div class="portrait-mini" style="overflow: hidden; position: relative; border-color: var(--card-border);">
                                    ${d.portrait ? `<img src="${d.portrait}" style="object-position: ${px}% ${py}%; transform: scale(${pz});">` : ''}
                                </div>
                                <div>
                                    <strong style="color: var(--op-ink); font-family: 'Crimson Text', serif; font-weight: 900; font-size: 1.1rem; letter-spacing: 1px;">${d.nome || 'PERSONA'}</strong> <small style="color:var(--cor-geral); font-family: 'Special Elite', monospace;">| EXP ${d.nex || '5%'}</small><br>
                                    <small style="color:var(--op-ink); font-family: 'Inter', sans-serif; font-size:9px; text-transform:uppercase; font-weight:bold;">Jogador: ${d.nomeJogador || 'Desconhecido'}</small><br>
                                    <small style="color:var(--op-red); font-family: 'Inter', sans-serif; font-weight: bold; letter-spacing: 1px;">VIT ${d.vidaAtual || 0}/${d.vidaMax || 0}</small> <span style="color:var(--cor-geral)">|</span> 
                                    <small style="color:var(--san-purple); font-family: 'Inter', sans-serif; font-weight: bold; letter-spacing: 1px;">LUC ${d.sanAtual || 0}/${d.sanMax || 0}</small>
                                </div>
                            </div>
                            <a href="ficha.html?id=${doc.id}" class="btn-open">VER</a>
                        </div>`;
                });
            });
        }

        async function criarNovaFicha() {
            const user = auth.currentUser;
            const nomeJogador = user.displayName ? user.displayName : user.email;
            const ref = await db.collection("fichas").add({ 
                dono: user.uid, nomeJogador: nomeJogador, nome: "NOVA PERSONA", nex: "5%", 
                forca: 0, agilidade: 0, sagacidade: 0, vigor: 0, vontade: 0,
                vidaAtual: 12, vidaMax: 12, sanAtual: 50, sanMax: 50, peAtual: 2, peMax: 2, 
                pX: 50, pY: 50, pZ: 1 
            });
            window.location.href = `ficha.html?id=${ref.id}`;
        }

        async function criarNovaAmeaca() {
            const user = auth.currentUser;
            const ref = await db.collection("ameacas").add({ dono: user.uid, nome: "ENTIDADE DESCONHECIDA", elemento: "SANGUE", vd: "20", pvAtual: 100, pvMax: 100, pX: 50, pY: 50, pZ: 1 });
            window.location.href = `ameaca.html?id=${ref.id}`;
        }
    </script>
</body>
</html>
