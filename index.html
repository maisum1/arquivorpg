<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Ficha Avançada</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --hp-red: #cc0000;
            --san-purple: #6a0dad;
            --pe-orange: #ff8c00;
        }

        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 20px;
        }

        /* REMOVER SETINHAS DOS INPUTS DE NÚMERO */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }

        .grid-container {
            display: grid;
            grid-template-columns: 350px 1fr 400px;
            gap: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* SIGILO DE ATRIBUTOS */
        .sigilo-container {
            position: relative; width: 260px; height: 260px;
            margin: 20px auto;
            background: url('https://www.ordemparanormal.com.br/assets/rituais/circulo_atributos.png') no-repeat center;
            background-size: contain;
        }
        .attr-box {
            position: absolute; width: 55px; height: 55px;
            background: #000; border: 2px solid #fff; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .attr-box input {
            background: transparent; border: none; color: #fff; text-align: center;
            width: 100%; font-size: 20px; font-family: 'Special Elite';
        }
        .attr-label { font-size: 9px; font-weight: bold; color: #aaa; }
        .agi { top: 0; left: 102px; }
        .for { top: 75px; left: 5px; }
        .int { top: 75px; right: 5px; }
        .pre { bottom: 20px; left: 45px; }
        .vig { bottom: 20px; right: 45px; }

        /* BARRAS DE STATUS DINÂMICAS */
        .status-container { margin-bottom: 15px; }
        .status-label-row {
            display: flex; justify-content: space-between; 
            font-family: 'Special Elite'; font-size: 13px; margin-bottom: 5px;
        }
        .max-input {
            background: transparent; border: none; color: #fff;
            width: 35px; text-align: right; border-bottom: 1px dashed #555;
        }

        .bar-bg {
            width: 100%; height: 35px; background: #1a1a1a; 
            border: 1px solid #000; position: relative; display: flex; align-items: center;
        }
        .bar-fill { height: 100%; transition: width 0.4s ease-in-out; position: absolute; left: 0; top: 0; }
        .vida-fill { background: var(--hp-red); }
        .san-fill { background: var(--san-purple); }
        .pe-fill { background: var(--pe-orange); }

        .bar-content {
            position: relative; z-index: 2; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 20px;
        }
        .bar-content input {
            background: transparent; border: none; color: #fff; 
            text-align: center; font-size: 20px; font-weight: bold; width: 50px;
        }
        .bar-btn { cursor: pointer; font-size: 24px; font-weight: bold; user-select: none; }

        /* PERÍCIAS */
        .pericia-row {
            display: grid; grid-template-columns: 1fr 50px 50px 70px;
            align-items: center; padding: 5px; border-bottom: 1px solid #111;
        }
        .pericia-name { font-size: 13px; }
        .pericia-attr { color: #555; font-size: 10px; }
        .treino-select {
            background: #111; color: #fff; border: 1px solid #333; font-size: 12px;
        }

    </style>
</head>
<body>

<div class="grid-container">
    
    <section>
        <div class="sigilo-container">
            <div class="attr-box agi"><span class="attr-label">AGI</span><input type="number" id="attr-agi" onchange="salvarFicha()"></div>
            <div class="attr-box for"><span class="attr-label">FOR</span><input type="number" id="attr-for" onchange="salvarFicha()"></div>
            <div class="attr-box int"><span class="attr-label">INT</span><input type="number" id="attr-int" onchange="salvarFicha()"></div>
            <div class="attr-box pre"><span class="attr-label">PRE</span><input type="number" id="attr-pre" onchange="salvarFicha()"></div>
            <div class="attr-box vig"><span class="attr-label">VIG</span><input type="number" id="attr-vig" onchange="salvarFicha()"></div>
        </div>

        <div class="status-container">
            <div class="status-label-row">
                <span>VIDA</span>
                <span><span id="label-vida-atual">0</span> / <input type="number" id="vida-max" class="max-input" onchange="salvarFicha()"></span>
            </div>
            <div class="bar-bg">
                <div id="bar-vida" class="bar-fill vida-fill" style="width: 50%;"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('vida', -1)">-</span>
                    <input type="number" id="vida-atual" onchange="salvarFicha()">
                    <span class="bar-btn" onclick="ajustar('vida', 1)">+</span>
                </div>
            </div>
        </div>

        <div class="status-container">
            <div class="status-label-row">
                <span>SANIDADE</span>
                <span><span id="label-san-atual">0</span> / <input type="number" id="san-max" class="max-input" onchange="salvarFicha()"></span>
            </div>
            <div class="bar-bg">
                <div id="bar-san" class="bar-fill san-fill" style="width: 50%;"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('san', -1)">-</span>
                    <input type="number" id="san-atual" onchange="salvarFicha()">
                    <span class="bar-btn" onclick="ajustar('san', 1)">+</span>
                </div>
            </div>
        </div>

        <div class="status-container">
            <div class="status-label-row">
                <span>ESFORÇO</span>
                <span><span id="label-pe-atual">0</span> / <input type="number" id="pe-max" class="max-input" onchange="salvarFicha()"></span>
            </div>
            <div class="bar-bg">
                <div id="bar-pe" class="bar-fill pe-fill" style="width: 50%;"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('pe', -1)">-</span>
                    <input type="number" id="pe-atual" onchange="salvarFicha()">
                    <span class="bar-btn" onclick="ajustar('pe', 1)">+</span>
                </div>
            </div>
        </div>
    </section>

    <section style="background: rgba(255,255,255,0.02); padding: 15px;">
        <h3 style="font-family: 'Special Elite'; border-bottom: 1px solid #333;">PERÍCIAS</h3>
        <div id="lista-pericias"></div>
    </section>

</div>

<script>
    // CONFIGURAÇÃO FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyBO3ytDF4stqlHA2h7qUP8fLcLsEwB3jNI",
        authDomain: "fichasrpg-7fc69.firebaseapp.com",
        projectId: "fichasrpg-7fc69",
        storageBucket: "fichasrpg-7fc69.firebasestorage.app",
        messagingSenderId: "758802032764",
        appId: "1:758802032764:web:40467e15fdc24c570081f9",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    let atual = urlParams.get('id');

    async function init() {
        if (!atual) {
            const ref = db.collection("fichas").doc();
            atual = ref.id;
            await ref.set({ 
                agi:1, for:1, int:1, pre:1, vig:1,
                vidaMax: 20, vidaAtual: 20, 
                sanMax: 20, sanAtual: 20, 
                peMax: 10, peAtual: 10 
            });
            window.location.search = `?id=${atual}`;
        } else {
            carregarFicha();
            gerarPericias();
        }
    }

    function carregarFicha() {
        db.collection("fichas").doc(atual).onSnapshot(doc => {
            const d = doc.data();
            if(!d) return;

            // Atributos
            const attrs = ['agi','for','int','pre','vig'];
            attrs.forEach(a => document.getElementById(`attr-${a}`).value = d[a]);

            // Status e Barras
            atualizarBarra('vida', d.vidaAtual, d.vidaMax);
            atualizarBarra('san', d.sanAtual, d.sanMax);
            atualizarBarra('pe', d.peAtual, d.peMax);
        });
    }

    function atualizarBarra(tipo, atualVal, maxVal) {
        document.getElementById(`${tipo}-atual`).value = atualVal;
        document.getElementById(`${tipo}-max`).value = maxVal;
        document.getElementById(`label-${tipo}-atual`).innerText = atualVal;
        
        // Cálculo da porcentagem para a largura da barra
        let porc = (atualVal / maxVal) * 100;
        if (porc > 100) porc = 100;
        if (porc < 0) porc = 0;
        
        document.getElementById(`bar-${tipo}`).style.width = porc + "%";
    }

    function salvarFicha() {
        db.collection("fichas").doc(atual).update({
            agi: parseInt(document.getElementById('attr-agi').value) || 0,
            for: parseInt(document.getElementById('attr-for').value) || 0,
            int: parseInt(document.getElementById('attr-int').value) || 0,
            pre: parseInt(document.getElementById('attr-pre').value) || 0,
            vig: parseInt(document.getElementById('attr-vig').value) || 0,
            vidaAtual: parseInt(document.getElementById('vida-atual').value) || 0,
            vidaMax: parseInt(document.getElementById('vida-max').value) || 1,
            sanAtual: parseInt(document.getElementById('san-atual').value) || 0,
            sanMax: parseInt(document.getElementById('san-max').value) || 1,
            peAtual: parseInt(document.getElementById('pe-atual').value) || 0,
            peMax: parseInt(document.getElementById('pe-max').value) || 1,
        });
    }

    function ajustar(tipo, valor) {
        const campo = document.getElementById(`${tipo}-atual`);
        campo.value = parseInt(campo.value) + valor;
        salvarFicha();
    }

    function gerarPericias() {
        const pericias = ["Acrobacia", "Atletismo", "Atualidades", "Ciências", "Crime", "Diplomacia", "Enganação", "Fortitude", "Furtividade", "Intuição", "Investigação", "Luta", "Medicina", "Ocultismo", "Percepção", "Pontaria", "Reflexos", "Vontade"];
        const container = document.getElementById('lista-pericias');
        
        container.innerHTML = pericias.map(p => `
            <div class="pericia-row">
                <span class="pericia-name">${p}</span>
                <span class="pericia-attr">(---)</span>
                <input type="number" class="max-input" value="0" style="text-align:center">
                <select class="treino-select">
                    <option value="0">0</option>
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                </select>
            </div>
        `).join('');
    }

    init();
</script>

</body>
</html>
