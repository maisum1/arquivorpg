<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB - Ordo Realitas</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        body { background-color: #0a0a0a; color: white; font-family: 'Special Elite', sans-serif; margin: 0; padding: 20px; }
        .nav-menu { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .nav-btn { background: none; border: none; color: #888; font-family: 'Special Elite'; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: #ff4d4d; text-shadow: 0 0 10px #ff0000; }
        .aba-content { display: none; }
        .aba-content.active { display: block; }
        .grid-fichas { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; padding: 15px; text-align: center; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: #ff4d4d; transform: scale(1.05); }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 3px; margin-bottom: 10px; }
        .btn-add { background: #441111; color: white; border: 1px solid #ff4d4d; padding: 10px 20px; font-family: 'Special Elite'; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="nav-menu">
        <button class="nav-btn" onclick="mostrarAba('mestre')" id="btn-mestre">PAINEL DE MESTRE</button>
        <button class="nav-btn active" onclick="mostrarAba('ameacas')" id="btn-ameacas">AMEAÇAS</button>
        <button class="nav-btn" onclick="mostrarAba('agentes')" id="btn-agentes">AGENTES</button>
    </div>

    <div id="aba-mestre" class="aba-content">
        <h2 style="color: #ff4d4d;">Controle Geral</h2>
        <div id="lista-mestre" class="grid-fichas"></div>
    </div>

    <div id="aba-ameacas" class="aba-content active">
        <button class="btn-add" onclick="criarAmeaca()" id="btn-add-ameaca" style="display:none;">+ CRIAR NOVA AMEAÇA</button>
        <div id="lista-ameacas" class="grid-fichas"></div>
    </div>

    <div id="aba-agentes" class="aba-content">
        <div id="lista-agentes" class="grid-fichas"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let ehMestre = false;
        const emailMestre = "seuemail@gmail.com"; // AJUSTE PARA O SEU EMAIL

        auth.onAuthStateChanged(user => {
            if (user && user.email === emailMestre) {
                ehMestre = true;
                document.getElementById('btn-add-ameaca').style.display = 'block';
            }
            carregarFichas();
            carregarAmeacas();
        });

        function mostrarAba(nome) {
            document.querySelectorAll('.aba-content').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('aba-' + nome).classList.add('active');
            document.getElementById('btn-' + nome).classList.add('active');
        }

        function carregarFichas() {
            db.collection("fichas").onSnapshot(snap => {
                const listaAgentes = document.getElementById('lista-agentes');
                const listaMestre = document.getElementById('lista-mestre');
                listaAgentes.innerHTML = "";
                listaMestre.innerHTML = "";

                snap.forEach(doc => {
                    const d = doc.data();
                    const card = `<div class="card" onclick="window.location.href='ficha.html?id=${doc.id}'">
                        <img src="${d.imgNormal || 'https://via.placeholder.com/150'}">
                        <p>${d.nome || 'Agente Sem Nome'}</p>
                    </div>`;
                    listaAgentes.innerHTML += card;
                    if(ehMestre) listaMestre.innerHTML += card;
                });
            });
        }

        function carregarAmeacas() {
            db.collection("ameacas").onSnapshot(snap => {
                const container = document.getElementById('lista-ameacas');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    container.innerHTML += `<div class="card" onclick="window.location.href='ameaca.html?id=${doc.id}'">
                        <img src="${d.imgAmeaca || 'https://via.placeholder.com/150'}">
                        <p>${d.nome || 'Ameaça Desconhecida'}</p>
                        <small style="color:#ff4d4d">VD ${d.vd || '??'}</small>
                    </div>`;
                });
            });
        }

        function criarAmeaca() {
            if(!ehMestre) return;
            const nome = prompt("Nome da Criatura:");
            if(nome) {
                db.collection("ameacas").add({
                    nome: nome,
                    vd: "0",
                    imgAmeaca: "",
                    elementos: "",
                    vidaAtual: 100,
                    vidaMax: 100,
                    createdAt: new Date()
                }).then(doc => window.location.href = `ameaca.html?id=${doc.id}`);
            }
        }
    </script>
</body>
</html>
