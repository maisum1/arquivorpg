<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.R.Q.U.I.V.O. - Hub Central</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;700;900&family=Special+Elite&display=swap');
        
        :root {
            --op-red: #a31515; --op-dark-red: #5a0000; --op-ink: #1a1a1a; 
            --bg-desk: #0a0a0a; --bg-paper: #dcd7cb; --paper-shadow: 0 20px 50px rgba(0,0,0,0.9);
            --card-bg: rgba(0,0,0,0.03); --card-border: rgba(0,0,0,0.1);
        }
        body.dark-theme {
            --op-red: #ff4d4d; --op-dark-red: #8b0000; --op-ink: #e0e0e0; 
            --bg-desk: #000000; --bg-paper: #1a1a1a; --paper-shadow: 0 10px 40px rgba(0,0,0,0.9);
            --card-bg: rgba(255,255,255,0.03); --card-border: rgba(255,255,255,0.1);
        }
        body { background-color: var(--bg-desk); font-family: 'Courier Prime', monospace; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: var(--op-ink); background-image: url('data:image/svg+xml,%3Csvg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100" height="100" filter="url(%23noise)" opacity="0.05"/%3E%3C/svg%3E');}
        
        .book-container { width: 95%; max-width: 1200px; background-color: var(--bg-paper); padding: 40px; box-shadow: var(--paper-shadow); border: 1px solid var(--op-ink); border-radius: 2px; position: relative; transition: 0.3s; background-image: url('data:image/svg+xml,%3Csvg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="2" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="300" height="300" filter="url(%23noise)" opacity="0.08"/%3E%3C/svg%3E');}
        
        #login-screen, #dashboard { display: none; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-desk); display: flex; justify-content: center; align-items: center; z-index: 9999; color: var(--op-red); font-family: 'Special Elite', monospace; font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        
        h1 { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 3.5rem; letter-spacing: 12px; margin: 0; color: var(--op-ink); border-bottom: 4px double var(--op-ink); padding-bottom: 10px; text-align: center;}
        
        .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; color: #888; font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.1rem; letter-spacing: 1px; cursor: pointer; padding: 10px 15px; transition: 0.3s; }
        .tab-btn:hover { color: var(--op-red); }
        .tab-btn.active { color: var(--op-ink); border-bottom-color: var(--op-ink); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .ficha-card, .ameaca-card { background: var(--card-bg); padding: 20px; border-radius: 2px; border: 1px solid var(--card-border); display: flex; align-items: center; justify-content: space-between; text-align: left; position: relative; transition: 0.2s; border-left: 5px solid var(--op-ink); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.02);}
        .ameaca-card { border-left-color: var(--op-red); }
        .ficha-card:hover, .ameaca-card:hover { transform: scale(1.02); border-color: var(--op-ink); }
        
        .portrait-mini { width: 55px; height: 55px; background: #000; border: 2px solid #fff; overflow: hidden; margin-right: 15px; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); transform: rotate(-2deg);}
        .portrait-mini img { width: 100%; height: 100%; object-fit: cover; filter: contrast(120%) grayscale(100%); mix-blend-mode: normal; }

        .btn-datilografar { background: transparent; border: 1px dashed var(--op-ink); color: var(--op-ink); padding: 12px 25px; font-family: 'Special Elite', monospace; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase; }
        .btn-datilografar:hover { background: rgba(0,0,0,0.05); }

        .btn-action-node { position: absolute; background: none; border: none; color: var(--op-red); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.3s; padding: 2px 5px; opacity: 0.5;}
        .btn-action-node.btn-del { top: 8px; right: 8px; }
        .btn-action-node.btn-copy { top: 8px; right: 35px; color: var(--op-ink); }
        .btn-action-node:hover { opacity: 1; }

        .btn-open { color: var(--op-ink); text-decoration: none; font-family: 'Special Elite', monospace; font-weight: bold; padding: 5px 10px; transition: 0.3s; border-bottom: 1px solid var(--op-ink); }
        .btn-open:hover { background: rgba(0,0,0,0.05); }
        
        .btn-theme { position: fixed; top: 15px; left: 15px; background: var(--bg-paper); border: 1px solid var(--op-ink); color: var(--op-ink); font-size: 20px; cursor: pointer; padding: 5px 10px; border-radius: 4px; z-index: 1000; box-shadow: var(--paper-shadow); transition: 0.3s;}
        .btn-theme:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <button id="theme-toggle" onclick="toggleTheme()" class="btn-theme" title="Alternar Tema">🌓</button>
    <div id="loading-screen">RECUPERANDO ARQUIVOS...</div>

    <div id="login-screen" class="book-container" style="text-align: center; max-width: 500px;">
        <h1>A.R.Q.U.I.V.O.</h1>
        <p style="color: var(--op-red); font-weight: bold; margin: 20px 0;">ACESSO RESTRITO</p>
        <button class="btn-datilografar" onclick="login()">IDENTIFICAR-SE</button>
    </div>

    <div id="dashboard" class="book-container">
        <h2 id="welcome" style="font-family: 'Special Elite', monospace; color: var(--op-ink); border-bottom: 1px dotted var(--op-ink); padding-bottom: 10px; margin-bottom: 30px;">IDENTIFICAÇÃO: LENDO...</h2>
        
        <div id="menu-abas" style="margin-bottom: 30px; border-bottom: 2px solid var(--op-ink); display: flex; justify-content: center; gap: 20px; padding-bottom: 10px;">
            <button id="btn-jog" class="tab-btn active" onclick="mudarAbaHub('jogador')">MINHAS PERSONAS</button> 
            <button id="btn-ameacas" class="tab-btn" style="display:none;" onclick="mudarAbaHub('ameacas')">REGISTRO DE AMEAÇAS</button>
            <button id="btn-mestre" class="tab-btn" style="display:none;" onclick="mudarAbaHub('mestre')">ARQUIVOS GERAIS</button>
        </div>

        <div id="hub-jogador" class="conteudo-hub">
            <div class="grid" id="lista-fichas"></div>
            <button class="btn-datilografar" onclick="criarNovaFicha()" style="margin-top: 30px;">+ DATILOGRAFAR NOVA PERSONA</button>
        </div>

        <div id="hub-ameacas" class="conteudo-hub" style="display: none;">
            <div id="lista-ameacas" class="grid"></div>
            <button class="btn-datilografar" onclick="criarNovaAmeaca()" style="margin-top: 30px;">+ DATILOGRAFAR NOVA AMEAÇA</button>
        </div>

       <div id="hub-mestre" class="conteudo-hub" style="display:none;">
            <div style="background: var(--card-bg); border: 1px solid var(--card-border); padding: 20px; margin-bottom: 30px; border-radius: 2px;">
                <h3 style="font-family: 'Inter', sans-serif; font-weight: 900; margin-top: 0; color: var(--op-red);">CONTROLE MESTRE DOS SEGREDOS</h3>
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <button onclick="toggleGlobal('revelado')" class="btn-datilografar" style="flex:1;">👁️ ERGUER O VÉU</button>
                    <button onclick="toggleGlobal('extremos')" class="btn-datilografar" style="flex:1; border-color: var(--op-red); color: var(--op-red);">🩸 ATIVAR APOTEOSE (100%)</button>
                    <button onclick="toggleGlobal('hexatombe')" class="btn-datilografar" style="flex:1; background: var(--op-dark-red); color: #fff; border-color: #000;">💀 MODO HEXATOMBE</button>
                </div>
            </div>
            <div id="monitor-mestre" class="grid"></div>
        </div>

        <div style="text-align: center; margin-top: 40px;">
            <button onclick="firebase.auth().signOut()" style="background:transparent; color:var(--op-red); border:none; cursor:pointer; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: bold; letter-spacing: 1px;">[ ENCERRAR SESSÃO ]</button>
        </div>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('theme_cris', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
        }
        if(localStorage.getItem('theme_cris') === 'dark') document.body.classList.add('dark-theme');

        const firebaseConfig = { apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI", authDomain: "fichasrpg-7fc69.firebaseapp.com", projectId: "fichasrpg-7fc69", storageBucket: "fichasrpg-7fc69.firebasestorage.app", messagingSenderId: "758802032764", appId: "1:758802032764:web:40467e15fdc24c570081f9" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();
        const EMAIL_MESTRE = "pedroacpr@gmail.com";

        function copiarLink(id) { navigator.clipboard.writeText(window.location.origin + window.location.pathname.replace(/index\.html.*/, '') + 'ficha.html?id=' + id); alert('Link Copiado!'); }
        function toggleGlobal(campo) { db.collection("configuracoes").doc("globais").get().then((doc) => { let e = doc.exists && doc.data()[campo]; let o = {}; o[campo] = !e; db.collection("configuracoes").doc("globais").set(o, { merge: true }).then(() => alert(`${campo.toUpperCase()} = ${!e}`)); }); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; document.getElementById('welcome').innerText = `AGENTE: ${user.displayName || user.email}`;
                if (user.email === EMAIL_MESTRE) { document.getElementById('btn-ameacas').style.display = 'inline-block'; document.getElementById('btn-mestre').style.display = 'inline-block'; }
                carregarFichasJogador(user.uid); listarAmeacas(); carregarMonitorMestre();
            } else {
                document.getElementById('login-screen').style.display = 'flex'; document.getElementById('dashboard').style.display = 'none';
            }
            setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 300);
        });

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function mudarAbaHub(aba) { document.querySelectorAll('.conteudo-hub').forEach(d => d.style.display = 'none'); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('hub-' + aba).style.display = 'block'; document.getElementById('btn-' + (aba==='jogador'?'jog':aba)).classList.add('active'); }
        async function deletarDocumento(colecao, id, nome) { if (confirm(`ATENÇÃO: Deseja incinerar o arquivo ${nome}?`)) await db.collection(colecao).doc(id).delete(); }

        function carregarFichasJogador(uid) {
            db.collection("fichas").where("dono", "==", uid).onSnapshot(snap => {
                const div = document.getElementById('lista-fichas'); div.innerHTML = "";
                snap.forEach(doc => { const d = doc.data(); div.innerHTML += `<div class="ficha-card"><button class="btn-action-node btn-copy" onclick="copiarLink('${doc.id}')" title="Copiar Link">🔗</button><button class="btn-action-node btn-del" onclick="deletarDocumento('fichas', '${doc.id}', '${d.nome}')">[x]</button><div style="display:flex; align-items:center; flex:1"><div class="portrait-mini">${d.portrait ? `<img src="${d.portrait}" style="object-position: ${d.pX||50}% ${d.pY||50}%; transform: scale(${d.pZ||1});">` : ''}</div><div><strong style="font-family: 'Inter', sans-serif; font-size: 16px; font-weight:900;">${d.nome || 'DESCONHECIDO'}</strong><br><small style="color:var(--op-red); font-weight:bold;">NEX ${d.nex || '5%'}</small></div></div><a href="ficha.html?id=${doc.id}" class="btn-open">ABRIR</a></div>`; });
            });
        }

        function listarAmeacas() {
            db.collection("ameacas").onSnapshot(snap => {
                const div = document.getElementById("lista-ameacas"); div.innerHTML = "";
                snap.forEach(doc => { const d = doc.data(); div.innerHTML += `<div class="ameaca-card"><button class="btn-action-node btn-del" onclick="deletarDocumento('ameacas', '${doc.id}', '${d.nome}')">[x]</button><div style="display:flex; align-items:center; flex:1"><div class="portrait-mini" style="border-color:var(--op-red);">${d.portrait ? `<img src="${d.portrait}" style="object-position: ${d.pX||50}% ${d.pY||50}%; transform: scale(${d.pZ||1});">` : ''}</div><div><strong style="font-family: 'Inter', sans-serif; font-size: 16px; font-weight:900;">${d.nome || 'DESCONHECIDO'}</strong><br><small style="color:var(--op-red); font-weight: bold;">VD ${d.vd || 0}</small></div></div><a href="ameaca.html?id=${doc.id}" class="btn-open">LER</a></div>`; });
            });
        }

        function carregarMonitorMestre() {
            db.collection("fichas").onSnapshot(snap => {
                const div = document.getElementById('monitor-mestre'); div.innerHTML = "";
                snap.forEach(doc => { const d = doc.data(); div.innerHTML += `<div class="ficha-card" style="border-left-color:#888"><button class="btn-action-node btn-copy" onclick="copiarLink('${doc.id}')" title="Copiar">🔗</button><div style="display:flex; align-items:center; flex:1"><div class="portrait-mini">${d.portrait ? `<img src="${d.portrait}" style="object-position: ${d.pX||50}% ${d.pY||50}%; transform: scale(${d.pZ||1});">` : ''}</div><div><strong style="font-family: 'Inter', sans-serif; font-size: 14px; font-weight:900;">${d.nome || 'DESCONHECIDO'}</strong> <small style="color:#888">| NEX ${d.nex || '5%'}</small><br><small style="font-family:'Inter'; color:var(--op-red); font-weight:bold;">VIT ${d.vidaAtual||0}/${d.vidaMax||0} | SAN ${d.sanAtual||0}/${d.sanMax||0}</small></div></div><a href="ficha.html?id=${doc.id}" class="btn-open">LER</a></div>`; });
            });
        }

        async function criarNovaFicha() { const u = auth.currentUser; const ref = await db.collection("fichas").add({ dono: u.uid, nomeJogador: u.displayName || u.email, nome: "NOVA PERSONA", nex: "5%", agi:0, for:0, int:0, pre:0, vig:0, vidaAtual: 12, vidaMax: 12, sanAtual: 12, sanMax: 12, peAtual: 1, peMax: 1 }); window.location.href = `ficha.html?id=${ref.id}`; }
        async function criarNovaAmeaca() { const u = auth.currentUser; const ref = await db.collection("ameacas").add({ dono: u.uid, nome: "NOVA AMEAÇA", vd: 0, pvAtual: 100, pvMax: 100, pcAtual: 100, pcMax: 100, peAtual: 100, peMax: 100}); window.location.href = `ameaca.html?id=${ref.id}`; }
    </script>
</body>
</html>
