<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.R.Q.U.I.V.O. - Hub</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a68a64">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;700;900&family=Special+Elite&family=Crimson+Text:wght@400;600;700&display=swap');

        :root {
            /* MODO CLARO (Papel/Arquivo) */
            --op-red: #a31515; 
            --op-dark-red: #5a0000; 
            --op-ink: #1a1a1a; 
            --bg-desk: #111111; 
            --bg-paper: #e9e1d3; 
            --paper-shadow: 0 15px 35px rgba(0,0,0,0.5);
            --card-bg: rgba(0,0,0,0.03); 
            --card-border: rgba(0,0,0,0.2);
            --text-main: #1a1a1a;
            --text-muted: #555;
            --cris-purple: #9e0b0f;
        }

        body.dark-theme {
            /* MODO ESCURO (Terminal/Original) */
            --op-red: #8b1c1c; 
            --op-dark-red: #5a0000; 
            --op-ink: #e0e0e0; 
            --bg-desk: #050505; 
            --bg-paper: #121212; 
            --paper-shadow: 0 10px 40px rgba(0,0,0,0.9);
            --card-bg: #181818; 
            --card-border: #333;
            --text-main: #d3d3d3;
            --text-muted: #888;
            --cris-purple: #a68a64;
        }

        /* Esconde as telas principais no carregamento */
        #login-screen, #dashboard { display: none; }

        /* Tela de Loading */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-desk); display: flex; justify-content: center; align-items: center; z-index: 9999; color: var(--cris-purple); font-family: 'Special Elite', monospace; font-size: 24px; font-weight: bold; letter-spacing: 2px; }

        body { 
            background-color: var(--bg-desk); color: var(--text-main); 
            font-family: 'Courier Prime', monospace; margin: 0; display: flex; 
            align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden;
            background-image: url('data:image/svg+xml,%3Csvg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100" height="100" filter="url(%23noise)" opacity="0.05"/%3E%3C/svg%3E');
            transition: background-color 0.5s ease;
        }
        
        .book-container { 
            width: 95%; max-width: 1200px; padding: 40px; text-align: center; 
            background-color: var(--bg-paper); box-shadow: var(--paper-shadow); border: 1px solid var(--card-border); border-radius: 4px;
            background-image: url('data:image/svg+xml,%3Csvg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="2" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="300" height="300" filter="url(%23noise)" opacity="0.08"/%3E%3C/svg%3E'), linear-gradient(to right, rgba(0,0,0,0.05) 0%, transparent 3%, transparent 97%, rgba(0,0,0,0.05) 100%);
            transition: all 0.5s ease; position: relative;
        }

        #login-screen { display: flex; flex-direction: column; align-items: center; gap: 30px; text-align: center; max-width: 500px; margin: auto; }
        h1 { font-size: 3.5rem; letter-spacing: 12px; margin: 0; color: var(--text-main); font-family: 'Inter', sans-serif; font-weight: 900; border-bottom: 4px double var(--card-border); padding-bottom: 10px;}
        
        .tab-btn { background: none; border: none; color: var(--text-muted); font-family: 'Inter', sans-serif; font-size: 1.1rem; font-weight: 900; letter-spacing: 1px; cursor: pointer; padding: 10px 15px; transition: 0.3s; border-bottom: 2px solid transparent; }
        .tab-btn:hover { color: var(--cris-purple); }
        .tab-btn.active { color: var(--text-main); border-bottom-color: var(--text-main); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .ficha-card, .ameaca-card { background: var(--card-bg); padding: 20px; border-radius: 2px; border: 1px solid var(--card-border); display: flex; align-items: center; justify-content: space-between; text-align: left; position: relative; transition: 0.2s; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.02);}
        .ficha-card { border-left: 5px solid var(--cris-purple); }
        .ameaca-card { border-left: 5px solid var(--op-red); }
        .ficha-card:hover, .ameaca-card:hover { transform: scale(1.02); border-color: var(--text-muted); }
        
        .portrait-mini { width: 55px; height: 55px; background: #000; border: 2px solid #fff; overflow: hidden; margin-right: 15px; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); transform: rotate(-3deg); position: relative;}
        .portrait-mini img { width: 100%; height: 100%; object-fit: cover; filter: contrast(120%) grayscale(100%); }

        .btn-google { background: transparent; color: var(--op-ink); border: 1px dashed var(--op-ink); padding: 12px 25px; border-radius: 2px; font-weight: bold; cursor: pointer; font-family: 'Special Elite', monospace; font-size: 14px; transition: 0.3s; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-google:hover { background: rgba(0,0,0,0.05); color: var(--cris-purple); border-color: var(--cris-purple);}
        body.dark-theme .btn-google:hover { background: rgba(255,255,255,0.05); }

        .btn-action-node { position: absolute; background: none; border: none; color: var(--op-red); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; padding: 2px 5px; opacity: 0.5;}
        .btn-action-node.btn-del { top: 8px; right: 8px; }
        .btn-action-node.btn-copy { top: 8px; right: 35px; color: var(--text-main); font-size: 14px;}
        .btn-action-node:hover { opacity: 1; transform: scale(1.2); }

        .btn-open { color: var(--text-main); text-decoration: none; font-family: 'Special Elite', monospace; font-size: 16px; font-weight: bold; padding: 5px 10px; border-bottom: 1px solid var(--text-main); transition: 0.3s; letter-spacing: 1px; }
        .btn-open:hover { background: rgba(0,0,0,0.05); }
        body.dark-theme .btn-open:hover { background: rgba(255,255,255,0.05); }

        .btn-theme { position: fixed; top: 15px; left: 15px; background: var(--bg-paper); border: 1px solid var(--card-border); color: var(--text-main); font-size: 20px; cursor: pointer; padding: 5px 10px; border-radius: 4px; z-index: 1000; box-shadow: var(--paper-shadow); transition: 0.3s;}
        .btn-theme:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <button id="theme-toggle" onclick="toggleTheme()" class="btn-theme" title="Alternar Tema">🌓</button>
    <div id="loading-screen">RECUPERANDO ARQUIVOS...</div>

    <div id="login-screen" class="book-container">
        <h1>A.R.Q.U.I.V.O.</h1>
        <p style="color: var(--op-red); font-family: 'Special Elite', monospace; font-size: 1.1rem; font-weight: bold;">Credenciais Necessárias</p>
        <button class="btn-google" onclick="login()">IDENTIFICAR-SE</button>
    </div>

    <div id="dashboard" class="book-container">
        <h2 id="welcome" style="color: var(--text-main); font-family: 'Special Elite', monospace; font-size: 1.4rem; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px dotted var(--card-border); padding-bottom: 15px; margin-bottom: 30px;">PERSONA: CONECTANDO...</h2>
        
        <div id="menu-abas" style="margin-bottom: 30px; border-bottom: 2px solid var(--card-border); display: flex; justify-content: center; gap: 20px;">
            <button id="btn-jog" class="tab-btn active" onclick="mudarAbaHub('jogador')">MINHAS PERSONAS</button> 
            <button id="btn-ameacas" class="tab-btn" style="display:none;" onclick="mudarAbaHub('ameacas')">REGISTRO DE ENTIDADES</button>
            <button id="btn-mestre" class="tab-btn" style="display:none;" onclick="mudarAbaHub('mestre')">ARQUIVOS CONFIDENCIAIS</button>
        </div>

        <div id="hub-jogador" class="conteudo-hub">
            <div class="grid" id="lista-fichas"></div>
            <button class="btn-google" onclick="criarNovaFicha()" style="margin-top: 30px;">+ DATILOGRAFAR NOVA PERSONA</button>
        </div>

        <div id="hub-ameacas" class="conteudo-hub" style="display: none;">
            <div id="lista-ameacas" class="grid"></div>
            <button class="btn-google" style="margin-top: 30px;" onclick="criarNovaAmeaca()">+ DATILOGRAFAR NOVA ANOMALIA</button>
        </div>

       <div id="hub-mestre" class="conteudo-hub" style="display:none;">
            <div style="background: var(--card-bg); border: 1px solid var(--card-border); padding: 20px; margin-bottom: 30px; text-align: left; border-radius: 2px;">
                <h3 style="color: var(--cris-purple); font-family: 'Inter', sans-serif; font-weight: 900; margin-top: 0;">🛠️ CONTROLE MESTRE DOS SEGREDOS</h3>
                <p style="font-size: 12px; color: var(--text-muted); font-family: 'Courier Prime', monospace;">Ativa ou desativa mecânicas nas fichas dos jogadores em TEMPO REAL.</p>
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <button onclick="toggleGlobal('revelado')" class="btn-google" style="flex: 1;">👁️ ERGUER O VÉU</button>
                    <button onclick="toggleGlobal('extremos')" class="btn-google" style="flex: 1;">🩸 ATIVAR APOTEOSE (100%)</button>
                    <button onclick="toggleGlobal('hexatombe')" class="btn-google" style="flex: 1; background: var(--op-dark-red); color: #fff; border:none; text-shadow: 0 0 5px #000;">💀 MODO HEXATOMBE</button>
                </div>
            </div>
            <div id="monitor-mestre" class="grid"></div>
        </div>

        <br><br>
        <button onclick="firebase.auth().signOut()" style="background:transparent; color:var(--op-red); border:none; cursor:pointer; font-family: 'Special Elite', monospace; font-size: 14px; font-weight: bold; letter-spacing: 1px; margin-top: 40px; transition: 0.3s;">[ ENCERRAR SESSÃO ]</button>
    </div>

    <script>
        // SCRIPT DO MODO CLARO/ESCURO
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('theme_cris', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
        }
        if(localStorage.getItem('theme_cris') === 'dark') document.body.classList.add('dark-theme');

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }

        document.addEventListener("DOMContentLoaded", () => {
            const estavaLogado = localStorage.getItem('cris_logado') === 'true';
            if (estavaLogado) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('loading-screen').style.display = 'none';
            }
        });

        const firebaseConfig = {
            apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();
        const EMAIL_MESTRE = "pedroacpr@gmail.com";

        function copiarLink(id) { const url = window.location.origin + window.location.pathname.replace(/index\.html.*/, '') + 'ficha.html?id=' + id; navigator.clipboard.writeText(url); alert('Link Copiado!'); }

        function toggleGlobal(campo) {
            const docRef = db.collection("configuracoes").doc("globais");
            docRef.get().then((doc) => {
                let estadoAtual = false; if(doc.exists && doc.data()[campo]) { estadoAtual = doc.data()[campo]; }
                let o = {}; o[campo] = !estadoAtual;
                docRef.set(o, { merge: true }).then(() => { alert(`Segredo Mestre [ ${campo.toUpperCase()} ] foi ${!estadoAtual ? "LIGADO" : "DESLIGADO"} para todos.`); });
            });
        }

        auth.onAuthStateChanged(user => {
            const loading = document.getElementById('loading-screen'); const loginSec = document.getElementById('login-screen'); const hubSec = document.getElementById('dashboard'); const btnAmeacas = document.getElementById('btn-ameacas'); const btnMestre = document.getElementById('btn-mestre'); const welcomeText = document.getElementById('welcome');
            if (user) {
                localStorage.setItem('cris_logado', 'true'); loginSec.style.display = 'none'; hubSec.style.display = 'block';
                const nomeUsuario = user.displayName ? user.displayName : user.email; welcomeText.innerText = `AGENTE: ${nomeUsuario}`;
                if (user.email === EMAIL_MESTRE) { btnAmeacas.style.display = 'inline-block'; btnMestre.style.display = 'inline-block'; } else { btnAmeacas.style.display = 'none'; btnMestre.style.display = 'none'; }
                carregarFichasJogador(user.uid); listarAmeacas(); carregarMonitorMestre();
            } else {
                localStorage.setItem('cris_logado', 'false'); loginSec.style.display = 'flex'; hubSec.style.display = 'none'; btnAmeacas.style.display = 'none'; btnMestre.style.display = 'none'; welcomeText.innerText = "SISTEMA DESCONECTADO";
            }
            setTimeout(() => { loading.style.display = 'none'; }, 300);
        });

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function mudarAbaHub(aba) {
            document.querySelectorAll('.conteudo-hub').forEach(d => d.style.display = 'none'); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('hub-' + aba).style.display = 'block';
            if (aba === 'jogador') document.getElementById('btn-jog').classList.add('active');
            if (aba === 'ameacas') document.getElementById('btn-ameacas').classList.add('active');
            if (aba === 'mestre') document.getElementById('btn-mestre').classList.add('active');
        }

        async function deletarDocumento(colecao, id, nome) {
            if (colecao === 'fichas') {
                const digitado = prompt(`ATENÇÃO: Esta persona será incinerada permanentemente: ${nome.toUpperCase()}.\nDigite EXCLUIR para confirmar:`);
                if (digitado === "EXCLUIR") { await db.collection(colecao).doc(id).delete(); } else if (digitado !== null) { alert("Operação cancelada."); }
            } else {
                if (confirm(`CONFIRMAR DESTRUIÇÃO DE ARQUIVO: ${nome.toUpperCase()}?`)) { await db.collection(colecao).doc(id).delete(); }
            }
        }

        function carregarFichasJogador(uid) {
            db.collection("fichas").where("dono", "==", uid).onSnapshot(snap => {
                const div = document.getElementById('lista-fichas'); div.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data(); const px = d.pX ?? 50; const py = d.pY ?? 50; const pz = d.pZ ?? 1;
                    div.innerHTML += `
                        <div class="ficha-card">
                            <button class="btn-action-node btn-copy" onclick="copiarLink('${doc.id}')" title="Copiar Link">🔗</button>
                            <button class="btn-action-node btn-del" onclick="deletarDocumento('fichas', '${doc.id}', '${d.nome || 'Persona'}')">[X]</button>
                            <div style="display:flex; align-items:center; flex:1">
                                <div class="portrait-mini">${d.portrait ? `<img src="${d.portrait}" style="object-position: ${px}% ${py}%; transform: scale(${pz});">` : ''}</div>
                                <div>
                                    <strong style="font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 900; letter-spacing: 1px; color:var(--text-main);">${d.nome || 'DESCONHECIDO'}</strong><br>
                                    <small style="color:var(--text-muted); font-family: 'Special Elite', monospace; font-weight:bold;">EXP ${d.nex || '5%'}</small>
                                </div>
                            </div>
                            <a href="ficha.html?id=${doc.id}" class="btn-open">ABRIR</a>
                        </div>`;
                });
            });
        }

        function listarAmeacas() {
            db.collection("ameacas").onSnapshot(snap => {
                const div = document.getElementById("lista-ameacas"); div.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data(); const px = d.pX || 50; const py = d.pY || 50; const pz = d.pZ || 1;
                    div.innerHTML += `
                        <div class="ameaca-card">
                            <button class="btn-action-node btn-del" onclick="deletarDocumento('ameacas', '${doc.id}', '${d.nome}')">[X]</button>
                            <div style="display:flex; align-items:center; flex:1">
                                <div class="portrait-mini" style="border-color:var(--op-red);">${d.portrait ? `<img src="${d.portrait}" style="object-position: ${px}% ${py}%; transform: scale(${pz});">` : ''}</div>
                                <div>
                                    <strong style="color:var(--text-main); font-family: 'Inter', sans-serif; font-size: 16px; font-weight:900;">${d.nome || 'DESCONHECIDO'}</strong><br>
                                    <small style="color:var(--op-red); font-family: 'Special Elite', monospace; font-weight: bold;">VD ${d.vd} | ${d.elemento}</small>
                                </div>
                            </div>
                            <a href="ameaca.html?id=${doc.id}" class="btn-open">LER</a>
                        </div>`;
                });
            });
        }

        function carregarMonitorMestre() {
            db.collection("fichas").onSnapshot(snap => {
                const div = document.getElementById('monitor-mestre'); div.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data(); const px = d.pX ?? 50; const py = d.pY ?? 50; const pz = d.pZ ?? 1;
                    div.innerHTML += `
                        <div class="ficha-card" style="border-left-color:var(--text-muted)">
                            <button class="btn-action-node btn-copy" onclick="copiarLink('${doc.id}')" title="Copiar Link para Transferir">🔗</button>
                            <button class="btn-action-node btn-del" onclick="deletarDocumento('fichas', '${doc.id}', '${d.nome || 'Persona'}')">[X]</button>
                            <div style="display:flex; align-items:center; flex:1">
                                <div class="portrait-mini" style="border-color: var(--text-muted);">${d.portrait ? `<img src="${d.portrait}" style="object-position: ${px}% ${py}%; transform: scale(${pz});">` : ''}</div>
                                <div>
                                    <strong style="font-family: 'Inter', sans-serif; font-weight:900; color:var(--text-main);">${d.nome || 'PERSONA'}</strong> <small style="color:var(--text-muted)">| EXP ${d.nex || '5%'}</small><br>
                                    <small style="color:var(--cris-purple); font-size:10px; text-transform:uppercase;">Agente: ${d.nomeJogador || 'Desconhecido'}</small><br>
                                    <small style="color:var(--op-red); font-weight: bold;">VIT ${d.vidaAtual || 0}/${d.vidaMax || 0}</small> <span style="color:var(--text-muted)">|</span> 
                                    <small style="color:var(--san-purple); font-weight: bold;">LUC ${d.sanAtual || 0}/${d.sanMax || 0}</small>
                                </div>
                            </div>
                            <a href="ficha.html?id=${doc.id}" class="btn-open" style="color:var(--text-muted)">VER</a>
                        </div>`;
                });
            });
        }

        async function criarNovaFicha() {
            const user = auth.currentUser; const nomeJogador = user.displayName ? user.displayName : user.email;
            const ref = await db.collection("fichas").add({ dono: user.uid, nomeJogador: nomeJogador, nome: "NOVA PERSONA", nex: "5%", forca: 0, agilidade: 0, sagacidade: 0, vigor: 0, vontade: 0, vidaAtual: 12, vidaMax: 12, sanAtual: 50, sanMax: 50, peAtual: 2, peMax: 2, pX: 50, pY: 50, pZ: 1 });
            window.location.href = `ficha.html?id=${ref.id}`;
        }

        async function criarNovaAmeaca() {
            const user = auth.currentUser;
            const ref = await db.collection("ameacas").add({ dono: user.uid, nome: "ENTIDADE DESCONHECIDA", elemento: "SANGUE", vd: "20", pvAtual: 100, pvMax: 100, pX: 50, pY: 50, pZ: 1 });
            window.location.href = `ameaca.html?id=${ref.id}`;
        }
    </script>
</body>
</html>
