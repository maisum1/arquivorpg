<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        body { background: #000; color: white; font-family: 'Special Elite', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        #login-screen { display: flex; flex-direction: column; align-items: center; gap: 40px; text-align: center; margin-top: 100px; }
        #hub-screen { display: none; width: 100%; max-width: 1000px; }
        h1 { font-size: 3.5rem; letter-spacing: 8px; margin: 0; }
        .btn-google { background: white; color: black; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; font-family: 'Special Elite'; }
        .nav-tabs { display: flex; justify-content: center; gap: 30px; margin-bottom: 40px; border-bottom: 1px solid #222; width: 100%; }
        .tab-btn { background: none; border: none; color: #555; font-family: 'Special Elite'; font-size: 1.2rem; cursor: pointer; padding: 10px; transition: 0.3s; }
        .tab-btn.active { color: #EAB308; border-bottom: 2px solid #EAB308; }
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 15px; }
        .ficha-card { background: #0a0a0a; border: 1px solid #222; padding: 15px; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; }
        .ficha-card:hover { border-color: #EAB308; }
        .retrato-mini { width: 50px; height: 50px; background: #111; border: 1px solid #333; overflow: hidden; position: relative; }
        .btn-novo { background: none; border: 1px solid #EAB308; color: #EAB308; padding: 10px 20px; font-family: 'Special Elite'; cursor: pointer; margin-bottom: 20px; }
        .btn-novo:hover { background: #EAB308; color: black; }
        .delete-btn { background: none; border: none; color: #b31d1d; cursor: pointer; font-family: 'Special Elite'; font-size: 10px; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>C.R.I.S.</h1>
        <button class="btn-google" onclick="login()">ENTRAR COM GOOGLE</button>
    </div>

    <div id="hub-screen">
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="mudarAba('agentes')">MEUS AGENTES</button>
            <button class="tab-btn" id="tab-ameacas" style="display:none;" onclick="mudarAba('ameacas')">AMEAÇAS</button>
            <button class="tab-btn" id="tab-mestre" style="display:none;" onclick="mudarAba('mestre')">PAINEL DO MESTRE</button>
        </div>

        <div id="content-agentes" class="tab-content active">
            <button class="btn-novo" onclick="criarNovaFicha()">+ NOVO AGENTE</button>
            <div id="lista-agentes" class="grid"></div>
        </div>

        <div id="content-ameacas" class="tab-content">
            <button class="btn-novo" onclick="criarAmeaca()">+ REGISTRAR AMEAÇA</button>
            <div id="lista-ameacas" class="grid"></div>
        </div>

        <div id="content-mestre" class="tab-content">
            <h2 style="color:#EAB308; text-align: center;">PAINEL GERAL</h2>
            <div id="lista-mestre" class="grid"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const EMAIL_MESTRE = "SEU_EMAIL@gmail.com"; // <-- MUDE AQUI

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('hub-screen').style.display = 'block';
                if (user.email === EMAIL_MESTRE) {
                    document.getElementById('tab-ameacas').style.display = 'block';
                    document.getElementById('tab-mestre').style.display = 'block';
                    carregarMestre();
                }
                carregarAgentes(user);
                carregarAmeacas();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('hub-screen').style.display = 'none';
            }
        });

        function mudarAba(aba) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('content-' + aba).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function criarCard(docId, d, tipo) {
            const url = tipo === 'ameaca' ? 'ameaca.html' : 'ficha.html';
            const img = d.imgAmeaca || d.portraitNormal || d.imgNormal || '';
            return `
                <div class="ficha-card">
                    <div style="display:flex; align-items:center; gap:12px">
                        <div class="retrato-mini">
                            ${img ? `<img src="${img}" style="width:100%; height:100%; object-fit:cover;">` : ''}
                        </div>
                        <div>
                            <strong>${d.nome || 'Sem Nome'}</strong><br>
                            <small>${d.nex || d.vd || '5%'}</small><br>
                            <button class="delete-btn" onclick="excluirItem('${docId}', '${d.nome}', '${tipo}')">EXCLUIR</button>
                        </div>
                    </div>
                    <div style="text-align:right">
                        <span style="color:#b31d1d; font-size:11px">PV: ${d.vidaAtual || 0}/${d.vidaMax || 0}</span><br>
                        ${tipo !== 'ameaca' ? `<span style="color:#034374; font-size:11px">SAN: ${d.sanAtual || 0}/${d.sanMax || 0}</span><br>` : ''}
                        <a href="${url}?id=${docId}" style="color:#EAB308; text-decoration:none; font-size:12px;">ABRIR</a>
                    </div>
                </div>`;
        }

        function carregarAgentes(user) {
            db.collection("fichas").onSnapshot(snap => {
                const lista = document.getElementById('lista-agentes');
                lista.innerHTML = "";
                snap.forEach(doc => { if (doc.data().dono === user.uid) lista.innerHTML += criarCard(doc.id, doc.data(), 'agente'); });
            });
        }

        function carregarAmeacas() {
            db.collection("ameacas").onSnapshot(snap => {
                const lista = document.getElementById('lista-ameacas');
                lista.innerHTML = "";
                snap.forEach(doc => { lista.innerHTML += criarCard(doc.id, doc.data(), 'ameaca'); });
            });
        }

        function carregarMestre() {
            db.collection("fichas").onSnapshot(snap => {
                const lista = document.getElementById('lista-mestre');
                lista.innerHTML = "";
                snap.forEach(doc => { lista.innerHTML += criarCard(doc.id, doc.data(), 'agente'); });
            });
        }

        async function excluirItem(id, nome, tipo) {
            if (prompt(`Para excluir "${nome}", digite EXCLUIR:`) === "EXCLUIR") {
                await db.collection(tipo === 'ameaca' ? 'ameacas' : 'fichas').doc(id).delete();
            }
        }

        async function criarNovaFicha() {
            const nome = prompt("Nome do Agente:");
            if (nome) await db.collection("fichas").add({ dono: auth.currentUser.uid, nome: nome, vidaAtual: 20, vidaMax: 20, sanAtual: 20, sanMax: 20 });
        }

        async function criarAmeaca() {
            const nome = prompt("Nome da Ameaça:");
            if (nome) {
                const res = await db.collection("ameacas").add({ nome: nome, vd: "20", vidaAtual: 100, vidaMax: 100 });
                window.location.href = "ameaca.html?id=" + res.id;
            }
        }
    </script>
</body>
</html>
