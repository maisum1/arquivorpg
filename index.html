<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Agente Completo</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --cris-purple: #6d28d9;
            --hp-red: #b31d1d;
            --san-purple: #5c2d91;
            --pe-orange: #d97706;
            --bg-dark: #0a0a0a;
        }

        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 20px;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .grid-container {
            display: grid;
            grid-template-columns: 320px 1fr 450px;
            gap: 25px;
            max-width: 1650px;
            margin: 0 auto;
        }

        /* --- COLUNA 1 --- */
        .header-name {
            width: 100%; background: transparent; border: none;
            border-bottom: 2px solid #333; color: #fff;
            font-family: 'Special Elite'; font-size: 22px;
            padding: 5px 0; margin-bottom: 20px; outline: none;
        }

        .sigilo-container {
            position: relative; width: 240px; height: 240px; margin: 0 auto 30px auto;
            background: url('https://www.ordemparanormal.com.br/assets/rituais/circulo_atributos.png') no-repeat center;
            background-size: contain;
        }
        .attr-box {
            position: absolute; width: 50px; height: 50px; background: #000;
            border: 2px solid #fff; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .attr-label { font-size: 8px; font-weight: bold; color: #888; margin-top: -2px; }
        .attr-box input { background: transparent; border: none; color: #fff; text-align: center; width: 100%; font-size: 20px; font-family: 'Special Elite'; font-weight: bold; }
        .agi { top: 0; left: 95px; } .for { top: 65px; left: 0; } .int { top: 65px; right: 0; } .pre { bottom: 15px; left: 35px; } .vig { bottom: 15px; right: 35px; }

        /* BARRAS ESTILO CRIS */
        .status-container { margin-bottom: 10px; text-align: center; }
        .status-title { font-size: 10px; font-weight: bold; letter-spacing: 1px; color: #aaa; margin-bottom: 3px; }
        .bar-bg { width: 100%; height: 35px; background: #111; position: relative; border: 1px solid #333; display: flex; align-items: center; }
        .bar-fill { height: 100%; transition: width 0.4s; position: absolute; left: 0; top: 0; opacity: 0.9; }
        .bar-content {
            position: relative; z-index: 2; width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px; font-family: 'Special Elite'; font-size: 18px; color: #fff;
        }
        .bar-btn { cursor: pointer; opacity: 0.6; font-size: 14px; }
        .bar-btn:hover { opacity: 1; }
        .val-group { display: flex; align-items: center; gap: 4px; }
        .val-group input { background: transparent; border: none; color: #fff; font-family: 'Special Elite'; font-size: 18px; width: 35px; text-align: center; }

        /* DEFESA E RESISTÊNCIAS */
        .defesa-grid { display: grid; grid-template-columns: 80px 1fr 60px 60px; gap: 10px; align-items: center; margin-top: 20px; }
        .defesa-shield {
            width: 70px; height: 75px; background: url('https://www.ordemparanormal.com.br/assets/rituais/escudo_defesa.png') no-repeat center;
            background-size: contain; display: flex; align-items: center; justify-content: center;
            font-family: 'Special Elite'; font-size: 22px; font-weight: bold;
        }
        .def-label { font-size: 10px; color: #aaa; font-weight: bold; }
        .def-val { font-size: 18px; font-family: 'Special Elite'; border-bottom: 1px solid #444; text-align: center; padding-bottom: 2px; }
        .info-input-row { margin-top: 15px; }
        .info-input-row label { display: block; font-size: 10px; font-weight: bold; color: #666; margin-bottom: 5px; }
        .info-field { width: 100%; background: transparent; border: none; border-bottom: 1px solid #333; color: #fff; font-size: 13px; padding: 4px 0; outline: none; }

        /* --- COLUNA 2 --- */
        .pericias-box { background: rgba(255,255,255,0.02); padding: 15px; border: 1px solid #111; }
        .pericia-row { display: grid; grid-template-columns: 1fr 40px 40px 60px; gap: 5px; padding: 5px 0; border-bottom: 1px solid #1a1a1a; font-size: 12px; align-items: center; }
        .treino-select { background: #000; color: #ccc; border: 1px solid #333; font-size: 11px; text-align: center; }

        /* --- COLUNA 3 --- */
        .tabs-nav { display: flex; gap: 5px; border-bottom: 1px solid #333; margin-bottom: 15px; }
        .tab-btn { background: transparent; border: none; color: #666; padding: 10px; cursor: pointer; font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid var(--cris-purple); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .ritual-card { background: #111; border-left: 4px solid #444; margin-bottom: 8px; border-radius: 4px; }
        .card-header { padding: 10px; cursor: pointer; display: flex; justify-content: space-between; font-size: 13px; font-family: 'Special Elite'; }
    </style>
</head>
<body>

<div class="grid-container">
    
    <section>
        <input type="text" id="nome-personagem" class="header-name" placeholder="NOME DO AGENTE" onchange="salvarFicha()">
        
        <div class="sigilo-container">
            <div class="attr-box agi"><span class="attr-label">AGI</span><input type="number" id="attr-agi" onchange="salvarFicha()"></div>
            <div class="attr-box for"><span class="attr-label">FOR</span><input type="number" id="attr-for" onchange="salvarFicha()"></div>
            <div class="attr-box int"><span class="attr-label">INT</span><input type="number" id="attr-int" onchange="salvarFicha()"></div>
            <div class="attr-box pre"><span class="attr-label">PRE</span><input type="number" id="attr-pre" onchange="salvarFicha()"></div>
            <div class="attr-box vig"><span class="attr-label">VIG</span><input type="number" id="attr-vig" onchange="salvarFicha()"></div>
        </div>

        <div class="status-container">
            <div class="status-title">VIDA</div>
            <div class="bar-bg">
                <div id="bar-vida" class="bar-fill" style="background:var(--hp-red)"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('vida', -1)">« <</span>
                    <div class="val-group">
                        <input type="number" id="vida-atual" onchange="salvarFicha()"> / 
                        <input type="number" id="vida-max" onchange="salvarFicha()">
                    </div>
                    <span class="bar-btn" onclick="ajustar('vida', 1)">> »</span>
                </div>
            </div>
        </div>

        <div class="status-container">
            <div class="status-title">SANIDADE</div>
            <div class="bar-bg">
                <div id="bar-san" class="bar-fill" style="background:var(--san-purple)"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('san', -1)">« <</span>
                    <div class="val-group">
                        <input type="number" id="san-atual" onchange="salvarFicha()"> / 
                        <input type="number" id="san-max" onchange="salvarFicha()">
                    </div>
                    <span class="bar-btn" onclick="ajustar('san', 1)">> »</span>
                </div>
            </div>
        </div>

        <div class="status-container">
            <div class="status-title">ESFORÇO</div>
            <div class="bar-bg">
                <div id="bar-pe" class="bar-fill" style="background:var(--pe-orange)"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('pe', -1)">« <</span>
                    <div class="val-group">
                        <input type="number" id="pe-atual" onchange="salvarFicha()"> / 
                        <input type="number" id="pe-max" onchange="salvarFicha()">
                    </div>
                    <span class="bar-btn" onclick="ajustar('pe', 1)">> »</span>
                </div>
            </div>
        </div>

        <div class="defesa-grid">
            <div class="defesa-shield" id="display-defesa">12</div>
            <div>
                <div class="def-label">DEFESA</div>
                <div style="font-size: 8px; color: #555;">= 10 + AGI + EQUIP. + OUTROS</div>
            </div>
            <div>
                <div class="def-label">BLOQUEIO</div>
                <div class="def-val" contenteditable="true">0</div>
            </div>
            <div>
                <div class="def-label">ESQUIVA</div>
                <div class="def-val" id="display-esquiva">12</div>
            </div>
        </div>

        <div class="info-input-row">
            <label>PROTEÇÃO</label>
            <input type="text" class="info-field" id="protecao" onchange="salvarFicha()">
        </div>
        <div class="info-input-row">
            <label>RESISTÊNCIAS</label>
            <input type="text" class="info-field" id="resistencias" onchange="salvarFicha()">
        </div>
        <div class="info-input-row">
            <label>PROFICIÊNCIAS</label>
            <input type="text" class="info-field" id="proficiencias" onchange="salvarFicha()">
        </div>
    </section>

    <section class="pericias-box">
        <h4 style="font-family: 'Special Elite'; margin: 0 0 10px 0;">PERÍCIAS</h4>
        <div id="lista-pericias"></div>
    </section>

    <section>
        <nav class="tabs-nav">
            <button class="tab-btn" onclick="mudarAba('combate')">Combate</button>
            <button class="tab-btn active" onclick="mudarAba('rituais')">Rituais</button>
            <button class="tab-btn" onclick="mudarAba('inventario')">Inventário</button>
        </nav>
        <div id="aba-rituais" class="tab-content active">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <button class="cris-btn" onclick="novoRitual()">+ Novo Ritual</button>
                <div style="font-family:'Special Elite'">DT <span id="dt-val">10</span></div>
            </div>
            <div id="lista-rituais"></div>
        </div>
        <div id="aba-combate" class="tab-content">Seção de Combate</div>
        <div id="aba-inventario" class="tab-content">Seção de Inventário</div>
    </section>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBO3ytDF4stqlHA2h7qUP8fLcLsEwB3jNI",
        authDomain: "fichasrpg-7fc69.firebaseapp.com",
        projectId: "fichasrpg-7fc69",
        storageBucket: "fichasrpg-7fc69.firebasestorage.app",
        messagingSenderId: "758802032764",
        appId: "1:758802032764:web:40467e15fdc24c570081f9",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    let atual = urlParams.get('id');

    async function init() {
        if (!atual) {
            const ref = db.collection("fichas").doc();
            atual = ref.id;
            await ref.set({ nome: "", agi:1, for:1, int:1, pre:1, vig:1, vidaMax:20, vidaAtual:20, sanMax:20, sanAtual:20, peMax:5, peAtual:5, protecao: "", resistencias: "", proficiencias: "Armas simples" });
            window.location.search = `?id=${atual}`;
        } else {
            carregarFicha();
            gerarPericias();
        }
    }

    function carregarFicha() {
        db.collection("fichas").doc(atual).onSnapshot(doc => {
            const d = doc.data();
            if(!d) return;
            document.getElementById('nome-personagem').value = d.nome || "";
            ['agi','for','int','pre','vig'].forEach(a => document.getElementById(`attr-${a}`).value = d[a]);
            atualizarStatus('vida', d.vidaAtual, d.vidaMax);
            atualizarStatus('san', d.sanAtual, d.sanMax);
            atualizarStatus('pe', d.peAtual, d.peMax);
            
            document.getElementById('protecao').value = d.protecao || "";
            document.getElementById('resistencias').value = d.resistencias || "";
            document.getElementById('proficiencias').value = d.proficiencias || "";

            const defBase = 10 + (parseInt(d.agi) || 0);
            document.getElementById('display-defesa').innerText = defBase;
            document.getElementById('display-esquiva').innerText = defBase;
            document.getElementById('dt-val').innerText = 10 + (parseInt(d.int) || 0) + 5;
        });
    }

    function atualizarStatus(tipo, at, mx) {
        document.getElementById(`${tipo}-atual`).value = at;
        document.getElementById(`${tipo}-max`).value = mx;
        const porc = (at / mx) * 100;
        document.getElementById(`bar-${tipo}`).style.width = Math.min(porc, 100) + "%";
    }

    function salvarFicha() {
        db.collection("fichas").doc(atual).update({
            nome: document.getElementById('nome-personagem').value,
            agi: parseInt(document.getElementById('attr-agi').value) || 0,
            for: parseInt(document.getElementById('attr-for').value) || 0,
            int: parseInt(document.getElementById('attr-int').value) || 0,
            pre: parseInt(document.getElementById('attr-pre').value) || 0,
            vig: parseInt(document.getElementById('attr-vig').value) || 0,
            vidaAtual: parseInt(document.getElementById('vida-atual').value) || 0,
            vidaMax: parseInt(document.getElementById('vida-max').value) || 1,
            sanAtual: parseInt(document.getElementById('san-atual').value) || 0,
            sanMax: parseInt(document.getElementById('san-max').value) || 1,
            peAtual: parseInt(document.getElementById('pe-atual').value) || 0,
            peMax: parseInt(document.getElementById('pe-max').value) || 1,
            protecao: document.getElementById('protecao').value,
            resistencias: document.getElementById('resistencias').value,
            proficiencias: document.getElementById('proficiencias').value
        });
    }

    function ajustar(tipo, v) {
        const input = document.getElementById(`${tipo}-atual`);
        input.value = parseInt(input.value) + v;
        salvarFicha();
    }

    function gerarPericias() {
        const pericias = ["Acrobacia", "Atletismo", "Atualidades", "Ciências", "Crime", "Diplomacia", "Enganação", "Fortitude", "Furtividade", "Intuição", "Investigação", "Luta", "Medicina", "Ocultismo", "Percepção", "Pontaria", "Reflexos", "Vontade"];
        document.getElementById('lista-pericias').innerHTML = pericias.map(p => `
            <div class="pericia-row">
                <span>${p}</span>
                <span style="color:#444">(---)</span>
                <input type="number" class="treino-select" value="0" style="width:25px; border:none; text-align:center">
                <select class="treino-select"><option>0</option><option>5</option><option>10</option><option>15</option><option>20</option></select>
            </div>
        `).join('');
    }

    function mudarAba(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + id).classList.add('active');
        event.target.classList.add('active');
    }

    init();
</script>
</body>
</html>
