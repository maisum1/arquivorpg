<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        body { background: #000; color: white; font-family: 'Special Elite', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        #login-screen { display: none; flex-direction: column; align-items: center; gap: 40px; text-align: center; }
        h1 { font-size: 3.5rem; letter-spacing: 8px; margin: 0; }
        .btn-google { background: white; color: black; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; font-family: sans-serif; }
        #dashboard { display: none; width: 90%; max-width: 800px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 8px; text-decoration: none; color: white; transition: 0.3s; display: flex; align-items: center; gap: 15px; position: relative; text-align: left; }
        .card:hover { border-color: #EAB308; background: #1a1a1a; }
        .tab-btn { background: transparent; border: none; color: #666; padding: 10px 20px; cursor: pointer; font-family: 'Special Elite'; font-size: 16px; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: white; border-bottom: 2px solid #EAB308; }
        .monitor-row { background: #111; padding: 15px; border-left: 4px solid #EAB308; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; text-align: left; }
        
        /* Botão de Excluir */
        .delete-btn {
            background: #441111;
            color: #ff4444;
            border: 1px solid #661111;
            padding: 4px 8px;
            font-size: 10px;
            cursor: pointer;
            border-radius: 3px;
            font-family: 'Special Elite';
            transition: 0.3s;
            position: absolute;
            bottom: 10px;
            right: 10px;
        }
        .delete-btn:hover { background: #ff4444; color: white; }
        .monitor-row {
    transition: background 0.3s;
}
.monitor-row:hover {
    background: rgba(234, 179, 8, 0.05);
}
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>C.R.I.S.</h1>
        <button class="btn-google" onclick="fazerLogin()">Entrar com Google</button>
    </div>

    <div id="dashboard">
        <h2 id="welcome">Agente Conectado</h2>
        <div id="menu-abas" style="margin-bottom: 30px;">
            <button id="btn-jog" class="tab-btn active" onclick="abaHub('jogador')">Meus Agentes</button>
        </div>
        <div id="hub-jogador">
            <div class="grid" id="lista-fichas"></div>
            <button class="btn-google" onclick="criarNovaFicha()" style="margin-top:30px; background:#222; color:white; border:1px solid #444;">+ Novo Agente</button>
        </div>
        <div id="hub-mestre" style="display:none;">
            <div id="monitor-mestre"></div>
        </div>
        <br><br>
        <button onclick="firebase.auth().signOut()" style="background:transparent; color:gray; border:none; cursor:pointer; font-family: sans-serif;">Sair da Conta</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const emailMestre = "pedroacpr@gmail.com"; 

        auth.onAuthStateChanged(user => {
            const loginScreen = document.getElementById('login-screen');
            const dashboard = document.getElementById('dashboard');

            if (user) {
                loginScreen.style.display = 'none';
                dashboard.style.display = 'block';
                document.getElementById('welcome').innerText = "Agente: " + user.displayName;
                
                if (user.email === emailMestre && !document.getElementById('btn-mes')) {
                    const btn = document.createElement('button');
                    btn.id = 'btn-mes';
                    btn.className = 'tab-btn';
                    btn.innerText = 'Painel do Mestre';
                    btn.style.color = '#ff4444';
                    btn.onclick = () => abaHub('mestre');
                    document.getElementById('menu-abas').appendChild(btn);
                }
                carregarFichas(user.uid);
            } else {
                loginScreen.style.display = 'flex';
                dashboard.style.display = 'none';
                const btnMes = document.getElementById('btn-mes');
                if(btnMes) btnMes.remove();
            }
        });

        function fazerLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            auth.signInWithPopup(provider).catch(error => alert("Erro: " + error.message));
        }

        function abaHub(tipo) {
            document.getElementById('hub-jogador').style.display = tipo === 'jogador' ? 'block' : 'none';
            document.getElementById('hub-mestre').style.display = tipo === 'mestre' ? 'block' : 'none';
            document.getElementById('btn-jog').classList.toggle('active', tipo === 'jogador');
            if(document.getElementById('btn-mes')) document.getElementById('btn-mes').classList.toggle('active', tipo === 'mestre');
            if(tipo === 'mestre') carregarMonitorMestre();
        }

        function carregarFichas(uid) {
            db.collection("fichas").where("dono", "==", uid).onSnapshot(snap => {
                const container = document.getElementById('lista-fichas');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    container.innerHTML += `
                        <div class="card" onclick="window.location.href='ficha.html?id=${doc.id}'" style="cursor:pointer; padding-bottom: 40px;">
                            <div style="width: 60px; height: 60px; background: #000; border: 1px solid #333; flex-shrink: 0; border-radius: 4px; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                                ${d.portrait ? `<img src="${d.portrait}" style="width: 100%; height: 100%; object-fit: cover;">` : `<span style="font-size: 8px; color: #555;">FOTO</span>`}
                            </div>
                            <div style="flex: 1;">
                                <strong style="font-size:18px;">${d.nome || 'Sem Nome'}</strong><br>
                                <small style="color:#EAB308; font-weight:bold;">NEX: ${d.nex || '5%'} | ${d.classe || 'Sem Classe'}</small>
                            </div>
                            <button class="delete-btn" onclick="event.stopPropagation(); confirmarExclusao('${doc.id}', '${d.nome}')">Excluir</button>
                        </div>`;
                });
            });
        }

        async function confirmarExclusao(id, nome) {
            if (confirm(`Deseja mesmo excluir a ficha de "${nome}"?`)) {
                const check = prompt("Para confirmar, digite EXCLUIR em letras maiúsculas:");
                if (check === "EXCLUIR") {
                    try {
                        await db.collection("fichas").doc(id).delete();
                        alert("Arquivo deletado com sucesso.");
                    } catch (e) {
                        alert("Erro ao deletar: " + e.message);
                    }
                } else {
                    alert("Ação cancelada. Texto incorreto.");
                }
            }
        }

       function carregarMonitorMestre() {
            db.collection("fichas").onSnapshot(snap => {
                const container = document.getElementById('monitor-mestre');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    
                    // Se houver retrato, aplica o enquadramento salvo. Se não, usa um placeholder cinza.
                    const estiloImagem = d.portrait ? 
                        `background-image: url('${d.portrait}'); background-size: ${d.pZ * 100 || 100}%; background-position: ${d.pX || 50}% ${d.pY || 50}%;` : 
                        `background: #222;`;

                    container.innerHTML += `
                        <div class="monitor-row" style="display: flex; align-items: center; gap: 15px; padding: 10px; border-bottom: 1px solid #222;">
                            <div style="width: 50px; height: 50px; border-radius: 5px; border: 1px solid var(--cris-purple); overflow: hidden; flex-shrink: 0; ${estiloImagem} background-repeat: no-repeat;">
                            </div>
                            <div style="flex-grow: 1;">
                                <strong>${d.nome || 'Agente'}</strong><br>
                                <small>${d.nex || '5%'}</small>
                            </div>
                            <div style="text-align:right">
                                <span style="color:#b31d1d">PV: ${d.vidaAtual || 0}/${d.vidaMax || 0}</span> | 
                                <span style="color:#034374">SAN: ${d.sanAtual || 0}/${d.sanMax || 0}</span><br>
                                <a href="ficha.html?id=${doc.id}" style="color:#EAB308; font-size: 12px;">ABRIR FICHA</a>
                            </div>
                        </div>`;
                });
            });
        }
        async function criarNovaFicha() {
            const user = auth.currentUser;
            const ref = await db.collection("fichas").add({
                dono: user.uid, nome: "Novo Agente", nex: "5%",
                vidaAtual: 20, vidaMax: 20, sanAtual: 20, sanMax: 20
            });
            window.location.href = `ficha.html?id=${ref.id}`;
        }
    </script>
</body>
</html>
