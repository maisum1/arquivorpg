<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Agente Completo</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --cris-purple: #6d28d9;
            --hp-red: #b31d1d;
            --san-purple: #5c2d91;
            --pe-orange: #d97706;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 20px;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .grid-container {
            display: grid;
            grid-template-columns: 320px 400px 1fr;
            gap: 25px;
            max-width: 1650px;
            margin: 0 auto;
        }

        .header-name {
            width: 100%; background: transparent; border: none;
            border-bottom: 2px solid #333; color: #fff;
            font-family: 'Special Elite'; font-size: 24px;
            padding: 5px 0; margin-bottom: 10px; outline: none;
        }

        .header-sub-row { display: flex; gap: 15px; margin-bottom: 10px; flex-wrap: wrap; }
        .sub-input-group { flex: 1; min-width: 80px; display: flex; flex-direction: column; }
        .sub-input-group label { font-size: 10px; color: #888; font-weight: bold; margin-bottom: 5px; font-family: 'Roboto'; text-transform: uppercase; }
        .sub-input-group input, .sub-input-group select {
            background: transparent; border: none; border-bottom: 1px solid #333;
            color: #fff; font-family: 'Special Elite'; font-size: 16px; padding: 5px 0; outline: none;
        }
        .sub-input-group select option { background: #111; color: #ccc; }

        /* RESTANTE DO CSS PERMANECE IDÊNTICO */
    </style>
</head>
<body>

<div class="grid-container">
    <section>
        <input type="text" id="nome-personagem" class="header-name" placeholder="NOME DO AGENTE" onchange="salvarFicha()">
        
        <div class="header-sub-row">
            <div class="sub-input-group">
                <label>ORIGEM</label>
                <input type="text" id="origem-personagem" onchange="salvarFicha()" placeholder="...">
            </div>
            <div class="sub-input-group">
                <label>CLASSE</label>
                <select id="classe-personagem" onchange="salvarFicha()">
                    <option value="">Selecione...</option>
                    <option value="Combatente">Combatente</option>
                    <option value="Esotérico">Esotérico</option>
                    <option value="Polímata">Polímata</option>
                </select>
            </div>

            <!-- ✅ ÚNICA ALTERAÇÃO FEITA AQUI -->
            <div class="sub-input-group" style="flex: 0 0 40px; min-width: 40px;">
                <label>IDADE</label>
                <input type="number" id="idade-personagem" onchange="salvarFicha()" placeholder="0">
            </div>
        </div>

        <!-- TODO O RESTANTE DO HTML PERMANECE EXATAMENTE IGUAL AO SEU ORIGINAL -->
