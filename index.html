<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Central de Agentes</title>
    
   <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --bg-dark: #090909;
            --card-bg: #111;
            --accent: #6d28d9;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { font-family: 'Special Elite'; letter-spacing: 2px; margin-bottom: 40px; text-align: center; }

        /* TELA DE LOGIN */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
        }

        .btn-google {
            background: white; color: #333;
            border: none; padding: 10px 20px;
            border-radius: 4px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; gap: 10px;
            font-size: 16px; transition: 0.2s;
        }
        .btn-google:hover { background: #f1f1f1; }

        /* DASHBOARD (ESCONDIDO NO INICIO) */
        #dashboard-screen { display: none; width: 100%; max-width: 1000px; }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 30px;
        }

        .user-info { font-size: 14px; color: #888; }
        .btn-logout { background: none; border: 1px solid #444; color: #888; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .btn-logout:hover { color: #fff; border-color: #fff; }

        /* AREA DO MESTRE */
        #master-area-btn {
            display: none; /* Escondido por padrão */
            background: #b91c1c; color: white;
            padding: 10px 20px; border: none; border-radius: 4px;
            font-family: 'Special Elite'; cursor: pointer;
            margin-bottom: 20px; width: 100%;
        }

        /* GRID DE FICHAS */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card-ficha {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card-ficha:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .card-new {
            border: 2px dashed #444;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; color: #666;
        }
        .card-new:hover { border-color: var(--accent); color: var(--accent); }

        .card-name { font-family: 'Special Elite'; font-size: 20px; margin-bottom: 5px; color: #fff; }
        .card-details { font-size: 12px; color: #888; }
        .card-nex { position: absolute; top: 15px; right: 15px; font-weight: bold; color: var(--accent); }

    </style>
</head>
<body>

    <div id="login-screen">
        <h1>C.R.I.S. - ACESSO RESTRITO</h1>
        <button class="btn-google" onclick="fazerLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Entrar com Google
        </button>
    </div>

    <div id="dashboard-screen">
        <div class="top-bar">
            <div class="user-info">Agente: <span id="user-name">...</span></div>
            <button class="btn-logout" onclick="fazerLogout()">Sair</button>
        </div>

        <button id="master-area-btn" onclick="irParaBestiario()">⚠ ACESSO DE MESTRE: BESTIÁRIO</button>

        <h2 style="font-family:'Special Elite'">MEUS AGENTES</h2>
        
        <div class="agents-grid" id="lista-fichas">
            </div>
    </div>

    <script>
        // CONFIGURAÇÃO DO FIREBASE (A MESMA DA SUA FICHA)
        const firebaseConfig = {
            apiKey: "AIzaSyBO3ytDF4stqlHA2h7qUP8fLcLsEwB3jNI",
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- COLOQUE SEU EMAIL AQUI PARA SER O MESTRE ---
        const EMAIL_MESTRE = "pedroacpr@gmail.com"; 

        // Monitora se o usuário entrou ou saiu
        auth.onAuthStateChanged(user => {
            if (user) {
                // Usuário logado
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-screen').style.display = 'block';
                document.getElementById('user-name').innerText = user.displayName;
                
                // Verifica se é o mestre
                if(user.email === pedroacpr@gmail.com) {
                    document.getElementById('master-area-btn').style.display = 'block';
                }

                carregarFichas(user.uid);
            } else {
                // Usuário deslogado
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('dashboard-screen').style.display = 'none';
            }
        });

        function fazerLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(error => {
                alert("Erro ao logar: " + error.message);
            });
        }

        function fazerLogout() {
            auth.signOut();
        }

        async function criarNovaFicha() {
            const user = auth.currentUser;
            if (!user) return;

            // Cria um documento vazio, mas JÁ COM O DONO definido
            const novaFicha = await db.collection("fichas").add({
                dono: user.uid, // O Segredo: Vincula a ficha ao usuário
                nome: "Novo Agente",
                classe: "Recruta",
                nex: "5%",
                vidaAtual: 20, vidaMax: 20,
                sanAtual: 20, sanMax: 20,
                peAtual: 5, peMax: 5
            });

            // Redireciona para a página de edição
            window.location.href = `ficha.html?id=${novaFicha.id}`;
        }

        function carregarFichas(uid) {
            const container = document.getElementById('lista-fichas');
            container.innerHTML = `
                <div class="card-ficha card-new" onclick="criarNovaFicha()">
                    <span style="font-size:30px;">+</span>
                    <span>NOVO AGENTE</span>
                </div>
            `;

            // Busca apenas as fichas onde 'dono' == ID do usuário logado
            db.collection("fichas")
              .where("dono", "==", uid)
              .onSnapshot(snap => {
                  // Limpa a lista (mantendo o botão de novo)
                  const cards = container.querySelectorAll('.card-ficha:not(.card-new)');
                  cards.forEach(c => c.remove());

                  snap.forEach(doc => {
                      const data = doc.data();
                      const html = `
                        <a href="ficha.html?id=${doc.id}" class="card-ficha">
                            <div class="card-nex">${data.nex || "5%"}</div>
                            <div class="card-name">${data.nome || "Sem Nome"}</div>
                            <div class="card-details">
                                ${data.classe || "Classe"} - ${data.origem || "Origem"}
                            </div>
                        </a>
                      `;
                      container.insertAdjacentHTML('beforeend', html);
                  });
              });
        }

        function irParaBestiario() {
            // Por enquanto vamos apenas alertar, depois criaremos a pagina criatura.html
            alert("Em breve: Redirecionando para criatura.html...");
            // window.location.href = "criatura.html";
        }
    </script>
</body>
</html>
