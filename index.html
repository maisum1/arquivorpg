<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Agente</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --cris-purple: #6d28d9;
            --hp-red: #cc0000;
            --san-purple: #6a0dad;
            --pe-orange: #ff8c00;
        }

        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 20px;
        }

        /* RESET INPUTS */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .grid-container {
            display: grid;
            grid-template-columns: 320px 1fr 450px;
            gap: 20px;
            max-width: 1650px;
            margin: 0 auto;
        }

        /* SIGILO E STATUS (COLUNA 1) */
        .sigilo-container {
            position: relative; width: 250px; height: 250px; margin: 10px auto;
            background: url('https://www.ordemparanormal.com.br/assets/rituais/circulo_atributos.png') no-repeat center;
            background-size: contain;
        }
        .attr-box {
            position: absolute; width: 50px; height: 50px; background: #000;
            border: 2px solid #fff; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .attr-box input { background: transparent; border: none; color: #fff; text-align: center; width: 100%; font-size: 18px; font-family: 'Special Elite'; }
        .agi { top: 0; left: 100px; } .for { top: 70px; left: 5px; } .int { top: 70px; right: 5px; } .pre { bottom: 20px; left: 40px; } .vig { bottom: 20px; right: 40px; }

        .status-container { margin-bottom: 12px; }
        .bar-bg { width: 100%; height: 30px; background: #1a1a1a; position: relative; border: 1px solid #000; }
        .bar-fill { height: 100%; transition: width 0.3s; position: absolute; }
        .bar-content { position: relative; z-index: 2; display: flex; justify-content: center; align-items: center; gap: 15px; height: 100%; font-weight: bold;}
        .bar-content input { background: transparent; border: none; color: #fff; width: 40px; text-align: center; font-size: 16px; }

        /* PERÍCIAS (COLUNA 2) */
        .pericia-row { display: grid; grid-template-columns: 1fr 40px 40px 60px; gap: 5px; padding: 4px 0; border-bottom: 1px solid #111; font-size: 12px; }
        .treino-select { background: #111; color: #fff; border: 1px solid #333; font-size: 11px; }

        /* ABAS (COLUNA 3) */
        .tabs-nav { display: flex; gap: 10px; border-bottom: 1px solid #333; margin-bottom: 15px; }
        .tab-btn { background: transparent; border: none; color: #666; padding: 8px; cursor: pointer; font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid var(--cris-purple); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* RITUAIS */
        .ritual-header-ui { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .dt-box { background: #111; border: 1px solid #444; padding: 5px 10px; font-family: 'Special Elite'; }
        .ritual-card { background: #121212; border-left: 4px solid #555; margin-bottom: 10px; border-radius: 4px; overflow: hidden; }
        .ritual-card[data-elem="Morte"] { border-left-color: #555; }
        .ritual-card[data-elem="Sangue"] { border-left-color: #cc0000; }
        .ritual-card[data-elem="Energia"] { border-left-color: #9333ea; }
        .ritual-card[data-elem="Conhecimento"] { border-left-color: #eab308; }

        .card-header { padding: 10px; cursor: pointer; display: flex; justify-content: space-between; background: rgba(255,255,255,0.03); }
        .card-body { padding: 15px; display: none; border-top: 1px solid #222; }
        .cris-textarea { width: 100%; background: transparent; border: 1px solid #333; color: #ccc; font-size: 12px; padding: 8px; min-height: 50px; }
        
        .cris-btn { background: var(--cris-purple); border: none; color: #fff; padding: 6px 12px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .danger-btn { background: #444; color: #ff4444; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="grid-container">
    
    <section>
        <input type="text" id="nome-personagem" class="bar-content" style="width:100%; border-bottom: 1px solid #333; margin-bottom: 10px; text-align: left;" placeholder="NOME DO AGENTE" onchange="salvarFicha()">
        
        <div class="sigilo-container">
            <div class="attr-box agi"><input type="number" id="attr-agi" onchange="salvarFicha()"></div>
            <div class="attr-box for"><input type="number" id="attr-for" onchange="salvarFicha()"></div>
            <div class="attr-box int"><input type="number" id="attr-int" onchange="salvarFicha()"></div>
            <div class="attr-box pre"><input type="number" id="attr-pre" onchange="salvarFicha()"></div>
            <div class="attr-box vig"><input type="number" id="attr-vig" onchange="salvarFicha()"></div>
        </div>

        <div class="status-container">
            <div style="font-size: 10px; display: flex; justify-content: space-between;"><span>VIDA</span> <span>MAX <input type="number" id="vida-max" class="treino-select" style="width:30px" onchange="salvarFicha()"></span></div>
            <div class="bar-bg"><div id="bar-vida" class="bar-fill" style="background:var(--hp-red)"></div><div class="bar-content"><span onclick="ajustar('vida', -1)">-</span><input type="number" id="vida-atual" onchange="salvarFicha()"><span onclick="ajustar('vida', 1)">+</span></div></div>
        </div>
        <div class="status-container">
            <div style="font-size: 10px; display: flex; justify-content: space-between;"><span>SANIDADE</span> <span>MAX <input type="number" id="san-max" class="treino-select" style="width:30px" onchange="salvarFicha()"></span></div>
            <div class="bar-bg"><div id="bar-san" class="bar-fill" style="background:var(--san-purple)"></div><div class="bar-content"><span onclick="ajustar('san', -1)">-</span><input type="number" id="san-atual" onchange="salvarFicha()"><span onclick="ajustar('san', 1)">+</span></div></div>
        </div>
        <div class="status-container">
            <div style="font-size: 10px; display: flex; justify-content: space-between;"><span>ESFORÇO</span> <span>MAX <input type="number" id="pe-max" class="treino-select" style="width:30px" onchange="salvarFicha()"></span></div>
            <div class="bar-bg"><div id="bar-pe" class="bar-fill" style="background:var(--pe-orange)"></div><div class="bar-content"><span onclick="ajustar('pe', -1)">-</span><input type="number" id="pe-atual" onchange="salvarFicha()"><span onclick="ajustar('pe', 1)">+</span></div></div>
        </div>
    </section>

    <section style="background: rgba(255,255,255,0.02); padding: 10px;">
        <h4 style="font-family: 'Special Elite'; margin: 0 0 10px 0;">PERÍCIAS</h4>
        <div id="lista-pericias"></div>
    </section>

    <section>
        <nav class="tabs-nav">
            <button class="tab-btn" onclick="mudarAba('combate')">Combate</button>
            <button class="tab-btn" onclick="mudarAba('habilidades')">Habilidades</button>
            <button class="tab-btn active" onclick="mudarAba('rituais')">Rituais</button>
            <button class="tab-btn" onclick="mudarAba('inventario')">Inventário</button>
        </nav>

        <div id="aba-rituais" class="tab-content active">
            <div class="ritual-header-ui">
                <input type="text" placeholder="Filtrar..." class="treino-select" style="flex:1; padding: 5px; margin-right: 10px;">
                <div class="dt-box">DT <span id="dt-val">13</span></div>
                <button class="cris-btn" style="margin-left:10px" onclick="novoRitual()">Adicionar</button>
            </div>
            <div id="lista-rituais"></div>
        </div>

        <div id="aba-combate" class="tab-content">
            <button class="cris-btn">+ Arma</button>
            <div style="margin-top:20px; color:#444">Nenhuma arma equipada.</div>
        </div>
        <div id="aba-habilidades" class="tab-content">
            <button class="cris-btn">+ Habilidade</button>
            <div style="margin-top:20px; color:#444">Habilidades de classe e origem aparecem aqui.</div>
        </div>
        <div id="aba-inventario" class="tab-content">
            <div style="display:flex; justify-content: space-between;"><span>Espaços: 0 / 15</span> <span>Carga: 0</span></div>
        </div>
    </section>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBO3ytDF4stqlHA2h7qUP8fLcLsEwB3jNI",
        authDomain: "fichasrpg-7fc69.firebaseapp.com",
        projectId: "fichasrpg-7fc69",
        storageBucket: "fichasrpg-7fc69.firebasestorage.app",
        messagingSenderId: "758802032764",
        appId: "1:758802032764:web:40467e15fdc24c570081f9",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    let atual = urlParams.get('id');

    async function init() {
        if (!atual) {
            const ref = db.collection("fichas").doc();
            atual = ref.id;
            await ref.set({ nome: "Novo Agente", agi:1, for:1, int:1, pre:1, vig:1, vidaMax:20, vidaAtual:20, sanMax:20, sanAtual:20, peMax:5, peAtual:5 });
            window.location.search = `?id=${atual}`;
        } else {
            carregarFicha();
            gerarPericias();
            carregarRituais();
        }
    }

    function carregarFicha() {
        db.collection("fichas").doc(atual).onSnapshot(doc => {
            const d = doc.data();
            if(!d) return;
            document.getElementById('nome-personagem').value = d.nome;
            ['agi','for','int','pre','vig'].forEach(a => document.getElementById(`attr-${a}`).value = d[a]);
            atualizarStatus('vida', d.vidaAtual, d.vidaMax);
            atualizarStatus('san', d.sanAtual, d.sanMax);
            atualizarStatus('pe', d.peAtual, d.peMax);
            document.getElementById('dt-val').innerText = 10 + parseInt(d.int || 0) + 5; // Exemplo de cálculo DT
        });
    }

    function atualizarStatus(tipo, at, mx) {
        document.getElementById(`${tipo}-atual`).value = at;
        document.getElementById(`${tipo}-max`).value = mx;
        const porc = (at / mx) * 100;
        document.getElementById(`bar-${tipo}`).style.width = Math.min(porc, 100) + "%";
    }

    function salvarFicha() {
        db.collection("fichas").doc(atual).update({
            nome: document.getElementById('nome-personagem').value,
            agi: parseInt(document.getElementById('attr-agi').value),
            for: parseInt(document.getElementById('attr-for').value),
            int: parseInt(document.getElementById('attr-int').value),
            pre: parseInt(document.getElementById('attr-pre').value),
            vig: parseInt(document.getElementById('attr-vig').value),
            vidaAtual: parseInt(document.getElementById('vida-atual').value),
            vidaMax: parseInt(document.getElementById('vida-max').value),
            sanAtual: parseInt(document.getElementById('san-atual').value),
            sanMax: parseInt(document.getElementById('san-max').value),
            peAtual: parseInt(document.getElementById('pe-atual').value),
            peMax: parseInt(document.getElementById('pe-max').value),
        });
    }

    function ajustar(tipo, v) {
        const input = document.getElementById(`${tipo}-atual`);
        input.value = parseInt(input.value) + v;
        salvarFicha();
    }

    function gerarPericias() {
        const pericias = ["Acrobacia", "Atletismo", "Atualidades", "Ciências", "Crime", "Diplomacia", "Enganação", "Fortitude", "Furtividade", "Intuição", "Investigação", "Luta", "Medicina", "Ocultismo", "Percepção", "Pontaria", "Reflexos", "Religião", "Sobrevivência", "Tática", "Tecnologia", "Vontade"];
        document.getElementById('lista-pericias').innerHTML = pericias.map(p => `
            <div class="pericia-row">
                <span>${p}</span>
                <span style="color:#444">(---)</span>
                <input type="number" class="treino-select" value="0" style="width:25px; border:none; text-align:center">
                <select class="treino-select">
                    <option>0</option><option>5</option><option>10</option><option>15</option><option>20</option>
                </select>
            </div>
        `).join('');
    }

    // LÓGICA DE RITUAIS
    function carregarRituais() {
        db.collection("fichas").doc(atual).collection("rituais").onSnapshot(snap => {
            const container = document.getElementById('lista-rituais');
            container.innerHTML = "";
            snap.forEach(doc => {
                const r = doc.data();
                const card = document.createElement('div');
                card.className = 'ritual-card';
                card.setAttribute('data-elem', r.elemento);
                card.innerHTML = `
                    <div class="card-header" onclick="toggleRitual('${doc.id}')">
                        <span>${r.nome}</span>
                        <span style="font-size:9px">${r.elemento} / ${r.circulo}º</span>
                    </div>
                    <div class="card-body" id="body-${doc.id}">
                        <input type="text" class="treino-select" value="${r.nome}" onchange="updateRitual('${doc.id}', 'nome', this.value)" style="width:100%; margin-bottom:5px">
                        <select class="treino-select" onchange="updateRitual('${doc.id}', 'elemento', this.value)">
                            <option ${r.elemento=='Morte'?'selected':''}>Morte</option>
                            <option ${r.elemento=='Sangue'?'selected':''}>Sangue</option>
                            <option ${r.elemento=='Energia'?'selected':''}>Energia</option>
                            <option ${r.elemento=='Conhecimento'?'selected':''}>Conhecimento</option>
                        </select>
                        <textarea class="cris-textarea" placeholder="Descrição..." onchange="updateRitual('${doc.id}', 'descricao', this.value)">${r.descricao || ''}</textarea>
                        <button class="cris-btn danger-btn" onclick="removerRitual('${doc.id}')">Excluir</button>
                    </div>
                `;
                container.appendChild(card);
            });
        });
    }

    async function novoRitual() {
        await db.collection("fichas").doc(atual).collection("rituais").add({ nome: "Novo Ritual", elemento: "Morte", circulo: 1, descricao: "" });
    }

    async function updateRitual(id, campo, valor) {
        let obj = {}; obj[campo] = valor;
        await db.collection("fichas").doc(atual).collection("rituais").doc(id).update(obj);
    }

    async function removerRitual(id) { if(confirm("Excluir?")) await db.collection("fichas").doc(atual).collection("rituais").doc(id).delete(); }

    function toggleRitual(id) {
        const b = document.getElementById(`body-${id}`);
        b.style.display = b.style.display === 'block' ? 'none' : 'block';
    }

    function mudarAba(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + id).classList.add('active');
        event.target.classList.add('active');
    }

    init();
</script>
</body>
</html>
