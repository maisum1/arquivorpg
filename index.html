<div class="section" id="rit" style="display:none">
  <div style="display:flex; justify-content:flex-end; align-items:center; gap:10px; margin-bottom:10px;">
    <div style="font-weight:bold; color:white;">DT DE RITUAIS</div>
    <div id="dtRituais" style="background:#111; border:1px solid #fff; padding:4px 8px; border-radius:4px;">0</div>
    <button onclick="novoRitual()">Novo Ritual</button>
  </div>
  <div id="listaRituais"></div>
</div>

<style>
.ritual-card{
  background:#1c1c1c;
  border:1px solid #6d28d9;
  border-radius:8px;
  padding:10px;
  margin-bottom:10px;
  color:white;
}

.ritual-card .titulo{
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

.ritual-card .conteudo{
  display:none;
  margin-top:8px;
  line-height:1.4em;
}

/* Tags fixas roxas */
.ritual-card span.tag{
  color:#a855f7;
  font-weight:bold;
  margin-right:4px;
}

/* Campo preenchível branco */
.ritual-card .campo{
  display:inline-block;
  background:#222;
  padding:2px 6px;
  border-radius:4px;
  color:white;
  min-width:30px;
}

/* Estilo dos botões Editar/Remover */
.ritual-card .acoes{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
}

.ritual-card button{
  background:none;
  border:none;
  color:#6d28d9;
  cursor:pointer;
  font-weight:bold;
  padding:4px 6px;
  border-radius:4px;
}

.ritual-card button:hover{
  background:#111;
}
</style>

<script>
// Atualiza lista de rituais
async function atualizarRituais(){
  const container = document.getElementById("listaRituais");
  container.innerHTML = "";
  if(!atual) return;
  const snapshot = await db.collection("fichas").doc(atual).collection("rituais").get();
  document.getElementById("dtRituais").textContent = snapshot.size;

  snapshot.forEach(docu=>{
    const data = docu.data();
    const card = document.createElement("div");
    card.className = "ritual-card";

    card.innerHTML = `
      <div class="titulo"><span class="campo">${data.varia || "VARIA 1"}</span> - ${data.nome || "Nome do Ritual"}</div>
      <div class="conteudo">
        <div><span class="tag">Execução:</span><span class="campo">${data.exec || "padrão"}</span></div>
        <div><span class="tag">Alcance:</span><span class="campo">${data.alcance || "toque"}</span></div>
        <div><span class="tag">Alvo:</span><span class="campo">${data.alvo || "-"}</span></div>
        <div><span class="tag">Duração:</span><span class="campo">${data.duracao || "cena"}</span></div>
        <p class="campo">${data.descricao || "Descrição do ritual"}</p>
        ${data.discente ? `<p><span class="tag">Discente (+${data.peDisc} PE):</span><span class="campo">${data.discente}</span></p>` : ""}
        ${data.verdadeiro ? `<p><span class="tag">Verdadeiro (+${data.peVerd} PE):</span><span class="campo">${data.verdadeiro}</span></p>` : ""}
        <div class="acoes">
          <button onclick="editarRitual('${docu.id}')">Editar</button>
          <button onclick="removerRitual('${docu.id}')">Remover</button>
        </div>
      </div>
    `;
    container.appendChild(card);

    // Toggle conteúdo
    card.querySelector(".titulo").onclick = ()=>{
      const conteudo = card.querySelector(".conteudo");
      conteudo.style.display = conteudo.style.display==="block"?"none":"block";
    };
  });
}

// Criar novo ritual
async function novoRitual(){
  if(!atual) return;
  const doc = await db.collection("fichas").doc(atual).collection("rituais").add({
    nome:"Novo Ritual",
    varia:"VARIA 1",
    exec:"padrão",
    alcance:"toque",
    alvo:"-",
    duracao:"cena",
    descricao:"",
    discente:"",
    peDisc:2,
    verdadeiro:"",
    peVerd:5
  });
  atualizarRituais();
}

// Excluir ritual
async function removerRitual(id){
  if(!atual) return;
  await db.collection("fichas").doc(atual).collection("rituais").doc(id).delete();
  atualizarRituais();
}

// Editar ritual (pode abrir modal ou inline)
function editarRitual(id){
  alert("Função de edição de ritual ainda precisa ser implementada.");
}

// Chama ao carregar aba
atualizarRituais();
</script>
