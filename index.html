<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha RPG</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { background:#111; color:#eee; font-family:Arial; }
input { background:#222; color:#eee; border:1px solid #444; padding:4px; }
.tab { cursor:pointer; padding:6px; display:inline-block; background:#222; margin-right:5px; }
.tab-content { display:none; margin-top:10px; }
.tab-active { background:#333; }

.defesa-grid {
display:grid;
grid-template-columns:80px auto 120px 120px;
gap:10px;
align-items:center;
margin-top:15px;
}

.defesa-shield {
width:70px;
height:70px;
background:#222;
border:2px solid #555;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
}

.def-label { font-size:12px; }
.def-val { font-size:18px; }
.info-row { margin:8px 0; }
</style>
</head>

<body>

<div>
<div class="tab tab-active" onclick="trocarAba('geral')">Geral</div>
<div class="tab" onclick="trocarAba('combate')">Combate</div>
</div>

<div id="aba-geral" class="tab-content" style="display:block;">

<h3>Perícias</h3>
Fortitude (Treino):
<input type="number" id="fortitude-treino" value="0" onchange="salvarFicha()">

<div class="defesa-grid">
<div class="defesa-shield" id="display-defesa">10</div>

<div>
<div class="def-label">
DEFESA 
<input type="number" id="bonus-defesa" value="0" onchange="salvarFicha()" style="width:40px;">
</div>
<div style="font-size:10px;color:#777;">10 + AGI + BÔNUS</div>
</div>

<div>
<div class="def-label">
BLOQUEIO 
<input type="number" id="bonus-bloqueio" value="0" onchange="salvarFicha()" style="width:40px;">
</div>
<div class="def-val" id="display-bloqueio">0</div>
</div>

<div>
<div class="def-label">
ESQUIVA 
<input type="number" id="bonus-esquiva" value="0" onchange="salvarFicha()" style="width:40px;">
</div>
<div class="def-val" id="display-esquiva">10</div>
</div>
</div>

</div>

<div id="aba-combate" class="tab-content">

<div class="info-row">
<label>PROTEÇÃO</label><br>
<input type="text" id="info-prot" onchange="salvarFicha()">
</div>

<div class="info-row">
<label>RESISTÊNCIAS</label><br>
<input type="text" id="info-res" onchange="salvarFicha()">
</div>

<div class="info-row">
<label>PROFICIÊNCIAS</label><br>
<input type="text" id="info-prof" onchange="salvarFicha()">
</div>

</div>

<script>
// 🔥 COLE AQUI SUA CONFIG DO FIREBASE
const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "SEU_AUTH_DOMAIN",
projectId: "SEU_PROJECT_ID",
storageBucket: "SEU_BUCKET",
messagingSenderId: "SEU_ID",
appId: "SEU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const fichaID = "fichaTeste";

function trocarAba(nome){
document.querySelectorAll(".tab-content").forEach(e=>e.style.display="none");
document.getElementById("aba-"+nome).style.display="block";
}

function salvarFicha(){

const treinoFortitude = parseInt(document.getElementById("fortitude-treino").value)||0;
const bonusBloq = parseInt(document.getElementById("bonus-bloqueio").value)||0;
const bonusEsq = parseInt(document.getElementById("bonus-esquiva").value)||0;
const bonusDef = parseInt(document.getElementById("bonus-defesa").value)||0;

const bloqueioFinal = treinoFortitude + bonusBloq;
const esquivaFinal = 10 + bonusEsq;
const defesaFinal = 10 + bonusDef;

document.getElementById("display-bloqueio").innerText = bloqueioFinal;
document.getElementById("display-esquiva").innerText = esquivaFinal;
document.getElementById("display-defesa").innerText = defesaFinal;

db.collection("fichas").doc(fichaID).set({
fortitudeTreino: treinoFortitude,
bonusBloqueio: bonusBloq,
bonusEsquiva: bonusEsq,
bonusDefesa: bonusDef,
protecao: document.getElementById("info-prot").value,
resistencias: document.getElementById("info-res").value,
proficiencias: document.getElementById("info-prof").value
});
}

function carregarFicha(){
db.collection("fichas").doc(fichaID).get().then(doc=>{
if(doc.exists){
const d = doc.data();

document.getElementById("fortitude-treino").value = d.fortitudeTreino||0;
document.getElementById("bonus-bloqueio").value = d.bonusBloqueio||0;
document.getElementById("bonus-esquiva").value = d.bonusEsquiva||0;
document.getElementById("bonus-defesa").value = d.bonusDefesa||0;

document.getElementById("info-prot").value = d.protecao||"";
document.getElementById("info-res").value = d.resistencias||"";
document.getElementById("info-prof").value = d.proficiencias||"";

salvarFicha();
}
});
}

carregarFicha();
</script>

</body>
</html>
