<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C.R.I.S. - Hub</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

body { background:#000; color:white; font-family:'Special Elite'; margin:0; display:flex; align-items:center; justify-content:center; min-height:100vh; }

#login-screen { display:none; flex-direction:column; align-items:center; gap:40px; text-align:center; }
h1 { font-size:3.5rem; letter-spacing:8px; margin:0; }

.btn-google { background:white; color:black; border:none; padding:15px 30px; border-radius:5px; font-weight:bold; cursor:pointer; font-family:sans-serif; }

#dashboard { display:none; width:90%; max-width:900px; text-align:center; }

.tab-btn {
background:transparent;
border:none;
color:#666;
padding:10px 20px;
cursor:pointer;
font-family:'Special Elite';
font-size:16px;
border-bottom:2px solid transparent;
}
.tab-btn.active { color:white; border-bottom:2px solid #EAB308; }

.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:20px; margin-top:30px; }

.card {
background:#111;
border:1px solid #333;
padding:20px;
border-radius:8px;
text-decoration:none;
color:white;
transition:0.3s;
cursor:pointer;
}
.card:hover { border-color:#b91c1c; background:#1a1a1a; }

.delete-btn {
background:#441111;
color:#ff4444;
border:1px solid #661111;
padding:4px 8px;
font-size:10px;
cursor:pointer;
border-radius:3px;
font-family:'Special Elite';
margin-top:10px;
}
.delete-btn:hover { background:#ff4444; color:white; }

.monitor-row {
background:#111;
padding:15px;
border-left:4px solid #EAB308;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
text-align:left;
}
</style>
</head>
<body>

<div id="login-screen">
<h1>C.R.I.S.</h1>
<button class="btn-google" onclick="fazerLogin()">Entrar com Google</button>
</div>

<div id="dashboard">
<h2 id="welcome"></h2>

<div id="menu-abas" style="margin-bottom:30px;">
<button id="btn-jog" class="tab-btn active" onclick="abaHub('jogador')">Meus Agentes</button>
</div>

<div id="hub-jogador">
<div class="grid" id="lista-fichas"></div>
<button class="btn-google" onclick="criarNovaFicha()" style="margin-top:30px;background:#222;color:white;border:1px solid #444;">+ Novo Agente</button>
</div>

<div id="hub-mestre" style="display:none;">
<div id="monitor-mestre"></div>
</div>

<div id="hub-ameacas" style="display:none;">
<div class="grid" id="lista-ameacas"></div>
<button class="btn-google" onclick="criarNovaAmeaca()" style="margin-top:30px;background:#1a0000;color:white;border:1px solid #660000;">+ Nova Ameaça</button>
</div>

<br><br>
<button onclick="firebase.auth().signOut()" style="background:transparent;color:gray;border:none;cursor:pointer;">Sair</button>
</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
authDomain: "fichasrpg-7fc69.firebaseapp.com",
projectId: "fichasrpg-7fc69",
storageBucket: "fichasrpg-7fc69.firebasestorage.app",
messagingSenderId: "758802032764",
appId: "1:758802032764:web:40467e15fdc24c570081f9",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

const emailMestre = "pedroacpr@gmail.com";

auth.onAuthStateChanged(user => {
if(user){
document.getElementById('login-screen').style.display='none';
document.getElementById('dashboard').style.display='block';
document.getElementById('welcome').innerText="Agente: "+user.displayName;

if(user.email===emailMestre && !document.getElementById('btn-mes')){
let btnMes=document.createElement('button');
btnMes.id='btn-mes';
btnMes.className='tab-btn';
btnMes.innerText='Painel do Mestre';
btnMes.onclick=()=>abaHub('mestre');

let btnAmeaca=document.createElement('button');
btnAmeaca.id='btn-ame';
btnAmeaca.className='tab-btn';
btnAmeaca.innerText='Ameaças';
btnAmeaca.onclick=()=>abaHub('ameacas');

document.getElementById('menu-abas').appendChild(btnMes);
document.getElementById('menu-abas').appendChild(btnAmeaca);
}

carregarFichas(user.uid);
if(user.email===emailMestre) carregarAmeacas();

}else{
document.getElementById('login-screen').style.display='flex';
document.getElementById('dashboard').style.display='none';
}
});

function abaHub(tipo){
document.getElementById('hub-jogador').style.display=tipo==='jogador'?'block':'none';
document.getElementById('hub-mestre').style.display=tipo==='mestre'?'block':'none';
document.getElementById('hub-ameacas').style.display=tipo==='ameacas'?'block':'none';

document.getElementById('btn-jog').classList.toggle('active',tipo==='jogador');
if(document.getElementById('btn-mes')) document.getElementById('btn-mes').classList.toggle('active',tipo==='mestre');
if(document.getElementById('btn-ame')) document.getElementById('btn-ame').classList.toggle('active',tipo==='ameacas');

if(tipo==='mestre') carregarMonitorMestre();
}

function carregarAmeacas(){
db.collection("ameacas").onSnapshot(snap=>{
let container=document.getElementById('lista-ameacas');
container.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();
container.innerHTML+=`
<div class="card" onclick="window.location.href='ameaca.html?id=${doc.id}'">
<strong style="font-size:18px;color:#b91c1c;">${d.nome||'Sem Nome'}</strong><br>
<small>VD ${d.vd||0} • ${d.tipo||''}</small>
<button class="delete-btn" onclick="event.stopPropagation();excluirAmeaca('${doc.id}')">Excluir</button>
</div>`;
});
});
}

async function excluirAmeaca(id){
if(confirm("Excluir ameaça?")){
await db.collection("ameacas").doc(id).delete();
}
}

async function criarNovaAmeaca(){
let ref=await db.collection("ameacas").add({
nome:"Nova Ameaça",
vd:10,
tipo:"Criatura",
descricao:"Descrição breve..."
});
window.location.href=`ameaca.html?id=${ref.id}`;
}

function fazerLogin(){
const provider=new firebase.auth.GoogleAuthProvider();
provider.setCustomParameters({prompt:'select_account'});
auth.signInWithPopup(provider);
}

function carregarFichas(uid){
db.collection("fichas").where("dono","==",uid).onSnapshot(snap=>{
let container=document.getElementById('lista-fichas');
container.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();
container.innerHTML+=`
<div class="card" onclick="window.location.href='ficha.html?id=${doc.id}'">
<strong>${d.nome||'Sem Nome'}</strong><br>
<small>NEX ${d.nex||'5%'}</small>
</div>`;
});
});
}

function carregarMonitorMestre(){
db.collection("fichas").onSnapshot(snap=>{
let container=document.getElementById('monitor-mestre');
container.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();
container.innerHTML+=`
<div class="monitor-row">
<strong>${d.nome}</strong>
<span>PV ${d.vidaAtual}/${d.vidaMax}</span>
</div>`;
});
});
}
</script>
</body>
</html>
