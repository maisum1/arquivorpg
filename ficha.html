<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Agente Completo</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --cris-purple: #6d28d9;
            --hp-red: #b31d1d;
            --san-purple: #034374;
            --pe-orange: #5A0C92;
            --bg-dark: #090909;
            --cor-morte: #1a1a1a;
            --cor-sangue: #8b0000;
            --cor-energia: #5a009d;
            --cor-conhecimento: #cead00;
            --cor-geral: #555;
            --cor-fixo: #eab308; /* Alaranjado Cthulhu */
        }

        body { background-color: var(--bg-dark); color: #e0e0e0; font-family: 'Roboto', sans-serif; margin: 0; padding: 20px; }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .grid-container { display: grid; grid-template-columns: 320px 400px 1fr; gap: 25px; max-width: 1650px; margin: 0 auto; }

        /* HEADER COM PORTRAIT */
        .header-agente { display: flex; gap: 15px; align-items: flex-start; margin-bottom: 20px; }
        .portrait-container { 
            width: 100px; height: 100px; border: 2px solid #333; background: #111; 
            cursor: pointer; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .portrait-container img { width: 100%; height: 100%; object-fit: cover; }
        .portrait-container span { font-size: 9px; color: #555; text-align: center; font-weight: bold; }

        .nome-container { flex: 1; }
        .header-name { width: 100%; background: transparent; border: none; border-bottom: 2px solid #333; color: #fff; font-family: 'Special Elite'; font-size: 24px; outline: none; padding-bottom: 5px; }

        /* ATRIBUTOS SIGILO */
        .sigilo-container { position: relative; width: 260px; height: 260px; margin: 0 auto 10px auto; background: url('https://www.ordemparanormal.com.br/assets/rituais/circulo_atributos.png') no-repeat center; background-size: contain; }
        .attr-box { position: absolute; width: 55px; height: 55px; background: #090909; border: 2px solid #fff; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .attr-label { font-size: 9px; font-weight: bold; color: #888; margin-top: -2px; }
        .attr-box input { background: transparent; border: none; color: #fff; text-align: center; width: 100%; font-size: 22px; font-family: 'Special Elite'; font-weight: bold; outline: none; }
        .agi { top: 0; left: 102px; } .for { top: 75px; left: 5px; } .int { top: 75px; right: 5px; } .pre { bottom: 20px; left: 45px; } .vig { bottom: 20px; right: 45px; }

        /* BARRAS DE STATUS */
        .status-container { margin-bottom: 12px; }
        .status-header { font-size: 11px; font-weight: bold; color: #aaa; text-align: center; margin-bottom: 4px; }
        .bar-bg { width: 100%; height: 32px; background: #111; position: relative; border: 1px solid #222; overflow: hidden; display: flex; align-items: center; }
        .bar-fill { height: 100%; transition: width 0.4s; position: absolute; top: 0; left: 0; opacity: 0.8; }
        .bar-content { position: relative; z-index: 2; width: 100%; display: flex; justify-content: space-between; padding: 0 10px; font-weight: bold; font-family: 'Special Elite'; align-items: center; }
        .bar-content input { background: transparent; border: none; color: #fff; width: 35px; text-align: center; font-size: 16px; font-family: 'Special Elite'; outline: none; }
        .bar-btn { cursor: pointer; color: #fff; font-size: 18px; opacity: 0.6; user-select: none; }

        /* RITUAIS - ESTILO CTHULHU */
        .ritual-card { background: #121212; border-left: 4px solid var(--cor-geral); margin-bottom: 12px; border-radius: 0 4px 4px 0; }
        .card-header { padding: 12px; cursor: pointer; display: flex; justify-content: space-between; background: rgba(255,255,255,0.03); align-items: center; font-family: 'Special Elite'; }
        .card-body { padding: 15px; border-top: 1px solid #222; display: none; }
        
        .rit-top-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .rit-symbol-box { width: 85px; height: 85px; border: 1px dashed #444; background: #080808; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .rit-symbol-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .rit-symbol-box span { font-size: 8px; color: #444; text-align: center; }

        .rit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1; }
        .rit-field { display: flex; flex-direction: column; }
        .rit-label { font-size: 10px; color: var(--cor-fixo); text-transform: uppercase; font-weight: bold; font-family: 'Roboto'; margin-bottom: 2px; }
        .rit-input { background: transparent; border: none; border-bottom: 1px solid #333; color: #fff; font-family: 'Special Elite'; font-size: 14px; outline: none; padding: 2px 0; }

        .rit-checkbox-group { display: flex; gap: 20px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px; margin-bottom: 15px; border: 1px solid #222; }
        .rit-checkbox-group label { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--cor-fixo); font-weight: bold; cursor: pointer; }
        .rit-checkbox-group input { accent-color: var(--cor-fixo); }

        .cris-textarea { width: 100%; background: #080808; border: 1px solid #333; color: #fff; font-size: 13px; padding: 10px; min-height: 80px; box-sizing: border-box; font-family: 'Roboto'; margin-top: 5px; outline: none; }
        .cris-btn { background: var(--cris-purple); border: none; color: #fff; padding: 8px 16px; cursor: pointer; font-size: 11px; font-weight: bold; border-radius: 2px; margin-bottom: 10px; }
        
        .tabs-nav { display: flex; gap: 5px; border-bottom: 1px solid #333; margin-bottom: 15px; }
        .tab-btn { background: transparent; border: none; color: #666; padding: 10px 15px; cursor: pointer; font-size: 12px; text-transform: uppercase; font-weight: bold; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid var(--cris-purple); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="grid-container">
    <section>
        <div style="margin-bottom: 20px;">
            <button onclick="window.location.href='index.html'" class="cris-btn" style="background: #222;">← VOLTAR AO HUB</button>
        </div>

        <div class="header-agente">
            <div class="portrait-container" onclick="uploadPortrait()">
                <img id="display-portrait" src="" class="hidden">
                <span id="label-portrait">CLIQUE PARA FOTO</span>
            </div>
            <div class="nome-container">
                <input type="text" id="nome-personagem" class="header-name" placeholder="NOME DO AGENTE" onchange="salvarFicha()">
                <div style="display:flex; gap:10px; margin-top:8px;">
                    <div class="rit-field" style="width: 60px;"><span class="rit-label">NEX</span><input type="text" id="nex-val" class="rit-input" onchange="salvarFicha()"></div>
                    <div class="rit-field"><span class="rit-label">CLASSE</span><input type="text" id="classe-val" class="rit-input" onchange="salvarFicha()"></div>
                </div>
            </div>
        </div>

        <div class="sigilo-container">
            <div class="attr-box agi"><span class="attr-label">AGI</span><input type="number" id="attr-agi" onchange="salvarFicha()"></div>
            <div class="attr-box for"><span class="attr-label">FOR</span><input type="number" id="attr-for" onchange="salvarFicha()"></div>
            <div class="attr-box int"><span class="attr-label">INT</span><input type="number" id="attr-int" onchange="salvarFicha()"></div>
            <div class="attr-box pre"><span class="attr-label">PRE</span><input type="number" id="attr-pre" onchange="salvarFicha()"></div>
            <div class="attr-box vig"><span class="attr-label">VIG</span><input type="number" id="attr-vig" onchange="salvarFicha()"></div>
        </div>

        <div class="status-container">
            <div class="status-header">VIDA</div>
            <div class="bar-bg"><div id="bar-vida" class="bar-fill" style="background:var(--hp-red)"></div>
                <div class="bar-content"><span class="bar-btn" onclick="ajustar('vida', -1)">-</span><div><input type="number" id="vida-atual" onchange="salvarFicha()"> / <input type="number" id="vida-max" onchange="salvarFicha()"></div><span class="bar-btn" onclick="ajustar('vida', 1)">+</span></div>
            </div>
        </div>
        <div class="status-container">
            <div class="status-header">SANIDADE</div>
            <div class="bar-bg"><div id="bar-san" class="bar-fill" style="background:var(--san-purple)"></div>
                <div class="bar-content"><span class="bar-btn" onclick="ajustar('san', -1)">-</span><div><input type="number" id="san-atual" onchange="salvarFicha()"> / <input type="number" id="san-max" onchange="salvarFicha()"></div><span class="bar-btn" onclick="ajustar('san', 1)">+</span></div>
            </div>
        </div>
        <div class="status-container">
            <div class="status-header">PE</div>
            <div class="bar-bg"><div id="bar-pe" class="bar-fill" style="background:var(--pe-orange)"></div>
                <div class="bar-content"><span class="bar-btn" onclick="ajustar('pe', -1)">-</span><div><input type="number" id="pe-atual" onchange="salvarFicha()"> / <input type="number" id="pe-max" onchange="salvarFicha()"></div><span class="bar-btn" onclick="ajustar('pe', 1)">+</span></div>
            </div>
        </div>
    </section>

    <section style="grid-column: span 2;">
        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="mudarAba('rituais')">Rituais</button>
            <button class="tab-btn">Outros</button>
        </nav>

        <div id="aba-rituais" class="tab-content active">
            <button class="cris-btn" onclick="novoRitual()">+ ADICIONAR RITUAL</button>
            <div id="lista-rituais"></div>
        </div>
    </section>
</div>

<script>
    // CONFIGURAÇÃO FIREBASE - SUBSTITUA PELAS SUAS CHAVES
    const firebaseConfig = { 
        apiKey: "SUA_API_KEY", 
        authDomain: "SEU_AUTH_DOMAIN", 
        projectId: "SEU_PROJECT_ID", 
        storageBucket: "SEU_STORAGE_BUCKET", 
        messagingSenderId: "SEU_SENDER_ID", 
        appId: "SEU_APP_ID" 
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    let atual = urlParams.get('id');
    let menusAbertos = new Set();

    async function init() {
        if (!atual) { window.location.href = "index.html"; } 
        else { carregarFicha(); carregarRituais(); }
    }

    function uploadPortrait() {
        const url = prompt("Cole a URL da imagem PNG do seu personagem:");
        if(url) {
            document.getElementById('display-portrait').src = url;
            document.getElementById('display-portrait').classList.remove('hidden');
            document.getElementById('label-portrait').classList.add('hidden');
            salvarFicha();
        }
    }

    function carregarFicha() {
        db.collection("fichas").doc(atual).get().then(doc => {
            const d = doc.data();
            if(!d) return;
            document.getElementById('nome-personagem').value = d.nome || "";
            document.getElementById('nex-val').value = d.nex || "";
            document.getElementById('classe-val').value = d.classe || "";
            if(d.portrait) {
                document.getElementById('display-portrait').src = d.portrait;
                document.getElementById('display-portrait').classList.remove('hidden');
                document.getElementById('label-portrait').classList.add('hidden');
            }
            ['agi','for','int','pre','vig'].forEach(a => { document.getElementById(`attr-${a}`).value = d[a] || 1; });
            atualizarStatus('vida', d.vidaAtual ?? 20, d.vidaMax ?? 20);
            atualizarStatus('san', d.sanAtual ?? 20, d.sanMax ?? 20);
            atualizarStatus('pe', d.peAtual ?? 5, d.peMax ?? 5);
        });
    }

    function salvarFicha() {
        db.collection("fichas").doc(atual).update({
            nome: document.getElementById('nome-personagem').value,
            portrait: document.getElementById('display-portrait').src,
            nex: document.getElementById('nex-val').value,
            classe: document.getElementById('classe-val').value,
            agi: parseInt(document.getElementById('attr-agi').value) || 0,
            for: parseInt(document.getElementById('attr-for').value) || 0,
            int: parseInt(document.getElementById('attr-int').value) || 0,
            pre: parseInt(document.getElementById('attr-pre').value) || 0,
            vig: parseInt(document.getElementById('attr-vig').value) || 0,
            vidaAtual: parseInt(document.getElementById('vida-atual').value) || 0,
            vidaMax: parseInt(document.getElementById('vida-max').value) || 1,
            sanAtual: parseInt(document.getElementById('san-atual').value) || 0,
            sanMax: parseInt(document.getElementById('san-max').value) || 1,
            peAtual: parseInt(document.getElementById('pe-atual').value) || 0,
            peMax: parseInt(document.getElementById('pe-max').value) || 1,
        });
    }

    function carregarRituais() {
        db.collection("fichas").doc(atual).collection("rituais").onSnapshot(snap => {
            const container = document.getElementById('lista-rituais');
            container.innerHTML = "";
            snap.forEach(doc => {
                const r = doc.data();
                const id = doc.id;
                const isOpen = menusAbertos.has(id);
                
                container.innerHTML += `
                <div class="ritual-card" style="border-left-color: ${getElementColor(r.elemento)}">
                    <div class="card-header" onclick="toggleRitual('${id}')">
                        <span style="color:white">${r.nome || 'Sem Nome'}</span>
                        <span style="font-size:10px; color:var(--cor-fixo)">${(r.elemento || 'Morte').toUpperCase()}</span>
                    </div>
                    <div class="card-body" id="body-${id}" style="display:${isOpen ? 'block' : 'none'}">
                        
                        <div class="rit-top-row">
                            <div class="rit-symbol-box" onclick="uploadSimbolo('${id}')">
                                ${r.simbolo ? `<img src="${r.simbolo}">` : '<span>PNG SÍMBOLO</span>'}
                            </div>
                            <div class="rit-grid">
                                <div class="rit-field"><span class="rit-label">NOME DO RITUAL</span><input class="rit-input" value="${r.nome||''}" onchange="updateRit('${id}','nome',this.value)"></div>
                                <div class="rit-field"><span class="rit-label">ELEMENTO</span>
                                    <select class="rit-input" onchange="updateRit('${id}','elemento',this.value)">
                                        <option value="Morte" ${r.elemento=='Morte'?'selected':''}>Morte</option>
                                        <option value="Sangue" ${r.elemento=='Sangue'?'selected':''}>Sangue</option>
                                        <option value="Energia" ${r.elemento=='Energia'?'selected':''}>Energia</option>
                                        <option value="Conhecimento" ${r.elemento=='Conhecimento'?'selected':''}>Conhecimento</option>
                                    </select>
                                </div>
                                <div class="rit-field"><span class="rit-label">TEMPO DE CONJURAÇÃO</span><input class="rit-input" value="${r.tempoConjuracao||''}" onchange="updateRit('${id}','tempoConjuracao',this.value)"></div>
                                <div class="rit-field"><span class="rit-label">ALCANCE</span><input class="rit-input" value="${r.alcance||''}" onchange="updateRit('${id}','alcance',this.value)"></div>
                                <div class="rit-field"><span class="rit-label">ALVO</span><input class="rit-input" value="${r.alvo||''}" onchange="updateRit('${id}','alvo',this.value)"></div>
                                <div class="rit-field"><span class="rit-label">DURAÇÃO</span><input class="rit-input" value="${r.duracao||''}" onchange="updateRit('${id}','duracao',this.value)"></div>
                            </div>
                        </div>

                        <div class="rit-grid" style="margin-bottom:15px">
                            <div class="rit-field"><span class="rit-label">CUSTO DE PE</span><input class="rit-input" value="${r.custoPe||''}" onchange="updateRit('${id}','custoPe',this.value)"></div>
                            <div class="rit-field"><span class="rit-label">CUSTO DE SANIDADE</span><input class="rit-input" value="${r.custoSanidade||''}" onchange="updateRit('${id}','custoSanidade',this.value)"></div>
                        </div>

                        <div class="rit-checkbox-group">
                            <label><input type="checkbox" ${r.aprendido?'checked':''} onchange="updateRit('${id}','aprendido',this.checked)"> RITUAL APRENDIDO</label>
                            <label><input type="checkbox" ${r.primeira?'checked':''} onchange="updateRit('${id}','primeira',this.checked)"> PRIMEIRA CONJURAÇÃO</label>
                        </div>

                        <div class="rit-field ${r.aprendido ? 'hidden' : ''}" style="margin-bottom:10px">
                            <span class="rit-label">TEMPO ATÉ APRENDIZADO</span>
                            <input class="rit-input" placeholder="Ex: 2 dias..." value="${r.tempoAprendizado||''}" onchange="updateRit('${id}','tempoAprendizado',this.value)">
                        </div>

                        <span class="rit-label">DESCRIÇÃO</span>
                        <textarea class="cris-textarea" onchange="updateRit('${id}','descricao',this.value)">${r.descricao||''}</textarea>
                        
                        <div style="text-align:right; margin-top:10px;">
                            <button class="cris-btn" style="background:#b31d1d" onclick="removerRitual('${id}')">EXCLUIR</button>
                        </div>
                    </div>
                </div>`;
            });
        });
    }

    function getElementColor(el) {
        const cores = { 'Morte': '#1a1a1a', 'Sangue': '#8b0000', 'Energia': '#5a009d', 'Conhecimento': '#cead00' };
        return cores[el] || '#555';
    }

    async function novoRitual() {
        await db.collection("fichas").doc(atual).collection("rituais").add({
            nome: "Novo Ritual", elemento: "Morte", aprendido: false, primeira: false, 
            tempoConjuracao: "", alcance: "", alvo: "", duracao: "", custoPe: "", custoSanidade: "", tempoAprendizado: "", descricao: ""
        });
    }

    function uploadSimbolo(id) {
        const url = prompt("Cole a URL do símbolo do ritual (PNG):");
        if(url) updateRit(id, 'simbolo', url);
    }

    async function updateRit(id, campo, valor) {
        let o = {}; o[campo] = valor;
        await db.collection("fichas").doc(atual).collection("rituais").doc(id).update(o);
    }

    async function removerRitual(id) { if(confirm("Excluir ritual?")) await db.collection("fichas").doc(atual).collection("rituais").doc(id).delete(); }

    function toggleRitual(id) {
        const b = document.getElementById('body-'+id);
        if(b.style.display === 'block') { b.style.display = 'none'; menusAbertos.delete(id); }
        else { b.style.display = 'block'; menusAbertos.add(id); }
    }

    function ajustar(tipo, v) {
        const input = document.getElementById(`${tipo}-atual`);
        const max = document.getElementById(`${tipo}-max`);
        let novo = (parseInt(input.value) || 0) + v;
        atualizarStatus(tipo, novo, parseInt(max.value));
        salvarFicha();
    }

    function atualizarStatus(tipo, at, mx) {
        document.getElementById(`${tipo}-atual`).value = at;
        document.getElementById(`${tipo}-max`).value = mx;
        document.getElementById(`bar-${tipo}`).style.width = Math.min((at/mx)*100, 100) + "%";
    }

    function mudarAba(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('aba-'+id).classList.add('active');
    }

    auth.onAuthStateChanged(user => { if (user) init(); else window.location.href = "index.html"; });
</script>
</body>
</html>
