<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Agente Completo</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --cris-purple: #6d28d9;
            --hp-red: #b31d1d;
            --san-blue: #034374;
            --pe-purple: #5A0C92;
            --bg-dark: #090909;
            
            /* Cores dos Elementos */
            --cor-morte: #212121;
            --cor-sangue: #8b0000;
            --cor-energia: #5a009d;
            --cor-conhecimento: #cead00;
            --cor-geral: #555;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 20px;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .grid-container {
            display: grid;
            grid-template-columns: 320px 400px 1fr;
            gap: 25px;
            max-width: 1650px;
            margin: 0 auto;
        }

        .header-name { width: 100%; background: transparent; border: none; border-bottom: 2px solid #333; color: #fff; font-family: 'Special Elite'; font-size: 24px; padding: 5px 0; margin-bottom: 10px; outline: none; }
        .header-sub-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .sub-input-group { flex: 1; display: flex; flex-direction: column; }
        .sub-input-group label { font-size: 10px; color: #888; font-weight: bold; margin-bottom: 5px; font-family: 'Roboto'; text-transform: uppercase; }
        .sub-input-group input, .sub-input-group select { background: transparent; border: none; border-bottom: 1px solid #333; color: #fff; font-family: 'Special Elite'; font-size: 16px; padding: 5px 0; outline: none; }

        .sigilo-container { position: relative; width: 260px; height: 260px; margin: 0 auto 10px auto; background: url('https://www.ordemparanormal.com.br/assets/rituais/circulo_atributos.png') no-repeat center; background-size: contain; }
        .attr-box { position: absolute; width: 55px; height: 55px; background: #090909; border: 2px solid #fff; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .attr-label { font-size: 9px; font-weight: bold; color: #888; margin-top: -2px; }
        .attr-box input { background: transparent; border: none; color: #fff; text-align: center; width: 100%; font-size: 22px; font-family: 'Special Elite'; font-weight: bold; }
        .agi { top: 0; left: 102px; } .for { top: 75px; left: 5px; } .int { top: 75px; right: 5px; } .pre { bottom: 20px; left: 45px; } .vig { bottom: 20px; right: 45px; }

        .status-container { margin-bottom: 12px; }
        .status-header { font-size: 11px; font-weight: bold; color: #aaa; text-align: center; margin-bottom: 4px; }
        .bar-bg { width: 100%; height: 32px; background: #111; position: relative; border: 1px solid #222; overflow: hidden; display: flex; align-items: center; }
        .bar-fill { height: 100%; transition: width 0.4s ease-out; position: absolute; top: 0; left: 0; opacity: 0.8; }
        .bar-content { position: relative; z-index: 2; width: 100%; display: flex; justify-content: space-between; padding: 0 10px; font-weight: bold; font-family: 'Special Elite'; align-items: center; }
        .bar-content input { background: transparent; border: none; color: #fff; width: 35px; text-align: center; font-size: 16px; font-family: 'Special Elite'; }
        .bar-btn { cursor: pointer; color: #fff; font-size: 18px; opacity: 0.6; user-select: none; }

        /* PERÍCIAS */
        .pericias-box { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 5px; border: 1px solid #111; }
        .pericia-header { display: grid; grid-template-columns: 1.5fr 60px 50px 50px 45px; font-size: 10px; color: #666; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; align-items: center; text-align: center; }
        .pericia-row { display: grid; grid-template-columns: 1.5fr 60px 50px 50px 45px; gap: 5px; padding: 6px 4px; border-bottom: 1px solid #1a1a1a; font-size: 13px; align-items: center; text-align: center; }
        .pericia-nome { cursor: pointer; color: #e0e0e0; transition: 0.2s; text-align: left; }
        .pericia-nome:hover { color: var(--cris-purple); }
        .pericia-desc { display: none; background: rgba(0,0,0,0.4); border-left: 2px solid var(--cris-purple); padding: 8px 10px; font-size: 11px; color: #aaa; margin-bottom: 4px; line-height: 1.4; }
        .treino-select { background: #0a0a0a; color: #ccc; border: 1px solid #333; font-size: 11px; text-align: center; width: 100%; border-radius: 2px; outline: none; padding: 2px; }

        /* CORES DOS CARDS POR ELEMENTO */
        .ritual-card { background: #121212; border-left: 4px solid var(--cor-geral); margin-bottom: 10px; border-radius: 0 4px 4px 0; transition: 0.3s; }
        .ritual-card[data-elem="Morte"] { border-left-color: var(--cor-morte); }
        .ritual-card[data-elem="Sangue"] { border-left-color: var(--cor-sangue); }
        .ritual-card[data-elem="Energia"] { border-left-color: var(--cor-energia); }
        .ritual-card[data-elem="Conhecimento"] { border-left-color: var(--cor-conhecimento); }
        .ritual-card[data-elem="Geral"] { border-left-color: var(--cor-geral); }

        .card-header { padding: 12px; cursor: pointer; display: flex; justify-content: space-between; background: rgba(255,255,255,0.03); align-items: center; font-family: 'Special Elite'; }
        .card-body { padding: 15px; display: none; border-top: 1px solid #222; }
        .cris-textarea { width: 100%; background: #080808; border: 1px solid #333; color: #ccc; font-size: 13px; padding: 10px; min-height: 80px; box-sizing: border-box; }
        .cris-btn { background: var(--cris-purple); border: none; color: #fff; padding: 8px 16px; cursor: pointer; font-size: 11px; font-weight: bold; border-radius: 2px; }

        .tabs-nav { display: flex; gap: 5px; border-bottom: 1px solid #333; margin-bottom: 15px; }
        .tab-btn { background: transparent; border: none; color: #666; padding: 10px 15px; cursor: pointer; font-size: 12px; text-transform: uppercase; font-weight: bold; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid var(--cris-purple); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .defesa-grid { display: flex; align-items: center; gap: 20px; margin-top: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 5px; }
        .defesa-shield { width: 70px; height: 75px; background: url('https://www.ordemparanormal.com.br/assets/rituais/escudo_defesa.png') no-repeat center; background-size: contain; display: flex; align-items: center; justify-content: center; font-family: 'Special Elite'; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

<div class="grid-container">
    <section>
        <div style="margin-bottom: 20px;">
            <button onclick="window.location.href='index.html'" class="cris-btn" style="background: #222; border: 1px solid #444;">← VOLTAR AO HUB</button>
        </div>
        <input type="text" id="nome-personagem" class="header-name" placeholder="NOME DO AGENTE" onchange="salvarFicha()">
        
        <div class="header-sub-row">
            <div class="sub-input-group"><label>ORIGEM</label><input type="text" id="origem-personagem" onchange="salvarFicha()"></div>
            <div class="sub-input-group">
                <label>CLASSE</label>
                <select id="classe-personagem" onchange="aplicarClasse()">
                    <option value="">Selecione...</option>
                    <option value="Combatente">Combatente</option>
                    <option value="Esotérico">Esotérico</option>
                    <option value="Polímata">Polímata</option>
                </select>
            </div>
        </div>

        <div class="sigilo-container">
            <div class="attr-box agi"><span class="attr-label">AGI</span><input type="number" id="attr-agi" onchange="salvarFicha()"></div>
            <div class="attr-box for"><span class="attr-label">FOR</span><input type="number" id="attr-for" onchange="salvarFicha()"></div>
            <div class="attr-box int"><span class="attr-label">INT</span><input type="number" id="attr-int" onchange="salvarFicha()"></div>
            <div class="attr-box pre"><span class="attr-label">PRE</span><input type="number" id="attr-pre" onchange="salvarFicha()"></div>
            <div class="attr-box vig"><span class="attr-label">VIG</span><input type="number" id="attr-vig" onchange="salvarFicha()"></div>
        </div>

        <div class="status-container">
            <div class="status-header">VIDA</div>
            <div class="bar-bg">
                <div id="bar-vida" class="bar-fill" style="background:var(--hp-red)"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('vida', -1)">«</span>
                    <div><input type="number" id="vida-atual" onchange="salvarFicha()"> / <input type="number" id="vida-max" onchange="salvarFicha()"></div>
                    <span class="bar-btn" onclick="ajustar('vida', 1)">»</span>
                </div>
            </div>
        </div>

        <div class="status-container">
            <div class="status-header">SANIDADE</div>
            <div class="bar-bg">
                <div id="bar-san" class="bar-fill" style="background:var(--san-blue)"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('san', -1)">«</span>
                    <div><input type="number" id="san-atual" onchange="salvarFicha()"> / <input type="number" id="san-max" onchange="salvarFicha()"></div>
                    <span class="bar-btn" onclick="ajustar('san', 1)">»</span>
                </div>
            </div>
        </div>

        <div class="status-container">
            <div class="status-header">ESFORÇO</div>
            <div class="bar-bg">
                <div id="bar-pe" class="bar-fill" style="background:var(--pe-purple)"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('pe', -1)">«</span>
                    <div><input type="number" id="pe-atual" onchange="salvarFicha()"> / <input type="number" id="pe-max" onchange="salvarFicha()"></div>
                    <span class="bar-btn" onclick="ajustar('pe', 1)">»</span>
                </div>
            </div>
        </div>
    </section>

    <section class="pericias-box">
        <h3 style="font-family:'Special Elite'; margin-top:0;">PERÍCIAS</h3>
        <div class="pericia-header">
            <span>Nome</span> <span>Atrib.</span> <span>Bônus</span> <span>Treino</span> <span>Soma</span>
        </div>
        <div id="lista-pericias"></div>
    </section>

    <section>
        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="mudarAba('combate')">Combate</button>
            <button class="tab-btn" onclick="mudarAba('rituais')">Rituais</button>
            <button class="tab-btn" onclick="mudarAba('poderes')">Poderes</button>
            <button class="tab-btn" onclick="mudarAba('habilidades')">Habilidades</button>
        </nav>

        <div id="aba-combate" class="tab-content active">
            <div class="defesa-grid">
                <div class="defesa-shield" id="display-defesa">10</div>
                <div style="flex:1; display:flex; justify-content:space-around; text-align:center;">
                    <div>
                        <div style="font-size:10px; color:#aaa;">BÔNUS DEFESA</div>
                        <input type="number" id="bonus-defesa" class="treino-select" style="width:40px;" onchange="salvarFicha()">
                    </div>
                    <div>
                        <div style="font-size:10px; color:#aaa;">ESQUIVA</div>
                        <div id="display-esquiva" style="font-family:'Special Elite'; font-size:20px;">10</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="aba-rituais" class="tab-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
                <div class="cris-btn" onclick="novoRitual()">+ Novo Ritual</div>
                <div style="font-family:'Special Elite';">
                    DT FINAL: <span id="dt-val" style="color:var(--cris-purple)">15</span>
                    <label style="font-size:10px; margin-left:10px;">BÔNUS:</label>
                    <input type="number" id="bonus-dt" value="0" onchange="salvarFicha()" style="width:40px; background:transparent; border:1px solid #444; color:#fff; text-align:center;">
                </div>
            </div>
            <div id="lista-rituais"></div>
        </div>

        <div id="aba-poderes" class="tab-content">
            <div class="cris-btn" onclick="novoPoder()" style="margin-bottom:15px;">+ Novo Poder</div>
            <div id="lista-poderes"></div>
        </div>

        <div id="aba-habilidades" class="tab-content">
            <div class="cris-btn" onclick="novaHabilidade()" style="margin-bottom:15px;">+ Nova Habilidade</div>
            <div id="lista-habilidades"></div>
        </div>
    </section>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
        authDomain: "fichasrpg-7fc69.firebaseapp.com",
        projectId: "fichasrpg-7fc69",
        storageBucket: "fichasrpg-7fc69.firebasestorage.app",
        messagingSenderId: "758802032764",
        appId: "1:758802032764:web:40467e15fdc24c570081f9",
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    let atual = urlParams.get('id');

    // Memória de quais cards estão abertos
    let menusAbertos = new Set();

    const bancoPericias = {
        "Acrobacia": { attr: "AGI", desc: "Equilíbrio e quedas." },
        "Atletismo": { attr: "FOR", desc: "Esforço físico bruto." },
        "Atualidades": { attr: "INT", desc: "Conhecimentos gerais." },
        "Ciências": { attr: "INT", desc: "Matemática e natureza." },
        "Crime": { attr: "AGI", desc: "Furtos e arrombamentos." },
        "Diplomacia": { attr: "PRE", desc: "Persuasão amigável." },
        "Enganação": { attr: "PRE", desc: "Mentiras e blefes." },
        "Fortitude": { attr: "VIG", desc: "Resistência corporal." },
        "Furtividade": { attr: "AGI", desc: "Passar despercebido." },
        "Intuição": { attr: "PRE", desc: "Ler pessoas." },
        "Investigação": { attr: "INT", desc: "Análise de pistas." },
        "Luta": { attr: "FOR", desc: "Combate corpo a corpo." },
        "Medicina": { attr: "INT", desc: "Primeiros socorros." },
        "Ocultismo": { attr: "INT", desc: "Conhecimento paranormal." },
        "Percepção": { attr: "PRE", desc: "Sentidos apurados." },
        "Pontaria": { attr: "AGI", desc: "Armas de fogo e arremesso." },
        "Reflexos": { attr: "AGI", desc: "Reação rápida." },
        "Religião": { attr: "PRE", desc: "Teologia e crenças." },
        "Sobrevivência": { attr: "INT", desc: "Rastreio e camping." },
        "Tática": { attr: "INT", desc: "Estratégia de combate." },
        "Tecnologia": { attr: "INT", desc: "Hacking e eletrônicos." },
        "Vontade": { attr: "PRE", desc: "Resistência mental." }
    };
    const nomesPericias = Object.keys(bancoPericias);

    async function init() {
        if (!atual) { window.location.href = "index.html"; } 
        else {
            gerarPericiasBase();
            carregarFicha();
            carregarSubColecao("rituais", "lista-rituais");
            carregarSubColecao("poderes", "lista-poderes");
            carregarSubColecao("habilidades", "lista-habilidades");
        }
    }

    function gerarPericiasBase() {
        document.getElementById('lista-pericias').innerHTML = nomesPericias.map(p => `
            <div class="pericia-row" id="row-${p}">
                <span class="pericia-nome" onclick="toggleDescricao('${p}')">${p}</span>
                <select id="attr-${p}" class="treino-select" onchange="salvarFicha()" style="border:none;">
                    <option value="AGI">AGI</option><option value="FOR">FOR</option><option value="INT">INT</option><option value="PRE">PRE</option><option value="VIG">VIG</option>
                </select>
                <input type="number" id="bonus-${p}" class="treino-select" value="0" onchange="salvarFicha()">
                <select id="treino-${p}" class="treino-select" onchange="salvarFicha()">
                    <option value="0">0</option><option value="5">5</option><option value="10">10</option><option value="15">15</option><option value="20">20</option>
                </select>
                <span id="total-${p}" style="font-family:'Special Elite'; color:var(--cris-purple);">0</span>
            </div>
            <div id="desc-${p}" class="pericia-desc">${bancoPericias[p].desc}</div>
        `).join('');
    }

    function toggleDescricao(nome) {
        const d = document.getElementById(`desc-${nome}`);
        d.style.display = d.style.display === 'block' ? 'none' : 'block';
    }

    function carregarFicha() {
        db.collection("fichas").doc(atual).get().then(doc => {
            const d = doc.data();
            if(!d) return;
            document.getElementById('nome-personagem').value = d.nome || "";
            document.getElementById('attr-agi').value = d.agi || 1;
            document.getElementById('attr-for').value = d.for || 1;
            document.getElementById('attr-int').value = d.int || 1;
            document.getElementById('attr-pre').value = d.pre || 1;
            document.getElementById('attr-vig').value = d.vig || 1;
            
            atualizarStatusVisual('vida', d.vidaAtual || 20, d.vidaMax || 20);
            atualizarStatusVisual('san', d.sanAtual || 20, d.sanMax || 20);
            atualizarStatusVisual('pe', d.peAtual || 5, d.peMax || 5);

            if(d.pericias) {
                nomesPericias.forEach(p => {
                    const dados = d.pericias[p] || { bonus: 0, treino: 0, atributo: bancoPericias[p].attr };
                    document.getElementById(`bonus-${p}`).value = dados.bonus;
                    document.getElementById(`treino-${p}`).value = dados.treino;
                    document.getElementById(`attr-${p}`).value = dados.atributo;
                    document.getElementById(`total-${p}`).innerText = (parseInt(dados.bonus)||0) + (parseInt(dados.treino)||0);
                });
            }
            document.getElementById('bonus-defesa').value = d.bonusDefesa || 0;
            document.getElementById('bonus-dt').value = d.bonusDt || 0;
            recalcularTudo();
        });
    }

    function recalcularTudo() {
        const agi = parseInt(document.getElementById('attr-agi').value) || 0;
        const int = parseInt(document.getElementById('attr-int').value) || 0;
        const bDef = parseInt(document.getElementById('bonus-defesa').value) || 0;
        const bDt = parseInt(document.getElementById('bonus-dt').value) || 0;

        document.getElementById('display-defesa').innerText = 10 + agi + bDef;
        document.getElementById('display-esquiva').innerText = 10 + agi + bDef; // Simplificado
        document.getElementById('dt-val').innerText = 10 + int + 5 + bDt;
    }

    function atualizarStatusVisual(tipo, at, mx) {
        document.getElementById(`${tipo}-atual`).value = at;
        document.getElementById(`${tipo}-max`).value = mx;
        const perc = Math.min((at / mx) * 100, 100);
        document.getElementById(`bar-${tipo}`).style.width = perc + "%";
    }

    function ajustar(tipo, v) {
        const input = document.getElementById(`${tipo}-atual`);
        const max = document.getElementById(`${tipo}-max`);
        let novo = (parseInt(input.value) || 0) + v;
        atualizarStatusVisual(tipo, novo, parseInt(max.value));
        salvarFicha();
    }

    function salvarFicha() {
        const periciasObj = {};
        nomesPericias.forEach(p => {
            const b = parseInt(document.getElementById(`bonus-${p}`).value) || 0;
            const t = parseInt(document.getElementById(`treino-${p}`).value) || 0;
            document.getElementById(`total-${p}`).innerText = b + t;
            periciasObj[p] = { bonus: b, treino: t, atributo: document.getElementById(`attr-${p}`).value };
        });

        recalcularTudo();

        db.collection("fichas").doc(atual).update({
            nome: document.getElementById('nome-personagem').value,
            agi: parseInt(document.getElementById('attr-agi').value) || 0,
            for: parseInt(document.getElementById('attr-for').value) || 0,
            int: parseInt(document.getElementById('attr-int').value) || 0,
            pre: parseInt(document.getElementById('attr-pre').value) || 0,
            vig: parseInt(document.getElementById('attr-vig').value) || 0,
            vidaAtual: parseInt(document.getElementById('vida-atual').value) || 0,
            vidaMax: parseInt(document.getElementById('vida-max').value) || 1,
            sanAtual: parseInt(document.getElementById('san-atual').value) || 0,
            sanMax: parseInt(document.getElementById('san-max').value) || 1,
            peAtual: parseInt(document.getElementById('pe-atual').value) || 0,
            peMax: parseInt(document.getElementById('pe-max').value) || 1,
            pericias: periciasObj,
            bonusDefesa: parseInt(document.getElementById('bonus-defesa').value) || 0,
            bonusDt: parseInt(document.getElementById('bonus-dt').value) || 0
        });
    }

    // CARREGA RITUAIS/PODERES E MANTÉM CORES E ESTADOS
    function carregarSubColecao(col, containerId) {
        db.collection("fichas").doc(atual).collection(col).onSnapshot(snap => {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            snap.forEach(doc => {
                const item = doc.data();
                const id = doc.id;
                const isOpen = menusAbertos.has(id);
                const elem = item.elemento || "Geral";

                let html = `
                <div class="ritual-card" data-elem="${elem}" id="card-${id}">
                    <div class="card-header" onclick="toggleCard('${id}')">
                        <span>${item.nome || 'Sem nome'}</span>
                        <span style="font-size:10px; opacity:0.5;">${elem.toUpperCase()}</span>
                    </div>
                    <div class="card-body" id="body-${id}" style="display:${isOpen ? 'block' : 'none'}">
                        <div style="display:flex; gap:10px; margin-bottom:10px;">
                            <input type="text" class="treino-select" value="${item.nome || ''}" 
                                onclick="event.stopPropagation()" 
                                onchange="updateSub('${id}', '${col}', 'nome', this.value)" style="flex:1; text-align:left;">
                            
                            <select class="treino-select" onclick="event.stopPropagation()" 
                                onchange="updateSub('${id}', '${col}', 'elemento', this.value); atualizarCorCard('${id}', this.value)">
                                <option ${elem=='Geral'?'selected':''}>Geral</option>
                                <option ${elem=='Morte'?'selected':''}>Morte</option>
                                <option ${elem=='Sangue'?'selected':''}>Sangue</option>
                                <option ${elem=='Energia'?'selected':''}>Energia</option>
                                <option ${elem=='Conhecimento'?'selected':''}>Conhecimento</option>
                            </select>
                        </div>
                        <textarea class="cris-textarea" onclick="event.stopPropagation()" 
                            onchange="updateSub('${id}', '${col}', 'descricao', this.value)">${item.descricao || ""}</textarea>
                        <div style="text-align:right; margin-top:10px;">
                            <button class="cris-btn" style="background:#444" onclick="event.stopPropagation(); removerSub('${id}', '${col}')">Excluir</button>
                        </div>
                    </div>
                </div>`;
                container.innerHTML += html;
            });
        });
    }

    function toggleCard(id) {
        const b = document.getElementById(`body-${id}`);
        if(b.style.display === 'block') {
            b.style.display = 'none';
            menusAbertos.delete(id);
        } else {
            b.style.display = 'block';
            menusAbertos.add(id);
        }
    }

    function atualizarCorCard(id, elemento) {
        const card = document.getElementById(`card-${id}`);
        if(card) card.setAttribute('data-elem', elemento);
    }

    async function updateSub(id, col, campo, valor) {
        let o = {}; o[campo] = valor;
        await db.collection("fichas").doc(atual).collection(col).doc(id).update(o);
    }

    async function novoRitual() { await db.collection("fichas").doc(atual).collection("rituais").add({ nome: "Novo Ritual", elemento: "Morte", descricao: "" }); }
    async function novoPoder() { await db.collection("fichas").doc(atual).collection("poderes").add({ nome: "Novo Poder", elemento: "Geral", descricao: "" }); }
    async function novaHabilidade() { await db.collection("fichas").doc(atual).collection("habilidades").add({ nome: "Nova Habilidade", descricao: "" }); }
    async function removerSub(id, col) { if(confirm("Deseja excluir?")) await db.collection("fichas").doc(atual).collection(col).doc(id).delete(); }

    function mudarAba(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    auth.onAuthStateChanged(user => { if (user) init(); else window.location.href = "index.html"; });
</script>
</body>
</html>
