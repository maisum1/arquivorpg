<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Agente Completo</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --cris-purple: #6d28d9;
            --hp-red: #b31d1d;
            --san-purple: #034374;
            --pe-orange: #5A0C92;
            --bg-dark: #090909;
            
            /* CORES DOS ELEMENTOS E ESTILO CTHULHU */
            --cor-morte: #1a1a1a;
            --cor-sangue: #8b0000;
            --cor-energia: #4b0082;
            --cor-conhecimento: #b8860b;
            --cor-medo: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 20px;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .grid-container {
            display: grid;
            grid-template-columns: 320px 400px 1fr;
            gap: 25px;
            max-width: 1650px;
            margin: 0 auto;
        }

        .header-name {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #333;
            color: #fff;
            font-family: 'Special Elite';
            font-size: 24px;
            padding: 5px 0;
            margin-bottom: 10px;
            outline: none;
        }
        
        .header-sub-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .sub-input-group { flex: 1; display: flex; flex-direction: column; }
        .sub-input-group label {
            font-size: 10px; color: #888; font-weight: bold; margin-bottom: 5px; font-family: 'Roboto'; text-transform: uppercase;
        }
        .sub-input-group input, .sub-input-group select {
            background: transparent; border: none; border-bottom: 1px solid #333; color: #fff; font-family: 'Special Elite'; font-size: 16px; padding: 5px 0; outline: none;
        }
        .sub-input-group select option { background: #111; color: #ccc; }

        /* PORTRAIT PARA OBS - OVERLAY INVISIVEL PARA O CLIQUE */
        .live-portrait-container {
            position: fixed; top: 20px; right: 20px; width: 320px;
            z-index: 9999; pointer-events: none;
            font-family: 'Special Elite', monospace;
            display: flex; flex-direction: column; align-items: center;
        }
        .live-img-wrapper {
            position: relative; width: 100%; height: 350px;
            display: flex; align-items: flex-end; justify-content: flex-start;
        }
        .live-img-wrapper img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; filter: drop-shadow(0 0 10px rgba(255,255,255,0.05));
            transition: all 0.3s ease;
        }
        .live-pe-txt {
            position: relative; z-index: 2; margin-left: 10px; margin-bottom: 10px;
            font-size: 28px; color: #a855f7; text-shadow: 0 0 8px #a855f7, 0 0 15px #a855f7;
            font-weight: bold;
        }
        .live-info-box {
            text-align: center; margin-top: 5px; width: 100%;
        }
        .live-name-txt { font-size: 26px; color: #fff; text-transform: uppercase; text-shadow: 2px 2px 4px #000; margin-bottom: 2px; }
        .live-pv-txt { font-size: 22px; color: #ff0000; text-shadow: 0 0 8px #ff0000, 0 0 15px #ff0000; font-weight: bold; margin-bottom: 2px; }
        .live-san-txt { font-size: 22px; color: #00f2ff; text-shadow: 0 0 8px #00f2ff, 0 0 15px #00f2ff; font-weight: bold; }
        .img-morto { filter: brightness(0) grayscale(100%) !important; }
        /* FIM PORTRAIT OBS */

        .sigilo-container {
            position: relative;
            width: 260px; height: 260px;
            margin: 0 auto 10px auto;
            background: url('https://www.ordemparanormal.com.br/assets/rituais/circulo_atributos.png') no-repeat center;
            background-size: contain;
        }
        .attr-box {
            position: absolute;
            width: 55px; height: 55px;
            background: #090909;
            border: 2px solid #fff; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .attr-label { font-size: 9px; font-weight: bold; color: #888; margin-top: -2px; }
        .attr-box input {
            background: transparent; border: none; color: #fff; text-align: center;
            width: 100%; font-size: 22px; font-family: 'Special Elite'; font-weight: bold; outline: none;
        }
        .agi { top: 0; left: 102px; }
        .for { top: 75px; left: 5px; }
        .int { top: 75px; right: 5px; }
        .pre { bottom: 20px; left: 45px; }
        .vig { bottom: 20px; right: 45px; }

        .status-container { margin-bottom: 12px; }
        .status-header { font-size: 11px; font-weight: bold; color: #aaa; text-align: center; margin-bottom: 4px; }
        .bar-bg { width: 100%; height: 32px; background: #111; position: relative; border: 1px solid #222; overflow: hidden; display: flex; align-items: center; }
        .bar-fill { height: 100%; transition: width 0.4s; position: absolute; top: 0; left: 0; opacity: 0.8; }
        .bar-content { position: relative; z-index: 2; width: 100%; display: flex; justify-content: space-between; padding: 0 10px; font-weight: bold; font-family: 'Special Elite'; align-items: center; }
        .bar-content input { background: transparent; border: none; color: #fff; width: 35px; text-align: center; font-size: 16px; font-family: 'Special Elite'; outline: none; }
        .bar-btn { cursor: pointer; color: #fff; font-size: 18px; opacity: 0.6; user-select: none; }

        .pericias-box { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 5px; border: 1px solid #111; height: fit-content; }
        .pericia-header { display: grid; grid-template-columns: 1.5fr 60px 50px 50px 45px; font-size: 10px; color: #666; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; align-items: center; text-align: center; }
        .pericia-header > span:first-child { text-align: left; }
        .pericia-row { display: grid; grid-template-columns: 1.5fr 60px 50px 50px 45px; gap: 5px; padding: 6px 4px; border-bottom: 1px solid #1a1a1a; font-size: 13px; align-items: center; text-align: center; }
        .pericia-row > span:first-child { text-align: left; }
        .pericia-nome { cursor: pointer; color: #e0e0e0; position: relative; }
        .pericia-nome::after { content: ' ▼'; font-size: 8px; opacity: 0.5; }
        .pericia-desc { display: none; background: rgba(0,0,0,0.4); border-left: 2px solid var(--cris-purple); padding: 8px 10px; font-size: 11px; color: #aaa; margin-bottom: 4px; line-height: 1.4; }
        .treino-select { background: #0a0a0a; color: #ccc; border: 1px solid #333; font-size: 11px; text-align: center; width: 100%; border-radius: 2px; outline: none; padding: 2px; }

        .p-verde { background: rgba(34, 197, 94, 0.1) !important; }
        .p-azul { background: rgba(59, 130, 246, 0.1) !important; }
        .p-laranja { background: rgba(255, 180, 68, 0.1) !important; }
        .p-vermelho { background: rgba(239, 0, 0, 0.1) !important; }

        .defesa-grid { display: flex; align-items: center; gap: 20px; margin-top: 10px; margin-bottom: 20px; }
        .defesa-shield {
            width: 70px; height: 75px;
            background: url('https://www.ordemparanormal.com.br/assets/rituais/escudo_defesa.png') no-repeat center;
            background-size: contain;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Special Elite'; font-size: 24px; font-weight: bold;
            flex-shrink: 0;
        }
        .defesa-colunas { display: flex; gap: 20px; flex: 1; justify-content: space-between; }
        .def-item { display: flex; flex-direction: column; align-items: center; }
        .def-label { font-size: 10px; color: #aaa; font-weight: bold; text-transform: uppercase; }
        .def-val-total { font-size: 20px; font-family: 'Special Elite'; border-bottom: 1px solid #fff; min-width: 45px; text-align: center; }

        .tabs-nav { display: flex; gap: 5px; border-bottom: 1px solid #333; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { background: transparent; border: none; color: #666; padding: 10px 15px; cursor: pointer; font-size: 12px; text-transform: uppercase; font-weight: bold; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid var(--cris-purple); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .ritual-card { background: #121212; margin-bottom: 10px; border-radius: 4px; border: 1px solid #222; overflow: hidden; }
        .card-header { padding: 10px 15px; cursor: pointer; display: flex; justify-content: space-between; background: rgba(255,255,255,0.02); align-items: center; font-family: 'Special Elite'; font-size: 16px; border-left: 4px solid #555;}
        
        .header-morte { border-left-color: var(--cor-morte); }
        .header-sangue { border-left-color: var(--cor-sangue); }
        .header-energia { border-left-color: var(--cor-energia); }
        .header-conhecimento { border-left-color: var(--cor-conhecimento); }
        .header-medo { border-left-color: var(--cor-medo); }

        .card-body { padding: 15px; display: none; border-top: 1px solid #222; background: #0c0c0c; }
        .cris-textarea { width: 100%; background: #080808; border: 1px solid #333; color: #ccc; font-size: 13px; padding: 10px; min-height: 80px; box-sizing: border-box; outline: none; margin-bottom: 5px; font-family: 'Roboto'; line-height: 1.5; }
        .cris-btn { background: var(--cris-purple); border: none; color: #fff; padding: 8px 16px; cursor: pointer; font-size: 11px; font-weight: bold; border-radius: 2px; }
        
        .grid-infos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .info-box { display: flex; flex-direction: column; }
        .info-box label { font-size: 9px; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 2px; }
        .info-box input, .info-box select { background: transparent; border: none; border-bottom: 1px solid #333; color: #fff; font-family: 'Special Elite'; font-size: 13px; padding: 4px 0; outline: none; }
        .info-box select option { background: #111; color: #fff; }

        .btn-add { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px dashed #444; color: #aaa; cursor: pointer; font-family: 'Special Elite'; font-size: 14px; transition: 0.2s; margin-bottom: 15px; }
        .btn-add:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: #fff; }

        .inv-row { display: grid; grid-template-columns: 2fr 1fr 1fr 60px; gap: 10px; align-items: center; padding: 8px; border-bottom: 1px solid #1a1a1a; font-family: 'Roboto'; font-size: 13px; }
        .inv-header { font-weight: bold; color: #888; text-transform: uppercase; font-size: 10px; border-bottom: 2px solid #333; }
        .inv-input { background: transparent; border: none; color: #fff; width: 100%; outline: none; }
        .inv-btn-del { background: #b31d1d; color: #fff; border: none; padding: 4px 8px; cursor: pointer; font-size: 10px; border-radius: 2px; }

    </style>
</head>
<body>

<div class="live-portrait-container">
    <div class="live-img-wrapper">
        <img id="live-img" src="" alt="">
        <div class="live-pe-txt" id="live-pe-txt">PE: 0/0</div>
    </div>
    <div class="live-info-box">
        <div class="live-name-txt" id="live-name-txt">AGENTE</div>
        <div class="live-pv-txt" id="live-pv-txt">PV: 0/0</div>
        <div class="live-san-txt" id="live-san-txt">SAN: 0/0</div>
    </div>
</div>
<div class="grid-container">
    <section>
        <div style="margin-bottom: 20px;">
            <button onclick="window.location.href='index.html'" class="cris-btn" style="background: #222; border: 1px solid #444;">← VOLTAR AO HUB</button>
        </div>

        <input type="text" id="nome-personagem" class="header-name" placeholder="NOME DO AGENTE" onchange="salvarFicha()">
        
        <div class="portrait-config-box" style="background: rgba(255,255,255,0.03); padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #222;">
            <div style="font-size: 10px; color: #888; margin-bottom: 5px; font-weight: bold;">URLs DO PORTRAIT (GIF/PNG)</div>
            <input type="text" id="img-normal" placeholder="Arte Normal" onchange="salvarFicha()" style="width:100%; margin-bottom:5px; font-size:11px; background:transparent; border:none; border-bottom:1px solid #333; color:#fff; padding:4px 0; outline:none;">
            <input type="text" id="img-machucado" placeholder="Arte Machucado (<= 50% PV)" onchange="salvarFicha()" style="width:100%; margin-bottom:5px; font-size:11px; background:transparent; border:none; border-bottom:1px solid #333; color:#fff; padding:4px 0; outline:none;">
            <input type="text" id="img-morrendo" placeholder="Arte Morrendo (0 PV)" onchange="salvarFicha()" style="width:100%; margin-bottom:10px; font-size:11px; background:transparent; border:none; border-bottom:1px solid #333; color:#fff; padding:4px 0; outline:none;">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px;">
                <button id="btn-est-enlouquecendo" class="cris-btn" style="background:#222; font-size:10px;" onclick="toggleEstado('enlouquecendo')">ENLOUQUECENDO</button>
                <button id="btn-est-morrendo" class="cris-btn" style="background:#222; font-size:10px;" onclick="toggleEstado('morrendo')">MORRENDO</button>
                <button id="btn-est-lesionado" class="cris-btn" style="background:#222; font-size:10px;" onclick="toggleEstado('lesionado')">LESIONADO</button>
                <button id="btn-est-morto" class="cris-btn" style="background:#222; font-size:10px;" onclick="toggleEstado('morto')">MORTO</button>
            </div>

            <div id="ui-morrendo" style="display:none; margin-bottom: 10px; background:#000; padding:5px; border-radius:3px;">
                <span style="font-size: 10px; color: #888; font-weight:bold;">TURNOS DE MORRENDO:</span>
                <input type="number" id="turnos-morrendo" style="width: 50px; background:transparent; border:none; border-bottom:1px solid red; color:red; font-family:'Special Elite'; font-size:14px; margin-left:5px;" onchange="salvarFicha()">
            </div>

            <div id="ui-lesionado" style="display:none; margin-bottom: 10px; background:#000; padding:5px; border-radius:3px;">
                <span style="font-size: 10px; color: #888; font-weight:bold;">LOCAL DA LESÃO:</span>
                <select id="local-lesao" style="width:100%; background:transparent; border:none; border-bottom:1px solid #444; color:#fff; font-size:12px; margin-top:5px; outline:none;" onchange="salvarFicha()">
                    <option value="Membros Superiores">Membros Superiores</option>
                    <option value="Membros Inferiores">Membros Inferiores</option>
                    <option value="Tórax">Tórax</option>
                    <option value="Crânio">Crânio</option>
                </select>
            </div>

            <div style="margin-top: 10px;">
                <label style="font-size: 10px; color: #888; cursor: pointer; font-weight:bold;">
                    <input type="checkbox" id="tem-sequela" onchange="toggleSequela()"> SEQUELA PERMANENTE
                </label>
                <div id="ui-sequela" style="display:none; margin-top: 5px;">
                    <textarea id="desc-sequela" class="cris-textarea" placeholder="Descreva a sequela..." style="min-height:40px; font-size:11px;" onchange="salvarFicha()"></textarea>
                </div>
            </div>
        </div>
        <div class="header-sub-row">
            <div class="sub-input-group">
                <label>Origem</label>
                <input type="text" id="origem" onchange="salvarFicha()">
            </div>
            <div class="sub-input-group">
                <label>Classe</label>
                <input type="text" id="classe" onchange="salvarFicha()">
            </div>
            <div class="sub-input-group" style="flex: 0.5;">
                <label>NEX (%)</label>
                <input type="text" id="nex" onchange="salvarFicha()" style="text-align: center;">
            </div>
        </div>

        <div class="sigilo-container">
            <div class="attr-box agi"><span class="attr-label">AGI</span><input type="number" id="attr-agi" onchange="salvarFicha()"></div>
            <div class="attr-box for"><span class="attr-label">FOR</span><input type="number" id="attr-for" onchange="salvarFicha()"></div>
            <div class="attr-box int"><span class="attr-label">INT</span><input type="number" id="attr-int" onchange="salvarFicha()"></div>
            <div class="attr-box pre"><span class="attr-label">PRE</span><input type="number" id="attr-pre" onchange="salvarFicha()"></div>
            <div class="attr-box vig"><span class="attr-label">VIG</span><input type="number" id="attr-vig" onchange="salvarFicha()"></div>
        </div>

        <div class="status-container">
            <div class="status-header">VIDA</div>
            <div class="bar-bg">
                <div id="bar-vida" class="bar-fill" style="background:var(--hp-red)"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('vida', -1)">-</span>
                    <div><input type="number" id="vida-atual" onchange="salvarFicha()"> / <input type="number" id="vida-max" onchange="salvarFicha()"></div>
                    <span class="bar-btn" onclick="ajustar('vida', 1)">+</span>
                </div>
            </div>
        </div>
        <div class="status-container">
            <div class="status-header">SANIDADE</div>
            <div class="bar-bg">
                <div id="bar-san" class="bar-fill" style="background:var(--san-purple)"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('san', -1)">-</span>
                    <div><input type="number" id="san-atual" onchange="salvarFicha()"> / <input type="number" id="san-max" onchange="salvarFicha()"></div>
                    <span class="bar-btn" onclick="ajustar('san', 1)">+</span>
                </div>
            </div>
        </div>
        <div class="status-container">
            <div class="status-header">ESFORÇO</div>
            <div class="bar-bg">
                <div id="bar-pe" class="bar-fill" style="background:var(--pe-orange)"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('pe', -1)">-</span>
                    <div><input type="number" id="pe-atual" onchange="salvarFicha()"> / <input type="number" id="pe-max" onchange="salvarFicha()"></div>
                    <span class="bar-btn" onclick="ajustar('pe', 1)">+</span>
                </div>
            </div>
        </div>
    </section>

    <section class="pericias-box">
        <h3 style="font-family:'Special Elite'; margin-top:0;">PERÍCIAS</h3>
        <div class="pericia-header">
            <span>Nome</span> <span>Atrib.</span> <span>Bônus</span> <span>Treino</span> <span>Soma</span>
        </div>
        <div id="lista-pericias"></div>
    </section>

    <section>
        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="mudarAba('combate')">Combate</button>
            <button class="tab-btn" onclick="mudarAba('habilidades')">Habilidades</button>
            <button class="tab-btn" onclick="mudarAba('rituais')">Rituais</button>
            <button class="tab-btn" onclick="mudarAba('poderes')">Poderes</button>
            <button class="tab-btn" onclick="mudarAba('inventario')">Inventário</button>
        </nav>

        <div id="aba-combate" class="tab-content active">
            <div class="defesa-grid" style="background: rgba(255,255,255,0.03); padding: 10px; border-radius: 5px;">
                <div class="defesa-shield" id="display-defesa">10</div>
                <div class="defesa-colunas">
                    <div class="def-item">
                        <label class="def-label">DEFESA</label>
                        <input type="number" id="bonus-defesa" class="treino-select" style="width:40px; font-size:16px;" onchange="salvarFicha()">
                    </div>
                    <div class="def-item">
                        <label class="def-label">BLOQUEIO</label>
                        <div class="def-val-total" id="display-bloqueio">0</div>
                    </div>
                    <div class="def-item">
                        <label class="def-label">ESQUIVA</label>
                        <div class="def-val-total" id="display-esquiva">10</div>
                    </div>
                </div>
            </div>
            
            <div style="margin-bottom:20px;">
                <label style="font-size:10px; color:#666; font-weight:bold;">PROTEÇÃO EQUIPADA</label>
                <input type="text" id="info-prot" class="header-name" style="font-size:14px; margin-bottom:5px;" placeholder="Ex: Colete Leve" onchange="salvarFicha()">
            </div>
            
            <div style="margin-bottom:20px;">
                <label style="font-size:10px; color:#666; font-weight:bold;">RESISTÊNCIAS</label>
                <textarea id="info-resist" class="cris-textarea" style="min-height: 40px;" placeholder="Ex: Balística 2, Fogo 5..." onchange="salvarFicha()"></textarea>
            </div>
            
            <h4 style="font-family:'Special Elite'; margin-bottom:5px; border-bottom:1px solid #333; padding-bottom:5px;">ARMAS</h4>
            <button class="btn-add" onclick="novaArma()">+ Adicionar Arma</button>
            <div id="lista-armas"></div>
        </div>

        <div id="aba-rituais" class="tab-content">
            <button class="btn-add" onclick="novoRitual()">+ Aprender Novo Ritual</button>
            <div id="lista-rituais"></div>
        </div>

        <div id="aba-poderes" class="tab-content">
            <button class="btn-add" onclick="novoPoder()">+ Adicionar Novo Poder</button>
            <div id="lista-poderes"></div>
        </div>

        <div id="aba-habilidades" class="tab-content">
            <button class="btn-add" onclick="novaHabilidade()">+ Adicionar Nova Habilidade</button>
            <div id="lista-habilidades"></div>
        </div>

        <div id="aba-inventario" class="tab-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <div style="font-family:'Special Elite'; font-size:18px;">PESO: <span id="peso-atual" style="color:#fff">0</span> / <input type="number" id="peso-max" style="width:40px; background:transparent; border:none; border-bottom:1px solid #333; color:#fff; font-family:'Special Elite'; font-size:18px; outline:none; text-align:center;" onchange="salvarFicha()"></div>
                <div style="font-family:'Special Elite'; font-size:18px;">PRESTÍGIO: <input type="number" id="prestigio" style="width:50px; background:transparent; border:none; border-bottom:1px solid #333; color:#fff; font-family:'Special Elite'; font-size:18px; outline:none; text-align:center;" onchange="salvarFicha()"></div>
            </div>
            <button class="btn-add" onclick="novoItem()">+ Adicionar Item</button>

</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
        authDomain: "fichasrpg-7fc69.firebaseapp.com",
        projectId: "fichasrpg-7fc69",
        storageBucket: "fichasrpg-7fc69.firebasestorage.app",
        messagingSenderId: "758802032764",
        appId: "1:758802032764:web:40467e15fdc24c570081f9",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const urlParams = new URLSearchParams(window.location.search);
    let atual = urlParams.get('id');

    let menusAbertos = new Set();
    let estados = { morrendo: false, enlouquecendo: false, lesionado: false, morto: false };

    const bancoPericias = {
        "Acrobacia": { attr: "AGI", desc: "Equilíbrio e quedas." },
        "Atletismo": { attr: "FOR", desc: "Correr, nadar, pular." },
        "Atualidades": { attr: "INT", desc: "Conhecimento do mundo." },
        "Ciências": { attr: "INT", desc: "Física, Química, etc." },
        "Crime": { attr: "AGI", desc: "Arrombar, furtar." },
        "Diplomacia": { attr: "PRE", desc: "Persuadir com calma." },
        "Enganação": { attr: "PRE", desc: "Mentir e blefar." },
        "Fortitude": { attr: "VIG", desc: "Resistência física." },
        "Furtividade": { attr: "AGI", desc: "Passar despercebido." },
        "Iniciativa": { attr: "AGI", desc: "Agir primeiro em combate." },
        "Intimidação": { attr: "PRE", desc: "Assustar ou coagir." },
        "Intuição": { attr: "PRE", desc: "Ler intenções e emoções." },
        "Investigação": { attr: "INT", desc: "Analisar pistas locais." },
        "Luta": { attr: "FOR", desc: "Combate corpo a corpo." },
        "Medicina": { attr: "INT", desc: "Tratar ferimentos." },
        "Ocultismo": { attr: "INT", desc: "Conhecimento paranormal." },
        "Percepção": { attr: "PRE", desc: "Notar coisas ao redor." },
        "Pilotagem": { attr: "AGI", desc: "Dirigir veículos." },
        "Pontaria": { attr: "AGI", desc: "Armas de fogo e arremesso." },
        "Profissão": { attr: "INT", desc: "Conhecimento de um ofício." },
        "Reflexos": { attr: "AGI", desc: "Reação rápida contra ataques." },
        "Religião": { attr: "PRE", desc: "Teologia e seitas." },
        "Sobrevivência": { attr: "INT", desc: "Orientação e caça na selva." },
        "Tática": { attr: "INT", desc: "Posicionamento e planos." },
        "Tecnologia": { attr: "INT", desc: "Hackear e usar sistemas." },
        "Vontade": { attr: "PRE", desc: "Resistência mental e sanidade." }
    };

    async function init() {
        if (!atual) { window.location.href = "index.html"; } 
        else {
            gerarPericiasBase();
            carregarFicha();
            carregarSubColecao("rituais", renderRituais);
            carregarSubColecao("poderes", renderPoderes);
            carregarSubColecao("habilidades", renderHabilidades);
            carregarSubColecao("armas", renderArmas);
            carregarSubColecao("inventario", renderInventario);
        }
    }

    function gerarPericiasBase() {
        const div = document.getElementById('lista-pericias');
        div.innerHTML = Object.keys(bancoPericias).map(p => {
            return `
            <div class="pericia-row" id="row-${p}">
                <span class="pericia-nome" onclick="toggleDesc('${p}')">${p}</span>
                <select id="attr-${p}" class="treino-select" onchange="salvarFicha()" style="border:none; background:transparent;">
                    <option value="AGI">AGI</option><option value="FOR">FOR</option><option value="INT">INT</option><option value="PRE">PRE</option><option value="VIG">VIG</option>
                </select>
                <input type="number" id="bonus-${p}" class="treino-select" value="0" onchange="salvarFicha()" style="border:none; background:transparent; width:30px">
                <select id="treino-${p}" class="treino-select" onchange="atualizarCorPericia('${p}', this.value); salvarFicha();">
                    <option value="0">0</option><option value="5">5</option><option value="10">10</option><option value="15">15</option><option value="20">20</option>
                </select>
                <span id="total-${p}" style="font-family:'Special Elite'; color:var(--cris-purple);">0</span>
            </div>
            <div id="desc-${p}" class="pericia-desc">${bancoPericias[p].desc}</div>`;
        }).join('');
    }

    function carregarFicha() {
        db.collection("fichas").doc(atual).onSnapshot(doc => {
            const d = doc.data();
            if(!d) return;
            
            document.getElementById('nome-personagem').value = d.nome || "";
            document.getElementById('origem').value = d.origem || "";
            document.getElementById('classe').value = d.classe || "";
            document.getElementById('nex').value = d.nex || "5%";
            
            // CONFIGS PORTRAIT
            document.getElementById('img-normal').value = d.imgNormal || "";
            document.getElementById('img-machucado').value = d.imgMachucado || "";
            document.getElementById('img-morrendo').value = d.imgMorrendo || "";
            
            estados = d.estados || { morrendo: false, enlouquecendo: false, lesionado: false, morto: false };
            atualizarBotoesEstado();
            
            document.getElementById('turnos-morrendo').value = d.turnosMorrendo || 0;
            document.getElementById('local-lesao').value = d.localLesao || "Membros Superiores";
            document.getElementById('tem-sequela').checked = d.temSequela || false;
            document.getElementById('desc-sequela').value = d.descSequela || "";
            toggleSequela(true);

            ['agi','for','int','pre','vig'].forEach(a => { if(d[a] !== undefined) document.getElementById(`attr-${a}`).value = d[a]; });

            atualizarStatus('vida', d.vidaAtual ?? 20, d.vidaMax ?? 20);
            atualizarStatus('san', d.sanAtual ?? 20, d.sanMax ?? 20);
            atualizarStatus('pe', d.peAtual ?? 5, d.peMax ?? 5);

            document.getElementById('info-prot').value = d.infoProt || "";
            document.getElementById('info-resist').value = d.infoResist || "";
            document.getElementById('peso-max').value = d.pesoMax || 10;
            document.getElementById('prestigio').value = d.prestigio || 0;

            let fortTreino = 0;
            if(d.pericias) {
                Object.keys(bancoPericias).forEach(p => {
                    const dados = d.pericias[p] || { bonus: 0, treino: 0, atributo: bancoPericias[p].attr };
                    document.getElementById(`bonus-${p}`).value = dados.bonus;
                    document.getElementById(`treino-${p}`).value = dados.treino;
                    document.getElementById(`attr-${p}`).value = dados.atributo || bancoPericias[p].attr;
                    
                    const attrVal = parseInt(d[dados.atributo.toLowerCase()]) || 0;
                    document.getElementById(`total-${p}`).innerText = (parseInt(dados.bonus) || 0) + (parseInt(dados.treino) || 0) + attrVal;
                    
                    atualizarCorPericia(p, dados.treino);
                    if(p === "Fortitude") fortTreino = parseInt(dados.treino);
                });
            }

            const bDef = parseInt(d.bonusDefesa) || 0;
            const agi = parseInt(d.agi) || 0;
            document.getElementById('display-defesa').innerText = 10 + agi + bDef;
            document.getElementById('display-esquiva').innerText = 10 + agi + (d.pericias?.Reflexos?.treino || 0);
            document.getElementById('display-bloqueio').innerText = fortTreino;
            document.getElementById('bonus-defesa').value = bDef;
            
            atualizarPortraitLive(d);
        });
    }

    function salvarFicha() {
        const periciasObj = {};
        Object.keys(bancoPericias).forEach(p => {
            periciasObj[p] = {
                bonus: parseInt(document.getElementById(`bonus-${p}`).value) || 0,
                treino: parseInt(document.getElementById(`treino-${p}`).value) || 0,
                atributo: document.getElementById(`attr-${p}`).value
            };
        });

        db.collection("fichas").doc(atual).update({
            nome: document.getElementById('nome-personagem').value,
            origem: document.getElementById('origem').value,
            classe: document.getElementById('classe').value,
            nex: document.getElementById('nex').value,
            
            imgNormal: document.getElementById('img-normal').value,
            imgMachucado: document.getElementById('img-machucado').value,
            imgMorrendo: document.getElementById('img-morrendo').value,
            estados: estados,
            turnosMorrendo: document.getElementById('turnos-morrendo').value,
            localLesao: document.getElementById('local-lesao').value,
            temSequela: document.getElementById('tem-sequela').checked,
            descSequela: document.getElementById('desc-sequela').value,

            agi: parseInt(document.getElementById('attr-agi').value) || 0,
            for: parseInt(document.getElementById('attr-for').value) || 0,
            int: parseInt(document.getElementById('attr-int').value) || 0,
            pre: parseInt(document.getElementById('attr-pre').value) || 0,
            vig: parseInt(document.getElementById('attr-vig').value) || 0,
            vidaAtual: parseInt(document.getElementById('vida-atual').value) || 0,
            vidaMax: parseInt(document.getElementById('vida-max').value) || 1,
            sanAtual: parseInt(document.getElementById('san-atual').value) || 0,
            sanMax: parseInt(document.getElementById('san-max').value) || 1,
            peAtual: parseInt(document.getElementById('pe-atual').value) || 0,
            peMax: parseInt(document.getElementById('pe-max').value) || 1,
            pericias: periciasObj,
            bonusDefesa: parseInt(document.getElementById('bonus-defesa').value) || 0,
            infoProt: document.getElementById('info-prot').value,
            infoResist: document.getElementById('info-resist').value,
            pesoMax: parseInt(document.getElementById('peso-max').value) || 10,
            prestigio: parseInt(document.getElementById('prestigio').value) || 0
        });
    }

    // NOVAS FUNÇÕES DO PORTRAIT E ESTADOS
    function toggleEstado(est) {
        estados[est] = !estados[est];
        salvarFicha();
    }
    
    function atualizarBotoesEstado() {
        const btnIds = ['enlouquecendo', 'morrendo', 'lesionado', 'morto'];
        btnIds.forEach(est => {
            const btn = document.getElementById('btn-est-' + est);
            if (btn) {
                btn.style.background = estados[est] ? 'var(--cris-purple)' : '#222';
            }
        });
        document.getElementById('ui-morrendo').style.display = estados.morrendo ? 'block' : 'none';
        document.getElementById('ui-lesionado').style.display = estados.lesionado ? 'block' : 'none';
    }
    
    function toggleSequela(noSave = false) {
        const checked = document.getElementById('tem-sequela').checked;
        document.getElementById('ui-sequela').style.display = checked ? 'block' : 'none';
        if (!noSave) salvarFicha();
    }
    
    function atualizarPortraitLive(d) {
        const img = document.getElementById('live-img');
        const peTxt = document.getElementById('live-pe-txt');
        const nameTxt = document.getElementById('live-name-txt');
        const pvTxt = document.getElementById('live-pv-txt');
        const sanTxt = document.getElementById('live-san-txt');

        nameTxt.innerText = d.nome || "AGENTE";
        pvTxt.innerText = `PV: ${d.vidaAtual !== undefined ? d.vidaAtual : 0}/${d.vidaMax || 0}`;
        sanTxt.innerText = `SAN: ${d.sanAtual !== undefined ? d.sanAtual : 0}/${d.sanMax || 0}`;
        peTxt.innerText = `PE: ${d.peAtual !== undefined ? d.peAtual : 0}/${d.peMax || 0}`;

        img.className = "";
        let hpPerc = ((d.vidaAtual || 0) / (d.vidaMax || 1)) * 100;

        let novaImg = d.imgNormal || "";
        if (estados.morto) {
            novaImg = d.imgNormal || "";
            img.classList.add('img-morto');
        } else if (estados.morrendo || (d.vidaAtual !== undefined && d.vidaAtual <= 0)) {
            novaImg = d.imgMorrendo || d.imgNormal || "";
        } else if (hpPerc <= 50) {
            novaImg = d.imgMachucado || d.imgNormal || "";
        } else {
            novaImg = d.imgNormal || "";
        }

        if (novaImg) {
            img.src = novaImg;
            img.style.display = 'block';
        } else {
            img.style.display = 'none';
        }
    }

    // RESTANTE DAS FUNÇÕES ORIGINAIS
    function ajustar(t, v) {
        const input = document.getElementById(`${t}-atual`);
        input.value = (parseInt(input.value) || 0) + v;
        salvarFicha();
    }

    function atualizarStatus(tipo, at, mx) {
        document.getElementById(`${tipo}-atual`).value = at;
        document.getElementById(`${tipo}-max`).value = mx;
        document.getElementById(`bar-${tipo}`).style.width = Math.min((at / mx) * 100, 100) + "%";
    }

    function atualizarCorPericia(nome, valor) {
        const el = document.getElementById(`row-${nome}`);
        el.className = 'pericia-row';
        if(valor == "5") el.classList.add('p-verde');
        else if(valor == "10") el.classList.add('p-azul');
        else if(valor == "15") el.classList.add('p-laranja');
        else if(valor == "20") el.classList.add('p-vermelho');
    }

    function toggleDesc(id) {
        const d = document.getElementById('desc-'+id);
        d.style.display = d.style.display === 'block' ? 'none' : 'block';
    }

    function carregarSubColecao(col, renderFunc) {
        db.collection("fichas").doc(atual).collection(col).onSnapshot(snap => {
            const arr = [];
            snap.forEach(doc => arr.push({ id: doc.id, ...doc.data() }));
            renderFunc(arr);
        });
    }

    function renderRituais(lista) {
        document.getElementById('lista-rituais').innerHTML = lista.map(r => {
            const disp = menusAbertos.has('rit-'+r.id) ? 'block' : 'none';
            const classeElemento = r.elemento ? 'header-' + r.elemento.toLowerCase() : '';
            return `
            <div class="ritual-card">
                <div class="card-header ${classeElemento}" onclick="toggleElem('rit-${r.id}')">
                    <input type="text" value="${r.nome || ''}" onclick="event.stopPropagation()" onchange="updateSub('${r.id}', 'rituais', 'nome', this.value)" style="background:transparent; border:none; color:#fff; font-family:'Special Elite'; font-size:16px; width:60%; outline:none;">
                    <select onclick="event.stopPropagation()" onchange="updateSub('${r.id}', 'rituais', 'elemento', this.value)" style="background:#111; border:1px solid #333; color:#aaa; font-size:11px; outline:none;">
                        <option value="Morte" ${r.elemento==='Morte'?'selected':''}>Morte</option>
                        <option value="Sangue" ${r.elemento==='Sangue'?'selected':''}>Sangue</option>
                        <option value="Energia" ${r.elemento==='Energia'?'selected':''}>Energia</option>
                        <option value="Conhecimento" ${r.elemento==='Conhecimento'?'selected':''}>Conhec.</option>
                        <option value="Medo" ${r.elemento==='Medo'?'selected':''}>Medo</option>
                    </select>
                </div>
                <div class="card-body" id="rit-${r.id}" style="display:${disp}">
                    <div class="grid-infos">
                        <div class="info-box"><label>Execução</label><input type="text" value="${r.execucao||''}" onchange="updateSub('${r.id}', 'rituais', 'execucao', this.value)"></div>
                        <div class="info-box"><label>Alcance</label><input type="text" value="${r.alcance||''}" onchange="updateSub('${r.id}', 'rituais', 'alcance', this.value)"></div>
                        <div class="info-box"><label>Alvo/Área</label><input type="text" value="${r.alvo||''}" onchange="updateSub('${r.id}', 'rituais', 'alvo', this.value)"></div>
                        <div class="info-box"><label>Duração</label><input type="text" value="${r.duracao||''}" onchange="updateSub('${r.id}', 'rituais', 'duracao', this.value)"></div>
                        <div class="info-box"><label>Resistência</label><input type="text" value="${r.resistencia||''}" onchange="updateSub('${r.id}', 'rituais', 'resistencia', this.value)"></div>
                    </div>
                    <textarea class="cris-textarea" placeholder="Descrição e danos..." onchange="updateSub('${r.id}', 'rituais', 'descricao', this.value)">${r.descricao || ""}</textarea>
                    <button class="cris-btn" style="background:#b31d1d; width:100%" onclick="removerSub('${r.id}', 'rituais')">Remover Ritual</button>
                </div>
            </div>`;
        }).join('');
    }

    function renderPoderes(lista) {
        document.getElementById('lista-poderes').innerHTML = lista.map(p => {
            const disp = menusAbertos.has('pod-'+p.id) ? 'block' : 'none';
            const classeElemento = p.elemento ? 'header-' + p.elemento.toLowerCase() : '';
            return `
            <div class="ritual-card">
                <div class="card-header ${classeElemento}" onclick="toggleElem('pod-${p.id}')">
                    <input type="text" value="${p.nome || ''}" onclick="event.stopPropagation()" onchange="updateSub('${p.id}', 'poderes', 'nome', this.value)" style="background:transparent; border:none; color:#fff; font-family:'Special Elite'; font-size:16px; width:60%; outline:none;">
                    <select onclick="event.stopPropagation()" onchange="updateSub('${p.id}', 'poderes', 'elemento', this.value)" style="background:#111; border:1px solid #333; color:#aaa; font-size:11px; outline:none;">
                        <option value="Geral" ${p.elemento==='Geral'?'selected':''}>Classe</option>
                        <option value="Morte" ${p.elemento==='Morte'?'selected':''}>Morte</option>
                        <option value="Sangue" ${p.elemento==='Sangue'?'selected':''}>Sangue</option>
                        <option value="Energia" ${p.elemento==='Energia'?'selected':''}>Energia</option>
                        <option value="Conhecimento" ${p.elemento==='Conhecimento'?'selected':''}>Conhec.</option>
                    </select>
                </div>
                <div class="card-body" id="pod-${p.id}" style="display:${disp}">
                    <textarea class="cris-textarea" placeholder="Descrição do poder..." onchange="updateSub('${p.id}', 'poderes', 'descricao', this.value)">${p.descricao || ""}</textarea>
                    <button class="cris-btn" style="background:#b31d1d; width:100%" onclick="removerSub('${p.id}', 'poderes')">Remover Poder</button>
                </div>
            </div>`;
        }).join('');
    }

    function renderHabilidades(lista) {
        document.getElementById('lista-habilidades').innerHTML = lista.map(h => {
            const disp = menusAbertos.has('hab-'+h.id) ? 'block' : 'none';
            return `
            <div class="ritual-card">
                <div class="card-header" onclick="toggleElem('hab-${h.id}')">
                    <input type="text" value="${h.nome || ''}" onclick="event.stopPropagation()" onchange="updateSub('${h.id}', 'habilidades', 'nome', this.value)" style="background:transparent; border:none; color:#fff; font-family:'Special Elite'; font-size:16px; width:100%; outline:none;">
                </div>
                <div class="card-body" id="hab-${h.id}" style="display:${disp}">
                    <textarea class="cris-textarea" placeholder="Descrição da habilidade..." onchange="updateSub('${h.id}', 'habilidades', 'descricao', this.value)">${h.descricao || ""}</textarea>
                    <button class="cris-btn" style="background:#b31d1d; width:100%" onclick="removerSub('${h.id}', 'habilidades')">Remover Habilidade</button>
                </div>
            </div>`;
        }).join('');
    }

    function renderArmas(lista) {
        document.getElementById('lista-armas').innerHTML = lista.map(a => {
            const disp = menusAbertos.has('arma-'+a.id) ? 'block' : 'none';
            return `
            <div class="ritual-card">
                <div class="card-header" onclick="toggleElem('arma-${a.id}')">
                    <input type="text" value="${a.nome || ''}" placeholder="Nome da Arma" onclick="event.stopPropagation()" onchange="updateSub('${a.id}', 'armas', 'nome', this.value)" style="background:transparent; border:none; color:#fff; font-family:'Special Elite'; font-size:16px; width:100%; outline:none;">
                </div>
                <div class="card-body" id="arma-${a.id}" style="display:${disp}">
                    <div class="grid-infos">
                        <div class="info-box"><label>Teste (Perícia)</label><input type="text" value="${a.teste||''}" onchange="updateSub('${a.id}', 'armas', 'teste', this.value)"></div>
                        <div class="info-box"><label>Dano</label><input type="text" value="${a.dano||''}" onchange="updateSub('${a.id}', 'armas', 'dano', this.value)"></div>
                        <div class="info-box"><label>Crítico</label><input type="text" value="${a.critico||''}" onchange="updateSub('${a.id}', 'armas', 'critico', this.value)"></div>
                        <div class="info-box"><label>Alcance</label><input type="text" value="${a.alcance||''}" onchange="updateSub('${a.id}', 'armas', 'alcance', this.value)"></div>
                        <div class="info-box"><label>Tipo/Especial</label><input type="text" value="${a.tipo||''}" onchange="updateSub('${a.id}', 'armas', 'tipo', this.value)"></div>

                    </div>
                    <button class="cris-btn" style="background:#b31d1d; width:100%; margin-top:5px;" onclick="removerSub('${a.id}', 'armas')">Remover Arma</button>
                </div>
            </div>`;
        }).join('');

    function renderInventario(lista) {
        let pesoTotal = 0;
        const html = lista.map(i => {
            pesoTotal += parseFloat(i.espacos) || 0;
            return `
            <div class="inv-row">
                <input type="text" class="inv-input" value="${i.nome || ''}" onchange="updateSub('${i.id}', 'inventario', 'nome', this.value)">
                <input type="text" class="inv-input" style="text-align:center" value="${i.categoria || 'I'}" onchange="updateSub('${i.id}', 'inventario', 'categoria', this.value)">
                <input type="number" step="0.5" class="inv-input" style="text-align:center" value="${i.espacos || 0}" onchange="updateSub('${i.id}', 'inventario', 'espacos', this.value)">
                <button class="inv-btn-del" onclick="removerSub('${i.id}', 'inventario')">X</button>
            </div>`;
        }).join('');
        document.getElementById('lista-inventario').innerHTML = html;
        document.getElementById('peso-atual').innerText = pesoTotal;
    }

    async function novoRitual() { await db.collection("fichas").doc(atual).collection("rituais").add({ nome: "Novo Ritual", elemento: "Morte", descricao: "" }); }
    async function novoPoder() { await db.collection("fichas").doc(atual).collection("poderes").add({ nome: "Novo Poder", elemento: "Geral", descricao: "" }); }
    async function novaHabilidade() { await db.collection("fichas").doc(atual).collection("habilidades").add({ nome: "Nova Habilidade", descricao: "" }); }
    async function novaArma() { await db.collection("fichas").doc(atual).collection("armas").add({ nome: "Nova Arma" }); }
    async function novoItem() { await db.collection("fichas").doc(atual).collection("inventario").add({ nome: "Novo Item", categoria: "I", espacos: 1 }); }
    
    async function updateSub(id, col, campo, valor) { 
        let o = {}; o[campo] = valor; 
        if (col === 'rituais') menusAbertos.add('rit-' + id);
        if (col === 'poderes') menusAbertos.add('pod-' + id);
        if (col === 'habilidades') menusAbertos.add('hab-' + id);
        if (col === 'armas') menusAbertos.add('arma-' + id);
        await db.collection("fichas").doc(atual).collection(col).doc(id).update(o); 
    }
    
    async function removerSub(id, col) { if(confirm("Excluir?")) await db.collection("fichas").doc(atual).collection(col).doc(id).delete(); }
    
    function toggleElem(id) { 
        const b = document.getElementById(id); 
        if(!b) return;
        if(b.style.display === 'block') {
            b.style.display = 'none';
            menusAbertos.delete(id);
        } else {
            b.style.display = 'block';
            menusAbertos.add(id);
        }
    }
    
    function mudarAba(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const aba = document.getElementById('aba-' + id);
        if(aba) aba.classList.add('active');
        if(event && event.currentTarget) event.currentTarget.classList.add('active');
    }

    auth.onAuthStateChanged(user => {
        if (user) { init(); } 
        else { window.location.href = "index.html"; }
    });
</script>
</body>
</html>
