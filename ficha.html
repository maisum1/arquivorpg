<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Agente Completo</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --cris-purple: #6d28d9;
            --hp-red: #ff0000;
            --san-blue: #00f2ff;
            --pe-yellow: #f4ff00;
            --bg-dark: #090909;
            --san-purple: #034374; /* Cor original para a barra da ficha */
            --pe-orange: #5A0C92;  /* Cor original para a barra da ficha */
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 20px;
        }

        /* --- PORTRAIT ANIMADO PARA LIVE (ESTILO HEXATOMBE) --- */
        .live-portrait-container {
            position: fixed; top: 20px; right: 20px; width: 250px; height: 350px;
            z-index: 999; pointer-events: none; text-align: center;
        }
        #live-img {
            width: 100%; height: 100%; object-fit: contain;
            transition: all 0.5s ease; filter: drop-shadow(0 0 10px rgba(109, 40, 217, 0.5));
        }
        .live-info {
            position: absolute; bottom: -60px; width: 100%;
            font-family: 'Special Elite'; text-shadow: 2px 2px 4px #000;
        }
        .neon-bar { height: 6px; margin: 4px 0; border-radius: 3px; transition: width 0.3s; }
        .dead { filter: brightness(0) grayscale(1) !important; }
        .dying { animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 
            0% { opacity: 1; filter: drop-shadow(0 0 5px red); } 
            50% { opacity: 0.6; filter: sepia(1) saturate(8) hue-rotate(-50deg) drop-shadow(0 0 20px red); } 
            100% { opacity: 1; filter: drop-shadow(0 0 5px red); } 
        }

        /* --- ESTILOS ORIGINAIS --- */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .grid-container {
            display: grid;
            grid-template-columns: 320px 400px 1fr;
            gap: 25px;
            max-width: 1650px;
            margin: 0 auto;
        }

        .header-name { width: 100%; background: transparent; border: none; border-bottom: 2px solid #333; color: #fff; font-family: 'Special Elite'; font-size: 24px; padding: 5px 0; margin-bottom: 10px; outline: none; }
        .header-sub-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .sub-input-group { flex: 1; display: flex; flex-direction: column; }
        .sub-input-group label { font-size: 10px; color: #888; font-weight: bold; margin-bottom: 5px; font-family: 'Roboto'; text-transform: uppercase; }
        .sub-input-group input, .sub-input-group select { background: transparent; border: none; border-bottom: 1px solid #333; color: #fff; font-family: 'Special Elite'; font-size: 16px; padding: 5px 0; outline: none; }
        .sub-input-group select option { background: #111; color: #ccc; }

        /* --- CONFIGURAÇÕES DE IMAGEM E ESTADOS --- */
        .config-box { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 5px; margin-top: 15px; border: 1px solid #222; }
        .config-box input { width: 100%; background: #000; border: 1px solid #333; color: #888; font-size: 10px; margin-bottom: 5px; padding: 4px; outline: none; }
        
        .status-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .btn-status { background: #1a1a1a; border: 1px solid #333; color: #666; padding: 6px; cursor: pointer; font-size: 9px; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .btn-status.active { background: var(--cris-purple); color: #fff; border-color: #fff; }
        .btn-status.danger.active { background: #b31d1d; }

        .lesao-ui { background: #000; padding: 8px; margin-top: 8px; border-radius: 4px; display: none; }
        .show { display: block !important; }

        /* --- RESTO DO CSS DA FICHA (3) --- */
        .sigilo-container { position: relative; width: 260px; height: 260px; margin: 0 auto 10px auto; background: url('https://www.ordemparanormal.com.br/assets/rituais/circulo_atributos.png') no-repeat center; background-size: contain; }
        .attr-box { position: absolute; width: 55px; height: 55px; background: #090909; border: 2px solid #fff; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .attr-label { font-size: 9px; font-weight: bold; color: #888; margin-top: -2px; }
        .attr-box input { background: transparent; border: none; color: #fff; text-align: center; width: 100%; font-size: 22px; font-family: 'Special Elite'; font-weight: bold; outline: none; }
        .agi { top: 0; left: 102px; } .for { top: 75px; left: 5px; } .int { top: 75px; right: 5px; } .pre { bottom: 20px; left: 45px; } .vig { bottom: 20px; right: 45px; }

        .mid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; font-family: 'Special Elite'; }
        .stat-box { border: 1px solid #333; background: #0a0a0a; padding: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .stat-box label { font-size: 10px; color: #888; font-weight: bold; font-family: 'Roboto', sans-serif; text-transform: uppercase; }
        .stat-box select, .stat-box input { background: transparent; border: none; color: #fff; font-family: 'Special Elite'; font-size: 18px; text-align: center; width: 100%; outline: none; cursor: pointer; }
        .stat-box select option { background: #111; color: #fff; }
        .desloc-box { grid-column: span 2; flex-direction: column-reverse; }

        .status-container { margin-bottom: 12px; }
        .status-header { font-size: 11px; font-weight: bold; color: #aaa; text-align: center; margin-bottom: 4px; }
        .bar-bg { width: 100%; height: 32px; background: #111; position: relative; border: 1px solid #222; overflow: hidden; display: flex; align-items: center; }
        .bar-fill { height: 100%; transition: width 0.4s; position: absolute; top: 0; left: 0; opacity: 0.8; }
        .bar-content { position: relative; z-index: 2; width: 100%; display: flex; justify-content: space-between; padding: 0 10px; font-weight: bold; font-family: 'Special Elite'; align-items: center; }
        .bar-content input { background: transparent; border: none; color: #fff; width: 35px; text-align: center; font-size: 16px; font-family: 'Special Elite'; outline: none; }
        .bar-btn { cursor: pointer; color: #fff; font-size: 18px; opacity: 0.6; user-select: none; }

        .pericias-box { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 5px; border: 1px solid #111; }
        .pericia-header { display: grid; grid-template-columns: 1.5fr 60px 50px 50px 45px; font-size: 10px; color: #666; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; align-items: center; text-align: center; }
        .pericia-header > span:first-child { text-align: left; }
        .pericia-row { display: grid; grid-template-columns: 1.5fr 60px 50px 50px 45px; gap: 5px; padding: 6px 4px; border-bottom: 1px solid #1a1a1a; font-size: 13px; align-items: center; text-align: center; }
        .pericia-row > span:first-child { text-align: left; }
        .pericia-nome { cursor: pointer; color: #e0e0e0; position: relative; }
        .pericia-nome::after { content: ' ▼'; font-size: 8px; opacity: 0.5; }
        .pericia-desc { display: none; background: rgba(0,0,0,0.4); border-left: 2px solid var(--cris-purple); padding: 8px 10px; font-size: 11px; color: #aaa; margin-bottom: 4px; line-height: 1.4; }
        .treino-select { background: #0a0a0a; color: #ccc; border: 1px solid #333; font-size: 11px; text-align: center; width: 100%; border-radius: 2px; outline: none; padding: 2px; }

        .p-verde { background: rgba(34, 197, 94, 0.1) !important; }
        .p-azul { background: rgba(59, 130, 246, 0.1) !important; }
        .p-laranja { background: rgba(255, 180, 68, 0.1) !important; }
        .p-vermelho { background: rgba(239, 0, 0, 0.1) !important; }

        .defesa-grid { display: flex; align-items: center; gap: 20px; margin-top: 10px; margin-bottom: 20px; }
        .defesa-shield { width: 70px; height: 75px; background: url('https://www.ordemparanormal.com.br/assets/rituais/escudo_defesa.png') no-repeat center; background-size: contain; display: flex; align-items: center; justify-content: center; font-family: 'Special Elite'; font-size: 24px; font-weight: bold; flex-shrink: 0; }
        .defesa-colunas { display: flex; gap: 20px; flex: 1; justify-content: space-between; }
        .def-item { display: flex; flex-direction: column; align-items: center; }
        .def-label { font-size: 10px; color: #aaa; font-weight: bold; text-transform: uppercase; }
        .def-val-total { font-size: 20px; font-family: 'Special Elite'; border-bottom: 1px solid #fff; min-width: 45px; text-align: center; }

        .tabs-nav { display: flex; gap: 5px; border-bottom: 1px solid #333; margin-bottom: 15px; }
        .tab-btn { background: transparent; border: none; color: #666; padding: 10px 15px; cursor: pointer; font-size: 12px; text-transform: uppercase; font-weight: bold; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid var(--cris-purple); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .ritual-card { background: #121212; border-left: 4px solid #555; margin-bottom: 10px; border-radius: 0 4px 4px 0; }
        .card-header { padding: 12px; cursor: pointer; display: flex; justify-content: space-between; background: rgba(255,255,255,0.03); align-items: center; font-family: 'Special Elite'; }
        .card-body { padding: 15px; display: none; border-top: 1px solid #222; }
        .cris-textarea { width: 100%; background: #080808; border: 1px solid #333; color: #ccc; font-size: 13px; padding: 10px; min-height: 80px; box-sizing: border-box; outline: none; }
        .cris-btn { background: var(--cris-purple); border: none; color: #fff; padding: 8px 16px; cursor: pointer; font-size: 11px; font-weight: bold; border-radius: 2px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="live-portrait-container">
    <img id="live-img" src="" alt="Portrait">
    <div class="live-info">
        <div id="live-nome" style="font-size: 18px; color: #fff; margin-bottom: 5px; text-transform: uppercase;">Agente</div>
        <div class="neon-bar" id="live-bar-hp" style="background: var(--hp-red); box-shadow: 0 0 10px var(--hp-red);"></div>
        <div class="neon-bar" id="live-bar-san" style="background: var(--san-blue); box-shadow: 0 0 10px var(--san-blue);"></div>
        <div class="neon-bar" id="live-bar-pe" style="background: var(--pe-yellow); box-shadow: 0 0 10px var(--pe-yellow);"></div>
        <div id="live-estado-texto" style="font-size: 10px; color: #ff0000; margin-top: 5px; font-weight: bold;"></div>
    </div>
</div>

<div class="grid-container">
    <section>
        <div style="margin-bottom: 20px;">
            <button onclick="window.location.href='index.html'" class="cris-btn" style="background: #222; border: 1px solid #444;">← VOLTAR AO HUB</button>
        </div>

        <input type="text" id="nome-personagem" class="header-name" placeholder="NOME DO AGENTE" onchange="salvarFicha()">
        
        <div class="config-box">
            <span style="font-size: 10px; font-weight: bold; color: var(--cris-purple)">PORTRAIT LINKS (IMG)</span>
            <input type="text" id="img-normal" placeholder="URL Imagem Normal" onchange="salvarFicha()">
            <input type="text" id="img-machucado" placeholder="URL Imagem Machucado (50%)" onchange="salvarFicha()">
            <input type="text" id="img-morrendo" placeholder="URL Imagem Morrendo (0 PV)" onchange="salvarFicha()">
            
            <div class="status-btn-group">
                <button id="btn-morrendo" class="btn-status danger" onclick="toggleEstado('morrendo')">Morrendo</button>
                <button id="btn-enlouquecendo" class="btn-status danger" onclick="toggleEstado('enlouquecendo')">Enlouquecendo</button>
                <button id="btn-lesionado" class="btn-status" onclick="toggleEstado('lesionado')">Lesionado</button>
                <button id="btn-morto" class="btn-status danger" onclick="toggleEstado('morto')">Morto</button>
            </div>

            <div id="ui-morrendo" class="lesao-ui">
                <span style="font-size:9px; color:#888">TURNOS EM MORRENDO:</span>
                <input type="number" id="turnos-morrendo" style="width:100%; background:transparent; border:none; color:red; font-family:'Special Elite'; font-size:16px;" onchange="salvarFicha()">
            </div>

            <div id="ui-lesionado" class="lesao-ui">
                <span style="font-size:9px; color:#888">LOCAL DA LESÃO:</span>
                <select id="local-lesao" class="treino-select" style="text-align:left; padding:5px; font-size:12px;" onchange="salvarFicha()">
                    <option value="Membros Superiores">Membros Superiores</option>
                    <option value="Membros Inferiores">Membros Inferiores</option>
                    <option value="Tórax">Tórax</option>
                    <option value="Crânio">Crânio</option>
                </select>
            </div>

            <div style="margin-top:10px;">
                <label style="font-size:11px; cursor:pointer"><input type="checkbox" id="tem-sequela" onchange="toggleSequela()"> SEQUELA PERMANENTE</label>
                <div id="ui-sequela" style="display:none; margin-top:5px;">
                    <textarea id="desc-sequela" class="cris-textarea" style="min-height:50px; font-size:11px;" placeholder="Descreva a sequela..." onchange="salvarFicha()"></textarea>
                </div>
            </div>
        </div>

        <div class="sigilo-container" style="margin-top:20px;">
            <div class="attr-box agi"><span class="attr-label">AGI</span><input type="number" id="attr-agi" onchange="salvarFicha()"></div>
            <div class="attr-box for"><span class="attr-label">FOR</span><input type="number" id="attr-for" onchange="salvarFicha()"></div>
            <div class="attr-box int"><span class="attr-label">INT</span><input type="number" id="attr-int" onchange="salvarFicha()"></div>
            <div class="attr-box pre"><span class="attr-label">PRE</span><input type="number" id="attr-pre" onchange="salvarFicha()"></div>
            <div class="attr-box vig"><span class="attr-label">VIG</span><input type="number" id="attr-vig" onchange="salvarFicha()"></div>
        </div>

        <div class="status-container">
            <div class="status-header">VIDA</div>
            <div class="bar-bg">
                <div id="bar-vida" class="bar-fill" style="background:var(--hp-red)"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('vida', -1)">-</span>
                    <div><input type="number" id="vida-atual" onchange="salvarFicha()"> / <input type="number" id="vida-max" onchange="salvarFicha()"></div>
                    <span class="bar-btn" onclick="ajustar('vida', 1)">+</span>
                </div>
            </div>
        </div>
        <div class="status-container">
            <div class="status-header">SANIDADE</div>
            <div class="bar-bg">
                <div id="bar-san" class="bar-fill" style="background:var(--san-purple)"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('san', -1)">-</span>
                    <div><input type="number" id="san-atual" onchange="salvarFicha()"> / <input type="number" id="san-max" onchange="salvarFicha()"></div>
                    <span class="bar-btn" onclick="ajustar('san', 1)">+</span>
                </div>
            </div>
        </div>
        <div class="status-container">
            <div class="status-header">ESFORÇO</div>
            <div class="bar-bg">
                <div id="bar-pe" class="bar-fill" style="background:var(--pe-orange)"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('pe', -1)">-</span>
                    <div><input type="number" id="pe-atual" onchange="salvarFicha()"> / <input type="number" id="pe-max" onchange="salvarFicha()"></div>
                    <span class="bar-btn" onclick="ajustar('pe', 1)">+</span>
                </div>
            </div>
        </div>
    </section>

    <section class="pericias-box">
        <h3 style="font-family:'Special Elite'; margin-top:0;">PERÍCIAS</h3>
        <div class="pericia-header">
            <span>Nome</span> <span>Atrib.</span> <span>Bônus</span> <span>Treino</span> <span>Soma</span>
        </div>
        <div id="lista-pericias"></div>
    </section>

    <section>
        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="mudarAba('combate')">Combate</button>
            <button class="tab-btn" onclick="mudarAba('habilidades')">Habilidades</button>
            <button class="tab-btn" onclick="mudarAba('rituais')">Rituais</button>
            <button class="tab-btn" onclick="mudarAba('poderes')">Poderes</button>
        </nav>

        <div id="aba-combate" class="tab-content active">
            <div class="defesa-grid" style="background: rgba(255,255,255,0.03); padding: 10px; border-radius: 5px;">
                <div class="defesa-shield" id="display-defesa">10</div>
                <div class="defesa-colunas">
                    <div class="def-item">
                        <label class="def-label">DEFESA</label>
                        <input type="number" id="bonus-defesa" class="treino-select" style="width:40px" onchange="salvarFicha()">
                    </div>
                    <div class="def-item">
                        <label class="def-label">BLOQUEIO</label>
                        <div class="def-val-total" id="display-bloqueio">0</div>
                    </div>
                    <div class="def-item">
                        <label class="def-label">ESQUIVA</label>
                        <div class="def-val-total" id="display-esquiva">10</div>
                    </div>
                </div>
            </div>
            <div style="margin-top:15px">
                <label style="font-size:10px; color:#666">PROTEÇÃO</label>
                <input type="text" id="info-prot" class="header-name" style="font-size:14px" onchange="salvarFicha()">
            </div>
        </div>

        <div id="aba-rituais" class="tab-content">
            <button class="cris-btn" onclick="novoRitual()" style="margin-bottom:15px;">+ Novo Ritual</button>
            <div id="lista-rituais"></div>
        </div>

        <div id="aba-poderes" class="tab-content">
            <button class="cris-btn" onclick="novoPoder()" style="margin-bottom:15px;">+ Novo Poder</button>
            <div id="lista-poderes"></div>
        </div>

        <div id="aba-habilidades" class="tab-content">
            <button class="cris-btn" onclick="novaHabilidade()" style="margin-bottom:15px;">+ Nova Habilidade</button>
            <div id="lista-habilidades"></div>
        </div>
    </section>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
        authDomain: "fichasrpg-7fc69.firebaseapp.com",
        projectId: "fichasrpg-7fc69",
        storageBucket: "fichasrpg-7fc69.firebasestorage.app",
        messagingSenderId: "758802032764",
        appId: "1:758802032764:web:40467e15fdc24c570081f9",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    let atual = urlParams.get('id');

    // BANCO DE PERÍCIAS ORIGINAL
    const bancoPericias = {
        "Acrobacia": { attr: "AGI", desc: "Equilíbrio e quedas." },
        "Atletismo": { attr: "FOR", desc: "Correr, nadar, pular." },
        "Atualidades": { attr: "INT", desc: "Conhecimento do mundo." },
        "Ciências": { attr: "INT", desc: "Física, Química, etc." },
        "Crime": { attr: "AGI", desc: "Arrombar, furtar." },
        "Diplomacia": { attr: "PRE", desc: "Persuadir com calma." },
        "Enganação": { attr: "PRE", desc: "Mentir e blefar." },
        "Fortitude": { attr: "VIG", desc: "Resistência física." },
        "Furtividade": { attr: "AGI", desc: "Passar despercebido." },
        "Intuição": { attr: "PRE", desc: "Ler intenções." },
        "Investigação": { attr: "INT", desc: "Analisar pistas." },
        "Luta": { attr: "FOR", desc: "Combate corpo a corpo." },
        "Medicina": { attr: "INT", desc: "Tratar ferimentos." },
        "Ocultismo": { attr: "INT", desc: "Conhecimento paranormal." },
        "Percepção": { attr: "PRE", desc: "Notar coisas." },
        "Pontaria": { attr: "AGI", desc: "Armas de fogo." },
        "Reflexos": { attr: "AGI", desc: "Reação rápida." },
        "Religião": { attr: "PRE", desc: "Teologia e seitas." },
        "Sobrevivência": { attr: "INT", desc: "Orientação e caça." },
        "Tática": { attr: "INT", desc: "Plano de combate." },
        "Tecnologia": { attr: "INT", desc: "Hackear sistemas." },
        "Vontade": { attr: "PRE", desc: "Resistência mental." }
    };

    let estados = { morrendo: false, enlouquecendo: false, lesionado: false, morto: false };

    async function init() {
        if (!atual) { window.location.href = "index.html"; } 
        else {
            gerarPericiasBase();
            carregarFicha();
            carregarRituais();
            carregarPoderes();
            carregarHabilidades();
        }
    }

    function gerarPericiasBase() {
        document.getElementById('lista-pericias').innerHTML = Object.keys(bancoPericias).map(p => {
            return `
            <div class="pericia-row" id="row-${p}">
                <span class="pericia-nome" onclick="toggleDesc('${p}')">${p}</span>
                <select id="attr-${p}" class="treino-select" onchange="salvarFicha()" style="border:none; background:transparent;">
                    <option value="AGI">AGI</option><option value="FOR">FOR</option><option value="INT">INT</option><option value="PRE">PRE</option><option value="VIG">VIG</option>
                </select>
                <input type="number" id="bonus-${p}" class="treino-select" value="0" onchange="salvarFicha()" style="border:none; background:transparent; width:30px">
                <select id="treino-${p}" class="treino-select" onchange="atualizarCorPericia('${p}', this.value); salvarFicha();">
                    <option value="0">0</option><option value="5">5</option><option value="10">10</option><option value="15">15</option><option value="20">20</option>
                </select>
                <span id="total-${p}" style="font-family:'Special Elite'; color:var(--cris-purple);">0</span>
            </div>
            <div id="desc-${p}" class="pericia-desc">${bancoPericias[p].desc}</div>`;
        }).join('');
    }

    function carregarFicha() {
        db.collection("fichas").doc(atual).onSnapshot(doc => {
            const d = doc.data();
            if(!d) return;
            
            document.getElementById('nome-personagem').value = d.nome || "";
            document.getElementById('live-nome').innerText = (d.nome || "Agente").toUpperCase();
            
            // Portrait Links
            document.getElementById('img-normal').value = d.imgNormal || "";
            document.getElementById('img-machucado').value = d.imgMachucado || "";
            document.getElementById('img-morrendo').value = d.imgMorrendo || "";

            // Atributos
            ['agi','for','int','pre','vig'].forEach(a => { if(d[a] !== undefined) document.getElementById(`attr-${a}`).value = d[a]; });

            // Status
            atualizarStatus('vida', d.vidaAtual ?? 20, d.vidaMax ?? 20);
            atualizarStatus('san', d.sanAtual ?? 20, d.sanMax ?? 20);
            atualizarStatus('pe', d.peAtual ?? 5, d.peMax ?? 5);

            // Estados e UI
            estados = d.estados || { morrendo: false, enlouquecendo: false, lesionado: false, morto: false };
            atualizarBotoesEstado();
            
            document.getElementById('turnos-morrendo').value = d.turnosMorrendo || 0;
            document.getElementById('local-lesao').value = d.localLesao || "Membros Superiores";
            document.getElementById('tem-sequela').checked = d.temSequela || false;
            document.getElementById('desc-sequela').value = d.descSequela || "";
            document.getElementById('ui-sequela').style.display = d.temSequela ? 'block' : 'none';

            // Perícias
            let fortTreino = 0;
            if(d.pericias) {
                Object.keys(bancoPericias).forEach(p => {
                    const dados = d.pericias[p] || { bonus: 0, treino: 0, atributo: bancoPericias[p].attr };
                    document.getElementById(`bonus-${p}`).value = dados.bonus;
                    document.getElementById(`treino-${p}`).value = dados.treino;
                    document.getElementById(`attr-${p}`).value = dados.atributo || bancoPericias[p].attr;
                    document.getElementById(`total-${p}`).innerText = (parseInt(dados.bonus) || 0) + (parseInt(dados.treino) || 0);
                    atualizarCorPericia(p, dados.treino);
                    if(p === "Fortitude") fortTreino = parseInt(dados.treino);
                });
            }

            // Defesa
            const bDef = parseInt(d.bonusDefesa) || 0;
            const agi = parseInt(d.agi) || 0;
            document.getElementById('display-defesa').innerText = 10 + agi + bDef;
            document.getElementById('display-esquiva').innerText = 10 + agi + (d.pericias?.Reflexos?.treino || 0);
            document.getElementById('display-bloqueio').innerText = fortTreino;
            document.getElementById('bonus-defesa').value = bDef;

            atualizarPortraitLive(d);
        });
    }

    function atualizarPortraitLive(d) {
        const img = document.getElementById('live-img');
        const txt = document.getElementById('live-estado-texto');
        let status = "";
        
        let hpPerc = (d.vidaAtual / d.vidaMax) * 100;
        img.className = "";

        if (estados.morto) {
            img.src = d.imgNormal;
            img.classList.add('dead');
            status = "MORTO";
        } else if (estados.morrendo || d.vidaAtual <= 0) {
            img.src = d.imgMorrendo || d.imgNormal;
            img.classList.add('dying');
            status = "MORRENDO";
        } else if (hpPerc <= 50) {
            img.src = d.imgMachucado || d.imgNormal;
            status = "FERIDO";
        } else {
            img.src = d.imgNormal;
        }

        if(estados.enlouquecendo) status = "ENLOUQUECENDO";

        txt.innerText = status;
        document.getElementById('live-bar-hp').style.width = Math.min(hpPerc, 100) + "%";
        document.getElementById('live-bar-san').style.width = Math.min((d.sanAtual/d.sanMax)*100, 100) + "%";
        document.getElementById('live-bar-pe').style.width = Math.min((d.peAtual/d.peMax)*100, 100) + "%";
    }

    function toggleEstado(est) {
        estados[est] = !estados[est];
        salvarFicha();
    }

    function atualizarBotoesEstado() {
        for (let key in estados) {
            const btn = document.getElementById('btn-' + key);
            if(estados[key]) btn.classList.add('active');
            else btn.classList.remove('active');
        }
        document.getElementById('ui-morrendo').style.display = estados.morrendo ? 'block' : 'none';
        document.getElementById('ui-lesionado').style.display = estados.lesionado ? 'block' : 'none';
    }

    function toggleSequela() {
        const checked = document.getElementById('tem-sequela').checked;
        document.getElementById('ui-sequela').style.display = checked ? 'block' : 'none';
        salvarFicha();
    }

    function salvarFicha() {
        const periciasObj = {};
        Object.keys(bancoPericias).forEach(p => {
            periciasObj[p] = {
                bonus: parseInt(document.getElementById(`bonus-${p}`).value) || 0,
                treino: parseInt(document.getElementById(`treino-${p}`).value) || 0,
                atributo: document.getElementById(`attr-${p}`).value
            };
        });

        db.collection("fichas").doc(atual).update({
            nome: document.getElementById('nome-personagem').value,
            imgNormal: document.getElementById('img-normal').value,
            imgMachucado: document.getElementById('img-machucado').value,
            imgMorrendo: document.getElementById('img-morrendo').value,
            agi: parseInt(document.getElementById('attr-agi').value) || 0,
            for: parseInt(document.getElementById('attr-for').value) || 0,
            int: parseInt(document.getElementById('attr-int').value) || 0,
            pre: parseInt(document.getElementById('attr-pre').value) || 0,
            vig: parseInt(document.getElementById('attr-vig').value) || 0,
            vidaAtual: parseInt(document.getElementById('vida-atual').value) || 0,
            vidaMax: parseInt(document.getElementById('vida-max').value) || 1,
            sanAtual: parseInt(document.getElementById('san-atual').value) || 0,
            sanMax: parseInt(document.getElementById('san-max').value) || 1,
            peAtual: parseInt(document.getElementById('pe-atual').value) || 0,
            peMax: parseInt(document.getElementById('pe-max').value) || 1,
            pericias: periciasObj,
            estados: estados,
            turnosMorrendo: document.getElementById('turnos-morrendo').value,
            localLesao: document.getElementById('local-lesao').value,
            temSequela: document.getElementById('tem-sequela').checked,
            descSequela: document.getElementById('desc-sequela').value,
            bonusDefesa: parseInt(document.getElementById('bonus-defesa').value) || 0
        });
    }

    // --- FUNÇÕES DE INTERFACE (ORIGINAIS) ---
    function ajustar(t, v) {
        const input = document.getElementById(`${t}-atual`);
        input.value = (parseInt(input.value) || 0) + v;
        salvarFicha();
    }

    function atualizarStatus(tipo, at, mx) {
        document.getElementById(`${tipo}-atual`).value = at;
        document.getElementById(`${tipo}-max`).value = mx;
        document.getElementById(`bar-${tipo}`).style.width = Math.min((at / mx) * 100, 100) + "%";
    }

    function atualizarCorPericia(nome, valor) {
        const el = document.getElementById(`row-${nome}`);
        el.className = 'pericia-row';
        if(valor == "5") el.classList.add('p-verde');
        else if(valor == "10") el.classList.add('p-azul');
        else if(valor == "15") el.classList.add('p-laranja');
        else if(valor == "20") el.classList.add('p-vermelho');
    }

    function toggleDesc(id) {
        const d = document.getElementById('desc-'+id);
        d.style.display = d.style.display === 'block' ? 'none' : 'block';
    }

    function mudarAba(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- RITUAIS, PODERES E HABILIDADES (COMPLETO) ---
    function carregarRituais() {
        db.collection("fichas").doc(atual).collection("rituais").onSnapshot(snap => {
            const container = document.getElementById('lista-rituais');
            container.innerHTML = "";
            snap.forEach(doc => {
                const r = doc.data();
                container.innerHTML += `<div class="ritual-card"><div class="card-header" onclick="toggleElem('rit-${doc.id}')"><span>${r.nome || 'Novo Ritual'}</span></div><div class="card-body" id="rit-${doc.id}"><textarea class="cris-textarea" onchange="updateSub('${doc.id}', 'rituais', 'descricao', this.value)">${r.descricao || ""}</textarea><button class="cris-btn" style="background:#444; margin-top:5px" onclick="removerSub('${doc.id}', 'rituais')">Remover</button></div></div>`;
            });
        });
    }

    function carregarPoderes() {
        db.collection("fichas").doc(atual).collection("poderes").onSnapshot(snap => {
            const container = document.getElementById('lista-poderes');
            container.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                container.innerHTML += `<div class="ritual-card"><div class="card-header" onclick="toggleElem('pod-${doc.id}')"><span>${p.nome || 'Novo Poder'}</span></div><div class="card-body" id="pod-${doc.id}"><textarea class="cris-textarea" onchange="updateSub('${doc.id}', 'poderes', 'descricao', this.value)">${p.descricao || ""}</textarea><button class="cris-btn" style="background:#444; margin-top:5px" onclick="removerSub('${doc.id}', 'poderes')">Remover</button></div></div>`;
            });
        });
    }

    function carregarHabilidades() {
        db.collection("fichas").doc(atual).collection("habilidades").onSnapshot(snap => {
            const container = document.getElementById('lista-habilidades');
            container.innerHTML = "";
            snap.forEach(doc => {
                const h = doc.data();
                container.innerHTML += `<div class="ritual-card"><div class="card-header" onclick="toggleElem('hab-${doc.id}')"><span>${h.nome || 'Nova Habilidade'}</span></div><div class="card-body" id="hab-${doc.id}"><textarea class="cris-textarea" onchange="updateSub('${doc.id}', 'habilidades', 'descricao', this.value)">${h.descricao || ""}</textarea><button class="cris-btn" style="background:#444; margin-top:5px" onclick="removerSub('${doc.id}', 'habilidades')">Remover</button></div></div>`;
            });
        });
    }

    async function novoRitual() { await db.collection("fichas").doc(atual).collection("rituais").add({ nome: "Novo Ritual", descricao: "" }); }
    async function novoPoder() { await db.collection("fichas").doc(atual).collection("poderes").add({ nome: "Novo Poder", descricao: "" }); }
    async function novaHabilidade() { await db.collection("fichas").doc(atual).collection("habilidades").add({ nome: "Nova Habilidade", descricao: "" }); }
    async function updateSub(id, col, campo, valor) { let o = {}; o[campo] = valor; await db.collection("fichas").doc(atual).collection(col).doc(id).update(o); }
    async function removerSub(id, col) { if(confirm("Excluir?")) await db.collection("fichas").doc(atual).collection(col).doc(id).delete(); }
    function toggleElem(id) { const b = document.getElementById(id); b.style.display = b.style.display === 'block' ? 'none' : 'block'; }

    firebase.auth().onAuthStateChanged(user => { if (user) init(); else window.location.href = "index.html"; });
</script>
</body>
</html>
