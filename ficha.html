<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Agente Completo</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --cris-purple: #6d28d9;
            --hp-red: #b31d1d;
            --san-purple: #034374;
            --pe-orange: #5A0C92;
            --bg-dark: #090909;
            
            /* CORES DOS ELEMENTOS E ESTILO CTHULHU */
            --cor-morte: #1a1a1a;
            --cor-sangue: #8b0000;
            --cor-energia: #800080;
            --cor-conhecimento: #b8860b;
            --cor-medo: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 20px;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 320px 400px 1fr;
            gap: 25px;
            max-width: 1650px;
            margin: 0 auto;
        }

        .header-name {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #333;
            color: #fff;
            font-family: 'Special Elite';
            font-size: 24px;
            padding: 5px 0;
            margin-bottom: 10px;
            outline: none;
        }

        .header-sub-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .sub-input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .sub-input-group label {
            font-size: 10px;
            color: #888;
            font-weight: bold;
            margin-bottom: 5px;
            font-family: 'Roboto';
            text-transform: uppercase;
        }

        .sub-input-group input, .sub-input-group select {
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: #fff;
            font-family: 'Special Elite';
            font-size: 16px;
            padding: 5px 0;
            outline: none;
        }

        .sub-input-group select option {
            background: #111;
            color: #ccc;
        }

        /* ESTILO DOS ELEMENTOS */
        .elem-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 5px;
        }
        .elem-box {
            flex: 1;
            text-align: center;
            border-top: 2px solid #333;
            padding-top: 5px;
            font-size: 9px;
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
        }
        .elem-box input {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            text-align: center;
            font-family: 'Special Elite';
            font-size: 16px;
            margin-top: 5px;
            outline: none;
        }

        /* ATRIBUTOS HEXÁGONO */
        .sigilo-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto 10px auto;
            background: url('https://www.ordemparanormal.com.br/assets/rituais/circulo_atributos.png') no-repeat center;
            background-size: contain;
        }

        .attr-box {
            position: absolute;
            width: 55px;
            height: 55px;
            background: #090909;
            border: 2px solid #fff;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .attr-label {
            font-size: 9px;
            font-weight: bold;
            color: #888;
            margin-top: -2px;
        }

        .attr-box input {
            background: transparent;
            border: none;
            color: #fff;
            text-align: center;
            width: 100%;
            font-size: 22px;
            font-family: 'Special Elite';
            font-weight: bold;
            outline: none;
        }

        .agi { top: 0; left: 102px; }
        .for { top: 75px; left: 5px; }
        .int { top: 75px; right: 5px; }
        .pre { bottom: 20px; left: 45px; }
        .vig { bottom: 20px; right: 45px; }

        .status-container {
            margin-bottom: 12px;
        }

        .status-header {
            font-size: 11px;
            font-weight: bold;
            color: #aaa;
            text-align: center;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .bar-bg {
            width: 100%;
            height: 32px;
            background: #111;
            position: relative;
            border: 1px solid #222;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.4s;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.8;
        }

        .bar-content {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            font-weight: bold;
            font-family: 'Special Elite';
            align-items: center;
        }

        .bar-content input {
            background: transparent;
            border: none;
            color: #fff;
            width: 35px;
            text-align: center;
            font-size: 16px;
            font-family: 'Special Elite';
            outline: none;
        }

        .bar-btn {
            cursor: pointer;
            color: #fff;
            font-size: 18px;
            opacity: 0.6;
            user-select: none;
        }

        .bar-btn:hover { opacity: 1; }

        /* ESTILOS DOS NOVOS BOTÕES DE ESTADO */
        .container-estados {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #222;
        }

        .btn-estado {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #666;
            padding: 10px;
            cursor: pointer;
            font-family: 'Special Elite';
            font-size: 13px;
            text-align: center;
            transition: 0.3s;
            border-radius: 4px;
        }

        .btn-estado.active {
            background: var(--cris-purple);
            color: white;
            border-color: #fff;
        }

        .area-selecao {
            display: none;
            padding: 10px;
            background: #000;
            border: 1px dashed #333;
            border-radius: 4px;
            margin-top: -5px;
        }

        .morrendo-checks {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
        }

        .morrendo-checks label {
            font-size: 10px;
            color: #888;
            font-weight: bold;
        }

        .treino-select {
            background: #0a0a0a;
            color: #ccc;
            border: 1px solid #333;
            font-size: 11px;
            text-align: center;
            width: 100%;
            border-radius: 2px;
            outline: none;
            padding: 5px;
        }

        .pericias-box {
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #111;
        }

        .pericia-header {
            display: grid;
            grid-template-columns: 1.5fr 60px 50px 50px 45px;
            font-size: 10px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
            align-items: center;
            text-align: center;
        }

        .pericia-header > span:first-child { text-align: left; }

        .pericia-row {
            display: grid;
            grid-template-columns: 1.5fr 60px 50px 50px 45px;
            gap: 5px;
            padding: 6px 4px;
            border-bottom: 1px solid #1a1a1a;
            font-size: 13px;
            align-items: center;
            text-align: center;
        }

        .pericia-row > span:first-child { text-align: left; }

        .pericia-nome { cursor: pointer; color: #e0e0e0; position: relative; }
        .pericia-nome::after { content: ' ▼'; font-size: 8px; opacity: 0.5; }

        .pericia-desc {
            display: none;
            background: rgba(0,0,0,0.4);
            border-left: 2px solid var(--cris-purple);
            padding: 8px 10px;
            font-size: 11px;
            color: #aaa;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .p-verde { background: rgba(34, 197, 94, 0.1) !important; }
        .p-azul { background: rgba(59, 130, 246, 0.1) !important; }
        .p-laranja { background: rgba(255, 180, 68, 0.1) !important; }
        .p-vermelho { background: rgba(239, 0, 0, 0.1) !important; }

        .defesa-grid {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .defesa-shield {
            width: 70px;
            height: 75px;
            background: url('https://www.ordemparanormal.com.br/assets/rituais/escudo_defesa.png') no-repeat center;
            background-size: contain;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Special Elite';
            font-size: 24px;
            font-weight: bold;
            flex-shrink: 0;
            color: #fff;
        }

        .defesa-colunas {
            display: flex;
            gap: 20px;
            flex: 1;
            justify-content: space-between;
        }

        .def-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .def-label { font-size: 10px; color: #aaa; font-weight: bold; text-transform: uppercase; }
        .def-val-total { font-size: 20px; font-family: 'Special Elite'; border-bottom: 1px solid #fff; min-width: 45px; text-align: center; }

        .tabs-nav {
            display: flex;
            gap: 5px;
            border-bottom: 1px solid #333;
            margin-bottom: 15px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #666;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
            font-family: 'Roboto';
        }

        .tab-btn.active {
            color: #fff;
            border-bottom: 2px solid var(--cris-purple);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .ritual-card {
            background: #121212;
            border-left: 4px solid var(--cris-purple);
            margin-bottom: 10px;
            border-radius: 0 4px 4px 0;
            overflow: hidden;
        }

        .card-header {
            padding: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            align-items: center;
            font-family: 'Special Elite';
        }

        .card-body {
            padding: 15px;
            display: none;
            border-top: 1px solid #222;
        }

        .cris-textarea {
            width: 100%;
            background: #080808;
            border: 1px solid #333;
            color: #ccc;
            font-size: 13px;
            padding: 10px;
            min-height: 80px;
            box-sizing: border-box;
            outline: none;
            font-family: 'Roboto';
        }

        .cris-btn {
            background: var(--cris-purple);
            border: none;
            color: #fff;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            border-radius: 2px;
            text-transform: uppercase;
        }

        .card-input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Special Elite';
            font-size: 16px;
            outline: none;
            width: 60%;
        }

        .elem-select {
            background: #111;
            color: #ccc;
            border: 1px solid #333;
            padding: 2px;
            font-size: 10px;
            outline: none;
        }
    </style>
</head>
<body>

<div class="grid-container">
    <section>
        <div style="margin-bottom: 20px;">
            <button onclick="window.location.href='index.html'" class="cris-btn" style="background: #222; border: 1px solid #444;">← VOLTAR AO HUB</button>
        </div>

        <input type="text" id="nome-personagem" class="header-name" placeholder="NOME DO AGENTE" onchange="salvarFicha()">
        
        <div class="header-sub-row">
            <div class="sub-input-group">
                <label>NEX</label>
                <input type="text" id="info-nex" placeholder="5%" onchange="salvarFicha()">
            </div>
            <div class="sub-input-group">
                <label>CLASSE</label>
                <input type="text" id="info-classe" placeholder="Especialista" onchange="salvarFicha()">
            </div>
            <div class="sub-input-group">
                <label>ORIGEM</label>
                <input type="text" id="info-origem" placeholder="Investigador" onchange="salvarFicha()">
            </div>
        </div>

        <div class="elem-container">
            <div class="elem-box" style="border-color: var(--cor-morte)">Morte<br><input type="number" id="elem-morte" onchange="salvarFicha()"></div>
            <div class="elem-box" style="border-color: var(--cor-sangue)">Sangue<br><input type="number" id="elem-sangue" onchange="salvarFicha()"></div>
            <div class="elem-box" style="border-color: var(--cor-energia)">Energia<br><input type="number" id="elem-energia" onchange="salvarFicha()"></div>
            <div class="elem-box" style="border-color: var(--cor-conhecimento)">Conhecimento<br><input type="number" id="elem-conhecimento" onchange="salvarFicha()"></div>
            <div class="elem-box" style="border-color: var(--cor-medo)">Medo<br><input type="number" id="elem-medo" onchange="salvarFicha()"></div>
        </div>

        <div class="sigilo-container">
            <div class="attr-box agi"><span class="attr-label">AGI</span><input type="number" id="attr-agi" onchange="salvarFicha()"></div>
            <div class="attr-box for"><span class="attr-label">FOR</span><input type="number" id="attr-for" onchange="salvarFicha()"></div>
            <div class="attr-box int"><span class="attr-label">INT</span><input type="number" id="attr-int" onchange="salvarFicha()"></div>
            <div class="attr-box pre"><span class="attr-label">PRE</span><input type="number" id="attr-pre" onchange="salvarFicha()"></div>
            <div class="attr-box vig"><span class="attr-label">VIG</span><input type="number" id="attr-vig" onchange="salvarFicha()"></div>
        </div>

        <div class="status-container">
            <div class="status-header">PONTOS DE VIDA</div>
            <div class="bar-bg">
                <div id="bar-vida" class="bar-fill" style="background:var(--hp-red)"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('vida', -1)">-</span>
                    <div><input type="number" id="vida-atual" onchange="salvarFicha()"> / <input type="number" id="vida-max" onchange="salvarFicha()"></div>
                    <span class="bar-btn" onclick="ajustar('vida', 1)">+</span>
                </div>
            </div>
        </div>

        <div class="status-container">
            <div class="status-header">SANIDADE</div>
            <div class="bar-bg">
                <div id="bar-san" class="bar-fill" style="background:var(--san-purple)"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('san', -1)">-</span>
                    <div><input type="number" id="san-atual" onchange="salvarFicha()"> / <input type="number" id="san-max" onchange="salvarFicha()"></div>
                    <span class="bar-btn" onclick="ajustar('san', 1)">+</span>
                </div>
            </div>
        </div>

        <div class="status-container">
            <div class="status-header">PONTOS DE ESFORÇO</div>
            <div class="bar-bg">
                <div id="bar-pe" class="bar-fill" style="background:var(--pe-orange)"></div>
                <div class="bar-content">
                    <span class="bar-btn" onclick="ajustar('pe', -1)">-</span>
                    <div><input type="number" id="pe-atual" onchange="salvarFicha()"> / <input type="number" id="pe-max" onchange="salvarFicha()"></div>
                    <span class="bar-btn" onclick="ajustar('pe', 1)">+</span>
                </div>
            </div>
        </div>

        <div class="container-estados">
            <button id="btn-enlouquecendo" class="btn-estado" onclick="toggleEstado('enlouquecendo')">Enlouquecendo</button>
            
            <button id="btn-morrendo" class="btn-estado" onclick="toggleEstado('morrendo')">Morrendo</button>
            <div id="ui-morrendo" class="area-selecao">
                <div class="morrendo-checks">
                    <label>T1 <input type="checkbox" id="m-t1" onchange="salvarFicha()"></label>
                    <label>T2 <input type="checkbox" id="m-t2" onchange="salvarFicha()"></label>
                    <label>T3 <input type="checkbox" id="m-t3" onchange="salvarFicha()"></label>
                </div>
            </div>

            <button id="btn-lesionado" class="btn-estado" onclick="toggleEstado('lesionado')">Lesionado</button>
            <div id="ui-lesionado" class="area-selecao">
                <select id="local-lesionado" class="treino-select" onchange="salvarFicha()">
                    <option value="">Selecionar Local...</option>
                    <option value="Membros Superiores">Membros Superiores</option>
                    <option value="Membros Inferiores">Membros Inferiores</option>
                    <option value="Tórax">Tórax</option>
                    <option value="Crânio">Crânio</option>
                </select>
            </div>

            <button id="btn-sequela" class="btn-estado" onclick="toggleEstado('sequela')">Sequelas Permanentes</button>
            <div id="ui-sequela" class="area-selecao">
                <textarea id="desc-sequela" class="cris-textarea" placeholder="Descreva a sequela..." onchange="salvarFicha()"></textarea>
            </div>
        </div>
    </section>

    <section class="pericias-box">
        <h3 style="font-family: 'Special Elite'; margin-top: 0;">PERÍCIAS</h3>
        <div class="pericia-header">
            <span>Nome</span><span>Atrib.</span><span>Bônus</span><span>Treino</span><span>Soma</span>
        </div>
        <div id="lista-pericias"></div>
    </section>

    <section>
        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="mudarAba('combate')">Combate</button>
            <button class="tab-btn" onclick="mudarAba('habilidades')">Habilidades</button>
            <button class="tab-btn" onclick="mudarAba('rituais')">Rituais</button>
        </nav>

        <div id="aba-combate" class="tab-content active">
            <div class="defesa-grid">
                <div class="defesa-shield" id="display-defesa">10</div>
                <div class="defesa-colunas">
                    <div class="def-item"><span class="def-label">BÔNUS DEFESA</span><input type="number" id="bonus-defesa" class="treino-select" value="0" onchange="salvarFicha()"></div>
                    <div class="def-item"><span class="def-label">BLOQUEIO</span><div class="def-val-total" id="display-bloqueio">0</div></div>
                    <div class="def-item"><span class="def-label">ESQUIVA</span><div class="def-val-total" id="display-esquiva">10</div></div>
                </div>
            </div>
            <div id="lista-armas"></div>
            <button class="cris-btn" onclick="novaArma()">+ Nova Arma</button>
        </div>

        <div id="aba-habilidades" class="tab-content">
            <div id="lista-habilidades"></div>
            <button class="cris-btn" onclick="novaHabilidade()">+ Nova Habilidade</button>
        </div>

        <div id="aba-rituais" class="tab-content">
            <div id="lista-rituais"></div>
            <button class="cris-btn" onclick="novoRitual()">+ Novo Ritual</button>
        </div>
    </section>
</div>

        "Sobrevivência": { attr: "INT", desc: "Orientação e caça." },
        "Tática": { attr: "INT", desc: "Plano de combate." },
        "Tecnologia": { attr: "INT", desc: "Computadores e eletrônicos." },
        "Vontade": { attr: "PRE", desc: "Resistência mental." }
    };

    async function init() {
        if (!atual) {
            window.location.href = "index.html";
        } else {
            gerarPericiasBase();
            carregarFicha();
            carregarSubColecao("rituais", "lista-rituais", renderRitual);
            carregarSubColecao("habilidades", "lista-habilidades", renderHabilidade);
            carregarSubColecao("armas", "lista-armas", renderArma);
        }
    }

    function gerarPericiasBase() {
        const lista = document.getElementById('lista-pericias');
        lista.innerHTML = Object.keys(bancoPericias).map(p => {
            return `
            <div class="pericia-row" id="row-${p}">
                <span class="pericia-nome" onclick="toggleDesc('${p}')">${p}</span>
                <span style="font-size:10px; color:#666;">${bancoPericias[p].attr}</span>
                <input type="number" id="bonus-${p}" class="treino-select" value="0" onchange="salvarFicha()" style="width:30px">
                <select id="treino-${p}" class="treino-select" onchange="atualizarCorPericia('${p}', this.value); salvarFicha();">
                    <option value="0">0</option><option value="5">5</option><option value="10">10</option><option value="15">15</option><option value="20">20</option>
                </select>
                <span id="total-${p}" style="font-family:'Special Elite'; color:var(--cris-purple);">0</span>
            </div>
            <div id="desc-${p}" class="pericia-desc">${bancoPericias[p].desc}</div>`;
        }).join('');
    }

    function toggleEstado(est) {
        estadosAtivos[est] = !estadosAtivos[est];
        const btn = document.getElementById('btn-' + est);
        const ui = document.getElementById('ui-' + est);

        if (estadosAtivos[est]) {
            btn.classList.add('active');
            if(ui) ui.style.display = 'block';
        } else {
            btn.classList.remove('active');
            if(ui) ui.style.display = 'none';
        }
        salvarFicha();
    }

    function carregarFicha() {
        db.collection("fichas").doc(atual).onSnapshot(doc => {
            const d = doc.data();
            if(!d) return;

            document.getElementById('nome-personagem').value = d.nome || "";
            document.getElementById('info-nex').value = d.nex || "";
            document.getElementById('info-classe').value = d.classe || "";
            document.getElementById('info-origem').value = d.origem || "";
            
            ['agi','for','int','pre','vig'].forEach(a => { if(d[a] !== undefined) document.getElementById(`attr-${a}`).value = d[a]; });
            ['morte','sangue','energia','conhecimento','medo'].forEach(e => { if(d["elem_"+e] !== undefined) document.getElementById(`elem-${e}`).value = d["elem_"+e]; });

            atualizarStatus('vida', d.vidaAtual ?? 20, d.vidaMax ?? 20);
            atualizarStatus('san', d.sanAtual ?? 20, d.sanMax ?? 20);
            atualizarStatus('pe', d.peAtual ?? 5, d.peMax ?? 5);

            // Carregar Estados
            if (d.estadosAtivos) {
                estadosAtivos = d.estadosAtivos;
                Object.keys(estadosAtivos).forEach(est => {
                    const btn = document.getElementById('btn-' + est);
                    const ui = document.getElementById('ui-' + est);
                    if (estadosAtivos[est]) {
                        btn.classList.add('active');
                        if(ui) ui.style.display = 'block';
                    } else {
                        btn.classList.remove('active');
                        if(ui) ui.style.display = 'none';
                    }
                });
            }
            document.getElementById('m-t1').checked = d.m_t1 || false;
            document.getElementById('m-t2').checked = d.m_t2 || false;
            document.getElementById('m-t3').checked = d.m_t3 || false;
            document.getElementById('local-lesionado').value = d.localLesionado || "";
            document.getElementById('desc-sequela').value = d.descSequela || "";

            let defesaExtra = parseInt(d.bonusDefesa) || 0;
            document.getElementById('bonus-defesa').value = defesaExtra;
            let valAgi = parseInt(d.agi) || 0;
            let reflexosTreino = 0;
            let fortitudeTreino = 0;

            if(d.pericias) {
                Object.keys(bancoPericias).forEach(p => {
                    const pData = d.pericias[p] || { bonus: 0, treino: 0 };
                    document.getElementById(`bonus-${p}`).value = pData.bonus;
                    document.getElementById(`treino-${p}`).value = pData.treino;
                    let soma = valAgi + parseInt(pData.bonus) + parseInt(pData.treino); 
                    document.getElementById(`total-${p}`).innerText = soma;
                    atualizarCorPericia(p, pData.treino);
                    if (p === "Reflexos") reflexosTreino = parseInt(pData.treino);
                    if (p === "Fortitude") fortitudeTreino = parseInt(pData.treino);
                });
            }
            document.getElementById('display-defesa').innerText = 10 + valAgi + defesaExtra;
            document.getElementById('display-esquiva').innerText = 10 + valAgi + defesaExtra + reflexosTreino;
            document.getElementById('display-bloqueio').innerText = fortitudeTreino;
        });
    }

    function salvarFicha() {
        const periciasObj = {};
        Object.keys(bancoPericias).forEach(p => {
            periciasObj[p] = {
                bonus: parseInt(document.getElementById(`bonus-${p}`).value) || 0,
                treino: parseInt(document.getElementById(`treino-${p}`).value) || 0
            };
        });

        db.collection("fichas").doc(atual).update({
            nome: document.getElementById('nome-personagem').value,
            nex: document.getElementById('info-nex').value,
            classe: document.getElementById('info-classe').value,
            origem: document.getElementById('info-origem').value,
            agi: parseInt(document.getElementById('attr-agi').value) || 0,
            for: parseInt(document.getElementById('attr-for').value) || 0,
            int: parseInt(document.getElementById('attr-int').value) || 0,
            pre: parseInt(document.getElementById('attr-pre').value) || 0,
            vig: parseInt(document.getElementById('attr-vig').value) || 0,
            elem_morte: parseInt(document.getElementById('elem-morte').value) || 0,
            elem_sangue: parseInt(document.getElementById('elem-sangue').value) || 0,
            elem_energia: parseInt(document.getElementById('elem-energia').value) || 0,
            elem_conhecimento: parseInt(document.getElementById('elem-conhecimento').value) || 0,
            elem_medo: parseInt(document.getElementById('elem-medo').value) || 0,
            vidaAtual: parseInt(document.getElementById('vida-atual').value) || 0,
            vidaMax: parseInt(document.getElementById('vida-max').value) || 1,
            sanAtual: parseInt(document.getElementById('san-atual').value) || 0,
            sanMax: parseInt(document.getElementById('san-max').value) || 1,
            peAtual: parseInt(document.getElementById('pe-atual').value) || 0,
            peMax: parseInt(document.getElementById('pe-max').value) || 1,
            bonusDefesa: parseInt(document.getElementById('bonus-defesa').value) || 0,
            pericias: periciasObj,
            // Salvar Estados
            estadosAtivos: estadosAtivos,
            m_t1: document.getElementById('m-t1').checked,
            m_t2: document.getElementById('m-t2').checked,
            m_t3: document.getElementById('m-t3').checked,
            localLesionado: document.getElementById('local-lesionado').value,
            descSequela: document.getElementById('desc-sequela').value
        });
    }

    function ajustar(tipo, valor) {
        const el = document.getElementById(`${tipo}-atual`);
        el.value = (parseInt(el.value) || 0) + valor;
        salvarFicha();
    }

    function atualizarStatus(tipo, atual, max) {
        document.getElementById(`${tipo}-atual`).value = atual;
        document.getElementById(`${tipo}-max`).value = max;
        const perc = (atual / max) * 100;
        document.getElementById(`bar-${tipo}`).style.width = Math.min(perc, 100) + "%";
    }

    function atualizarCorPericia(nome, valor) {
        const el = document.getElementById(`row-${nome}`);
        el.className = 'pericia-row';
        if(valor == "5") el.classList.add('p-verde');
        else if(valor == "10") el.classList.add('p-azul');
        else if(valor == "15") el.classList.add('p-laranja');
        else if(valor == "20") el.classList.add('p-vermelho');
    }

    function toggleDesc(id) {
        const d = document.getElementById('desc-'+id);
        d.style.display = d.style.display === 'block' ? 'none' : 'block';
    }

    function carregarSubColecao(colecao, divId, renderFunc) {
        db.collection("fichas").doc(atual).collection(colecao).onSnapshot(snap => {
            const container = document.getElementById(divId);
            container.innerHTML = "";
            snap.forEach(doc => { container.innerHTML += renderFunc(doc.id, doc.data(), colecao); });
        });
    }

    function renderRitual(id, r, col) {
        return `<div class="ritual-card"><div class="card-header" onclick="toggleElem('${id}')"><span>${r.nome}</span></div><div class="card-body" id="${id}"><textarea class="cris-textarea" onchange="updateSub('${id}','${col}','descricao',this.value)">${r.descricao}</textarea><button class="cris-btn" onclick="removerSub('${id}','${col}')">Excluir</button></div></div>`;
    }

    function renderHabilidade(id, h, col) {
        return `<div class="ritual-card"><div class="card-header" onclick="toggleElem('${id}')"><span>${h.nome}</span></div><div class="card-body" id="${id}"><textarea class="cris-textarea" onchange="updateSub('${id}','${col}','descricao',this.value)">${h.descricao}</textarea><button class="cris-btn" onclick="removerSub('${id}','${col}')">Excluir</button></div></div>`;
    }

    function renderArma(id, a, col) {
        return `<div class="ritual-card"><div class="card-header" onclick="toggleElem('${id}')"><span>${a.nome}</span></div><div class="card-body" id="${id}"><input type="text" placeholder="Dano" value="${a.dano||''}" onchange="updateSub('${id}','${col}','dano',this.value)"><button class="cris-btn" onclick="removerSub('${id}','${col}')">Excluir</button></div></div>`;
    }

    async function novoRitual() { await db.collection("fichas").doc(atual).collection("rituais").add({ nome: "Novo Ritual", descricao: "" }); }
    async function novoHabilidade() { await db.collection("fichas").doc(atual).collection("habilidades").add({ nome: "Nova Habilidade", descricao: "" }); }
    async function novaArma() { await db.collection("fichas").doc(atual).collection("armas").add({ nome: "Nova Arma", dano: "" }); }
    async function updateSub(id, col, campo, valor) { let o = {}; o[campo] = valor; await db.collection("fichas").doc(atual).collection(col).doc(id).update(o); }
    async function removerSub(id, col) { if(confirm("Excluir?")) await db.collection("fichas").doc(atual).collection(col).doc(id).delete(); }
    
    function toggleElem(id) { 
        const b = document.getElementById(id); 
        if(b) b.style.display = b.style.display === 'block' ? 'none' : 'block'; 
    }
    
    function mudarAba(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const aba = document.getElementById('aba-' + id);
        if(aba) aba.classList.add('active');
        if(event && event.currentTarget) event.currentTarget.classList.add('active');
    }

    auth.onAuthStateChanged(user => { if (user) { init(); } else { window.location.href = "index.html"; } });
</script>
</body>
</html>
