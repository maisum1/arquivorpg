<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.R.Q.U.I.V.O. - Estudo de Ameaça</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;700&display=swap');

        :root {
            --hp-red: #8b1c1c;
            --san-purple: #2f4f4f;
            --pe-orange: #5c4033;
            --bg-dark: #121212;
            --bg-panel: #1a1a1a;
            --text-main: #d3d3d3;
            --cris-purple: #a68a64;
        }

        /* TEMA HEXATOMBE FORTALECIDO */
        body.tema-hexatombe {
            --cris-purple: #8b1c1c !important; 
            --bg-panel: #1c0a0a !important; 
            --cor-fixo: #8b1c1c !important;
            background-color: #0d0000 !important;
            transition: all 0.5s ease;
        }

        body {
            background-color: var(--bg-dark); color: var(--text-main);
            font-family: 'Inter', sans-serif; margin: 0; padding: 20px; transition: background-color 0.5s ease;
        }

        /* Remove as setinhas dos inputs numericos */
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        @keyframes shake { 0% { transform: translate(2px, 1px) rotate(0deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
        .shake { animation: shake 0.5s; animation-iteration-count: infinite; }

        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 320px 1fr; gap: 40px; }
        .col-left { display: flex; flex-direction: column; gap: 15px; }

        /* PORTRAIT */
        .portrait { width: 100%; height: 450px; background: #0d0d0d; border: 1px solid #444; border-bottom: 4px solid var(--hp-red); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; border-radius: 2px; box-shadow: 2px 2px 15px rgba(0,0,0,0.8); }
        #img-preview { width: 100%; height: 100%; object-fit: cover; transition: transform 0.1s; filter: grayscale(20%) contrast(110%); }
        .upload-hint { position: absolute; color: #555; font-family: 'Inter', sans-serif; font-size: 11px; text-align: center; pointer-events: none; letter-spacing: 1px; font-weight: bold; }

        /* DOSSIER PANEL */
        .stat-block { background-color: var(--bg-panel); border: 1px solid #333; border-top: 4px solid var(--hp-red); padding: 30px; border-radius: 2px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        
        .inline-input { background: transparent; border: none; border-bottom: 1px solid #333; color: #fff; font-family: inherit; font-size: inherit; outline: none; padding: 2px; transition: 0.3s; }
        .inline-input:focus { border-bottom: 1px solid var(--hp-red); }

        /* SIGILO DE ATRIBUTOS (IMPORTADO DA FICHA) */
        .sigilo-container { position: relative; width: 260px; height: 260px; margin: 20px auto 10px auto; background: url('https://www.ordemparanormal.com.br/assets/rituais/circulo_atributos.png') no-repeat center; background-size: contain; filter: grayscale(50%) opacity(0.8); }
        .sigilo-container::before { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 110%; height: 110%; background-image: url('https://pngimg.com/uploads/pentagram/pentagram_PNG22.png'); background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.15; z-index: -1; pointer-events: none; }
        .attr-box { position: absolute; width: 55px; height: 55px; background: var(--bg-panel); border: 1px solid #555; border-radius: 2px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); z-index: 1;}
        .attr-label { font-size: 9px; font-weight: bold; color: var(--cris-purple); margin-top: -2px; letter-spacing: 1px;}
        .attr-box input { background: transparent; border: none; color: #fff; text-align: center; width: 100%; font-size: 24px; font-family: 'Crimson Text', serif; font-weight: bold; outline: none;}
        .agi { top: 0; left: 102px; } .for { top: 75px; left: 5px; } .sag { top: 75px; right: 5px; } .von { bottom: 20px; left: 45px; } .vig { bottom: 20px; right: 45px; }

        /* GRIDS E CAIXAS DE ESTATÍSTICAS */
        .mid-stats { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 20px !important; margin-bottom: 25px; }
        .stat-box { border: 1px solid #333; background: #121212; padding: 15px; display: flex; flex-direction: column; border-radius: 2px; }
        .stat-box-title { color: var(--hp-red); font-weight: bold; font-size: 11px; letter-spacing: 1px; margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px; }

        /* BARRAS DE STATUS */
        .status-container { margin-bottom: 15px; }
        .status-header { font-size: 11px; font-weight: bold; letter-spacing: 2px; font-family: 'Inter'; text-align: center; margin-bottom: 4px; }
        .bar-bg { width: 100%; height: 20px; background: #111; position: relative; border: 1px solid #333; overflow: hidden; display: flex; align-items: center; border-radius: 2px;}
        .bar-fill { height: 100%; transition: width 0.4s, filter 0.3s; position: absolute; top: 0; left: 0; opacity: 0.8; }
        .bar-content { position: relative; z-index: 2; width: 100%; display: flex; justify-content: center; padding: 0; font-weight: bold; font-family: 'Crimson Text', serif; align-items: center; transition: opacity 0.3s; }
        .bar-content input { background: transparent; border: none; color: #fff; width: 35px; text-align: center; font-size: 14px; font-family: 'Crimson Text', serif; font-weight: bold; outline: none;}

        /* INFO ROWS */
        .info-row { margin-top: 10px; display: flex; align-items: baseline; flex-wrap: wrap; margin-bottom: 8px;}
        .info-label { display: inline-block; font-weight: bold; color: var(--cris-purple); font-size: 10px; flex-shrink: 0; letter-spacing: 1px; text-transform: uppercase; margin-right: 10px;}
        .info-field { flex: 1; background: transparent; border: none; border-bottom: 1px solid #333; color: #d3d3d3; font-size: 13px; padding: 4px 5px; outline: none; font-family: 'Inter', sans-serif;}
        .info-field:focus { border-bottom-color: var(--cris-purple); }

        .section-title { color: var(--hp-red); padding: 5px 0; font-family: 'Crimson Text', serif; font-size: 1.4em; font-weight: bold; display: block; margin: 30px 0 15px 0; border-bottom: 1px solid #333; text-transform: uppercase; letter-spacing: 1px; }

        /* ESTILOS DE BOTÕES E TEXTAREAS */
        .cris-textarea { width: 100%; background: #121212; border: 1px solid #333; color: #d3d3d3; font-size: 13px; padding: 15px; box-sizing: border-box; font-family: 'Inter', sans-serif; line-height: 1.6; border-radius: 2px; outline: none; transition: border-color 0.3s; resize: vertical; min-height: 100px; }
        .cris-textarea:focus { border-color: var(--cris-purple); }
        .cris-btn { background: transparent; border: 1px solid #555; color: #888; padding: 8px 16px; cursor: pointer; font-size: 10px; font-weight: bold; border-radius: 2px; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; display: inline-block; margin-bottom: 15px;}
        .cris-btn:hover { background: #333; color: #fff; border-color: #888; }

        .voltar-btn { position: fixed; bottom: 20px; right: 20px; background: #1a1a1a; color: #888; padding: 10px 20px; text-decoration: none; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: bold; border: 1px solid #444; border-radius: 2px; z-index: 1000; transition: 0.3s; letter-spacing: 1px; }
        .voltar-btn:hover { background: #333; color: #fff; border-color: #666; }

        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } .mid-stats { grid-template-columns: 1fr !important; } }
    </style>
</head>
<body>

    <a href="index.html" class="voltar-btn">FECHAR ARQUIVO</a>

    <div class="container">
        
        <div class="col-left">
           <div class="portrait" onclick="document.getElementById('fileInput').click()">
                <img id="img-preview" style="display:none; position: absolute; left: 0; top: 0;">
                <div id="img-placeholder" class="upload-hint">REGISTRO FOTOGRÁFICO DA ENTIDADE</div>
            </div>

            <div style="padding: 15px; background: #121212; border: 1px solid #333; border-radius: 2px;">
                <label style="font-size: 10px; color: var(--cris-purple); font-weight: bold; letter-spacing: 1px; display:block; margin-bottom: 10px;">AJUSTE DE ENQUADRAMENTO</label>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <input type="range" id="pZ" min="0.1" max="5" step="0.01" value="1" oninput="ajustarFoto()" onchange="updateField('pZ', this.value)">
                    <input type="range" id="pX" min="-50" max="150" step="0.5" value="50" oninput="ajustarFoto()" onchange="updateField('pX', this.value)">
                    <input type="range" id="pY" min="-50" max="150" step="0.5" value="50" oninput="ajustarFoto()" onchange="updateField('pY', this.value)">
                </div>
            </div>

            <div class="sigilo-container" id="sigilo-box">
                <div class="attr-box agi"><span class="attr-label">AGI</span><input type="number" id="agi" class="save-auto" placeholder="0"></div>
                <div class="attr-box for"><span class="attr-label">FOR</span><input type="number" id="for" class="save-auto" placeholder="0"></div>
                <div class="attr-box sag"><span class="attr-label">INT</span><input type="number" id="int" class="save-auto" placeholder="0"></div>
                <div class="attr-box von"><span class="attr-label">PRE</span><input type="number" id="pre" class="save-auto" placeholder="0"></div>
                <div class="attr-box vig"><span class="attr-label">VIG</span><input type="number" id="vig" class="save-auto" placeholder="0"></div>
            </div>

            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="converterImagem(this)">
        </div>

        <div class="stat-block">
            
            <div style="display: flex; align-items: baseline; justify-content: space-between; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 25px;">
                <input id="nome" class="inline-input save-auto" style="font-family: 'Crimson Text', serif; font-size: 2.8em; font-weight: bold; color: #fff; text-transform: uppercase; width: 70%; letter-spacing: 2px; border: none;" placeholder="NOME DA ENTIDADE">
                <div style="display: flex; align-items: center; gap: 10px; border-left: 1px solid #333; padding-left: 20px;">
                    <span style="font-family: 'Inter', sans-serif; font-size: 16px; font-weight: bold; color: var(--hp-red); letter-spacing: 2px;">VD</span>
                    <input id="vd" class="inline-input save-auto" style="font-family: 'Crimson Text', serif; font-size: 2.2em; color: var(--hp-red); font-weight: bold; width: 70px; text-align: center; border-bottom: 2px solid var(--hp-red);" placeholder="0">
                </div>
            </div>

            <div class="mid-stats">
                <div class="stat-box">
                    <span class="stat-box-title">SENTIDOS & INICIATIVA</span>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px; align-items: baseline;">
                        <span style="color: #888; font-size: 13px;">Percepção</span>
                        <input id="percepcao" class="inline-input save-auto" style="width: 60%; text-align: right;" placeholder="2d20+10">
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: baseline;">
                        <span style="color: #888; font-size: 13px;">Iniciativa</span>
                        <input id="iniciativa" class="inline-input save-auto" style="width: 60%; text-align: right;" placeholder="2d20+5">
                    </div>
                </div>

                <div class="stat-box">
                    <span class="stat-box-title">SISTEMA DE DEFESA</span>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center;">
                        <span style="color: #fff; font-size: 14px; font-weight: bold;">Passiva</span>
                        <input id="defesa" class="inline-input save-auto" style="width: 50px; text-align: center; font-size: 24px; font-family: 'Crimson Text', serif; font-weight: bold; color: #fff;" placeholder="20">
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 11px; color: #888; align-items: baseline; gap: 5px;">
                        <span style="flex:1">Fortitude <input id="fortitude" class="inline-input save-auto" style="width: 100%; font-size:12px; margin-top: 3px;" placeholder="2d20+10"></span>
                        <span style="flex:1">Reflexos <input id="reflexos" class="inline-input save-auto" style="width: 100%; font-size:12px; margin-top: 3px;" placeholder="2d20+5"></span>
                        <span style="flex:1">Vontade <input id="vontade" class="inline-input save-auto" style="width: 100%; font-size:12px; margin-top: 3px;" placeholder="2d20+5"></span>
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px;">
                <div class="status-container">
                    <div class="status-header" style="color: var(--hp-red);">VITALIDADE</div>
                    <div class="bar-bg">
                        <div id="bar-pv" class="bar-fill" style="background:var(--hp-red)"></div>
                        <div class="bar-content">
                            <div style="display: flex; align-items: baseline;">
                                <input type="number" id="pv-atual" oninput="atualizarVisualBarra('pv')" onchange="salvarAmeaca()" style="color:#fff; text-align: right;">
                                <span style="color:#666; margin: 0 2px;">/</span>
                                <input type="number" id="pv-max" oninput="atualizarVisualBarra('pv')" onchange="salvarAmeaca()" style="color:#aaa; text-align: left;">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="status-container">
                    <div class="status-header" style="color: #668888;">CONSCIÊNCIA</div>
                    <div class="bar-bg">
                        <div id="bar-pc" class="bar-fill" style="background:var(--san-purple)"></div>
                        <div class="bar-content">
                            <div style="display: flex; align-items: baseline;">
                                <input type="number" id="pc-atual" oninput="atualizarVisualBarra('pc')" onchange="salvarAmeaca()" style="color:#fff; text-align: right;">
                                <span style="color:#666; margin: 0 2px;">/</span>
                                <input type="number" id="pc-max" oninput="atualizarVisualBarra('pc')" onchange="salvarAmeaca()" style="color:#aaa; text-align: left;">
                            </div>                            
                        </div>
                    </div>
                </div>

                <div class="status-container">
                    <div class="status-header" style="color: #8b6e4f;">ENERGIA</div>
                    <div class="bar-bg">
                        <div id="bar-pe" class="bar-fill" style="background:var(--pe-orange)"></div>
                        <div class="bar-content">
                            <div style="display: flex; align-items: baseline;">
                                <input type="number" id="pe-atual" oninput="atualizarVisualBarra('pe')" onchange="salvarAmeaca()" style="color:#fff; text-align: right;">
                                <span style="color:#666; margin: 0 2px;">/</span>
                                <input type="number" id="pe-max" oninput="atualizarVisualBarra('pe')" onchange="salvarAmeaca()" style="color:#aaa; text-align: left;">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div style="background: #121212; padding: 15px; border: 1px solid #333; border-radius: 2px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="info-row"><label class="info-label" style="color:var(--hp-red)">VULNERAB.</label><input id="vulnerabilidades" class="info-field save-auto" placeholder="Ex: Energia..."></div>
                    <div class="info-row"><label class="info-label" style="color:var(--hp-red)">RESISTÊNCIAS</label><input id="resistencias" class="info-field save-auto" placeholder="Ex: Físico 10..."></div>
                </div>
                <div class="info-row"><label class="info-label">IMUNIDADES</label><input id="imunidades" class="info-field save-auto" placeholder="Ex: Condições de paralisia, venenos..."></div>
                <div class="info-row"><label class="info-label">PERÍCIAS NOTÁVEIS</label><input id="pericias" class="info-field save-auto" placeholder="Ex: Atletismo 4d20+15..."></div>
                <div class="info-row"><label class="info-label">MOBILIDADE TÁTICA</label><input id="deslocamento" class="info-field save-auto" placeholder="Ex: 9m | 6q"></div>
            </div>

            <div>
                <span class="section-title">AÇÕES OFENSIVAS</span>
                <div id="lista-acoes"></div>
                <button class="cris-btn" onclick="addAcao()">+ INSERIR PADRÃO DE ATAQUE</button>
            </div>

            <div>
                <span class="section-title">COMPORTAMENTOS E TRAÇOS</span>
                <div id="lista-habilidades"></div>
                <button class="cris-btn" onclick="addHabilidade()">+ REGISTRAR COMPORTAMENTO</button>
            </div>

            <div>
                <span class="section-title" style="color: var(--cris-purple); border-color: var(--cris-purple);">SOLUÇÃO DO ENIGMA</span>
                <textarea id="enigma" class="cris-textarea save-auto" placeholder="Descreva os requisitos ou descobertas necessárias para quebrar a imunidade / enigma desta entidade..." style="border-left: 4px solid var(--cris-purple); background: #121212; font-style: italic;"></textarea>
            </div>
            
            <div>
                <span class="section-title" style="color: #888; border-color: #333;">RELATÓRIO DE PESQUISA</span>
                <textarea id="descricao" class="cris-textarea save-auto" placeholder="Insira aqui o relatório de pesquisa, comportamento e biologia observada da criatura..." style="min-height: 180px;"></textarea>
            </div>

        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore(); const urlParams = new URLSearchParams(window.location.search); const atual = urlParams.get('id');

        if(!atual) { window.location.href = "index.html"; }

        // --- SISTEMAS SECRETOS MESTRE ---
        let isHexatombe = false;
        let globalHexatombe = false; 
        let prevHexatombeFinal = false; 

        db.collection("configuracoes").doc("globais").onSnapshot(doc => {
            if(doc.exists) {
                const data = doc.data(); 
                globalHexatombe = data.hexatombe || false; 
                aplicarSegredosAmeaca();
            }
        });

        let cheatCode = "";
        document.addEventListener('keydown', (e) => {
            const active = document.activeElement; if (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT') return;
            cheatCode += e.key.toLowerCase(); if (cheatCode.length > 20) cheatCode = cheatCode.substring(1);
            if (cheatCode.includes("hexatombe")) { 
                document.body.classList.add('shake');
                setTimeout(async () => { document.body.classList.remove('shake'); 
                    let doc = await db.collection("ameacas").doc(atual).get(); 
                    let valAtual = doc.data().hexatombe || false; 
                    await db.collection("ameacas").doc(atual).update({ hexatombe: !valAtual }); 
                }, 800);
                cheatCode = ""; 
            }
        });

        function aplicarSegredosAmeaca() {
            const hexatombeFinal = isHexatombe || globalHexatombe;
            if (hexatombeFinal) document.body.classList.add('tema-hexatombe'); else document.body.classList.remove('tema-hexatombe');
        }

        // --- AUTO-SAVE ---
        let timeout;
        function updateField(campo, valor) {
            clearTimeout(timeout);
            timeout = setTimeout(() => { let obj = {}; obj[campo] = valor; db.collection("ameacas").doc(atual).update(obj); }, 800);
        }

        db.collection("ameacas").doc(atual).onSnapshot(doc => {
            if(doc.exists) {
                const d_raw = doc.data();
                isHexatombe = d_raw.hexatombe || false;
                const hexatombeFinal = isHexatombe || globalHexatombe;

                if (prevHexatombeFinal !== hexatombeFinal) {
                    let o = {};
                    if (hexatombeFinal) {
                        o.pvAtual_hexa = (parseInt(d_raw.pvAtual) || 0) + 50;
                        o.pcAtual_hexa = parseInt(d_raw.pcAtual) || 0;
                        o.peAtual_hexa = parseInt(d_raw.peAtual) || 0;
                        
                        // Garante que atributos base originais se mantêm fixos
                        d_raw.agi = d_raw.agi; d_raw.for = d_raw.for; d_raw.int = d_raw.int; d_raw.pre = d_raw.pre; d_raw.vig = d_raw.vig;

                        o.hexatombe_data = { ...d_raw }; delete o.hexatombe_data.hexatombe_data; 
                    } else {
                        let nPv = (parseInt(d_raw.pvAtual_hexa) || 0) - 50; if(nPv < 1) nPv = 1;
                        o.pvAtual = nPv;
                        o.pcAtual = parseInt(d_raw.pcAtual_hexa) || 0;
                        o.peAtual = parseInt(d_raw.peAtual_hexa) || 0;
                    }
                    prevHexatombeFinal = hexatombeFinal;
                    db.collection("ameacas").doc(atual).update(o);
                    return; 
                }

                let d = d_raw;
                if (hexatombeFinal && d_raw.hexatombe_data) { 
                    d = { ...d_raw, ...d_raw.hexatombe_data }; 
                    d.agi = d_raw.agi; d.for = d_raw.for; d.int = d_raw.int; d.pre = d_raw.pre; d.vig = d_raw.vig;
                }

                let vAt = hexatombeFinal ? (d_raw.pvAtual_hexa ?? d_raw.pvAtual) : d_raw.pvAtual;
                let sAt = hexatombeFinal ? (d_raw.pcAtual_hexa ?? d_raw.pcAtual) : d_raw.pcAtual;
                let pAt = hexatombeFinal ? (d_raw.peAtual_hexa ?? d_raw.peAtual) : d_raw.peAtual;

                if (document.activeElement !== document.getElementById('pv-atual')) document.getElementById('pv-atual').value = vAt ?? 100;
                if (document.activeElement !== document.getElementById('pc-atual')) document.getElementById('pc-atual').value = sAt ?? 100;
                if (document.activeElement !== document.getElementById('pe-atual')) document.getElementById('pe-atual').value = pAt ?? 100;

                if (document.activeElement !== document.getElementById('pv-max')) document.getElementById('pv-max').value = d.pvMax ?? 100;
                if (document.activeElement !== document.getElementById('pc-max')) document.getElementById('pc-max').value = d.pcMax ?? 100;
                if (document.activeElement !== document.getElementById('pe-max')) document.getElementById('pe-max').value = d.peMax ?? 100;

                document.querySelectorAll('.save-auto').forEach(el => {
                    if(el.id && d[el.id] !== undefined && el.value !== d[el.id] && document.activeElement !== el) {
                        el.value = d[el.id];
                    }
                });
                
                if (d.portrait) { const img = document.getElementById('img-preview'); img.src = d.portrait; img.style.display = 'block'; document.getElementById('img-placeholder').style.display = 'none'; if(d.pZ) document.getElementById('pZ').value = d.pZ; if(d.pX) document.getElementById('pX').value = d.pX; if(d.pY) document.getElementById('pY').value = d.pY; ajustarFoto(); }

                atualizarVisualBarra('pv'); atualizarVisualBarra('pc'); atualizarVisualBarra('pe');
                aplicarSegredosAmeaca();
            }
        });

        document.querySelectorAll('.save-auto').forEach(el => { el.addEventListener('input', (e) => updateField(e.target.id, e.target.value)); });

        function atualizarVisualBarra(tipo) {
            let atStr = document.getElementById(`${tipo}-atual`).value; let mxStr = document.getElementById(`${tipo}-max`).value;
            let curr = atStr === '' ? 0 : parseFloat(atStr); let max = mxStr === '' ? 1 : parseFloat(mxStr);
            const bar = document.getElementById(`bar-${tipo}`);
            if(bar) { bar.style.width = Math.max(0, Math.min((curr / max) * 100, 100)) + "%"; if(max > 0 && curr <= (max / 2)) { bar.style.filter = "brightness(0.35)"; } else { bar.style.filter = "brightness(1)"; } }
        }

        function salvarAmeaca() {
            const hexatombeFinal = isHexatombe || globalHexatombe;
            let payload = {
                nome: document.getElementById('nome').value, vd: parseInt(document.getElementById('vd').value) || 0,
                agi: parseInt(document.getElementById('agi').value) || 0, for: parseInt(document.getElementById('for').value) || 0, int: parseInt(document.getElementById('int').value) || 0, pre: parseInt(document.getElementById('pre').value) || 0, vig: parseInt(document.getElementById('vig').value) || 0,
                pvMax: parseInt(document.getElementById('pv-max').value) || 1, pcMax: parseInt(document.getElementById('pc-max').value) || 1, peMax: parseInt(document.getElementById('pe-max').value) || 1,
                descricao: document.getElementById('descricao').value,
                percepcao: document.getElementById('percepcao').value, iniciativa: document.getElementById('iniciativa').value, defesa: document.getElementById('defesa').value, fortitude: document.getElementById('fortitude').value, reflexos: document.getElementById('reflexos').value, vontade: document.getElementById('vontade').value, vulnerabilidades: document.getElementById('vulnerabilidades').value, resistencias: document.getElementById('resistencias').value, imunidades: document.getElementById('imunidades').value, pericias: document.getElementById('pericias').value, deslocamento: document.getElementById('deslocamento').value, enigma: document.getElementById('enigma').value
            };

            let rootUpdates = { hexatombe: isHexatombe };
            let inV = parseInt(document.getElementById('pv-atual').value) || 0; let inS = parseInt(document.getElementById('pc-atual').value) || 0; let inP = parseInt(document.getElementById('pe-atual').value) || 0;

            if (hexatombeFinal) { 
                rootUpdates.hexatombe_data = payload; 
                rootUpdates.pvAtual_hexa = inV; rootUpdates.pcAtual_hexa = inS; rootUpdates.peAtual_hexa = inP; 
                
                rootUpdates.agi = payload.agi; rootUpdates.for = payload.for; rootUpdates.int = payload.int; rootUpdates.pre = payload.pre; rootUpdates.vig = payload.vig;
            } else { 
                rootUpdates = { ...payload, ...rootUpdates }; 
                rootUpdates.pvAtual = inV; rootUpdates.pcAtual = inS; rootUpdates.peAtual = inP; 
            }
            db.collection("ameacas").doc(atual).update(rootUpdates);
        }

        function loadSub(col, containerId, renderFunc) {
            const hexatombeFinal = isHexatombe || globalHexatombe; const path = hexatombeFinal ? "hexa_" + col : col;
            db.collection("ameacas").doc(atual).collection(path).onSnapshot(snap => {
                const container = document.getElementById(containerId); container.innerHTML = "";
                snap.forEach(doc => { container.innerHTML += renderFunc(doc.id, doc.data(), path); });
            });
        }

        async function updateSub(id, path, campo, valor) { let obj = {}; obj[campo] = valor; await db.collection("ameacas").doc(atual).collection(path).doc(id).update(obj); }
        async function removerSub(id, path) { if(confirm("Excluir este registro?")) await db.collection("ameacas").doc(atual).collection(path).doc(id).delete(); }

        async function addAcao() { const path = (isHexatombe || globalHexatombe) ? "hexa_acoes" : "acoes"; await db.collection("ameacas").doc(atual).collection(path).add({ tipo: "Padrão", nome: "Nova Ação", alcance: "Curto", teste: "4d20", dano: "1d10" }); }
        function renderAcao(id, data, path) { 
            return `
            <div style="background: #151515; border: 1px solid #333; border-left: 4px solid var(--hp-red); border-radius: 2px; position: relative; margin-bottom: 15px; padding: 15px;">
                <button onclick="removerSub('${id}', '${path}')" style="position:absolute; top:12px; right:12px; background:none; border:none; color:#555; cursor:pointer; font-weight:bold; transition:0.2s;">X</button>
                <div style="display:flex; gap:10px; align-items:baseline; margin-bottom:10px;">
                    <input class="inline-input" placeholder="Padrão" value="${data.tipo || ''}" onchange="updateSub('${id}','${path}','tipo',this.value)" style="width: 80px; font-family: 'Inter', sans-serif; font-size: 11px; text-transform:uppercase; color:#888; border-bottom: 1px solid #333;">
                    <input class="inline-input" placeholder="Nome do Ataque" value="${data.nome || ''}" onchange="updateSub('${id}','${path}','nome',this.value)" style="flex:1; color: var(--hp-red); font-weight: bold; font-family: 'Crimson Text', serif; font-size: 20px; border-bottom: 1px solid #333;">
                </div>
                <div style="display:flex; gap:15px; margin-bottom: 10px; flex-wrap:wrap;">
                    <div style="display:flex; align-items:baseline; gap:5px;"><span style="font-size:11px; color:#888; font-weight:bold;">TESTE:</span> <input class="inline-input" placeholder="4d20+15" value="${data.teste || ''}" onchange="updateSub('${id}','${path}','teste',this.value)" style="width: 100px; font-family:'Inter'; font-size: 13px; border-bottom: 1px solid #333;"></div>
                    <div style="display:flex; align-items:baseline; gap:5px;"><span style="font-size:11px; color:#888; font-weight:bold;">DANO:</span> <input class="inline-input" placeholder="2d10+10 Sangue" value="${data.dano || ''}" onchange="updateSub('${id}','${path}','dano',this.value)" style="width: 150px; font-family:'Inter'; font-size: 13px; color:#fff; font-weight:bold; border-bottom: 1px solid #333;"></div>
                    <div style="display:flex; align-items:baseline; gap:5px;"><span style="font-size:11px; color:#888; font-weight:bold;">ALCANCE:</span> <input class="inline-input" placeholder="Curto" value="${data.alcance || ''}" onchange="updateSub('${id}','${path}','alcance',this.value)" style="width: 100px; font-family:'Inter'; font-size: 13px; border-bottom: 1px solid #333;"></div>
                </div>
                <input class="inline-input" placeholder="Efeitos adicionais, crítico, condições..." value="${data.efeitos || ''}" onchange="updateSub('${id}','${path}','efeitos',this.value)" style="width: 100%; color: #aaa; font-size: 12px; font-family: 'Inter', sans-serif; font-style: italic; border-bottom: 1px solid #333;">
            </div>`; 
        }

        async function addHabilidade() { const path = (isHexatombe || globalHexatombe) ? "hexa_habilidades_ameaca" : "habilidades_ameaca"; await db.collection("ameacas").doc(atual).collection(path).add({ nome: "Comportamento Indefinido", descricao: "" }); }
        function renderHabilidade(id, data, path) { 
            return `
            <div style="background: #151515; border: 1px solid #333; border-left: 4px solid #555; border-radius: 2px; position: relative; margin-bottom: 15px; padding: 15px;">
                <button onclick="removerSub('${id}', '${path}')" style="position:absolute; top:12px; right:12px; background:none; border:none; color:#555; cursor:pointer; font-weight:bold; transition:0.2s;">X</button>
                <input class="inline-input" placeholder="Título do Comportamento" value="${data.nome || ''}" onchange="updateSub('${id}','${path}','nome',this.value)" style="width: 90%; color: #fff; font-weight: bold; font-family: 'Crimson Text', serif; font-size: 18px; margin-bottom: 10px; border-bottom: 1px solid #333;">
                <textarea class="cris-textarea" placeholder="Detalhes da habilidade ou comportamento da entidade..." onchange="updateSub('${id}','${path}','descricao',this.value)" style="width: 100%; min-height: 60px; border: 1px solid #333; background: #121212; padding: 10px;">${data.descricao || ''}</textarea>
            </div>`; 
        }

        loadSub('acoes', 'lista-acoes', renderAcao); loadSub('habilidades_ameaca', 'lista-habilidades', renderHabilidade);

        function converterImagem(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader(); reader.onload = function(e) {
                    const imgElement = new Image(); imgElement.src = e.target.result;
                    imgElement.onload = function() {
                        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); const maxW = 800; const scale = maxW / imgElement.width; canvas.width = maxW; canvas.height = imgElement.height * scale; ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);
                        const base64comprimido = canvas.toDataURL('image/webp', 0.6); document.getElementById('img-preview').src = base64comprimido; document.getElementById('img-preview').style.display = 'block'; document.getElementById('img-placeholder').style.display = 'none'; updateField('portrait', base64comprimido);
                    };
                }; reader.readAsDataURL(input.files[0]);
            }
        }
        function ajustarFoto() { const z = document.getElementById('pZ').value; const x = document.getElementById('pX').value; const y = document.getElementById('pY').value; const img = document.getElementById('img-preview'); img.style.objectPosition = `${x}% ${y}%`; img.style.transform = `scale(${z})`; }
    </script>
</body>
</html>
