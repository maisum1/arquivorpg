<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Arquivo de Ameaça</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --hp-red: #b31d1d;
            --bg-dark: #090909;
            --text-main: #e0e0e0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        /* AJUSTE NO PORTRAIT PARA NÃO DESALINHAR */
        .portrait {
            width: 100%;
            height: 450px;
            background: #111;
            border: 2px solid #333;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .portrait img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .portrait .upload-hint {
            position: absolute;
            color: #555;
            font-family: 'Special Elite';
            font-size: 12px;
            text-align: center;
            pointer-events: none;
        }

        .section-box {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #222;
            padding: 15px;
            margin-bottom: 20px;
        }

        h2 {
            font-family: 'Special Elite', cursive;
            color: var(--hp-red);
            border-bottom: 1px solid var(--hp-red);
            padding-bottom: 5px;
            margin-top: 0;
            text-transform: uppercase;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        
        .stat-field label { display: block; font-size: 0.8em; color: #888; margin-bottom: 3px; }
        
        .inline-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: white;
            font-family: inherit;
            width: 100%;
            padding: 5px 0;
        }
        .inline-input:focus { border-bottom-color: var(--hp-red); outline: none; }

        .atributos-circle {
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
            background: #111;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .atrib-item { text-align: center; }
        .atrib-item label { display: block; color: var(--hp-red); font-weight: bold; font-size: 12px; }
        .atrib-item input {
            width: 40px;
            height: 40px;
            background: transparent;
            border: 2px solid #333;
            border-radius: 50%;
            color: white;
            text-align: center;
            font-size: 1.2em;
            font-family: 'Special Elite', cursive;
        }

        .btn-add {
            background: #222;
            color: #aaa;
            border: 1px dashed #444;
            width: 100%;
            padding: 10px;
            cursor: pointer;
            font-family: 'Special Elite', cursive;
            margin-top: 10px;
        }
        .btn-add:hover { background: #333; color: white; border-color: var(--hp-red); }

        .dynamic-item {
            background: #151515;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 3px solid var(--hp-red);
            position: relative;
        }

        .btn-del {
            position: absolute;
            right: 5px;
            top: 5px;
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
        }
        .btn-del:hover { color: var(--hp-red); }

    </style>
</head>
<body>

<div class="container">
    <aside>
        <div class="portrait" onclick="document.getElementById('fileInput').click()">
            <img id="img-preview" style="display:none;">
            <div id="img-placeholder" class="upload-hint">CLIQUE PARA REGISTRO VISUAL</div>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="converterImagem(this)">

        <div class="section-box" style="margin-top:20px;">
            <h2>Defesas</h2>
            <div class="stat-field">
                <label>DEFESA</label>
                <input class="inline-input" id="defesa" onchange="update('defesa', this.value)">
            </div>
            <div class="stat-field" style="margin-top:10px;">
                <label>RESISTÊNCIAS</label>
                <input class="inline-input" id="resistencias" onchange="update('resistencias', this.value)">
            </div>
        </div>
    </aside>

    <main>
        <div class="section-box">
            <input class="inline-input" id="nome" style="font-size: 2em; font-family: 'Special Elite', cursive; color: var(--hp-red);" placeholder="NOME DA AMEAÇA" onchange="update('nome', this.value)">
            <div class="stats-grid">
                <div class="stat-field">
                    <label>VD</label>
                    <input id="vd" class="inline-input" onchange="update('vd', this.value)">
                </div>
                <div class="stat-field">
                    <label>ELEMENTO</label>
                    <input id="elemento" class="inline-input" onchange="update('elemento', this.value)">
                </div>
                <div class="stat-field">
                    <label>TAMANHO</label>
                    <input id="tamanho" class="inline-input" onchange="update('tamanho', this.value)">
                </div>
            </div>
        </div>

        <div class="atributos-circle">
            <div class="atrib-item"><label>AGI</label><input id="agi" onchange="update('agi', this.value)"></div>
            <div class="atrib-item"><label>FOR</label><input id="for" onchange="update('for', this.value)"></div>
            <div class="atrib-item"><label>INT</label><input id="int" onchange="update('int', this.value)"></div>
            <div class="atrib-item"><label>PRE</label><input id="pre" onchange="update('pre', this.value)"></div>
            <div class="atrib-item"><label>VIG</label><input id="vig" onchange="update('vig', this.value)"></div>
        </div>

        <div class="section-box">
            <h2>Vida e Combate</h2>
            <div class="stats-grid">
                <div class="stat-field">
                    <label>PV ATUAIS</label>
                    <input id="pvAtual" class="inline-input" onchange="update('pvAtual', this.value)">
                </div>
                <div class="stat-field">
                    <label>PV TOTAL</label>
                    <input id="pvMax" class="inline-input" onchange="update('pvMax', this.value)">
                </div>
                <div class="stat-field">
                    <label>DESLOCAMENTO</label>
                    <input id="deslocamento" class="inline-input" onchange="update('deslocamento', this.value)">
                </div>
            </div>
        </div>

        <div class="section-box">
            <h2>Ações</h2>
            <div id="lista-acoes"></div>
            <button class="btn-add" onclick="addAcao()">+ ADICIONAR AÇÃO</button>
        </div>

        <div class="section-box">
            <h2>Habilidades</h2>
            <div id="lista-habilidades"></div>
            <button class="btn-add" onclick="addHabilidade()">+ ADICIONAR HABILIDADE</button>
        </div>
    </main>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
        authDomain: "fichasrpg-7fc69.firebaseapp.com",
        projectId: "fichasrpg-7fc69",
        storageBucket: "fichasrpg-7fc69.firebasestorage.app"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const atual = params.get("id");

    if (atual) {
        db.collection("ameacas").doc(atual).onSnapshot(doc => {
            if (doc.exists) {
                const d = doc.data();
                for (let key in d) {
                    const el = document.getElementById(key);
                    if (el) el.value = d[key];
                }
                // Carregar Imagem Base64
                if (d.portrait) {
                    const img = document.getElementById('img-preview');
                    img.src = d.portrait;
                    img.style.display = 'block';
                    document.getElementById('img-placeholder').style.display = 'none';
                }
            }
        });
    }

    async function update(campo, valor) {
        let o = {}; o[campo] = valor;
        await db.collection("ameacas").doc(atual).update(o);
    }

    // SISTEMA DE UPLOAD BASE64
    function converterImagem(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64 = e.target.result;
                document.getElementById('img-preview').src = base64;
                document.getElementById('img-preview').style.display = 'block';
                document.getElementById('img-placeholder').style.display = 'none';
                update('portrait', base64);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function loadSub(col, containerId, renderFn) {
        db.collection("ameacas").doc(atual).collection(col).onSnapshot(snap => {
            const div = document.getElementById(containerId);
            div.innerHTML = "";
            snap.forEach(doc => {
                div.innerHTML += renderFn(doc.id, doc.data());
            });
        });
    }

    async function updateSub(id, col, campo, valor) {
        let o = {}; o[campo] = valor;
        await db.collection("ameacas").doc(atual).collection(col).doc(id).update(o);
    }

    async function removerSub(id, col) {
        if(confirm("Excluir item?")) await db.collection("ameacas").doc(atual).collection(col).doc(id).delete();
    }

    // Ações
    async function addAcao() {
        await db.collection("ameacas").doc(atual).collection("acoes").add({ nome: "Nova Ação", teste: "", dano: "", efeitos: "" });
    }

    function renderAcao(id, data) {
        return `
        <div class="dynamic-item">
            <button class="btn-del" onclick="removerSub('${id}', 'acoes')">X</button>
            <div style="display: flex; gap: 10px; margin-bottom: 5px;">
                <input class="inline-input" placeholder="Ação" value="${data.nome || ''}" onchange="updateSub('${id}','acoes','nome',this.value)" style="width: 40%; color: var(--hp-red); font-weight: bold;">
                <input class="inline-input" placeholder="Teste" value="${data.teste || ''}" onchange="updateSub('${id}','acoes','teste',this.value)" style="width: 25%;">
                <input class="inline-input" placeholder="Dano" value="${data.dano || ''}" onchange="updateSub('${id}','acoes','dano',this.value)" style="width: 25%;">
            </div>
            <input class="inline-input" placeholder="Efeitos extras (opcional)..." value="${data.efeitos || ''}" onchange="updateSub('${id}','acoes','efeitos',this.value)" style="width: 90%; margin-top: 5px; color: #aaa; font-size: 0.9em;">
        </div>`;
    }

    // Habilidades
    async function addHabilidade() {
        await db.collection("ameacas").doc(atual).collection("habilidades_ameaca").add({ nome: "Nova Habilidade", descricao: "" });
    }

    function renderHabilidade(id, data) {
        return `
        <div class="dynamic-item">
            <button class="btn-del" onclick="removerSub('${id}', 'habilidades_ameaca')">X</button>
            <div style="margin-bottom: 5px;">
                <input class="inline-input" placeholder="Nome da Habilidade" value="${data.nome || ''}" onchange="updateSub('${id}','habilidades_ameaca','nome',this.value)" style="width: 250px; color: var(--hp-red); font-weight: bold; font-family: 'Special Elite', cursive;">
            </div>
            <textarea class="inline-input" placeholder="Descrição da habilidade..." onchange="updateSub('${id}','habilidades_ameaca','descricao',this.value)" style="width: 90%; height: 50px; resize: vertical; border-bottom: 1px dashed #555;">${data.descricao || ''}</textarea>
        </div>`;
    }

    loadSub('acoes', 'lista-acoes', renderAcao);
    loadSub('habilidades_ameaca', 'lista-habilidades', renderHabilidade);
</script>

</body>
</html>
