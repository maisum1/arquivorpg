<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Ameaça - Ordo Realitas</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        body { background: #050505; color: #e0e0e0; font-family: 'Special Elite', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .nav-header { width: 100%; max-width: 900px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-voltar { background: transparent; border: 1px solid #444; color: #888; padding: 8px 15px; cursor: pointer; font-family: 'Special Elite'; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .btn-voltar:hover { border-color: #ff4d4d; color: #ff4d4d; }
        #status-save { font-size: 0.8rem; color: #555; }

        .ficha-container { width: 100%; max-width: 900px; background: #121212; border: 2px solid #441111; padding: 20px; box-sizing: border-box; }
        
        .header { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; border-bottom: 2px solid #ff4d4d; padding-bottom: 15px; margin-bottom: 20px; }
        .nome-area input { background: transparent; border: none; color: #ff4d4d; font-size: 2.5rem; font-family: 'Special Elite'; width: 100%; outline: none; }
        .vd-area { text-align: right; color: #ff4d4d; font-size: 1.5rem; }
        .vd-area input { width: 80px; background: #1a1a1a; border: 1px solid #441111; color: white; text-align: center; font-family: 'Special Elite'; font-size: 1.5rem; }

        .top-info { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; font-size: 0.9rem; }
        .top-info input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 5px; font-family: 'Special Elite'; outline: none; }

        .corpo-ficha { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        @media (max-width: 768px) { .corpo-ficha { grid-template-columns: 1fr; } }

        .stats-col { display: flex; flex-direction: column; gap: 20px; }
        .atributos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
        .attr-box { background: #1a1a1a; border: 1px solid #ff4d4d; border-radius: 50%; width: 70px; height: 70px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: auto; }
        .attr-box input { width: 40px; background: transparent; border: none; color: white; text-align: center; font-size: 1.4rem; font-family: 'Special Elite'; outline: none; }
        .attr-label { font-size: 0.7rem; color: #ff4d4d; font-weight: bold; }

        .img-ameaca { width: 100%; border: 1px solid #ff4d4d; min-height: 250px; background: #000; cursor: pointer; object-fit: cover; }
        .section-title { background: #441111; color: white; padding: 5px 10px; margin: 15px 0 10px 0; font-size: 1.1rem; border-left: 5px solid #ff4d4d; }
        
        textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #ccc; font-family: 'Special Elite'; resize: vertical; padding: 10px; box-sizing: border-box; outline: none; }

        .vida-box { display: flex; align-items: center; justify-content: center; gap: 10px; background: #221111; padding: 15px; border: 1px solid #ff4d4d; }
        .vida-box input { width: 80px; font-size: 1.8rem; background: transparent; border: none; color: #ff4d4d; text-align: center; font-family: 'Special Elite'; outline: none; }
    </style>
</head>
<body>

<div class="nav-header">
    <a href="index.html" class="btn-voltar">← HUB</a>
    <div id="status-save">Sincronizado</div>
</div>

<div class="ficha-container">
    <div class="header">
        <div class="nome-area"><input type="text" id="nome" onchange="autoSalvar('nome', this.value)" placeholder="NOME DA AMEAÇA"></div>
        <div class="vd-area">VD <input type="number" id="vd" onchange="autoSalvar('vd', this.value)" placeholder="0"></div>
    </div>

    <div class="top-info">
        <div>ELEMENTOS: <input type="text" id="elementos" onchange="autoSalvar('elementos', this.value)"></div>
        <div>CLASSE: <input type="text" id="classe" onchange="autoSalvar('classe', this.value)"></div>
        <div>TAMANHO: <input type="text" id="tamanho" onchange="autoSalvar('tamanho', this.value)"></div>
    </div>

    <div class="corpo-ficha">
        <div class="stats-col">
            <img src="" id="preview-img" class="img-ameaca" onclick="document.getElementById('file-input').click()">
            <input type="file" id="file-input" style="display:none;" onchange="uploadImagem(this)">
            
            <div class="atributos-grid">
                <div class="attr-box"><span class="attr-label">AGI</span><input type="number" id="agi" onchange="autoSalvar('agi', this.value)"></div>
                <div class="attr-box"><span class="attr-label">FOR</span><input type="number" id="for" onchange="autoSalvar('for', this.value)"></div>
                <div class="attr-box"><span class="attr-label">INT</span><input type="number" id="int" onchange="autoSalvar('int', this.value)"></div>
                <div class="attr-box"><span class="attr-label">VIG</span><input type="number" id="vig" onchange="autoSalvar('vig', this.value)"></div>
                <div class="attr-box"><span class="attr-label">PRE</span><input type="number" id="pre" onchange="autoSalvar('pre', this.value)"></div>
            </div>

            <div class="vida-box">
                <span style="color:#ff4d4d">PV</span>
                <input type="number" id="vidaAtual" onchange="autoSalvar('vidaAtual', this.value)"> 
                <span>/</span> 
                <input type="number" id="vidaMax" onchange="autoSalvar('vidaMax', this.value)">
            </div>
        </div>

        <div class="info-col">
            <div class="section-title">PERÍCIAS / DEFESA</div>
            <textarea id="pericias" rows="3" onchange="autoSalvar('pericias', this.value)"></textarea>

            <div class="section-title">AÇÕES</div>
            <textarea id="acoes" rows="12" onchange="autoSalvar('acoes', this.value)"></textarea>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
        authDomain: "fichasrpg-7fc69.firebaseapp.com",
        projectId: "fichasrpg-7fc69",
        storageBucket: "fichasrpg-7fc69.firebasestorage.app",
        messagingSenderId: "758802032764",
        appId: "1:758802032764:web:40467e15fdc24c570081f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const id = new URLSearchParams(window.location.search).get('id');

    if (id) {
        db.collection("ameacas").doc(id).onSnapshot(doc => {
            if (!doc.exists) return;
            const d = doc.data();
            Object.keys(d).forEach(k => {
                const el = document.getElementById(k);
                if (el && document.activeElement !== el) el.value = d[k];
            });
            if (d.imgAmeaca) document.getElementById('preview-img').src = d.imgAmeaca;
        });
    }

    async function autoSalvar(campo, valor) {
        const status = document.getElementById('status-save');
        status.innerText = "Salvando...";
        try {
            const valFinal = isNaN(valor) || valor === "" ? valor : Number(valor);
            let dados = {}; dados[campo] = valFinal;
            await db.collection("ameacas").doc(id).update(dados);
            status.innerText = "Alterações salvas";
        } catch (e) {
            status.innerText = "Erro ao salvar!";
        }
    }

    function uploadImagem(input) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64 = e.target.result;
            document.getElementById('preview-img').src = base64;
            await db.collection("ameacas").doc(id).update({ imgAmeaca: base64 });
        };
        reader.readAsDataURL(input.files[0]);
    }
</script>
</body>
</html>
