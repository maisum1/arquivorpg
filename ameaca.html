<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R.I.S. - Arquivo de Ameaça</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --hp-red: #b31d1d;
            --bg-dark: #090909;
            --text-main: #e0e0e0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            max-width: 1100px;
            margin: 0 auto 20px auto;
        }

        .btn-acao {
            padding: 10px 20px;
            font-family: 'Special Elite', cursive;
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }

        .btn-voltar { background: #333; color: white; }
        .btn-voltar:hover { background: #555; }
        .btn-excluir { background: transparent; border: 1px solid var(--hp-red); color: var(--hp-red); }
        .btn-excluir:hover { background: var(--hp-red); color: white; }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        /* Coluna da Esquerda */
        .col-left { display: flex; flex-direction: column; gap: 15px; }

        .portrait-box {
            width: 100%; aspect-ratio: 1; background-color: #111; border: 2px solid #333;
            border-radius: 8px; position: relative; overflow: hidden;
        }

        .portrait-box img { width: 100%; height: 100%; object-fit: cover; }

        textarea.descricao-box {
            width: 100%; flex: 1; min-height: 200px; background: #111; border: 1px solid #333;
            color: #ccc; padding: 15px; font-family: 'Roboto', sans-serif; border-radius: 8px;
            resize: vertical; box-sizing: border-box;
        }

        /* Coluna da Direita */
        .stat-block {
            background-color: #111; border: 3px solid var(--hp-red); padding: 25px;
            border-radius: 4px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .inline-input {
            background: transparent; border: none; border-bottom: 1px dashed #555;
            color: #fff; font-family: inherit; font-size: inherit; outline: none; padding: 2px;
        }
        .inline-input:focus { border-bottom: 1px solid var(--hp-red); }

        .stat-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            border-bottom: 2px solid var(--hp-red); padding-bottom: 15px; margin-bottom: 15px;
        }

        .stat-nome {
            font-family: 'Special Elite', cursive; font-size: 2.5em; color: #fff;
            text-transform: uppercase; width: 100%;
        }

        .stat-subtitle { color: #aaa; font-size: 0.9em; text-transform: uppercase; margin-top: 5px; }
        .stat-vd { font-family: 'Special Elite', cursive; font-size: 1.5em; color: var(--hp-red); white-space: nowrap; }

        /* Atributos */
        .atributos-container { display: flex; justify-content: space-around; margin: 20px 0; }
        .attr-box { text-align: center; }
        .attr-label { font-family: 'Special Elite', cursive; color: #888; font-size: 14px; margin-bottom: 5px; }
        .attr-input {
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--hp-red);
            background: #1a1a1a; color: white; text-align: center; font-size: 22px;
            font-weight: bold; font-family: 'Special Elite', cursive; outline: none;
        }

        .separator { border-bottom: 2px solid var(--hp-red); margin: 15px 0; }
        .stat-row { margin-bottom: 8px; line-height: 1.6; }
        .stat-label { font-family: 'Special Elite', cursive; color: var(--hp-red); font-weight: bold; margin-right: 5px; }
        .section-title { background-color: var(--hp-red); color: white; padding: 5px 10px; font-family: 'Special Elite', cursive; font-size: 1.2em; display: inline-block; margin-bottom: 10px; }

        /* Itens Dinâmicos (Ações, Habilidades) */
        .dynamic-item {
            background: rgba(255,255,255,0.02); border-left: 3px solid #444; padding: 10px;
            margin-bottom: 10px; position: relative;
        }
        .btn-del {
            position: absolute; top: 5px; right: 5px; background: none; border: none;
            color: #ff4444; cursor: pointer; font-weight: bold; font-size: 16px;
        }
        .btn-add {
            background: transparent; border: 1px solid var(--hp-red); color: var(--hp-red);
            padding: 5px 15px; cursor: pointer; font-family: 'Special Elite', cursive;
            margin-bottom: 15px; transition: 0.3s; width: 100%;
        }
        .btn-add:hover { background: var(--hp-red); color: white; }

        .save-indicator {
            position: fixed; bottom: 10px; right: 10px; background: #222; border: 1px solid #444;
            padding: 5px 10px; font-size: 12px; border-radius: 4px; display: none; color: #EAB308;
        }

        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-acao btn-voltar" onclick="window.location.href='index.html'">🡄 VOLTAR AO HUB</button>
        <button class="btn-acao btn-excluir" onclick="excluirAmeaca()">EXCLUIR AMEAÇA</button>
    </div>

    <div class="container">
        <div class="col-left">
            <div class="portrait-box">
                <img id="portrait-img" src="" alt="" onerror="this.style.display='none'">
                <span id="portrait-placeholder" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #555; font-family: 'Special Elite', cursive;">URL DA IMAGEM</span>
            </div>
            <input type="text" id="portrait" class="inline-input" placeholder="Cole o link da imagem aqui..." style="width: 100%; border-bottom: 1px solid #444;" onchange="salvarCampo(this.id, this.value)">
            <textarea id="descricao" class="descricao-box" placeholder="Breve descrição, lore, ou táticas da ameaça..." onchange="salvarCampo(this.id, this.value)"></textarea>
        </div>

        <div class="stat-block">
            
            <div class="stat-header">
                <div style="flex: 1; padding-right: 20px;">
                    <input id="nome" class="inline-input stat-nome" placeholder="NOME DA CRIATURA" onchange="salvarCampo(this.id, this.value)">
                    <div class="stat-subtitle">
                        CRIATURA <span style="color:var(--hp-red)">-</span> 
                        <input id="tamanho" class="inline-input" placeholder="TAMANHO" style="width: 80px; text-transform: uppercase;" onchange="salvarCampo(this.id, this.value)"> <span style="color:var(--hp-red)">-</span> 
                        <input id="elemento" class="inline-input" placeholder="ELEMENTO" style="width: 120px; text-transform: uppercase;" onchange="salvarCampo(this.id, this.value)">
                    </div>
                </div>
                <div class="stat-vd">
                    VD <input id="vd" class="inline-input" placeholder="0" style="width: 50px; font-size: 1em; color: var(--hp-red); text-align: center;" onchange="salvarCampo(this.id, this.value)">
                </div>
            </div>

            <div class="atributos-container">
                <div class="attr-box"><div class="attr-label">AGI</div><input id="agi" class="attr-input" placeholder="1" onchange="salvarCampo(this.id, this.value)"></div>
                <div class="attr-box"><div class="attr-label">FOR</div><input id="for" class="attr-input" placeholder="1" onchange="salvarCampo(this.id, this.value)"></div>
                <div class="attr-box"><div class="attr-label">INT</div><input id="int" class="attr-input" placeholder="1" onchange="salvarCampo(this.id, this.value)"></div>
                <div class="attr-box"><div class="attr-label">PRE</div><input id="pre" class="attr-input" placeholder="1" onchange="salvarCampo(this.id, this.value)"></div>
                <div class="attr-box"><div class="attr-label">VIG</div><input id="vig" class="attr-input" placeholder="1" onchange="salvarCampo(this.id, this.value)"></div>
            </div>

            <div class="separator"></div>

            <div class="stat-row">
                <span class="stat-label">SENTIDOS</span> 
                Percepção <input id="percepcao" class="inline-input" placeholder="2d20+10" style="width: 100px;" onchange="salvarCampo(this.id, this.value)"> 
                Iniciativa <input id="iniciativa" class="inline-input" placeholder="2d20+5" style="width: 100px;" onchange="salvarCampo(this.id, this.value)">
            </div>
            
            <div class="stat-row">
                <span class="stat-label">DEFESA</span> 
                <input id="defesa" class="inline-input" placeholder="20" style="width: 40px; font-weight: bold;" onchange="salvarCampo(this.id, this.value)"> 
                Fortitude <input id="fortitude" class="inline-input" placeholder="2d20+10" style="width: 80px;" onchange="salvarCampo(this.id, this.value)"> 
                Reflexos <input id="reflexos" class="inline-input" placeholder="2d20+5" style="width: 80px;" onchange="salvarCampo(this.id, this.value)"> 
                Vontade <input id="vontade" class="inline-input" placeholder="2d20+5" style="width: 80px;" onchange="salvarCampo(this.id, this.value)">
            </div>

            <div class="stat-row">
                <span class="stat-label">PONTOS DE VIDA</span> 
                <input id="pvMax" class="inline-input" placeholder="200" style="width: 50px; font-weight: bold;" onchange="salvarCampo(this.id, this.value)"> | 
                Atual <input id="pvAtual" class="inline-input" placeholder="200" style="width: 50px; color: var(--hp-red);" onchange="salvarCampo(this.id, this.value)"> | 
                Machucado <input id="pvMachucado" class="inline-input" placeholder="100" style="width: 50px;" onchange="salvarCampo(this.id, this.value)">
            </div>

            <div class="stat-row">
                <span class="stat-label">VULNERABILIDADES</span> <input id="vulnerabilidades" class="inline-input" placeholder="Energia..." style="width: 70%;" onchange="salvarCampo(this.id, this.value)">
            </div>
            <div class="stat-row">
                <span class="stat-label">RESISTÊNCIAS</span> <input id="resistencias" class="inline-input" placeholder="Dano físico 10, Sangue 10..." style="width: 75%;" onchange="salvarCampo(this.id, this.value)">
            </div>
            <div class="stat-row">
                <span class="stat-label">IMUNIDADES</span> <input id="imunidades" class="inline-input" placeholder="Condições de paralisia..." style="width: 78%;" onchange="salvarCampo(this.id, this.value)">
            </div>

            <div class="separator"></div>

            <div class="stat-row">
                <span class="stat-label">PERÍCIAS</span> <input id="pericias" class="inline-input" placeholder="Atletismo 4d20+15, Luta 4d20+15..." style="width: 85%;" onchange="salvarCampo(this.id, this.value)">
            </div>

            <div class="separator"></div>

            <div class="stat-row">
                <span class="stat-label">DESLOCAMENTO</span> <input id="deslocamento" class="inline-input" placeholder="9m | 6q" style="width: 70%;" onchange="salvarCampo(this.id, this.value)">
            </div>

            <div class="separator"></div>

            <div>
                <div class="section-title">AÇÕES</div>
                <div id="lista-acoes"></div>
                <button class="btn-add" onclick="addAcao()">+ Adicionar Nova Ação</button>
            </div>

            <div class="separator"></div>

            <div>
                <div class="section-title">HABILIDADES</div>
                <div id="lista-habilidades"></div>
                <button class="btn-add" onclick="addHabilidade()">+ Adicionar Nova Habilidade</button>
            </div>

            <div class="separator"></div>

            <div>
                <div class="section-title">ENIGMA DE MEDO</div>
                <textarea id="enigma" class="descricao-box" placeholder="Descreva o enigma de medo e como resolvê-lo..." style="min-height: 100px; border: none; border-bottom: 1px dashed #555; border-radius: 0; background: transparent; padding: 5px;" onchange="salvarCampo(this.id, this.value)"></textarea>
            </div>

        </div>
    </div>

    <div id="save-indicator" class="save-indicator">A guardar alterações...</div>

    <script>
        // --- COLOCA AS TUAS CREDENCIAIS AQUI ---
        const firebaseConfig = {
            apiKey: "SUA_API_KEY_AQUI",
            authDomain: "SEU_DOMAIN_AQUI.firebaseapp.com",
            projectId: "SEU_PROJECT_ID_AQUI",
            storageBucket: "SEU_BUCKET_AQUI.appspot.com",
            messagingSenderId: "SEU_SENDER_ID",
            appId: "SEU_APP_ID"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        
        const urlParams = new URLSearchParams(window.location.search);
        const atual = urlParams.get('id');

        if(!atual) { 
            alert("Erro: ID da ameaça não encontrado!");
            window.location.href = "index.html"; 
        }

        // --- SISTEMA DE GUARDAR AUTOMÁTICO (ROBUSTO) ---
        function salvarCampo(campo, valor) {
            const ind = document.getElementById('save-indicator');
            ind.style.display = 'block';
            ind.innerText = "A guardar...";

            let obj = {}; 
            obj[campo] = valor;
            
            db.collection("ameacas").doc(atual).update(obj).then(() => {
                ind.innerText = "Guardado!";
                setTimeout(() => ind.style.display = 'none', 1500);
            }).catch(erro => {
                console.error("Erro ao guardar:", erro);
                ind.innerText = "Erro ao guardar!";
                ind.style.color = "red";
            });
        }

        // Carregar Dados Iniciais (Apenas uma vez para não apagar o que estás a escrever)
        db.collection("ameacas").doc(atual).get().then(doc => {
            if(doc.exists) {
                const d = doc.data();
                const campos = ['nome', 'tamanho', 'elemento', 'vd', 'agi', 'for', 'int', 'pre', 'vig', 
                                'percepcao', 'iniciativa', 'defesa', 'fortitude', 'reflexos', 'vontade', 
                                'pvMax', 'pvAtual', 'pvMachucado', 'vulnerabilidades', 'resistencias', 
                                'imunidades', 'pericias', 'deslocamento', 'descricao', 'enigma', 'portrait'];
                
                campos.forEach(campo => {
                    if (d[campo] !== undefined) {
                        document.getElementById(campo).value = d[campo];
                    }
                });

                // Atualizar Imagem
                if(d.portrait) {
                    document.getElementById('portrait-img').src = d.portrait;
                    document.getElementById('portrait-img').style.display = 'block';
                    document.getElementById('portrait-placeholder').style.display = 'none';
                }
            }
        });

        // --- EXCLUIR AMEAÇA INTEIRA ---
        async function excluirAmeaca() {
            if(confirm("TEM A CERTEZA? Esta ação apagará a ameaça permanentemente.")) {
                await db.collection("ameacas").doc(atual).delete();
                window.location.href = "index.html";
            }
        }

        // --- SUBCOLEÇÕES (Ações e Habilidades) ---
        function loadSub(col, containerId, renderFunc) {
            db.collection("ameacas").doc(atual).collection(col).onSnapshot(snap => {
                const container = document.getElementById(containerId);
                container.innerHTML = "";
                snap.forEach(doc => { container.innerHTML += renderFunc(doc.id, doc.data()); });
            });
        }

        async function updateSub(id, col, campo, valor) {
            let obj = {}; obj[campo] = valor;
            await db.collection("ameacas").doc(atual).collection(col).doc(id).update(obj);
        }

        async function removerSub(id, col) {
            if(confirm("Excluir este item?")) {
                await db.collection("ameacas").doc(atual).collection(col).doc(id).delete();
            }
        }

        // AÇÕES
        async function addAcao() {
            await db.collection("ameacas").doc(atual).collection("acoes").add({
                tipo: "Padrão", nome: "Nova Ação", alcance: "Corpo a Corpo", teste: "4d20", dano: "1d10"
            });
        }

        function renderAcao(id, data) {
            return `
            <div class="dynamic-item">
                <button class="btn-del" onclick="removerSub('${id}', 'acoes')" title="Excluir Ação">✖</button>
                <div style="margin-bottom: 5px; padding-right: 20px;">
                    <input class="inline-input" placeholder="Ação Padrão" value="${data.tipo || ''}" onchange="updateSub('${id}','acoes','tipo',this.value)" style="width: 80px;"> 
                    <input class="inline-input" placeholder="Nome do Ataque" value="${data.nome || ''}" onchange="updateSub('${id}','acoes','nome',this.value)" style="width: 150px; color: var(--hp-red); font-weight: bold; font-family: 'Special Elite', cursive;"> 
                    (<input class="inline-input" placeholder="Alcance" value="${data.alcance || ''}" onchange="updateSub('${id}','acoes','alcance',this.value)" style="width: 120px;">)
                </div>
                <div>
                    <span class="stat-label">Teste:</span> <input class="inline-input" placeholder="4d20+15" value="${data.teste || ''}" onchange="updateSub('${id}','acoes','teste',this.value)" style="width: 80px;"> | 
                    <span class="stat-label">Dano:</span> <input class="inline-input" placeholder="2d10+10 Sangue" value="${data.dano || ''}" onchange="updateSub('${id}','acoes','dano',this.value)" style="width: 150px;">
                </div>
                <input class="inline-input" placeholder="Efeitos extras (ex: deixa sangrando)..." value="${data.efeitos || ''}" onchange="updateSub('${id}','acoes','efeitos',this.value)" style="width: 100%; margin-top: 5px; color: #aaa; font-size: 0.9em;">
            </div>`;
        }

        // HABILIDADES
        async function addHabilidade() {
            await db.collection("ameacas").doc(atual).collection("habilidades").add({ 
                nome: "Nova Habilidade", descricao: "" 
            });
        }

        function renderHabilidade(id, data) {
            return `
            <div class="dynamic-item">
                <button class="btn-del" onclick="removerSub('${id}', 'habilidades')" title="Excluir Habilidade">✖</button>
                <div style="margin-bottom: 5px; padding-right: 20px;">
                    <input class="inline-input" placeholder="Nome da Habilidade" value="${data.nome || ''}" onchange="updateSub('${id}','habilidades','nome',this.value)" style="width: 250px; color: var(--hp-red); font-weight: bold; font-family: 'Special Elite', cursive;">
                </div>
                <textarea class="inline-input" placeholder="Descrição da habilidade..." onchange="updateSub('${id}','habilidades','descricao',this.value)" style="width: 100%; height: 50px; resize: vertical; border-bottom: 1px dashed #555;">${data.descricao || ''}</textarea>
            </div>`;
        }

        // Iniciar carregamento das listas
        loadSub('acoes', 'lista-acoes', renderAcao);
        loadSub('habilidades', 'lista-habilidades', renderHabilidade);
    </script>
</body>
</html>
