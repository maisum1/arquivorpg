<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ameaça</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

body{
background:#0b0b0b;
color:white;
font-family:'Special Elite';
margin:0;
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:800px;
border:1px solid #7f1d1d;
padding:20px;
background:#111;
}

.header{
display:flex;
gap:20px;
flex-wrap:wrap;
align-items:center;
border-bottom:1px solid #7f1d1d;
padding-bottom:20px;
}

.portrait{
width:140px;
height:140px;
background:#000;
border:1px solid #7f1d1d;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.portrait img{
width:100%;
height:100%;
object-fit:cover;
}

input, textarea{
background:#000;
border:1px solid #333;
color:white;
padding:6px;
font-family:'Special Elite';
width:100%;
}

.section{
margin-top:20px;
border-top:1px solid #333;
padding-top:15px;
}

h2{
color:#b91c1c;
margin:0 0 10px 0;
}

button{
background:#7f1d1d;
border:none;
color:white;
padding:10px 15px;
cursor:pointer;
margin-top:15px;
}
button:hover{ background:#991b1b; }

@media(max-width:600px){
.header{flex-direction:column;align-items:flex-start;}
.portrait{width:100%;height:200px;}
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<div class="portrait" onclick="document.getElementById('imgUpload').click()">
<img id="preview">
</div>

<div style="flex:1">
<label>Nome</label>
<input id="nome">
<label>VD</label>
<input id="vd" type="number">
<label>Tipo</label>
<input id="tipo">
<label>Descrição Breve</label>
<textarea id="descricao"></textarea>
</div>
</div>

<div class="section">
<h2>Atributos</h2>
AGI <input id="agi" type="number">
FOR <input id="for" type="number">
INT <input id="int" type="number">
PRE <input id="pre" type="number">
VIG <input id="vig" type="number">
</div>

<div class="section">
<h2>Combate</h2>
Defesa <input id="defesa" type="number">
Vida <input id="vida" type="number">
Deslocamento <input id="deslocamento">
Presença Perturbadora <textarea id="presenca"></textarea>
</div>

<button onclick="salvar()">Salvar</button>
<br><br>
<a href="index.html" style="color:#b91c1c;">Voltar</a>

<input type="file" id="imgUpload" style="display:none">

</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
authDomain:"fichasrpg-7fc69.firebaseapp.com",
projectId:"fichasrpg-7fc69",
storageBucket:"fichasrpg-7fc69.firebasestorage.app",
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const storage=firebase.storage();

const params=new URLSearchParams(window.location.search);
const id=params.get("id");

if(id){
db.collection("ameacas").doc(id).get().then(doc=>{
if(doc.exists){
let d=doc.data();
for(let k in d){
if(document.getElementById(k))
document.getElementById(k).value=d[k];
}
if(d.imagem) document.getElementById('preview').src=d.imagem;
}
});
}

async function salvar(){
let dados={
nome:nome.value,
vd:vd.value,
tipo:tipo.value,
descricao:descricao.value,
agi:agi.value,
for:for.value,
int:int.value,
pre:pre.value,
vig:vig.value,
defesa:defesa.value,
vida:vida.value,
deslocamento:deslocamento.value,
presenca:presenca.value
};

await db.collection("ameacas").doc(id).update(dados);
alert("Salvo.");
}

document.getElementById('imgUpload').addEventListener('change',async e=>{
let file=e.target.files[0];
let ref=storage.ref().child("ameacas/"+id);
await ref.put(file);
let url=await ref.getDownloadURL();
document.getElementById('preview').src=url;
await db.collection("ameacas").doc(id).update({imagem:url});
});
</script>
</body>
</html>
