<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Ameaça - Ordo Realitas</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        
        /* Remove setas de número */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        body { 
            background: #050505; 
            color: #e0e0e0; 
            font-family: 'Special Elite', sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* Layout Full Width */
        .nav-header { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
        }

        .btn-voltar { 
            background: transparent; 
            border: 1px solid #444; 
            color: #888; 
            padding: 10px 20px; 
            cursor: pointer; 
            font-family: 'Special Elite'; 
            text-decoration: none; 
            transition: 0.3s; 
        }
        .btn-voltar:hover { border-color: #ff4d4d; color: #ff4d4d; }
        #status-save { font-size: 0.9rem; color: #444; }

        .ficha-container { 
            width: 100%; 
            background: #0a0a0a; 
            border: 2px solid #330000; 
            padding: 30px; 
            box-sizing: border-box; 
            min-height: 90vh;
        }
        
        .header { 
            display: grid; 
            grid-template-columns: 3fr 1fr; 
            gap: 30px; 
            border-bottom: 2px solid #ff4d4d; 
            padding-bottom: 20px; 
            margin-bottom: 30px; 
        }

        .nome-area input { 
            background: transparent; 
            border: none; 
            color: #ff4d4d; 
            font-size: 3.5rem; 
            font-family: 'Special Elite'; 
            width: 100%; 
            outline: none; 
        }

        .vd-area { text-align: right; color: #ff4d4d; font-size: 2rem; }
        .vd-area input { 
            width: 120px; 
            background: #151515; 
            border: 1px solid #441111; 
            color: white; 
            text-align: center; 
            font-family: 'Special Elite'; 
            font-size: 2rem; 
        }

        .top-info { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        .top-info div { display: flex; flex-direction: column; gap: 5px; color: #888; }
        .top-info input { 
            background: #151515; 
            border: 1px solid #333; 
            color: white; 
            padding: 10px; 
            font-family: 'Special Elite'; 
            outline: none; 
        }

        .corpo-ficha { 
            display: grid; 
            grid-template-columns: 300px 1fr 1fr; 
            gap: 30px; 
        }

        .stats-col { display: flex; flex-direction: column; gap: 25px; }

        .img-ameaca { 
            width: 100%; 
            aspect-ratio: 2/3; 
            border: 1px solid #333; 
            background: #000; 
            cursor: pointer; 
            object-fit: cover; 
            transition: 0.3s;
        }
        .img-ameaca:hover { border-color: #ff4d4d; }

        .atributos-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
        }
        .attr-box { 
            background: #111; 
            border: 1px solid #ff4d4d; 
            border-radius: 50%; 
            width: 80px; 
            height: 80px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            margin: auto; 
        }
        .attr-box input { 
            width: 45px; 
            background: transparent; 
            border: none; 
            color: white; 
            text-align: center; 
            font-size: 1.6rem; 
            font-family: 'Special Elite'; 
            outline: none; 
        }
        .attr-label { font-size: 0.8rem; color: #ff4d4d; font-weight: bold; }

        .vida-box { 
            background: #200; 
            border: 1px solid #ff4d4d; 
            padding: 20px; 
            text-align: center; 
            border-radius: 4px;
        }
        .vida-box div { margin-bottom: 5px; color: #ff4d4d; font-size: 1.2rem; }
        .vida-inputs { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .vida-inputs input { 
            width: 90px; 
            font-size: 2rem; 
            background: transparent; 
            border: none; 
            color: #ff4d4d; 
            text-align: center; 
            font-family: 'Special Elite'; 
            outline: none; 
        }

        .section-title { 
            background: #300; 
            color: #ff4d4d; 
            padding: 10px 15px; 
            margin: 0 0 15px 0; 
            font-size: 1.2rem; 
            border-left: 5px solid #ff4d4d; 
            letter-spacing: 2px;
        }
        
        textarea { 
            width: 100%; 
            background: #111; 
            border: 1px solid #222; 
            color: #ccc; 
            font-family: 'Special Elite'; 
            resize: vertical; 
            padding: 15px; 
            box-sizing: border-box; 
            outline: none; 
            margin-bottom: 25px;
            font-size: 1rem;
            line-height: 1.5;
        }
        textarea:focus { border-color: #ff4d4d; background: #150505; }

        @media (max-width: 1100px) {
            .corpo-ficha { grid-template-columns: 1fr; }
            .stats-col { align-items: center; }
        }
    </style>
</head>
<body>

<div class="nav-header">
    <a href="index.html" class="btn-voltar">← VOLTAR AO HUB</a>
    <div id="status-save">Sincronizado</div>
</div>

<div class="ficha-container">
    <div class="header">
        <div class="nome-area">
            <input type="text" id="nome" placeholder="NOME DA AMEAÇA" onchange="autoSave('nome', this.value)">
        </div>
        <div class="vd-area">
            VD <input type="number" id="vd" placeholder="0" onchange="autoSave('vd', this.value)">
        </div>
    </div>

    <div class="top-info">
        <div>ELEMENTOS <input type="text" id="elementos" onchange="autoSave('elementos', this.value)"></div>
        <div>CLASSE <input type="text" id="classe" onchange="autoSave('classe', this.value)"></div>
        <div>TAMANHO <input type="text" id="tamanho" onchange="autoSave('tamanho', this.value)"></div>
        <div>TIPO <input type="text" id="tipo" onchange="autoSave('tipo', this.value)"></div>
    </div>

    <div class="corpo-ficha">
        <div class="stats-col">
            <img src="" id="preview-img" class="img-ameaca" title="Clique para alterar imagem" onclick="document.getElementById('file-input').click()">
            <input type="file" id="file-input" style="display:none;" onchange="uploadImg(this)">
            
            <div class="atributos-grid">
                <div class="attr-box"><span class="attr-label">AGI</span><input type="number" id="agi" onchange="autoSave('agi', this.value)"></div>
                <div class="attr-box"><span class="attr-label">FOR</span><input type="number" id="for" onchange="autoSave('for', this.value)"></div>
                <div class="attr-box"><span class="attr-label">INT</span><input type="number" id="int" onchange="autoSave('int', this.value)"></div>
                <div class="attr-box"><span class="attr-label">VIG</span><input type="number" id="vig" onchange="autoSave('vig', this.value)"></div>
                <div class="attr-box"><span class="attr-label">PRE</span><input type="number" id="pre" onchange="autoSave('pre', this.value)"></div>
            </div>

            <div class="vida-box">
                <div>PONTOS DE VIDA</div>
                <div class="vida-inputs">
                    <input type="number" id="vidaAtual" onchange="autoSave('vidaAtual', this.value)"> 
                    <span>/</span> 
                    <input type="number" id="vidaMax" onchange="autoSave('vidaMax', this.value)">
                </div>
            </div>
        </div>

        <div class="center-col">
            <div class="section-title">DEFESA E RESISTÊNCIAS</div>
            <textarea id="defesa" rows="4" placeholder="Defesa: 20&#10;Esquiva: 30&#10;Resistências: Morte 10, Corte 5..." onchange="autoSave('defesa', this.value)"></textarea>

            <div class="section-title">PERÍCIAS</div>
            <textarea id="pericias" rows="4" placeholder="Percepção +15, Iniciativa +10, Fortitude +2d20+10..." onchange="autoSave('pericias', this.value)"></textarea>

            <div class="section-title">DESCRIÇÃO</div>
            <textarea id="descricao" rows="10" placeholder="História, comportamento e aparência..." onchange="autoSave('descricao', this.value)"></textarea>
        </div>

        <div class="right-col">
            <div class="section-title">AÇÕES E ATAQUES</div>
            <textarea id="acoes" rows="28" placeholder="PADRÃO - Mordida: +15 | 2d10+5 Sangue&#10;&#10;MOVIMENTO - Salto: Se desloca 9m...&#10;&#10;REAÇÃO - Pele de Ferro..." onchange="autoSave('acoes', this.value)"></textarea>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
        authDomain: "fichasrpg-7fc69.firebaseapp.com",
        projectId: "fichasrpg-7fc69",
        storageBucket: "fichasrpg-7fc69.firebasestorage.app",
        messagingSenderId: "758802032764",
        appId: "1:758802032764:web:40467e15fdc24c570081f9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const id = new URLSearchParams(window.location.search).get('id');

    if (!id) window.location.href = 'index.html';

    // Carregamento Inicial Realtime
    db.collection("ameacas").doc(id).onSnapshot(doc => {
        if (!doc.exists) return;
        const d = doc.data();
        Object.keys(d).forEach(key => {
            const input = document.getElementById(key);
            if (input && document.activeElement !== input) {
                input.value = d[key];
            }
        });
        if (d.imgAmeaca) document.getElementById('preview-img').src = d.imgAmeaca;
    });

    async function autoSave(campo, valor) {
        const status = document.getElementById('status-save');
        status.innerText = "Salvando...";
        status.style.color = "#ff4d4d";

        try {
            // Converte para número se o input for do tipo number
            const finalValue = document.getElementById(campo).type === 'number' ? Number(valor) : valor;
            
            let data = {};
            data[campo] = finalValue;
            
            await db.collection("ameacas").doc(id).update(data);
            
            status.innerText = "Alterações salvas";
            status.style.color = "#444";
        } catch (e) {
            console.error(e);
            status.innerText = "Erro ao salvar!";
        }
    }

    function uploadImg(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const base64 = e.target.result;
            document.getElementById('preview-img').src = base64;
            await db.collection("ameacas").doc(id).update({ imgAmeaca: base64 });
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
