<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portrait Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: 'Special Elite', sans-serif; 
            background: transparent; 
        }
        
        #portrait-container {
            position: relative;
            width: 400px;
            height: 550px;
        }

        #personagem-img {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: bottom;
            z-index: 1;
            transition: all 0.5s ease;
        }

        /* CONTEINER DE STATUS (NOME, VIDA, SAN) */
        .status-text-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-align: right;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            line-height: 1.2;
        }

        #nome-val {
            font-size: 32px;
            color: #ff4d4d;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 10px #ff0000, 0 0 20px #ff0000;
            margin-bottom: 5px;
        }

        #vida-text {
            font-size: 28px;
            color: #ff4d4d;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 10px #ff0000, 0 0 20px #ff0000;
            margin-bottom: 5px;
        }

        #san-text {
            font-size: 28px;
            color: #4da6ff;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 10px #0066ff, 0 0 20px #0066ff;
        }

        /* ESFORÇO NO CANTO INFERIOR ESQUERDO */
        #pe-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 22px; 
            color: #cc66ff;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 10px #9900ff, 0 0 20px #9900ff;
            z-index: 11;
        }

        /* Estado Morto (Silhueta Escura) */
        .morto { filter: brightness(0) contrast(100%); }

        /* Tela de erro para avisar se o Firebase bloquear o OBS */
        #error-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999; color: white;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
            padding: 20px; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="error-screen">
        <h3 style="color: #ff4d4d; margin-top: 0;">ACESSO BLOQUEADO</h3>
        <p style="font-family: sans-serif; font-size: 14px; color: #ccc;">
            O OBS não tem permissão para ler o banco de dados.<br><br>
            Vá nas Regras (Rules) do seu Firestore e coloque:<br>
            <strong style="color: yellow;">allow read: if true;</strong><br><br>
            Ou clique com botão direito no OBS -> Interagir -> Fazer Login abaixo:
        </p>
        <button onclick="fazerLoginOBS()" style="padding: 10px; cursor: pointer; background: var(--pe-orange); color: white; border: none; font-weight: bold;">Login com Google</button>
    </div>

    <div id="portrait-container">
        <img id="personagem-img" src="" alt="">
        
        <div id="pe-container">
            <span id="pe-val">0</span>
        </div>

        <div class="status-text-container">
            <div id="nome-val">AGENTE</div>
            <div id="vida-text">0 / 0</div>
            <div id="san-text">0 / 0</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        function fazerLoginOBS() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => alert(e.message));
        }

        function iniciarOverlay() {
            if(!id) return;

            db.collection("fichas").doc(id).onSnapshot(doc => {
                // Se der certo, oculta a tela de erro
                document.getElementById('error-screen').style.display = 'none';

                const d = doc.data();
                if(!d) return;

                // 1. Atualiza Textos
                document.getElementById('nome-val').innerText = d.nome || "Agente";
                document.getElementById('pe-val').innerText = d.peAtual || 0;
                
                document.getElementById('vida-text').innerText = `${d.vidaAtual || 0} / ${d.vidaMax || 0}`;
                document.getElementById('san-text').innerText = `${d.sanAtual || 0} / ${d.sanMax || 0}`;

                // 2. Lógica Automática de Troca de Arte
                let imgFinal = d.portraitNormal || "";
                const imgEl = document.getElementById('personagem-img');
                imgEl.classList.remove('morto');

                const pVida = (d.vidaAtual / d.vidaMax) * 100;

                // A prioridade desce do Pior estado (Morto) para o Menos Pior
                if (d.vidaAtual <= 0) {
                    imgFinal = d.portraitMorto || d.portraitNormal || "";
                    if (!d.portraitMorto && d.portraitNormal) imgEl.classList.add('morto'); 
                } 
                else if (d.sanAtual <= 0) {
                    imgFinal = d.portraitEnlouquecendo || d.portraitNormal || "";
                } 
                else if (pVida <= 50) {
                    imgFinal = d.portraitMachucado || d.portraitNormal || "";
                }

                // Evita que a imagem "pisque" atualizando só se a URL mudar de verdade
                if(imgFinal && imgEl.getAttribute('src') !== imgFinal) {
                    imgEl.setAttribute('src', imgFinal);
                } else if (!imgFinal && imgEl.getAttribute('src') !== "") {
                    imgEl.setAttribute('src', "");
                }

            }, error => {
                // Se o OBS for bloqueado pelo Firebase, mostra o erro visual
                console.error("Erro de permissão:", error);
                document.getElementById('error-screen').style.display = 'flex';
            });
        }

        // Tenta iniciar a leitura imediatamente. 
        iniciarOverlay();

        // Se o usuário logar pelo OBS para resolver a permissão, recarrega
        auth.onAuthStateChanged(user => {
            if(user) iniciarOverlay();
        });

    </script>
</body>
</html>
