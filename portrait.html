<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portrait Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Special Elite', sans-serif; background: transparent; }
        
        #portrait-container {
            position: relative;
            width: 400px;
            height: 550px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        #personagem-img {
            position: absolute;
            bottom: 80px;
            left: 0;
            width: 100%;
            z-index: 1;
            transition: all 0.5s ease;
        }

        .status-bars {
            position: relative;
            z-index: 10;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }

        .nome {
            font-size: 28px;
            color: white;
            text-transform: uppercase;
            text-shadow: 2px 2px #000, 0 0 10px rgba(255,255,255,0.3);
            margin-bottom: 5px;
        }

        .bar-container { width: 250px; height: 12px; background: rgba(0,0,0,0.5); border: 1px solid #333; margin-bottom: 5px; position: relative; }
        .bar-fill { height: 100%; transition: width 0.5s ease; }
        
        .vida-fill { background: #b31d1d; box-shadow: 0 0 10px #b31d1d; }
        .san-fill { background: #034374; box-shadow: 0 0 10px #034374; }
        
        .pe-badge {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(90, 12, 146, 0.2);
            border: 2px solid #5A0C92;
            color: #bd6bff;
            padding: 5px 15px;
            font-size: 20px;
            box-shadow: 0 0 15px #5A0C92;
            z-index: 11;
        }

        /* Estado Morto (Silhueta Escura) */
        .morto { filter: brightness(0) contrast(100%); }
    </style>
</head>
<body>

    <div id="portrait-container">
        <img id="personagem-img" src="" alt="">
        
        <div class="pe-badge">PE: <span id="pe-val">0</span></div>

        <div class="status-bars">
            <div class="nome" id="nome-val">AGENTE</div>
            <div class="bar-container"><div id="vida-fill" class="bar-fill vida-fill"></div></div>
            <div class="bar-container"><div id="san-fill" class="bar-fill san-fill"></div></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if(id) {
            db.collection("fichas").doc(id).onSnapshot(doc => {
                const d = doc.data();
                if(!d) return;

                // 1. Atualiza Textos
                document.getElementById('nome-val').innerText = d.nome || "Agente";
                document.getElementById('pe-val').innerText = d.peAtual || 0;

                // 2. Atualiza Barras Gráficas
                const pVida = (d.vidaAtual / d.vidaMax) * 100;
                const pSan = (d.sanAtual / d.sanMax) * 100;
                document.getElementById('vida-fill').style.width = Math.max(0, Math.min(pVida, 100)) + "%";
                document.getElementById('san-fill').style.width = Math.max(0, Math.min(pSan, 100)) + "%";

                // 3. Lógica Automática de Troca de Arte
                let imgFinal = d.portraitNormal;
                const imgEl = document.getElementById('personagem-img');
                imgEl.classList.remove('morto');

                // A prioridade desce do "Pior caso" para o "Melhor caso"
                if (d.vidaAtual <= 0) {
                    imgFinal = d.portraitMorto || d.portraitNormal;
                    if (!d.portraitMorto && d.portraitNormal) imgEl.classList.add('morto'); 
                } 
                else if (d.sanAtual <= 0) {
                    imgFinal = d.portraitEnlouquecendo || d.portraitNormal;
                } 
                else if (pVida <= 50) {
                    imgFinal = d.portraitMachucado || d.portraitNormal;
                }

                // Atualiza a fonte da imagem apenas se necessário para evitar piscar (flicker) na live
                if(imgEl.src !== imgFinal) {
                    imgEl.src = imgFinal || "";
                }
            });
        }
    </script>
</body>
</html>
