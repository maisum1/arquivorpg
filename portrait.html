<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portrait FIX</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Special Elite', sans-serif; background: transparent; color: white; }
        #main-wrapper { display: flex; flex-direction: row; align-items: flex-end; padding: 20px; gap: 25px; }
        #image-frame { position: relative; width: 250px; height: 350px; overflow: hidden; }
        #personagem-img { position: absolute; transition: all 0.4s ease-out; }
        #stats-container { display: flex; flex-direction: column; margin-left: -40px; position: relative; z-index: 10; }
        #nome-val { font-size: 40px; text-transform: uppercase; text-shadow: 2px 2px 2px #000, 0 0 8px #ff0000; color: white; }
        #vida-text { font-size: 36px; text-shadow: 2px 2px 2px #000, 0 0 8px #ff0000; color: white; }
        #san-text { font-size: 36px; text-shadow: 2px 2px 2px #000, 0 0 8px #0066ff; color: white; }
    </style>
</head>
<body>
    <div id="main-wrapper">
        <div id="image-frame"><img id="personagem-img" src=""></div>
        <div id="stats-container">
            <div id="nome-val">...</div>
            <div id="vida-text">0/0</div>
            <div id="san-text">0/0</div>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const id = new URLSearchParams(window.location.search).get('id');

        if (id) {
            db.collection("fichas").doc(id).onSnapshot(doc => {
                const d = doc.data();
                if(!d) return;
                document.getElementById('nome-val').innerText = d.nome || "Agente";
                document.getElementById('vida-text').innerText = `${d.vidaAtual}/${d.vidaMax}`;
                document.getElementById('san-text').innerText = `${d.sanAtual}/${d.sanMax}`;

                let estado = "Normal";
                if (d.vidaAtual <= 0) estado = "Morto";
                else if (d.sanAtual <= 0) estado = "Enlouquecendo";
                else if ((d.vidaAtual / d.vidaMax) <= 0.5) estado = "Machucado";

                const imgFinal = d.imgNormal || d.portraitNormal;
                const imgEl = document.getElementById('personagem-img');
                if(imgFinal && imgEl.src !== imgFinal) imgEl.src = imgFinal;

                const zoom = Number(d["p"+estado+"Zoom"]) || 1;
                const x = Number(d["p"+estado+"X"]) || 0;
                const y = Number(d["p"+estado+"Y"]) || 0;

                imgEl.style.width = (zoom * 100) + "%";
                imgEl.style.left = x + "px";
                imgEl.style.top = y + "px";
                imgEl.style.filter = "drop-shadow(0 0 5px #ff0000) drop-shadow(0 0 15px #ff0000)";
            });
        }
    </script>
</body>
</html>
