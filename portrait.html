<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portrait Recorte Manual</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Special Elite', sans-serif; background: transparent; }
        
        #main-wrapper { display: flex; flex-direction: row; align-items: flex-end; padding: 20px; gap: 25px; }

        /* QUADRO DE RECORTE FIXO */
        #image-frame {
            position: relative;
            width: 250px; height: 350px;
            overflow: hidden;
            background: transparent;
        }

        #personagem-img {
            position: absolute;
            transition: all 0.4s ease-out; /* Suaviza a troca de posição/zoom */
        }

        /* PE SOBREPOSTO */
        #pe-container {
            position: absolute; bottom: 10px; left: 10px; font-size: 40px; 
            color: #cc66ff; text-shadow: 2px 2px 0 #000, 0 0 12px #9900ff; z-index: 10;
        }

        /* TEXTOS AO LADO */
        #stats-container { display: flex; flex-direction: column; align-items: flex-start; padding-bottom: 5px; }
        #nome-val { font-size: 40px; color: #ff4d4d; text-transform: uppercase; text-shadow: 2px 2px 0 #000, 0 0 15px #ff0000; margin-bottom: 10px; line-height: 0.9; }
        #vida-text { font-size: 36px; color: #ff4d4d; text-shadow: 2px 2px 0 #000, 0 0 10px #ff0000; margin-bottom: 5px; line-height: 1; }
        #san-text { font-size: 36px; color: #4da6ff; text-shadow: 2px 2px 0 #000, 0 0 10px #0066ff; line-height: 1; }
        
        .morto-filtro { filter: brightness(0) contrast(100%); }
    </style>
</head>
<body>

    <div id="main-wrapper">
        <div id="image-frame">
            <img id="personagem-img" src="">
            <div id="pe-container"><span id="pe-val">0</span></div>
        </div>

        <div id="stats-container">
            <div id="nome-val">AGENTE</div>
            <div id="vida-text">0 / 0</div>
            <div id="san-text">0 / 0</div>
        </div>
    </div>

    <script>
        // Use suas credenciais aqui
        const firebaseConfig = {
            apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        db.collection("fichas").doc(id).onSnapshot(doc => {
            const d = doc.data();
            if(!d) return;

            // 1. Atualizar Textos
            document.getElementById('nome-val').innerText = d.nome || "Agente";
            document.getElementById('pe-val').innerText = d.peAtual || 0;
            document.getElementById('vida-text').innerText = `${d.vidaAtual}/${d.vidaMax}`;
            document.getElementById('san-text').innerText = `${d.sanAtual}/${d.sanMax}`;

            // 2. Lógica de Imagem e Recorte Específico
            let imgFinal = d.portraitNormal;
            let estado = "Normal";
            const imgEl = document.getElementById('personagem-img');
            imgEl.classList.remove('morto-filtro');

            if (d.vidaAtual <= 0) {
                imgFinal = d.portraitMorto || d.portraitNormal;
                estado = "Morto";
                if(!d.portraitMorto) imgEl.classList.add('morto-filtro');
            } else if (d.sanAtual <= 0) {
                imgFinal = d.portraitEnlouquecendo || d.portraitNormal;
                estado = "Enlouquecendo";
            } else if ((d.vidaAtual / d.vidaMax) <= 0.5) {
                imgFinal = d.portraitMachucado || d.portraitNormal;
                estado = "Machucado";
            }

            // Aplica a URL
            if(imgEl.src !== imgFinal) imgEl.src = imgFinal;

            // 3. APLICA O RECORTE MANUAL SALVO PARA ESTE ESTADO
            const zoom = d[`p${estado}Zoom`] || d.pNormalZoom || 1;
            const x = d[`p${estado}X`] || d.pNormalX || 0;
            const y = d[`p${estado}Y`] || d.pNormalY || 0;

            imgEl.style.width = (zoom * 100) + "%";
            imgEl.style.left = x + "px";
            imgEl.style.top = y + "px";
        });
    </script>
</body>
</html>
