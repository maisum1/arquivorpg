<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portrait Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

body { 
    margin: 0; 
    padding: 0; 
    overflow: hidden; 
    font-family: 'Special Elite', sans-serif; 
    background: transparent; 
}

/* CONTAINER PRINCIPAL */
#main-wrapper {
    display: flex;
    flex-direction: row;
    align-items: flex-start; /* Nome sobe */
    padding: 15px;
    gap: 18px;
}

/* QUADRO DA IMAGEM */
#image-frame {
    position: relative;
    width: 240px;
    height: 340px;
    overflow: visible; /* importante */
    background: transparent;
}

/* Remove qualquer borda do container */
#image-frame {
    border: none;
    box-shadow: none;
}

#personagem-img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* importante para PNG recortado */
    object-position: bottom center;
    transition: all 0.5s ease;

    /* Moldura vermelha que segue o contorno */
    filter:
        drop-shadow(0 0 6px #ff0000)
        drop-shadow(0 0 12px #ff0000)
        drop-shadow(0 0 18px #990000);
}

/* PE (mantido no canto inferior esquerdo) */
#pe-container {
    position: absolute;
    bottom: 8px;
    left: 8px;
    font-size: 24px; 
    color: #cc66ff;
    text-shadow:
        2px 2px 0 #000,
        0 0 10px #9900ff,
        0 0 20px #9900ff;
    z-index: 10;
}

/* CONTAINER STATUS */
#stats-container {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    padding-top: 5px;
}

/* NOME */
#nome-val {
    font-size: 42px;
    color: #ff1a1a;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow:
        3px 3px 0 #000,
        0 0 12px #ff0000,
        0 0 24px #ff0000;
    margin-bottom: 12px;
    line-height: 1;
}

/* VIDA */
#vida-text {
    font-size: 38px;
    color: #ff1a1a;
    text-shadow:
        2px 2px 0 #000,
        0 0 10px #ff0000,
        0 0 20px #ff0000;
    margin-bottom: 4px;
    line-height: 1;
}

/* SANIDADE */
#san-text {
    font-size: 32px;
    color: #2da8ff;
    text-shadow:
        2px 2px 0 #000,
        0 0 10px #0066ff,
        0 0 20px #0066ff;
    line-height: 1;
}

/* Estado Morto */
.morto { 
    filter: brightness(0) contrast(120%);
}

/* Tela erro (inalterada visualmente) */
#error-screen {
    display: none; 
    position: absolute; 
    top: 0; left: 0; 
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); 
    z-index: 9999; 
    color: white;
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    text-align: center;
    padding: 20px; 
    box-sizing: border-box;
}
</style>
</head>
<body>

    <div id="error-screen">
        <h3 style="color: #ff4d4d; margin-top: 0;">ACESSO BLOQUEADO</h3>
        <p style="font-family: sans-serif; font-size: 14px; color: #ccc;">
            O OBS não tem permissão para ler o banco de dados.<br><br>
            Vá nas Regras (Rules) do seu Firestore e coloque:<br>
            <strong style="color: yellow;">allow read: if true;</strong><br><br>
            Ou clique com botão direito no OBS -> Interagir -> Fazer Login abaixo:
        </p>
        <button onclick="fazerLoginOBS()" style="padding: 10px; cursor: pointer; background: #5A0C92; color: white; border: none; font-weight: bold;">Login com Google</button>
    </div>

    <div id="main-wrapper">
        
        <div id="image-frame">
            <img id="personagem-img" src="" alt="">
            <div id="pe-container">
                <span id="pe-val">0</span>
            </div>
        </div>

        <div id="stats-container">
            <div id="nome-val">AGENTE</div>
            <div id="vida-text">0 / 0</div>
            <div id="san-text">0 / 0</div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        function fazerLoginOBS() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => alert(e.message));
        }

        function iniciarOverlay() {
            if(!id) return;

            db.collection("fichas").doc(id).onSnapshot(doc => {
                document.getElementById('error-screen').style.display = 'none';

                const d = doc.data();
                if(!d) return;

                // 1. Atualiza Textos
                document.getElementById('nome-val').innerText = d.nome || "Agente";
                document.getElementById('pe-val').innerText = d.peAtual || 0;
                
                document.getElementById('vida-text').innerText = `${d.vidaAtual || 0} / ${d.vidaMax || 0}`;
                document.getElementById('san-text').innerText = `${d.sanAtual || 0} / ${d.sanMax || 0}`;

                // 2. Lógica Automática de Troca de Arte
                let imgFinal = d.portraitNormal || "";
                const imgEl = document.getElementById('personagem-img');
                imgEl.classList.remove('morto');

                const pVida = (d.vidaAtual / d.vidaMax) * 100;

                // A prioridade desce do Pior estado (Morto) para o Menos Pior
                if (d.vidaAtual <= 0) {
                    imgFinal = d.portraitMorto || d.portraitNormal || "";
                    if (!d.portraitMorto && d.portraitNormal) imgEl.classList.add('morto'); 
                } 
                else if (d.sanAtual <= 0) {
                    imgFinal = d.portraitEnlouquecendo || d.portraitNormal || "";
                } 
                else if (pVida <= 50) {
                    imgFinal = d.portraitMachucado || d.portraitNormal || "";
                }

                // Evita que a imagem "pisque" atualizando só se a URL mudar
                if(imgFinal && imgEl.getAttribute('src') !== imgFinal) {
                    imgEl.setAttribute('src', imgFinal);
                } else if (!imgFinal && imgEl.getAttribute('src') !== "") {
                    imgEl.setAttribute('src', "");
                }

            }, error => {
                console.error("Erro de permissão:", error);
                document.getElementById('error-screen').style.display = 'flex';
            });
        }

        iniciarOverlay();

        auth.onAuthStateChanged(user => {
            if(user) iniciarOverlay();
        });

    </script>
</body>
</html>
