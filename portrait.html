<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portrait Overlay - Manual Crop</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
        
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: 'Special Elite', sans-serif; 
            background: transparent; 
        }
        
        #main-wrapper {
            display: flex;
            flex-direction: row;
            align-items: flex-end; 
            padding: 20px;
            gap: 25px;
        }

        /* JANELA DE RECORTE (TAMANHO FIXO) */
        #image-frame {
            position: relative;
            width: 250px;  /* Largura fixa do recorte */
            height: 350px; /* Altura fixa do recorte */
            overflow: hidden; /* Esconde o que sobrar da imagem manual */
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #personagem-img {
            position: absolute; /* Necessário para o recorte manual */
            transition: all 0.3s ease-out; /* Transição suave ao ajustar */
            /* O tamanho e posição serão controlados pelo JavaScript via Firebase */
        }

        /* PE SOBREPOSTO NA IMAGEM (CANTO INFERIOR ESQUERDO) */
        #pe-container {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 28px; 
            color: #cc66ff;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 10px #9900ff, 0 0 20px #9900ff;
            z-index: 10;
        }

        /* STATUS AO LADO DA IMAGEM */
        #stats-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-end;
            padding-bottom: 5px;
        }

        #nome-val {
            font-size: 40px;
            color: #ff4d4d;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 12px #ff0000, 0 0 25px #ff0000;
            margin-bottom: 10px;
            line-height: 0.9;
        }

        #vida-text {
            font-size: 36px;
            color: #ff4d4d;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 10px #ff0000, 0 0 20px #ff0000;
            margin-bottom: 5px;
            line-height: 1;
        }

        #san-text {
            font-size: 36px;
            color: #4da6ff;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 10px #0066ff, 0 0 20px #0066ff;
            line-height: 1;
        }

        .morto { filter: brightness(0) contrast(100%); }

        #error-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999; color: white;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
    </style>
</head>
<body>

    <div id="error-screen">
        <h3 style="color: #ff4d4d;">ERRO DE PERMISSÃO</h3>
        <button onclick="fazerLoginOBS()">Fazer Login</button>
    </div>

    <div id="main-wrapper">
        <div id="image-frame">
            <img id="personagem-img" src="" alt="">
            <div id="pe-container"><span id="pe-val">0</span></div>
        </div>

        <div id="stats-container">
            <div id="nome-val">AGENTE</div>
            <div id="vida-text">0 / 0</div>
            <div id="san-text">0 / 0</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzOGimCx5mgObg1ulI0SdnbyS0zlU-DkI",
            authDomain: "fichasrpg-7fc69.firebaseapp.com",
            projectId: "fichasrpg-7fc69",
            storageBucket: "fichasrpg-7fc69.firebasestorage.app",
            messagingSenderId: "758802032764",
            appId: "1:758802032764:web:40467e15fdc24c570081f9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        function iniciarOverlay() {
            if(!id) return;

            db.collection("fichas").doc(id).onSnapshot(doc => {
                const d = doc.data();
                if(!d) return;

                // 1. Atualiza Textos
                document.getElementById('nome-val').innerText = d.nome || "Agente";
                document.getElementById('pe-val').innerText = d.peAtual || 0;
                document.getElementById('vida-text').innerText = `${d.vidaAtual || 0} / ${d.vidaMax || 0}`;
                document.getElementById('san-text').innerText = `${d.sanAtual || 0} / ${d.sanMax || 0}`;

                // 2. Lógica de Imagem
                let imgFinal = d.portraitNormal || "";
                const imgEl = document.getElementById('personagem-img');
                const pVida = (d.vidaAtual / d.vidaMax) * 100;

                imgEl.classList.remove('morto');
                if (d.vidaAtual <= 0) {
                    imgFinal = d.portraitMorto || d.portraitNormal || "";
                    if (!d.portraitMorto) imgEl.classList.add('morto');
                } else if (d.sanAtual <= 0) {
                    imgFinal = d.portraitEnlouquecendo || d.portraitNormal || "";
                } else if (pVida <= 50) {
                    imgFinal = d.portraitMachucado || d.portraitNormal || "";
                }

                if(imgEl.src !== imgFinal) imgEl.src = imgFinal;

                // 3. RECORTE MANUAL (Ajusta via Firebase)
                // Use os campos: portraitZoom (ex: 1.5), portraitX (ex: -50), portraitY (ex: 20)
                const zoom = d.portraitZoom || 1;
                const posX = d.portraitX || 0;
                const posY = d.portraitY || 0;

                imgEl.style.width = (zoom * 100) + "%"; 
                imgEl.style.left = posX + "px";
                imgEl.style.top = posY + "px";

            }, err => {
                document.getElementById('error-screen').style.display = 'flex';
            });
        }

        iniciarOverlay();
    </script>
</body>
</html>
